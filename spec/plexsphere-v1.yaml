            (unlike the IdP list endpoint where it is optional) because
            Group slugs are scoped per-Domain and listing across
            domains would require cross-domain cursor merging that the
            repo layer does not support and is not needed by the admin
            UI.
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: |
            Opaque continuation token returned by a previous call's
            `next_cursor`.
        - in: query
          name: limit
