  /v1/projects/{project_id}/resources:
    post:
      operationId: CreateResource
      summary: Create a Resource (adopted or broker-provisioned).
      description: |
        Creates a Tenancy Resource inside the addressed Project. The
        `origin` field discriminates the two creation flows:

          * `origin=adopted` — the Resource entered the platform
            through an out-of-band channel (bare-metal systemd unit,
            Kubernetes ExternalSecrets pattern). The handler persists
            the Resource with `Origin=Adopted` and returns `201` with
            the hydrated `ResourceResponse`.
          * `origin=provisioned` — the Resource's substrate is owned
            by the Provisioning Broker. The handler persists the
            Resource with `Origin=Provisioned`, calls
            `broker.Service.Provision` to mint a Pending
            `ProvisionedResource`, and returns `202` with a pollable
            `Location` header pointing at `/v1/resources/{id}`. The
            provisioned flow additionally requires the
            `cloud_credential#uses` ReBAC relation on the named
            Cloud Credential.

        Every call runs the Project `deploy` ReBAC check BEFORE any
        persistence write. A body missing `origin` or carrying a value
        outside `{adopted, provisioned}` is rejected with
        `400 invalid_resource_origin`.
      tags:
        - resource
      parameters:
        - $ref: "#/components/parameters/ResourceProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceCreateRequest"
            example:
              origin: "adopted"
              kind: "kubernetes-node"
              external_ref: "node-ref-01"
      responses:
        "201":
          description: |
            Adopted Resource created. The response body is the
            hydrated `ResourceResponse`; the `provisioning` field is
            absent because adopted Resources have no broker-owned
            ProvisionedResource.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceResponse"
        "202":
          description: |
            Provisioned Resource accepted. The broker has minted a
            Pending `ProvisionedResource` and reconcile will drive it
            toward `Ready`. The response body carries the hydrated
            `ResourceResponse` with `provisioning.phase = Pending`;
            the `Location` header carries the canonical URL of the
            new Resource.
          headers:
            Location:
              description: |
                Canonical URL of the freshly created Resource —
                `/v1/resources/{id}` — pollable by the caller to
                observe broker provisioning progress.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceResponse"
        "400":
          description: |
            Body rejected. Body is a `Problem` with `code` ∈
            { `invalid_resource_origin`, `invalid_project_id`,
            `invalid_body` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/invalid-resource-origin"
                title: "Invalid Resource Origin"
                status: 400
                detail: "origin must be one of: adopted, provisioned"
                instance: "/v1/projects/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1/resources"
                code: "invalid_resource_origin"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to create a Resource in this
            Project (missing Project `deploy`) or to use the named
            Cloud Credential (missing `cloud_credential#uses` for the
            provisioned flow). Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Parent Project not found. Body is a `Problem` with
            `code: project_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "413":
          description: |
            Request body exceeded the 8 KiB tenancy ceiling.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    get:
      operationId: ListProjectResources
      summary: List Resources inside a Project.
      description: |
        Returns a creation-ordered page of Resources owned by the
        Project identified by `{project_id}`. The handler runs a
        top-level `observe` ReBAC check on the parent Project BEFORE
        the persistence read, then layers a per-row `observe` filter
        on top so the response items are the subset of the
        persistence-level page the caller is authorised to see.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`.
      tags:
