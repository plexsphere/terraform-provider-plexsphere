                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to remove the Group member. Body
            is a `PermissionDenied` problem carrying the ReBAC denial
            `reason`, traversed `relation_path`, and the
            `correlation_id` that pairs with the audit entry
