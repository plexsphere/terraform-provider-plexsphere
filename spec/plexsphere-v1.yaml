                detail: "no Cloud Credential with id 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d1"
                instance: "/v1/cloud-credentials/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d1"
                code: "cloud_credential_not_found"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/cloud-credentials/{id}/revoke:
    post:
      operationId: RevokeCloudCredential
      summary: Revoke a Cloud Credential.
      description: |
        Revokes the Cloud Credential identified by `{id}`. The handler
        reads the row to resolve the parent Cloud, runs the `manage`
        ReBAC check on that Cloud, then delegates to the Cloud
        Credentials Custodian which stamps `revoked_at`, soft-deletes
        the underlying secret, and appends a `CloudCredentialRevoked`
        outbox event in a single transaction.

        Revocation is idempotent: revoking an already-revoked
        credential returns `200` with the unchanged metadata rather
        than an error. The response carries the metadata-only
        projection showing the populated `revoked_at`.
      tags:
        - cloud
      parameters:
        - $ref: "#/components/parameters/CloudCredentialID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloudCredentialRevokeRequest"
            example:
              reason: "rotated out of band by the platform on-call"
      responses:
        "200":
          description: |
            Cloud Credential revoked (or already revoked — the call is
            idempotent). Body is the metadata-only projection with
            `revoked_at` populated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudCredentialResponse"
        "400":
          description: |
            Malformed id or body. Body is a `Problem` with `code` ∈
            { `invalid_cloud_credential_id`, `invalid_body`,
            `invalid_revoke_reason` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to manage the parent Cloud.
            Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Cloud Credential not found. Body is a `Problem` with
            `code: cloud_credential_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "413":
          description: |
            Request body exceeded the 8 KiB Cloud Credentials ceiling.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/projects/{id}/credential-assignments:
    post:
      operationId: RequestCredentialAssignment
      summary: Request a Credential Assignment for a Project.
      description: |
        Opens a Credential Assignment request that binds the Cloud
        Credential named in the body to the Project identified by
        `{id}`. The handler runs a `manage` ReBAC check on the parent
        Project BEFORE the persistence write, then delegates to the
        Credential Assignment application service which records the
        request in the `requested` state and appends a
        `CredentialAssignmentRequested` outbox event in a single
        transaction.

        The newly opened assignment is not yet materialised — the
        binding only becomes live once an approver moves it to the
        `approved` state. A second open request for the same
        (Project, Cloud Credential) pair while an earlier one is still
        live is rejected with `409 duplicate_live_assignment`. A Cloud
        Credential that is not in an assignable lifecycle state is
        rejected with `422 credential_not_assignable`.
      tags:
        - cloud
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialAssignmentRequest"
            example:
              cloud_credential_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d1"
      responses:
        "201":
          description: |
            Credential Assignment opened in the `requested` state. The
            `Location` header carries the canonical URL of the new
            assignment.
          headers:
            Location:
              description: |
                Canonical URL of the freshly opened Credential
                Assignment — `/v1/credential-assignments/{id}`.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialAssignmentResponse"
        "400":
          description: |
            Malformed id or body. Body is a `Problem` with `code` ∈
            { `invalid_project_id`, `invalid_body`,
            `invalid_cloud_credential_id` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to manage the parent Project.
            Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "409":
          description: |
            A live Credential Assignment already exists for the same
            (Project, Cloud Credential) pair. Body is a `Problem` with
            `code: duplicate_live_assignment`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: |
            The named Cloud Credential is not in an assignable
            lifecycle state. Body is a `Problem` with
            `code: credential_not_assignable`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    get:
      operationId: ListCredentialAssignments
      summary: List the Credential Assignments owned by a Project.
      description: |
        Returns a creation-ordered page of Credential Assignment
        lifecycle metadata for the Project identified by `{id}`. The
        handler runs a top-level `observe` ReBAC check on the parent
        Project BEFORE the persistence read, then layers a per-row
        `observe` filter on top so the response items are the subset
        of the persistence-level page the caller is authorised to see.

        The projection carries the assignment identity, the owning
        Project, the bound Cloud Credential, the lifecycle state, a
        derived `materialised` flag, and the lifecycle timestamps.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
