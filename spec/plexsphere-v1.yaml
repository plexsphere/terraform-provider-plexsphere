            `400 allowed_subnet_empty`.
        routing_policy:
          $ref: "#/components/schemas/BridgeSiteToSiteTunnelRoutingPolicy"
    BridgeSiteToSiteTunnelResponse:
      type: object
      description: |
        Hydrated projection of a bridge site-to-site tunnel. Shared by
        `CreateBridgeSiteToSiteTunnel`, `GetBridgeSiteToSiteTunnel`,
        `UpdateBridgeSiteToSiteTunnel`, and the list wrapper.
      required:
        - id
        - slug
        - kind
        - remote_host
        - remote_port
        - auth_secret_ref
        - allowed_subnets
        - routing_policy
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Tunnel identifier (UUIDv7).
        slug:
          type: string
          pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
          maxLength: 63
          description: Stable identity of the tunnel within its Resource.
        kind:
          $ref: "#/components/schemas/BridgeSiteToSiteTunnelKind"
        remote_host:
          type: string
          minLength: 1
          description: Hostname or address of the remote tunnel endpoint.
        remote_port:
          type: integer
          minimum: 1
          maximum: 65535
          description: Port on the remote tunnel endpoint.
        auth_secret_ref:
          type: string
          description: |
            Opaque reference to the tunnel's authentication material in
            the form `secret:<domain>/<project>/<name>(:<version>)?`.
        allowed_subnets:
          type: array
          items:
            type: string
            description: CIDR prefix the tunnel routes.
          description: CIDR prefixes the tunnel routes.
        routing_policy:
          $ref: "#/components/schemas/BridgeSiteToSiteTunnelRoutingPolicy"
        created_at:
          type: string
          format: date-time
          description: Tunnel creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: Last-modified timestamp (UTC).
    BridgeSiteToSiteTunnelList:
      type: object
      description: |
        Site-to-site tunnels on a bridge Resource, returned by
        `ListBridgeSiteToSiteTunnels`. Ordered by slug ascending.
      required:
        - tunnels
      properties:
        tunnels:
          type: array
          items:
            $ref: "#/components/schemas/BridgeSiteToSiteTunnelResponse"
          description: Tunnels ordered by slug ascending.
  parameters:
    DomainID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Domain identifier (UUIDv7). Bound on `/v1/domains/{id}` for
        the tenancy CRUD surface.
    CloudID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Cloud identifier (UUIDv7). Bound on `/v1/clouds/{id}` for the
        Cloud Inventory CRUD surface.
    CloudCredentialID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Cloud Credential identifier (UUIDv7). Bound on
        `/v1/cloud-credentials/{id}` and
        `/v1/cloud-credentials/{id}/revoke` for the operator-facing
        Cloud Credentials read + revoke surface.
    BlueprintID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Blueprint identifier (UUIDv7). Bound on `/v1/blueprints/{id}`
        for the read-only Blueprint Catalog surface.
    ResourceID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Resource identifier (UUIDv7). Bound on `/v1/resources/{id}`
        for the Tenancy Resource read + delete surface.
    ResourceProjectID:
      in: path
      name: project_id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Owning Project (UUIDv7). Bound on
        `/v1/projects/{project_id}/resources` for the Resource
        collection — create and list. Reused by the Bridge Orchestrator
        surface under
        `/v1/projects/{project_id}/resources/{resource_id}/bridge/...`.
    # traceability: PX-0072, S037 — Bridge Orchestrator path parameters.
    BridgeResourceID:
      in: path
      name: resource_id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Addressed bridge Resource (UUIDv7). Bound on every
        `/v1/projects/{project_id}/resources/{resource_id}/bridge/...`
        operation. A Resource that exists but is not kind `bridge`
        surfaces as `409 resource_not_bridge` on every mutating call.
    BridgeSlug:
      in: path
      name: slug
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
        maxLength: 63
      description: |
        Stable slug of a bridge user-access provider, public-ingress
        rule, or site-to-site tunnel. Bound on the `/{slug}` sub-resource
        operations. Unique per `(resource_id, slug)` within its
        aggregate kind.
    ProjectID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Project identifier (UUIDv7). Bound on `/v1/projects/{id}` for
        the tenancy CRUD surface and on
        `/v1/projects/{id}/credentials` for the operator-facing
        OpenBao Credential Broker inventory list.
    CredentialID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Credential identifier (UUIDv7). Bound on
        `/v1/credentials/{id}`, `/v1/credentials/{id}/revoke`, and
        `/v1/credentials/{id}/rotate` for the operator-facing OpenBao
        Credential Broker read + lifecycle surface.
    CredentialAssignmentID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Credential Assignment identifier (UUIDv7). Bound on
        `/v1/credential-assignments/{id}/approve`,
        `/v1/credential-assignments/{id}/reject`, and
        `/v1/credential-assignments/{id}/revoke` for the Credential
        Assignment decision surface.
    IntegrityViolationID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Integrity-violation identifier (UUIDv7). Bound on
        `/v1/integrity-violations/{id}/acknowledge` for the triage
        acknowledge surface.
    ApprovalID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Approval identifier (UUIDv7). Bound on
        `/v1/approvals/{id}`, `/v1/approvals/{id}/approve`,
        `/v1/approvals/{id}/reject`, and
        `/v1/approvals/{id}/break-glass` for the dual-control approval
        read + decision surface.
    ExecutionProjectID:
      in: path
      name: project_id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Owning Project. The Action Orchestrator dispatch and read
        operations are scoped per Project, so every operator-facing
        endpoint requires the Project identifier in the path.
    ExecutionID:
      in: path
      name: execution_id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Execution identifier (UUIDv7). Bound on
        `/v1/projects/{project_id}/executions/{execution_id}` for the
        single-Execution read.
    SessionProjectID:
      in: path
      name: project_id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Owning Project. The Access Orchestrator issue, list, read, and
        revoke operations are scoped per Project, so every operator-facing
        endpoint requires the Project identifier in the path.
    SessionID:
      in: path
      name: session_id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Session identifier (UUIDv7). Bound on
        `/v1/projects/{project_id}/sessions/{session_id}`, its `:revoke`
        sub-resource, and its `/attach` WebSocket gateway for the
        single-Session read, revoke, and attach.
    # traceability: PX-0082, S057, REQ-001 — Secret Store inventory path parameter.
    SecretInventoryProjectID:
      in: path
      name: project_id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Owning Project. The operator-facing Secret Store inventory is scoped
        per Project, so the listing endpoint requires the Project identifier
        in the path.
    BootstrapTokenProjectID:
      in: path
      name: project_id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Owning Project. The BootstrapToken aggregate is scoped per
        Project so every administration endpoint requires the Project
        identifier in the path.
    ManagementClusterID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Management cluster identifier (UUIDv7). Bound on
        `/v1/management-clusters/{id}` and
        `/v1/management-clusters/{id}/assignments` for the
        operator-facing Management Fleet surface.
    ManagementFleetProjectID:
      in: path
      name: project_id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Owning Project (UUIDv7). Bound on
        `/v1/projects/{project_id}/management-cluster-assignment` and
        its `/terminate` sub-resource — the Management Fleet assignment
        is keyed by the Project it places.
    AuditDomainID:
      in: path
      name: domainId
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Owning Domain. The Platform Audit Log is per-Domain by
        residency contract — cross-Domain decisions land in EACH
        affected Domain's chain, never on a shared system chain
        . Every audit endpoint requires the Domain
        identifier in the path.
    PrincipalID:
      in: path
      name: principalId
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Principal identifier (UUIDv7). Bound on
        `/v1/domains/{id}/identities/{principalId}` for the per-Domain
        identity-read surface.
    InvitationID:
      in: path
      name: invitationId
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Invitation identifier (UUIDv7). Bound on
        `/v1/domains/{id}/invitations/{invitationId}` for the per-
        Domain invitation read / revoke surface.
    RelationTupleID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Relation tuple identifier (UUIDv7). Bound on
        `/v1/authz/relation-tuples/{id}` for the per-tuple PATCH /
        DELETE surface.
    # traceability: PX-0063 — Path parameters for the Network Policy
    # editor surface. Naming follows the snake_case convention used
    # by sibling Project-scoped surfaces (`project_id`, `policy_id`,
    # `revision_id`).
    PolicyProjectID:
      in: path
      name: project_id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Owning Project (UUIDv7). Bound on every
        `/v1/projects/{project_id}/policies/...` operation — the
        Policy aggregate is per-Project and the dual ReBAC check uses
        the Project as the second relation target.
    PolicyID:
      in: path
      name: policy_id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Policy identifier (UUIDv7). Bound on every
        `/v1/projects/{project_id}/policies/{policy_id}/...` operation.
    PolicyRevisionID:
      in: path
      name: revision_id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Revision identifier (UUIDv7). Bound on
        `/v1/projects/{project_id}/policies/{policy_id}/revisions/{revision_id}`.
        Revisions that do not belong to the addressed Policy surface
        as `404 revision_not_visible`.
    ArtifactVersion:
      in: path
      name: version
      required: true
      schema:
        type: string
      description: |
        plexd release version the registry indexes — the upstream
        release tag, for example a semver tag such as `v1.4.2`. Bound on
        `/v1/artifacts/plexd/{version}` and its `.sigstore` companion
        for the read-only plexd release registry surface.
    Authorization:
      in: header
      name: Authorization
      required: true
      schema:
        type: string
      description: |
        `Bearer <access token>` — the operator bearer credential the
        request authenticates with. A missing, malformed, or rejected
        token surfaces as `401`.
  securitySchemes:
    operatorBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Operator bearer credential carried in the `Authorization: Bearer`
        header. The Access Orchestrator issuance and revocation operations
        require it. Note this scheme authenticates the OPERATOR making the
        request; it is distinct from the short-lived, session-scoped EdDSA
        JWT the issuance operation returns, which authenticates the
        operator's later connection to the mediated target and is signed
        with the per-Domain Signing Service key.
