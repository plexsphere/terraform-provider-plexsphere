        "409":
          description: |
            Immutable Definition rejected a value-schema change
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: Aggregate invariant violated.
          content:
            application/problem+json:
