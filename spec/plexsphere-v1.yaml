  /v1/nodes/{id}/capabilities:
    put:
      operationId: PutNodeCapabilities
      summary: Record the per-Node capability manifest snapshot.
      description: |
        Accepts a CapabilityManifest snapshot from plexd describing the
        running agent binary, its SSH host-key fingerprint, and any
        hooks the agent advertises. The handler:

          1. Authenticates the caller against the Node Secret Key (NSK)
             plaintext supplied in the `Authorization: Bearer` header,
             refusing missing or revoked credentials with 401.
          2. Asserts that the NSK belongs to the Node addressed by the
             path `id`, refusing cross-Node use with 403
             `node_id_mismatch` so a leaked NSK cannot be replayed
             against a sibling Node.
          3. Caps the request body at 32 KiB; oversize bodies receive
             413 `capabilities_body_too_large` without ever touching
             the JSON decoder.
          4. Decodes the body with `DisallowUnknownFields`; a malformed
             envelope or an unknown field surfaces as 400
             `malformed_capabilities_request`.
          5. Canonicalises the envelope through the
             `tenancy.NewCapabilityManifest` value-object constructor
             which enforces every manifest invariant: `binary_version`
             non-empty, `binary_checksum` exactly 32 bytes,
             `ssh_host_key_fingerprint` empty or matching
             `SHA256:<base64>`, no duplicate hook names, hook count
             within the per-manifest cap, and every hook's `checksum`
             exactly 32 bytes.
          6. Persists the snapshot inside a single transaction. When
             the supplied manifest differs from the prior persisted
             row, the recorder appends a `NodeCapabilitiesUpdated`
             outbox event in the same transaction so downstream
             integrity correlators and dashboard projectors observe
             the change atomically.

        The 200 response carries `accepted_at` (server commit
        timestamp), the alphabetically-sorted `fields_changed` list of
        manifest fields that transitioned versus the prior snapshot,
        and the dedicated `host_key_changed` flag so downstream
        security correlators can branch on SSH host-key transitions
        without parsing `fields_changed`. An idempotent PUT (no diff)
        emits an empty `fields_changed` array and `host_key_changed:
        false`.

        DEFERRED-WIRING POSTURE: until the production composition root
        supplies the CapabilitiesRecorder, NSKResolver, and NodeRepo
        ports the handler depends on, every request to this endpoint
        returns 501 with `code: capabilities_not_provisioned` so log
        scrapers can alert on the deferred-wiring state.
      tags:
        - mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Node identifier (UUIDv7) — the capability manifest scope.
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: |
            `Bearer <NSK plaintext>` — the per-Node Node Secret Key
            issued at registration time. The NSK is bound to the Node
            addressed by the path `id`; a credential belonging to a
            different Node surfaces as 403 `node_id_mismatch`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapabilityManifestRequest"
            example:
              binary_version: "plexd-v0.4.2-ge5f3a1c"
              binary_checksum: "XohImNooBHFR0OVvjcYpJ3NgPQ1qq73WKhHvch0VQtg="
              ssh_host_key_fingerprint: "SHA256:6QGz1Q4iE2zG5p2N3oRZb8ZsT4nKqJgY3oZmP8eFvWk="
              declared_hooks:
                - name: "post-install"
                  checksum: "XohImNooBHFR0OVvjcYpJ3NgPQ1qq73WKhHvch0VQtg="
              plexd_hooks:
                - name: "nightly-backup"
                  image_digest: "sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
                  parameters:
                    retention: "7d"
                  timeout_seconds: 300
                  sandbox: true
      responses:
        "200":
          description: |
            Capability manifest accepted. The persisted snapshot has
            been updated and the response carries the server commit
            timestamp and the diff against the prior snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilityManifestResponse"
              example:
                accepted_at: "2026-04-27T10:15:30.123Z"
                fields_changed:
                  - "binary_checksum"
                  - "binary_version"
                host_key_changed: false
        "400":
          description: |
            Capability manifest body failed structural validation. The
            Problem body's `code` field disambiguates the cause and is
            one of the following exhaustive enum values:

              - `binary_version_empty` — `binary_version` is missing
                or empty after trimming whitespace.
              - `binary_checksum_invalid` — `binary_checksum` is
                missing or does not decode to a 32-byte SHA-256
                digest.
              - `ssh_host_key_fingerprint_invalid` —
                `ssh_host_key_fingerprint` is non-empty and does not
                match the canonical `SHA256:<base64>` form.
              - `declared_hook_invalid` — `declared_hooks` contains an
                entry whose `name` is empty or whose `checksum` is not
                exactly 32 bytes.
              - `declared_hook_duplicate` — `declared_hooks` contains
                two entries with the same `name`.
              - `declared_hooks_too_many` — `declared_hooks` exceeds
                the per-manifest cap of 128 entries.
              - `malformed_capabilities_request` — request body cannot
                be decoded as a CapabilityManifestRequest envelope
                (e.g. invalid JSON, unknown field, missing required
                field).

            Generated TypeScript / Go clients can therefore
            exhaustively switch on `code` without a fall-through arm.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/binary-checksum-invalid"
                title: "Bad Request"
                status: 400
                detail: "binary_checksum must be exactly 32 bytes (raw SHA-256)."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/capabilities"
                code: "binary_checksum_invalid"
        "401":
          description: |
            NSK in the `Authorization: Bearer` header is missing,
            malformed, or has been revoked. The Problem body's `code`
            field disambiguates the cause:

              - `nsk_revoked` — the NSK has been revoked by the NSK
                middleware (the normal production path; rejection
                happens before the handler runs).
              - `unauthorized` — the handler's defensive arm fired
                because the NSK middleware did not attach a Node to
                the request context (a misconfigured route, or the
                middleware was bypassed).

            Generated TypeScript / Go clients can exhaustively switch
            on `code` without a fall-through arm. The example below
            illustrates the canonical `nsk_revoked` path.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/nsk-revoked"
                title: "Unauthorized"
                status: 401
                detail: "NSK presented in Authorization: Bearer has been revoked."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/capabilities"
                code: "nsk_revoked"
        "403":
          description: |
            The NSK in the `Authorization: Bearer` header authenticates
            successfully but belongs to a different Node than the path
            `id`. The PermissionDenied body's `code` field is
            `node_id_mismatch` so a leaked NSK cannot be replayed
            against a sibling Node.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
              example:
                type: "https://plexsphere.dev/errors/node-id-mismatch"
                title: "Forbidden"
                status: 403
                detail: "NSK is bound to a different Node than the path id."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/capabilities"
                code: "node_id_mismatch"
                reason: insufficient_relation
                relation_path: []
                correlation_id: "01HXYZABCDEFGHJKMNPQRSTVWX"
        "404":
          description: |
            No Node row resolves for the path `id` — the row was
            concurrently deleted between the NSK middleware's admission
            and the aggregate write. The Problem body's `code` field is
            `capabilities_node_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/capabilities-node-not-found"
                title: "Node Not Found"
                status: 404
                detail: "node not found."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/capabilities"
                code: "capabilities_node_not_found"
        "413":
          description: |
            Request body exceeded the 32 KiB ceiling enforced by the
            handler. The Problem body's `code` field is
            `capabilities_body_too_large` so the handler can refuse a
            pathological payload without ever invoking the JSON
            decoder.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/capabilities-body-too-large"
                title: "Payload Too Large"
                status: 413
                detail: "request body exceeds the 32768-byte capabilities envelope cap."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/capabilities"
                code: "capabilities_body_too_large"
        "422":
          description: |
            A `plexd_hooks` entry — the discovered Kubernetes PlexdHook
            list — failed a value-object invariant. The structurally
            well-formed envelope decoded, but a discovered-hook value is
            semantically invalid, so the surface returns 422 rather than
            the 400 reserved for structural/declared-hook failures. The
            Problem body's `code` field disambiguates the cause and is
            one of the following exhaustive enum values:

              - `plexd_hook_invalid` — a `plexd_hooks` entry has an
                empty `name`, an `image_digest` that is not canonical
                `sha256:<64 lowercase hex>`, or a negative
                `timeout_seconds`.
              - `plexd_hook_duplicate` — `plexd_hooks` contains two
                entries with the same `name`.
              - `plexd_hooks_too_many` — `plexd_hooks` exceeds the
                per-manifest cap of 128 entries.

            Generated TypeScript / Go clients can therefore exhaustively
            switch on `code` without a fall-through arm.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/plexd-hook-invalid"
                title: "Unprocessable Entity"
                status: 422
                detail: "plexd_hooks contains an entry whose image_digest is not a canonical sha256 digest."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/capabilities"
                code: "plexd_hook_invalid"
        "501":
          description: |
            The capability ingest surface is not yet provisioned in
            this build. The Problem body's `code` field is
            `capabilities_not_provisioned` so log scrapers can alert
            on the deferred-wiring state. Resolves once the
            CapabilitiesRecorder, NSKResolver, and NodeRepo ports are
            wired into the v1 handler dependency cone.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/capabilities-not-provisioned"
                title: "Not Implemented"
                status: 501
                detail: "PUT /v1/nodes/{id}/capabilities requires the production wiring of CapabilitiesRecorder, NSKResolver, and NodeRepo. One or more ports are not yet provisioned in this build."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/capabilities"
                code: "capabilities_not_provisioned"
  /v1/nodes/{id}/integrity-violations:
    post:
      operationId: PostNodeIntegrityViolations
      summary: Ingest a batch of integrity-violation reports for a Node.
      description: |
        Accepts a batch of `IntegrityViolation` reports from plexd
        describing tamper-evidence divergences the agent detected on
        the local Node: a mismatched binary checksum, a tampered Lua
        hook checksum, or a rotated SSH host-key fingerprint. The
        handler:

          1. Authenticates the caller against the Node Secret Key (NSK)
             plaintext supplied in the `Authorization: Bearer` header,
             refusing missing or revoked credentials with 401.
          2. Asserts that the NSK belongs to the Node addressed by the
             path `id`, refusing cross-Node use with 403
             `node_id_mismatch` so a leaked NSK cannot be replayed
             against a sibling Node.
          3. Caps the request body at 32 KiB; oversize bodies receive
             413 `integrity_violations_body_too_large` without ever
             touching the JSON decoder.
          4. Decodes the body with `DisallowUnknownFields`; a malformed
             envelope or an unknown field surfaces as 400
             `malformed_integrity_violations_request`.
          5. Canonicalises every entry through the
             `tenancy.NewIntegrityViolation` value-object constructor
             which enforces every per-violation invariant: `kind` in
             the closed set `{binary_checksum, hook_checksum,
             ssh_host_key}`, `detected_by` in the closed set
             `{startup_scan, inotify, pre_dispatch}`, `artifact_id`
             non-empty after trimming, `observed_checksum`/
             `expected_checksum` exactly 32 bytes for the checksum
             kinds, `observed_fingerprint`/`expected_fingerprint`
             matching `SHA256:<base64>` for the `ssh_host_key` kind,
             and the per-kind column-mismatch guard that rejects a
             checksum kind carrying fingerprint fields and vice versa.
          6. Hands the canonical batch to the Node aggregate's
             `RecordIntegrityViolations` method which enforces the
             batch-level invariants: at least one entry
             (`integrity_violations_empty`) and at most 128 entries
             (`integrity_violations_too_many`).
          7. Persists every violation row and appends a single
             `integrity_alert` outbox event inside one transaction so
             the operator signal and the audit evidence land together
             or neither lands.

        The 202 response carries `accepted_at` (server commit
        timestamp) and `violation_count` (echo of the persisted batch
        size) so the agent can record the receipt and reconcile with
        its local replay-queue. The response carries no payload echo
        and no per-row identifiers; the operator UI consumes the
        persisted rows from the dedicated audit and integrity surfaces.

        DEFERRED-WIRING POSTURE: until the production composition root
        supplies the IntegrityViolationsRecorder, NSKResolver, and
        NodeRepo ports the handler depends on, every request to this
        endpoint returns 501 with `code:
        integrity_violations_not_provisioned` so log scrapers can
        alert on the deferred-wiring state.
      tags:
        - mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Node identifier (UUIDv7) — the reporting Node.
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: |
            `Bearer <NSK plaintext>` — the per-Node Node Secret Key
            issued at registration time. The NSK is bound to the Node
            addressed by the path `id`; a credential belonging to a
            different Node surfaces as 403 `node_id_mismatch`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrityViolationsRequest"
            example:
              violations:
                - kind: "binary_checksum"
                  detected_by: "startup_scan"
                  artifact_id: "plexd"
                  observed_checksum: "XohImNooBHFR0OVvjcYpJ3NgPQ1qq73WKhHvch0VQtg="
                  expected_checksum: "n4bQgYhMfWWaL+qgxVrQFaO/TxsrC4Is0V1sFbDwCgg="
                - kind: "ssh_host_key"
                  detected_by: "inotify"
                  artifact_id: "ssh_host_ed25519_key.pub"
                  observed_fingerprint: "SHA256:6QGz1Q4iE2zG5p2N3oRZb8ZsT4nKqJgY3oZmP8eFvWk="
                  expected_fingerprint: "SHA256:7QGz1Q4iE2zG5p2N3oRZb8ZsT4nKqJgY3oZmP8eFvWk="
      responses:
        "202":
          description: |
            Integrity-violation batch accepted. Every violation row has
            been persisted and the dedicated `integrity_alert` outbox
            event has been appended inside the same transaction.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrityViolationsResponse"
              example:
                accepted_at: "2026-05-28T10:15:30.123Z"
                violation_count: 2
        "400":
          description: |
            Integrity-violation body failed structural validation. The
            Problem body's `code` field disambiguates the cause and is
            one of the following exhaustive enum values:

              - `malformed_integrity_violations_request` — request
                body cannot be decoded as an IntegrityViolationsRequest
                envelope (invalid JSON, unknown field, missing
                required field).
              - `integrity_violations_empty` — the `violations` array
                is empty after decoding.
              - `integrity_violations_too_many` — the `violations`
                array exceeds the per-batch cap of 128 entries.
              - `integrity_violation_kind_invalid` — an entry's `kind`
                is not in `{binary_checksum, hook_checksum,
                ssh_host_key}`.
              - `integrity_violation_kind_mismatch` — a `binary_checksum`
                or `hook_checksum` entry carries a fingerprint field,
                or an `ssh_host_key` entry carries a checksum field.
              - `integrity_violation_detected_by_invalid` — an entry's
                `detected_by` is not in `{startup_scan, inotify,
                pre_dispatch}`.
              - `integrity_violation_artifact_id_empty` — an entry's
                `artifact_id` is empty or whitespace-only.
              - `integrity_violation_checksum_invalid` — an entry's
                `observed_checksum` or `expected_checksum` is missing
                or does not decode to exactly 32 bytes.
              - `integrity_violation_host_key_fingerprint_invalid` —
                an entry's `observed_fingerprint` or
                `expected_fingerprint` is non-empty and does not match
                the canonical `SHA256:<base64>` form.

            Generated TypeScript / Go clients can therefore
            exhaustively switch on `code` without a fall-through arm.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/integrity-violation-kind-invalid"
                title: "Bad Request"
                status: 400
                detail: "violations[0].kind must be one of binary_checksum, hook_checksum, ssh_host_key."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/integrity-violations"
                code: "integrity_violation_kind_invalid"
        "401":
          description: |
            NSK in the `Authorization: Bearer` header is missing,
            malformed, or has been revoked. The Problem body's `code`
            field disambiguates the cause:

              - `nsk_revoked` — the NSK has been revoked by the NSK
                middleware (the normal production path; rejection
                happens before the handler runs).
              - `unauthorized` — the handler's defensive arm fired
                because the NSK middleware did not attach a Node to
                the request context (a misconfigured route, or the
                middleware was bypassed).

            Generated TypeScript / Go clients can exhaustively switch
            on `code` without a fall-through arm. The example below
            illustrates the canonical `nsk_revoked` path.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/nsk-revoked"
                title: "Unauthorized"
                status: 401
                detail: "NSK presented in Authorization: Bearer has been revoked."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/integrity-violations"
                code: "nsk_revoked"
        "403":
          description: |
            The NSK in the `Authorization: Bearer` header authenticates
            successfully but belongs to a different Node than the path
            `id`. The PermissionDenied body's `code` field is
            `node_id_mismatch` so a leaked NSK cannot be replayed
            against a sibling Node.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
              example:
                type: "https://plexsphere.dev/errors/node-id-mismatch"
                title: "Forbidden"
                status: 403
                detail: "NSK is bound to a different Node than the path id."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/integrity-violations"
                code: "node_id_mismatch"
                reason: insufficient_relation
                relation_path: []
                correlation_id: "01HXYZABCDEFGHJKMNPQRSTVWX"
        "404":
          description: |
            No Node row resolves for the path `id` — the row was
            concurrently deleted between the NSK middleware's admission
            and the aggregate write. The Problem body's `code` field is
            `integrity_violations_node_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/integrity-violations-node-not-found"
                title: "Node Not Found"
                status: 404
                detail: "node not found."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/integrity-violations"
                code: "integrity_violations_node_not_found"
        "413":
          description: |
            Request body exceeded the 32 KiB ceiling enforced by the
            handler. The Problem body's `code` field is
            `integrity_violations_body_too_large` so the handler can
            refuse a pathological payload without ever invoking the
            JSON decoder.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/integrity-violations-body-too-large"
                title: "Payload Too Large"
                status: 413
                detail: "request body exceeds the 32768-byte integrity-violations envelope cap."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/integrity-violations"
                code: "integrity_violations_body_too_large"
        "500":
          description: |
            Internal server error. A persistence or outbox failure that
