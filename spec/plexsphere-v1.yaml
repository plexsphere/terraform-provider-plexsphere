  /v1/nodes/{id}/executions/{exec_id}:
    post:
      operationId: PostNodeExecutionCallback
      summary: Report an action-execution status advance from a Node.
      description: |
        Accepts a per-Node action-execution result callback from plexd
        and drives the addressed invocation through the closed status
        state machine. The handler:

          1. Authenticates the caller against the Node Secret Key (NSK)
             plaintext supplied in the `Authorization: Bearer` header,
             rejecting revoked credentials with 401.
          2. Asserts that the NSK belongs to the Node addressed by the
             path `id`, refusing cross-Node use with 403
             `nsk_node_mismatch` so a leaked NSK cannot be replayed
             against a sibling Node's invocation.
          3. Drives the invocation addressed by `{exec_id}` to the
             reported `status` through a server-side compare-and-set
             against the closed state machine
             (`ack → started → (succeeded | failed | cancelled |
             timeout)`). An illegal advance returns 409
             `invalid_state_transition`; a re-post onto an already-settled
             invocation returns 409 `execution_already_terminal`.
          4. Collects the reported output. A bounded inline `output`
             (≤ 16 KiB) is stored in the control plane; an inline body
             over the ceiling is refused with 413
             `inline_output_too_large`. When the Node declares an
             over-ceiling output, the FIRST callback's 200 response
             carries an `output_upload_url` — a presigned object-store
             PUT URL the Node uploads the full body to before sending the
             terminal callback.

        DEFERRED-WIRING POSTURE: until the production composition root
        supplies the callback service and its NSK validator, every
        request to this endpoint returns 501 with `code:
        execution_callback_not_provisioned` so log scrapers can alert on
        the deferred-wiring state.
      tags:
        - actions
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Node identifier (UUIDv7) — the callback scope.
        - in: path
          name: exec_id
          required: true
          schema:
            type: string
            format: uuid
          description: Execution identifier (UUIDv7) the callback settles.
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: |
            `Bearer <NSK plaintext>` — the per-Node Node Secret Key
            issued at registration time. The NSK is bound to the Node
            addressed by the path `id`; a credential belonging to a
            different Node surfaces as 403 `nsk_node_mismatch`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutionCallbackRequest"
            example:
              status: "succeeded"
              exit_code: 0
              output:
                inline: "aGVsbG8gd29ybGQ="
      responses:
        "200":
          description: |
            Callback accepted. The invocation has been advanced and the
            response carries the new status. On the first over-ceiling
            callback it also carries the presigned object-store PUT URL
            the Node uploads the full output to.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionCallbackResponse"
              example:
                status: "started"
        "400":
          description: |
            Callback body failed structural validation — an invalid JSON
            envelope or a `status` that is not a member of the closed
            status set.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: |
            NSK in the `Authorization: Bearer` header is missing,
            malformed, or has been revoked. The Problem body's `code`
            field is `nsk_revoked` so log scrapers can distinguish
            credential revocation from generic auth failures.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            The NSK in the `Authorization: Bearer` header authenticates
            successfully but belongs to a different Node than the path
            `id`. The PermissionDenied body's `code` field is
            `nsk_node_mismatch` so a leaked NSK cannot be replayed against
            a sibling Node's invocation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            No invocation resolves for the addressed `(id, exec_id)` pair.
            Body is a `Problem` with `code: execution_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            The reported status advance is not legal. Body is a `Problem`
            with `code` ∈ { `invalid_state_transition` (the advance is not
            a legal edge of the state machine), `execution_already_terminal`
            (the invocation has already settled into a terminal status) }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "413":
          description: |
            The reported inline `output` exceeds the 16 KiB control-plane
            ceiling. Body is a `Problem` with `code:
            inline_output_too_large`. Over-ceiling output must be uploaded
            to the presigned object-store URL returned on the first
            callback instead.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: |
            The execution-callback surface is not yet provisioned in this
            build. The Problem body's `code` field is
            `execution_callback_not_provisioned` so log scrapers can alert
            on the deferred-wiring state. Resolves once the callback
            service and its NSK validator are wired into the v1 handler
            dependency cone.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/execution-callback-not-provisioned"
                title: "Not Implemented"
                status: 501
                detail: "POST /v1/nodes/{id}/executions/{exec_id} requires the production wiring of the callback service and its NSK validator. One or more ports are not yet provisioned in this build."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/executions/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0f1"
                code: "execution_callback_not_provisioned"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  # traceability: PX-0082, S057, REQ-001 — operator-facing Secret Store inventory.
  /v1/projects/{project_id}/secrets:
    get:
      operationId: ListProjectSecrets
      summary: List the secret names and current versions a Project exposes.
      description: |
        Returns a name-ordered page of Secret Store inventory metadata for
        the owning Project — each entry carrying ONLY the secret `name` and
        its `current_version`. The handler runs the secret-read ReBAC check
        on the Project BEFORE the persistence read. The projection is
        metadata-only: it never carries a secret payload, an OpenBao path,
        or any wrapping material, so an operator can audit what a Project
        exposes without ever seeing a payload.

        The pagination cursor is opaque and HMAC-signed by the server, so a
        tampered cursor surfaces as `400` on the next call.
      tags:
        - secrets
      security:
        - operatorBearer: []
      parameters:
        - $ref: "#/components/parameters/SecretInventoryProjectID"
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: |
            Opaque continuation token returned by a previous call's
            `next_cursor`. The encoding is HMAC-signed by the server so a
            tampered cursor surfaces as `400`.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: |
            Maximum number of items to return in a single page. The handler
            clamps the value to [1, 200] before forwarding it to the read
            service.
      responses:
        "200":
          description: Page of Secret Store inventory entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSecretList"
              example:
                items:
                  - name: "database-password"
                    current_version: 3
                  - name: "tls-private-key"
                    current_version: 1
                next_cursor: null
        "400":
          description: |
            Invalid query parameters — typically a tampered or malformed
            cursor (`code: invalid_cursor`) or an out-of-range `limit`
            (`code: invalid_limit`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to read the secret inventory in the
            owning Project. Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            The owning Project does not exist or is not visible. Body is a
            `Problem` with `code: project_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
