  /v1/keys/rotate:
    post:
      operationId: PostKeysRotate
      summary: Submit a freshly-generated Curve25519 key to complete a rotation.
      description: |
        Completes a pending mesh-key rotation for the calling Node.
        After an operator triggers a rotation via
        `POST /v1/nodes/{id}/keys/rotate` — or the heartbeat response
        sets `rotate_keys: true` — plexd generates a fresh Curve25519
        keypair and submits the new public key here. The handler:

          1. Authenticates the caller against the Node Secret Key
             (NSK) plaintext supplied in the `Authorization: Bearer`
             header. The route carries NO path `{id}` segment — the
             rotating Node is identified solely by the NSK envelope it
             presents — so a missing or unresolved NSK surfaces as
             401.
          2. Caps the request body at 4 KiB; oversize bodies receive
             413 `keys_rotate_body_too_large` without ever touching
             the JSON decoder.
          3. Validates the submitted `new_public_key` — it MUST decode
             to exactly 32 bytes and MUST NOT be the all-zero
             degenerate value — BEFORE any database read (otherwise
             422 `keys_rotate_public_key_invalid`).
          4. Resolves the caller's live Peer row; a Node with no live
             Peer surfaces as 404 `keys_rotate_peer_not_found`.
          5. Hands the new key to the rotation completer, which — in
             one transaction — updates `nodes.public_key`, retires the
             old pairwise PSK, wraps and inserts a fresh PSK, appends
             a `peer_key_rotated` outbox event, and flips the pending
             `peer_key_rotation` row to `completed`.

        The 200 response carries the completed rotation's id plus the
        `(kid, wrap_key_version)` reference of the re-issued PSK — it
        never carries PSK plaintext or ciphertext. An idempotent retry
        with the same key against an already-completed rotation
        returns the prior receipt and emits no second event.

        DEFERRED-WIRING POSTURE: until the production composition root
        supplies the RotationCompleter, NSKResolver, NodeRepo, and
        PeerLookup ports the handler depends on, every request to this
        endpoint returns 501 with `code: keys_rotate_not_provisioned`
        so log scrapers can alert on the deferred-wiring state.
      tags:
        - mesh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeysRotateRequest"
            example:
              new_public_key: "AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8="
      responses:
        "200":
          description: |
            Rotation completed. `nodes.public_key` has been updated,
            the old PSK retired, a fresh wrapped PSK inserted, and the
            pending `peer_key_rotation` row flipped to `completed` —
            all in one transaction. The response carries the rotation
            id and the re-issued PSK's `(kid, wrap_key_version)`
            reference.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeysRotateResponse"
              example:
                rotation_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a4"
                kid: "did:web:plexsphere.dev#psk-2026-04"
                wrap_key_version: 7
        "400":
          description: |
            Request body could not be decoded as a KeysRotateRequest
            envelope (invalid JSON, unknown field). The Problem body's
            `code` field is `malformed_keys_rotate_request`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: |
            NSK in the `Authorization: Bearer` header is missing,
            malformed, or has been revoked, so the rotating Node could
            not be resolved. The Problem body's `code` field is
            `unauthorized`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            The ReBAC middleware could not authorize the calling
            principal for the key-rotation surface — the authenticated
            Node does not map to a Subject permitted to complete a
            rotation. The PermissionDenied body carries the ReBAC
            denial `reason` and the `correlation_id` that pairs with
            the audit entry.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            No live Peer row resolves for the authenticated Node — the
            Node was drained or has never been bound to a Peer. The
            Problem body's `code` field is `keys_rotate_peer_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            No pending `peer_key_rotation` row exists for the
            authenticated Node — the submission has no rotation to
            complete. The Problem body's `code` field is
            `keys_rotate_no_pending_rotation`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "413":
          description: |
            Request body exceeded the 4 KiB ceiling enforced by the
            handler. The Problem body's `code` field is
            `keys_rotate_body_too_large` so the handler can refuse a
            pathological payload without ever invoking the JSON
            decoder.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: |
            The submitted `new_public_key` failed a structural or
            invariant check. The Problem body's `code` field
            disambiguates the cause:

              - `keys_rotate_public_key_invalid` — the key did not
                decode to exactly 32 bytes, was the all-zero
                degenerate value, or failed the rotation aggregate's
                key invariants.
              - `keys_rotate_public_key_unchanged` — the key is
                byte-identical to the Node's current public key; a
                rotation must install a genuinely new key.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: |
            Internal server error. A Peer-lookup failure or a
            rotation-completion persistence fault surfaces here with a
            non-revealing detail string; the rotation transaction
            rolls back atomically.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: |
            The key-rotation surface is not yet provisioned in this
            build. The Problem body's `code` field is
            `keys_rotate_not_provisioned` so log scrapers can alert on
            the deferred-wiring state. Resolves once the
            RotationCompleter, NSKResolver, NodeRepo, and PeerLookup
            ports are wired into the v1 handler dependency cone.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/nodes:
    get:
      operationId: ListNodes
      summary: List Node aggregates the cluster knows about.
      description: |
        Returns a page of Node aggregates (VM / Bridge / Worker) the
        caller is authorised to see. Per-row visibility is layered on
        top of the page: rows the caller cannot `read` are filtered
        out so the response items are a subset of the persistence-
        level page. The optional `domain_id` query parameter scopes
        the page to a single parent Domain. Cursor pagination mirrors
        `/v1/projects` exactly.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`.
      tags:
        - nodes
      parameters:
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: |
            Opaque continuation token returned by a previous call's
            `next_cursor`. The encoding is HMAC-signed by the server
            so a tampered cursor surfaces as `400`.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: |
            Maximum number of items to return in a single page. The
            handler clamps the value to [1, 200] before forwarding it
            to the service.
        - in: query
          name: domain_id
          required: false
          schema:
            type: string
            format: uuid
          description: |
            Optional filter scoping the page to a single parent
            Domain. Omit to page across every Domain the caller is
            authorised to see.
      responses:
        "200":
          description: Page of Nodes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeList"
              example:
                items:
                  - id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa"
                    name: "edge-bridge-01"
                    domain_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
                    kind: "bridge"
                    created_at: "2026-05-02T10:00:00Z"
                next_cursor: "eyJuYW1lIjoiZWRnZS1icmlkZ2UtMDEifQ.signed"
        "400":
          description: |
            Invalid query parameters — typically a tampered or
            malformed cursor, an out-of-range limit, or a malformed
            `domain_id` filter.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to list Nodes (body is a
            `PermissionDenied` problem) OR the pagination cursor was
            minted by a different caller and the per-(caller, pepper)
            HMAC binding rejected the replay (body is a `Problem`
            with `code = cursor_binding_mismatch`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/nodes/{id}/events:
    get:
      operationId: GetNodeEvents
      summary: Stream signed envelope events for a Node over SSE.
      description: |
        Opens a Server-Sent Events stream of canonical signed
        `Envelope` records scoped to the addressed Node. Each `data:` frame is the JSON wire body
        produced by `internal/signing/envelope.CanonicalBytes`. The
        server runs ed25519 verification against the per-Domain
        signing public key before emitting the frame; consumers
        SHOULD verify the trailing `signature:` field again as a
        defence-in-depth measure.

        The `id:` field on every event frame is the JetStream stream
        sequence number for that envelope. Clients resume by re-
        connecting with `Last-Event-ID: <numeric>` set to the last
        sequence they durably processed; the server replays from the
        next sequence (`> last`). When the header is absent or empty
        the stream tails from now — historical events are NOT
        backfilled.

        The server emits a 25-second SSE comment-frame keep-alive
        (`:keep-alive\n\n`) so idle proxies do not collapse the
        connection. The `X-Plexsphere-API-Version` response header
        carries the contract version the stream conforms to;
        `Cache-Control: no-cache` opts the response out of any
        intermediary caching layer.

        DEFERRED-WIRING POSTURE: the production
        composition root does not yet supply the SignatureVerifier,
        RelationChecker, or NodeRepo ports the handler depends on.
        Until those ports are wired, every request to this endpoint
        returns 501 with `code: signed_event_bus_not_provisioned`.
        See docs/architecture/mesh-event-bus-roadmap.md for the deferred work tracking.
      tags:
        - mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Node identifier (UUIDv7) — the SSE stream scope.
        - in: header
          name: Last-Event-ID
          required: false
          schema:
            type: string
          description: |
            SSE replay cursor. When present and parseable as a
            non-negative integer, the server resumes streaming from
            the envelope whose JetStream sequence is strictly greater
            than the supplied value. When absent or empty the stream
            tails from now.
      responses:
        "200":
          description: |
            SSE stream of signed envelope events. The body is an
            unbounded `text/event-stream` — each event frame carries
            an `id:` (JetStream sequence), an `event:` discriminator,
            and a `data:` line whose payload is the canonical signed
            envelope JSON. The currently emitted `event:` values are
            `node_state_updated`, `policy_updated`, and
            `bridge_config_updated`; `policy_updated` carries the
            per-(Node, Policy) compiled-ruleset projection described by
            `PolicyUpdatedPayload`, while `bridge_config_updated`
            carries the per-(Node, bridge Resource) delivered-config
            projection described by `BridgeConfigUpdatedPayload`.
            Additional discriminators land as the README's 14-type
            taxonomy ships. Comment frames every 25 seconds keep idle
            proxies from collapsing the connection.
          headers:
            X-Plexsphere-API-Version:
              description: |
                Contract version this SSE stream conforms to. Lets
                consumers branch on schema evolution without parsing
                the OpenAPI document at runtime.
              schema:
                type: string
              required: true
            Cache-Control:
              description: |
                Always `no-cache` — opts the SSE response out of any
                intermediary caching layer so events reach the
                consumer without staleness.
              schema:
                type: string
              required: true
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Opaque SSE wire body. The OpenAPI document cannot
                  describe the framed event-stream encoding directly;
                  consumers MUST parse it through an SSE-aware client
                  and verify each envelope's ed25519 signature. Each
                  envelope's `data:` payload, once parsed, conforms to
                  one of the per-event-type payload schemas — e.g.
                  `PolicyUpdatedPayload` for `event: policy_updated`
                  frames carrying the per-(Node, Policy) compiled
                  ruleset.
              example: |
                id: 1
                event: policy_updated
                data: {"id":"0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0","type":"policy_updated","scope":"domain:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1","key_id":"k-1","issued_at":"2026-05-27T10:00:00Z","payload":{"node_id":"0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a2","policy_id":"0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a3","revision_id":"0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a4","fingerprint":"47DEQpj8HBSa+/TImW+5JCeuQeRkm5NMpJWZG3hSuFU=","rules":[]},"signature":"<base64-ed25519>"}
              # x-plexsphere-event-payload-schemas documents the
              # discriminator → payload schema mapping for the SSE
              # frames carried on this stream. The `text/event-stream`
              # body itself is schema-less (`type: string`), so without
              # an explicit `$ref` here the per-event-type payload
              # schemas would be unreachable from any operation and
              # `make openapi-lint`'s `oas3-unused-component` rule
              # would (correctly) flag them as orphans. Mirroring the
              # `skip-prune: true` precedent in
              # tools/openapi/oapi-codegen-*.yaml, this extension
              # surfaces the schemas at the operation that emits the
              # corresponding frames so a consumer reading the spec
              # finds the per-event-type wire contract co-located with
              # its producer (PX-0065, REQ-007, S030).
              x-plexsphere-event-payload-schemas:
                policy_updated:
                  $ref: "#/components/schemas/PolicyUpdatedPayload"
                bridge_config_updated:
                  $ref: "#/components/schemas/BridgeConfigUpdatedPayload"
        "400":
          description: |
            `Last-Event-ID` header was present but unparseable —
            non-numeric, negative, or otherwise outside the integer
            domain. The stream is NOT opened.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller lacks the node-agent ReBAC relation on the
            addressed Node and may not subscribe to its event stream
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Node id not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: |
            The Signed Event Bus surface is not yet provisioned in
            this build. The Problem body's `code` field is
            `signed_event_bus_not_provisioned` so log scrapers can
            alert on the deferred-wiring state. Resolves once
            SignatureVerifier, RelationChecker, and NodeRepo are
            wired into the v1 handler dependency cone — see
            docs/architecture/mesh-event-bus-roadmap.md.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/signed-event-bus-not-provisioned"
                title: "Not Implemented"
                status: 501
                detail: "GET /v1/nodes/{id}/events requires the production wiring of EventStream, NonceStore, SignatureVerifier, RelationChecker, and NodeRepo. One or more ports are not yet provisioned in this build (see docs/architecture/mesh-event-bus-roadmap.md)."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/events"
                code: "signed_event_bus_not_provisioned"
  /v1/nodes/{id}/state:
    get:
      operationId: GetNodeState
      summary: Reconciliation pull for a Node — return the canonical NodeStateSnapshot.
      description: |
        Returns the canonical `NodeStateSnapshot` for the addressed
        Node. The snapshot is the authoritative
        cold-start view that plexd consumes when it first comes up,
        when its SSE connection has been disconnected for longer than
        the replay window, or when an out-of-band request arrives to
        re-derive the desired state. The four wire blocks — `peers`,
        `policy`, `bridge`, and `state`/`reports` — are always present
        so plexd's reconcile loop can diff by field presence rather
        than absence; later stories populate the
        currently-empty blocks without changing the wire shape
        .

        The peer projection is a single SQL round-trip ordered by
        `node_id ASC` so two consecutive pulls against the same
        ledger snapshot are byte-equal — plexd's reconcile loop
        reduces redundant rewrites by hashing the response.

        The endpoint reuses the `node-agent` ReBAC relation already
        guarding `GET /v1/nodes/{id}/events`, so any caller authorised to subscribe to a
        Node's SSE event stream is also authorised to issue a
        reconciliation pull. Unauthenticated callers receive 401;
        authenticated callers without the relation receive 403; an
        unknown Node id surfaces as 404 only after the authorisation
        gate passes so the endpoint cannot be used as a Node-id
        oracle.

        DEFERRED-WIRING POSTURE: until the production
        composition root supplies the `SnapshotProvider`,
        `RelationChecker`, and `NodeRepo` ports the handler depends
        on, every request to this endpoint returns 501 with `code:
        signed_event_bus_not_provisioned` so log scrapers can alert
        on the deferred-wiring state. See docs/architecture/mesh-event-bus-roadmap.md for
        the deferred work tracking.
      tags:
        - mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Node identifier (UUIDv7) — the snapshot scope.
      responses:
        "200":
          description: |
            Canonical `NodeStateSnapshot` for the addressed Node. The
            `peers` array carries one entry per other Node in the
            addressed Node's Domain; the addressed Node itself is
            excluded so plexd does not program a self-peer. The remaining blocks (`policy`, `bridge`,
            `state`, `reports`) are present-but-empty placeholders
            that later stories populate without changing the wire
            shape.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeStateSnapshot"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller lacks the `node-agent` ReBAC relation on the
            addressed Node and may not issue a reconciliation pull
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: |
            Node id not found. Surfaced only after the authorisation
            gate has passed so the endpoint cannot be used as a
            Node-id oracle.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: |
            The reconciliation-pull surface is not yet provisioned in
            this build. The Problem body's `code` field is
            `signed_event_bus_not_provisioned` so log scrapers can
            alert on the deferred-wiring state — the same code used
            by the SSE peer endpoint, since both surfaces share the
            same fail-closed posture and unblock together. Resolves
            once `SnapshotProvider`, `RelationChecker`, and
            `NodeRepo` are wired into the v1 handler dependency cone
            (see docs/architecture/mesh-event-bus-roadmap.md).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/signed-event-bus-not-provisioned"
                title: "Not Implemented"
                status: 501
                detail: "GET /v1/nodes/{id}/state requires the production wiring of SnapshotProvider, RelationChecker, and NodeRepo. One or more ports are not yet provisioned in this build (see docs/architecture/mesh-event-bus-roadmap.md)."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/state"
                code: "signed_event_bus_not_provisioned"
  /v1/nodes/{id}/heartbeat:
    post:
      operationId: PostNodeHeartbeat
      summary: Record a Node liveness heartbeat and return reconcile/rotate hints.
      description: |
        Accepts a per-Node liveness heartbeat from plexd and updates the
        reachability projection that drives the mesh-wide health view
        . The handler:

          1. Authenticates the caller against the Node Secret Key (NSK)
             plaintext supplied in the `Authorization: Bearer` header,
             rejecting revoked credentials with 401.
          2. Asserts that the NSK belongs to the Node addressed by the
             path `id`, refusing cross-Node use with 403
             `node_id_mismatch` so a leaked NSK cannot be replayed
             against a sibling Node.
          3. Validates the request body — `client_now` MUST be within
             60s of server now (otherwise 400 `clock_skew`),
             `binary_checksum` MUST be present and decode to a 32-byte
             SHA-256 digest (otherwise 400 `binary_checksum_empty`)
             .
          4. Persists the heartbeat fact and updates the per-Node
             reachability state-machine (`healthy` → `stale` after 90s,
             `stale` → `unreachable` after 300s) so the projection at
             `GET /v1/nodes/{id}/reachability` reflects the new fact
             on the next read.

        The 200 response carries `accepted_at` (server timestamp at
        commit) and two reconciliation flags. `reconcile` defaults to
        `false` and later stories flip it when the controller wants
        plexd to issue a fresh reconciliation pull. `rotate_keys` is
        load-bearing: it is set to `true` whenever a `peer_key_rotation`
        row is pending for the heartbeating Node, telling the caller to
        generate a fresh Curve25519 keypair and complete the rotation
        via `POST /v1/keys/rotate`.

        DEFERRED-WIRING POSTURE: until the production
        composition root supplies the NSK validator, ReachabilityRepo,
        and clock-skew evaluator the handler depends on, every request
        to this endpoint returns 501 with `code:
        heartbeat_not_provisioned` so log scrapers can alert on the
        deferred-wiring state. See docs/architecture/mesh-event-bus-roadmap.md for the
        deferred work tracking.
      tags:
        - mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Node identifier (UUIDv7) — the heartbeat scope.
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: |
            `Bearer <NSK plaintext>` — the per-Node Node Secret Key
            issued at registration time. The NSK is bound to the Node
            addressed by the path `id`; a credential belonging to a
            different Node surfaces as 403 `node_id_mismatch`
            .
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatRequest"
            example:
              client_now: "2026-04-27T10:15:30Z"
              binary_checksum: "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8"
              binary_version: "plexd-v0.4.2-ge5f3a1c"
              nat_summary: {}
      responses:
        "200":
          description: |
            Heartbeat accepted. The reachability projection has been
            advanced and the response carries any reconcile / key-
            rotation hints the controller wants the caller to act on
            .
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeartbeatResponse"
              example:
                accepted_at: "2026-04-27T10:15:30.123Z"
                reconcile: false
                rotate_keys: false
        "400":
          description: |
            Heartbeat body failed structural validation. The Problem
            body's `code` field disambiguates the cause and is one of
            the following exhaustive enum values:

              - `clock_skew` — `client_now` drifts more than 60 seconds
                from server now.
              - `binary_checksum_empty` — `binary_checksum` is missing
                or does not decode to a 32-byte SHA-256 digest
                .
              - `binary_version_empty` — `binary_version` is missing
                or empty after trimming whitespace.
              - `malformed_heartbeat_request` — request body cannot be
                decoded as a HeartbeatRequest envelope (e.g. invalid
                JSON, unknown field).

            Generated TypeScript / Go clients can therefore exhaustively
            switch on `code` without a fall-through arm
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/clock-skew"
                title: "Bad Request"
                status: 400
                detail: "client_now drifted by 142s from server now; heartbeats must be within +/-60s of server time."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/heartbeat"
                code: "clock_skew"
        "401":
          description: |
            NSK in the `Authorization: Bearer` header is missing,
            malformed, or has been revoked. The Problem body's `code`
            field is `nsk_revoked` so log scrapers can distinguish
            credential revocation from generic auth failures
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/nsk-revoked"
                title: "Unauthorized"
                status: 401
                detail: "NSK presented in Authorization: Bearer has been revoked."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/heartbeat"
                code: "nsk_revoked"
        "403":
          description: |
            The NSK in the `Authorization: Bearer` header authenticates
            successfully but belongs to a different Node than the path
            `id`. The PermissionDenied body's `code` field is
            `node_id_mismatch` so a leaked NSK cannot be replayed
            against a sibling Node.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
              example:
                type: "https://plexsphere.dev/errors/node-id-mismatch"
                title: "Forbidden"
                status: 403
                detail: "NSK is bound to a different Node than the path id."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/heartbeat"
                code: "node_id_mismatch"
                reason: insufficient_relation
                relation_path: []
                correlation_id: "01HXYZABCDEFGHJKMNPQRSTVWX"
        "501":
          description: |
            The heartbeat surface is not yet provisioned in this build.
            The Problem body's `code` field is
            `heartbeat_not_provisioned` so log scrapers can alert on
            the deferred-wiring state. Resolves once the NSK validator,
            ReachabilityRepo, and clock-skew evaluator are wired into
            the v1 handler dependency cone (see docs/architecture/mesh-event-bus-roadmap.md).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/heartbeat-not-provisioned"
                title: "Not Implemented"
                status: 501
                detail: "POST /v1/nodes/{id}/heartbeat requires the production wiring of NSKValidator, ReachabilityRepo, and Clock. One or more ports are not yet provisioned in this build (see docs/architecture/mesh-event-bus-roadmap.md)."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/heartbeat"
                code: "heartbeat_not_provisioned"
  /v1/nodes/{id}/endpoint:
    put:
      operationId: PutNodeEndpoint
      summary: Record a NAT-observed Peer endpoint observation.
      description: |
        Accepts a per-Node NAT endpoint observation from plexd and
        stamps it onto the Peer aggregate that backs the addressed
        Node. The handler:

          1. Authenticates the caller against the Node Secret Key (NSK)
             plaintext supplied in the `Authorization: Bearer` header,
             refusing missing or revoked credentials with 401.
          2. Asserts that the NSK belongs to the Node addressed by the
             path `id`, refusing cross-Node use with 403
             `node_id_mismatch` so a leaked NSK cannot be replayed
             against a sibling Node.
          3. Caps the request body at 4 KiB; oversize bodies receive
             413 `endpoint_body_too_large` without ever touching the
             JSON decoder.
          4. Validates the body — `reported_at` MUST be within 60s of
             server now (otherwise 400 `endpoint_clock_skew`),
             `endpoint` MUST parse as a `host:port` tuple in the
             RFC 6056 1..65535 port range and a non-loopback IPv4/IPv6
             address (otherwise 400 `endpoint_unparseable`), and the
             envelope MUST decode without unknown fields (otherwise
             400 `malformed_endpoint_request`).
          5. Persists the observation through the per-Domain Peer
             aggregate writer, which emits a `peer_endpoint_changed`
             outbox event when the (endpoint, port) tuple differs from
             the prior observation or transitions out of the stale
             window; identical refreshes simply refresh the freshness
             timestamp without emitting a wake-up.

        The 200 response carries `accepted_at` (server commit
        timestamp) and `stale_after` (`accepted_at` plus the per-Domain
        endpoint TTL); plexd uses `stale_after` to schedule the next
        observation before the sweeper would tombstone the endpoint.

        DEFERRED-WIRING POSTURE: until the production composition root
        supplies the EndpointRecorder, NSKResolver, NodeRepo, and
        PeerLookup ports the handler depends on, every request to this
        endpoint returns 501 with `code: endpoint_not_provisioned` so
        log scrapers can alert on the deferred-wiring state.
      tags:
        - mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Node identifier (UUIDv7) — the endpoint scope.
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: |
            `Bearer <NSK plaintext>` — the per-Node Node Secret Key
            issued at registration time. The NSK is bound to the Node
            addressed by the path `id`; a credential belonging to a
            different Node surfaces as 403 `node_id_mismatch`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EndpointRequest"
            example:
              endpoint: "203.0.113.7:51820"
              nat_type: "port_restricted"
              reported_at: "2026-04-27T10:15:30Z"
      responses:
        "200":
          description: |
            Endpoint observation accepted. The Peer aggregate has been
            stamped and the response carries the server commit
            timestamp and the freshness deadline the agent must beat
            before the sweeper tombstones the endpoint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndpointResponse"
              example:
                accepted_at: "2026-04-27T10:15:30.123Z"
                stale_after: "2026-04-27T10:20:30.123Z"
        "400":
          description: |
            Endpoint body failed structural validation. The Problem
            body's `code` field disambiguates the cause and is one of
            the following exhaustive enum values:

              - `endpoint_clock_skew` — covers two semantically
                distinct refusals that share one wire code:
                (a) `reported_at` drifts more than 60 seconds from
                server now (the handler's MaxEndpointSkew gate);
                (b) `reported_at` is older than the per-Domain
                endpoint TTL window so the agent's keep-alive
                cadence has lapsed (the recorder's
                ErrEndpointObservationStale gate). Operators can
                disambiguate the two flavours from the audit-row
                `reason` field — the recorder-side stale arm
                stamps `reported_at older than per-Domain endpoint
                TTL` while the handler-side drift arm stamps
                `reported_at outside MaxEndpointSkew window`. The
                agent remediation is the same in both flavours
                (refresh `reported_at` from a fresh `time.Now()`
                and retry), so the two share one wire code.
              - `endpoint_unparseable` — `endpoint` is not a valid
                `host:port` tuple, the port is outside 1..65535, or
                the host is not a routable IPv4/IPv6 address.
              - `malformed_endpoint_request` — request body cannot be
                decoded as an EndpointRequest envelope (e.g. invalid
                JSON, unknown field, missing required field).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/endpoint-clock-skew"
                title: "Bad Request"
                status: 400
                detail: "reported_at drifted by 142s from server now; endpoint observations must be within +/-60s of server time."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/endpoint"
                code: "endpoint_clock_skew"
        "401":
          description: |
            NSK in the `Authorization: Bearer` header is missing,
            malformed, or has been revoked. The Problem body's `code`
            field is `nsk_revoked` so log scrapers can distinguish
            credential revocation from generic auth failures.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/nsk-revoked"
                title: "Unauthorized"
                status: 401
                detail: "NSK presented in Authorization: Bearer has been revoked."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/endpoint"
                code: "nsk_revoked"
        "403":
          description: |
            The NSK in the `Authorization: Bearer` header authenticates
            successfully but belongs to a different Node than the path
            `id`. The PermissionDenied body's `code` field is
            `node_id_mismatch` so a leaked NSK cannot be replayed
            against a sibling Node.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
              example:
                type: "https://plexsphere.dev/errors/node-id-mismatch"
                title: "Forbidden"
                status: 403
                detail: "NSK is bound to a different Node than the path id."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/endpoint"
                code: "node_id_mismatch"
                reason: insufficient_relation
                relation_path: []
                correlation_id: "01HXYZABCDEFGHJKMNPQRSTVWX"
        "404":
          description: |
            No live Peer row resolves for the authenticated Node — the
            Node was drained or has never been bound to a Peer. The
            Problem body's `code` field is `endpoint_peer_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/endpoint-peer-not-found"
                title: "Peer Not Found"
                status: 404
                detail: "no live Peer is registered for the addressed Node."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/endpoint"
                code: "endpoint_peer_not_found"
        "410":
          description: |
            The target Peer was deregistered between the handler's
            admission gates and the recorder's UPDATE — a narrow race
            that surfaces as 410 Gone so the agent learns to stop
            reporting against a row that no longer accepts
            observations. The Problem body's `code` field is
            `endpoint_peer_gone`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/endpoint-peer-gone"
                title: "Peer Gone"
                status: 410
                detail: "the addressed Peer was deregistered before the observation could be recorded."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/endpoint"
                code: "endpoint_peer_gone"
        "413":
          description: |
            Request body exceeded the 4 KiB ceiling enforced by the
            handler. The Problem body's `code` field is
            `endpoint_body_too_large` so the handler can refuse a
            pathological payload without ever invoking the JSON
            decoder.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/endpoint-body-too-large"
                title: "Payload Too Large"
                status: 413
                detail: "request body exceeds the 4096-byte endpoint envelope cap."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/endpoint"
                code: "endpoint_body_too_large"
        "501":
          description: |
            The endpoint intake surface is not yet provisioned in this
            build. The Problem body's `code` field is
            `endpoint_not_provisioned` so log scrapers can alert on
            the deferred-wiring state. Resolves once the
            EndpointRecorder, NSKResolver, NodeRepo, and PeerLookup
            ports are wired into the v1 handler dependency cone.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/endpoint-not-provisioned"
                title: "Not Implemented"
                status: 501
                detail: "PUT /v1/nodes/{id}/endpoint requires the production wiring of EndpointRecorder, NSKResolver, NodeRepo, and PeerLookup. One or more ports are not yet provisioned in this build."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/endpoint"
                code: "endpoint_not_provisioned"
  # traceability: PX-0078, REQ-011, REQ-012, REQ-015
  /v1/nodes/{id}/secrets/{name}:
    get:
      operationId: FetchNodeSecret
      summary: Fetch a Secret Store entry rewrapped under the calling Node's NSK.
      # traceability: PX-0078, REQ-011
      x-plexsphere-no-payload-logging: true
      description: |
        Returns the named Secret Store entry for the addressed Node as an
        AES-256-GCM ciphertext envelope rewrapped under the calling
        Node's Node Secret Key (NSK). The Secret Store is the platform's
        only meet-and-rewrap point between the OpenBao backend and the
        per-Node NSK: the handler reads the OpenBao plaintext, recovers
        the NSK, and rewraps the payload in-process so that ONLY
        NSK-wrapped ciphertext ever crosses the wire. The transient
        OpenBao plaintext and the recovered NSK are zeroed on every exit
        path; no plaintext is ever persisted, logged, cached, or placed
        on the event bus.

        The 200 body is the raw envelope `<12-byte nonce> ||
        <ciphertext + 16-byte GCM tag>`, served as
        `application/octet-stream`. The caller recovers the seeded
        plaintext byte-for-byte with `AES-256-GCM-Open` under its NSK.
        The response carries the served version in
        `X-Plexsphere-Secret-Version`, the NSK key id used for the wrap
        in `X-Plexsphere-Secret-KID` (so plexd can pick the right NSK
        during a rotation overlap), and `Cache-Control: no-store` so no
        intermediary ever retains the ciphertext.

        The handler:

          1. Authenticates the caller against the Node Secret Key (NSK)
             plaintext supplied in the `Authorization: Bearer` header,
             refusing missing or revoked credentials with 401. Only a
             Node proving possession of its NSK can reach the rewrap
             pipeline.
          2. Resolves the addressed secret metadata, applies the
             per-Node and per-Domain rate limits, and runs the
             `node-agent` ReBAC visibility check on the addressed Node.
             An authenticated caller without the relation receives 403
             `PermissionDenied`; the denial is recorded with
             `insufficient_relation`.
          3. Reads the entry from the OpenBao backend — the current
             version when `version` is omitted, or the requested version
             when present — reconciling the served version against the
             metadata; the OpenBao-returned version wins for the header.
          4. Rewraps the payload under the recovered NSK with a fresh
             12-byte nonce and emits exactly one granted audit row. A
             backend read that fails AFTER a granted authorization still
             records the granted audit row — operational outcomes are
             carried on the fetch-duration metric, never on the audit
             chain.

        The response body is capped at 1 MiB of ciphertext.

        DEFERRED-WIRING POSTURE: when the Secret Store backend is not
        configured (empty backend DSN) the production composition root
        leaves this surface disabled and every request returns 501 with
        `code: secrets_not_provisioned` so log scrapers can alert on the
        deferred-wiring state.
      tags:
        - mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Node identifier (UUIDv7) — the secret-fetch scope.
        - in: path
          name: name
          required: true
          schema:
            type: string
            pattern: "^[a-z][a-z0-9_-]{0,62}$"
          description: |
            Secret name within the owning Project. Lower-case, starts
            with a letter, and is limited to letters, digits, hyphen,
            and underscore (1 to 63 characters).
        - in: query
          name: version
          required: false
          schema:
            type: integer
            minimum: 1
          description: |
            Optional OpenBao KV v2 version to fetch. When omitted the
            current version is served. The version actually served is
            always reported in the `X-Plexsphere-Secret-Version`
            response header.
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: |
            `Bearer <NSK plaintext>` — the per-Node Node Secret Key
            issued at registration time. Only a Node proving possession
            of its NSK may fetch a secret; a missing, malformed, or
            revoked credential surfaces as 401.
      responses:
        "200":
          # traceability: PX-0078, REQ-001, REQ-012, REQ-015
          x-plexsphere-no-payload-logging: true
          description: |
            The rewrapped secret envelope `<12-byte nonce> ||
            <ciphertext + 16-byte GCM tag>`. `AES-256-GCM-Open` under
            the calling Node's NSK recovers the seeded cleartext
            byte-for-byte. The body is opaque ciphertext and is never
            logged.
          headers:
            X-Plexsphere-Secret-Version:
              description: |
                The version actually served — the version OpenBao
                returned, which wins over the metadata current version
                when KV v2 promoted a version server-side.
              schema:
                type: integer
                minimum: 1
              required: true
            X-Plexsphere-Secret-KID:
              description: |
                The NSK key id used to wrap the envelope. Lets plexd
                pick the correct NSK to unwrap with during a key-rotation
                overlap window.
              schema:
                type: string
              required: true
            Cache-Control:
              description: |
                Always `no-store` — the ciphertext envelope MUST NOT be
                retained by any intermediary or client cache.
              schema:
                type: string
              required: true
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: |
            NSK in the `Authorization: Bearer` header is missing,
            malformed, or has been revoked. The Problem body's `code`
            field is `unauthorized`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/unauthorized"
                title: "Unauthorized"
                status: 401
                detail: "NSK presented in Authorization: Bearer is missing or has been revoked."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/secrets/db-password"
                code: "unauthorized"
        "403":
          description: |
            The NSK authenticates successfully but the calling Node lacks
            the `node-agent` ReBAC relation that gates visibility of the
            addressed secret. The PermissionDenied body carries the ReBAC
            denial `reason` and the `correlation_id` that pairs with the
            audit entry; surfaced only after authentication so the
            endpoint cannot be used as a secret-name oracle.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
              example:
                type: "https://plexsphere.dev/errors/permission-denied"
                title: "Forbidden"
                status: 403
                detail: "calling Node is not permitted to read the addressed secret."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/secrets/db-password"
                code: "permission_denied"
                reason: insufficient_relation
                relation_path: []
                correlation_id: "01HXYZABCDEFGHJKMNPQRSTVWX"
        "404":
          description: |
            No secret resolves for the addressed Node and name. The
            Problem body's `code` field disambiguates the cause:

              - `secret_not_found` — no metadata row exists for the
                addressed Node and name.
              - `secret_version_not_found` — the requested `version` does
                not exist at the backend.

            No audit row is emitted for a non-existent secret — nothing
            was authorized.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/secret-not-found"
                title: "Not Found"
                status: 404
                detail: "no secret named db-password is visible to the addressed Node."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/secrets/db-password"
                code: "secret_not_found"
        "429":
          description: |
            The per-Node or per-Domain secret-fetch rate-limit bucket is
            exhausted. The Problem body's `code` field is one of
            `per_node_rate_limited` or `per_domain_rate_limited`, and the
            `Retry-After` response header carries the number of seconds
            the caller should wait before retrying.
          headers:
            Retry-After:
              description: |
                Seconds the caller should wait before retrying, derived
                from the exhausted rate-limit bucket's refill window.
              schema:
                type: integer
                minimum: 0
              required: true
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/per-node-rate-limited"
                title: "Too Many Requests"
                status: 429
                detail: "per-Node secret-fetch rate limit exceeded; retry after the window refills."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/secrets/db-password"
                code: "per_node_rate_limited"
        "503":
          description: |
            The OpenBao backend is sealed or unavailable, so an
            authorized read could not be completed. The Problem body's
            `code` field is `openbao_unavailable`. A backend-unavailable
            read that follows a granted authorization still emits one
            granted audit row.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/openbao-unavailable"
                title: "Service Unavailable"
                status: 503
                detail: "the secret backend is sealed or unreachable; the authorized read could not be completed."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/secrets/db-password"
                code: "openbao_unavailable"
        "501":
          description: |
            The Secret Store surface is not yet provisioned in this
            build — the backend DSN is unset, so the rewrap pipeline is
            disabled. The Problem body's `code` field is
            `secrets_not_provisioned` so log scrapers can alert on the
            deferred-wiring state. Resolves once the Secret Store backend
            is configured and the fetch service and its ports are wired
            into the v1 handler dependency cone.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/secrets-not-provisioned"
                title: "Not Implemented"
                status: 501
                detail: "GET /v1/nodes/{id}/secrets/{name} requires the Secret Store backend to be configured. The surface is not provisioned in this build."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/secrets/db-password"
                code: "secrets_not_provisioned"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/nodes/{id}/state/reports/{key}:
    put:
      operationId: PutNodeStateReport
      summary: Record an upstream node-state report entry for a Node.
      # traceability: PX-0080, REQ-005, REQ-006, REQ-007
      description: |
        Records one upstream, workload-authored node-state report entry
        for the addressed Node under the addressed key. The entry is
        stored with `kind = report`; report entries are Node-authored
        telemetry and — unlike the platform-owned metadata/data entries —
        do NOT fan out a `node_state_updated` event.

        The caller authenticates with its Node Secret Key (NSK) in the
        `Authorization: Bearer` header; the handler asserts the resolved
        NSK Node matches the path `id` so a Node may only write its own
        reports. The stored entry surfaces in the `reports` bucket of the
        `state`/`reports` blocks on the next
        `GET /v1/nodes/{id}/state` reconciliation pull.

        DEFERRED-WIRING POSTURE: when the node-state service is not wired
        into this build every request returns 501 with
        `code: reports_not_provisioned`.
      tags:
        - mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Node identifier (UUIDv7) — the report-write scope.
        - in: path
          name: key
          required: true
          schema:
            type: string
            pattern: "^[a-z][a-z0-9._-]{0,127}$"
          description: |
            Report entry key. Lower-case, starts with a letter, and is
            limited to letters, digits, dot, hyphen, and underscore
            (1 to 128 characters).
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: |
            `Bearer <NSK plaintext>` — the per-Node Node Secret Key
            issued at registration time. Only a Node proving possession
            of its NSK may write a report; a missing, malformed, or
            revoked credential surfaces as 401.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeStateReportRequest"
      responses:
        "200":
          description: |
            The report entry was accepted and durably recorded. The body
            echoes the stored key and the server accept timestamp.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeStateReportResponse"
              example:
                accepted_at: "2026-06-08T12:00:00Z"
                key: "cpu-load"
        "400":
          description: |
            The request body is malformed, the key violates the entry
            grammar, the value exceeds the 4096-byte ceiling, or the
            per-Node report quota is exhausted. The Problem body's `code`
            field disambiguates the cause (`invalid_report` or
            `report_quota_exceeded`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/invalid-report"
                title: "Bad Request"
                status: 400
                detail: "the report value exceeds the 4096-byte limit."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/state/reports/cpu-load"
                code: "invalid_report"
        "401":
          description: |
            NSK in the `Authorization: Bearer` header is missing,
            malformed, or has been revoked. The Problem body's `code`
            field is `unauthorized`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/unauthorized"
                title: "Unauthorized"
                status: 401
                detail: "NSK presented in Authorization: Bearer is missing or has been revoked."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/state/reports/cpu-load"
                code: "unauthorized"
        "403":
          description: |
            The NSK authenticates but resolves to a different Node than
            the path `id` — a Node may only write its own reports. The
            PermissionDenied body's `code` field is `node_id_mismatch`
            so a leaked NSK cannot be replayed against a sibling Node.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
              example:
                type: "https://plexsphere.dev/errors/node-id-mismatch"
                title: "Forbidden"
                status: 403
                detail: "resolved NSK Node id does not match URL path id."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/state/reports/cpu-load"
                code: "node_id_mismatch"
                reason: insufficient_relation
                relation_path: []
                correlation_id: "01HXYZABCDEFGHJKMNPQRSTVWX"
        "404":
          description: |
            No Node resolves for the addressed `id`. The Problem body's
            `code` field is `node_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/node-not-found"
                title: "Not Found"
                status: 404
                detail: "node id does not match any Node in this Domain."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/state/reports/cpu-load"
                code: "node_not_found"
        "413":
          description: |
            The request body exceeds the handler's defensive size cap.
            The Problem body's `code` field is `payload_too_large`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/payload-too-large"
                title: "Payload Too Large"
                status: 413
                detail: "the request body exceeds the maximum allowed size."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/state/reports/cpu-load"
                code: "payload_too_large"
        "501":
          description: |
            The node-state service is not yet provisioned in this build.
            The Problem body's `code` field is `reports_not_provisioned`
            so log scrapers can alert on the deferred-wiring state.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/reports-not-provisioned"
                title: "Not Implemented"
                status: 501
                detail: "PUT /v1/nodes/{id}/state/reports/{key} requires the production wiring of the node-state service. The surface is not provisioned in this build."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/state/reports/cpu-load"
                code: "reports_not_provisioned"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
