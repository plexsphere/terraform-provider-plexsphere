  /v1/domains/{id}/invitations:
    post:
      operationId: CreateInvitation
      summary: Stage a pending Invitation on a Domain.
      description: |
        Creates a pending Invitation under the Domain identified by
        `{id}`. The handler authorises the call
        against the parent Domain's `manage` ReBAC relation BEFORE
        invoking the service so an unauthorised caller never produces
        an `InvitationCreated` outbox row.

        The aggregate enforces every issuance invariant — non-empty
        `external_subject`, `ttl_seconds` in [60, 604800], at most 32
        `initial_tuples`, and every `initial_tuples[].object` in the
        closed prefix set
        `{domain:<this-id>, project:<uuid>, group:<uuid>}`. A
        duplicate `(domain_id, external_subject)` for which a pending
        row already exists surfaces as
        `409 invitation_already_pending` carrying the existing
        invitation's id in the Problem detail so the operator can
        choose to revoke and re-issue. The plaintext `external_subject`
        is intentionally NOT echoed in the response — only the
        per-Domain pseudonym is — so a server-side log of the response
        body never carries raw IdP-side PII.

        On success the handler emits an `invitation.create` audit row
        and the service appends an `InvitationCreated` outbox event in
        the same transaction.
      tags:
        - tenancy
      parameters:
        - $ref: "#/components/parameters/DomainID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationCreateRequest"
            example:
              external_subject: "ada@example.com"
              ttl_seconds: 86400
              initial_tuples:
                - relation: "member"
                  object: "project:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa"
      responses:
        "201":
          description: Invitation staged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationResponse"
              example:
                id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1"
                domain_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
                external_subject_pseudonym: "9f2c7c0d2a3a4b8d1e6c8a7f5b3d2e1c0a9b8c7d6e5f4a3b2c1d0e9f8a7b6c5d"
                status: "pending"
                expires_at: "2026-05-03T10:00:00Z"
                created_at: "2026-05-02T10:00:00Z"
                initial_tuples:
                  - relation: "member"
                    object: "project:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa"
        "400":
          description: |
            Aggregate or handler invariant rejected the body. Body is
            a `Problem` with `code` ∈ { `invalid_body`, `invalid_ttl`
            }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller lacks the `manage` ReBAC relation on the addressed
            Domain. Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Domain not found. Surfaced only after the authorisation
            gate has passed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            A pending invitation already exists for the
            `(domain_id, external_subject)` pair. Body is a `Problem`
            with `code: invitation_already_pending`; the existing
            invitation's id is carried in the Problem detail so the
            operator can revoke-and-reissue without listing the table
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/invitation-already-pending"
                title: "Invitation Already Pending"
                status: 409
                detail: "a pending invitation already exists for this (domain, external_subject); existing id 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c0"
                instance: "/v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1/invitations"
                code: "invitation_already_pending"
        "413":
          description: |
            Request body exceeded the 8 KiB tenancy ceiling enforced
            by the handler.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: |
            Body parsed but a structural invariant rejected it. Body
            is a `Problem` with `code` ∈
            { `too_many_initial_tuples`,
            `invitation_object_out_of_scope`,
            `invalid_caveat_context` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/invitation-object-out-of-scope"
                title: "Invitation Object Out of Scope"
                status: 422
                detail: "initial_tuples[0].object must be domain:<this-id>, project:<uuid>, or group:<uuid>"
                instance: "/v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1/invitations"
                code: "invitation_object_out_of_scope"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    get:
      operationId: ListInvitations
      summary: List Invitations on a Domain.
      description: |
        Returns a cursor-paginated page of Invitations attached to the
        Domain identified by `{id}`, optionally filtered by status
        . The handler runs the `read` ReBAC check on
        `domain:<id>` BEFORE the persistence read so an unauthorised
        caller receives `403` without the existence side-channel a
        "load-then-check" flow would leak. The optional `status` query
        parameter narrows the page to a single lifecycle state; the
        special value `all` surfaces every status in one window — omit
        to default to `all`.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`.

        The handler emits one `invitation.list` audit row per served
        page.
      tags:
        - tenancy
      parameters:
        - $ref: "#/components/parameters/DomainID"
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: |
            Opaque continuation token returned by a previous call's
            `next_cursor`. The encoding is HMAC-signed by the server
            so a tampered cursor surfaces as `400 invalid_cursor`
            .
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: |
            Maximum number of items to return in a single page. The
            handler clamps the value to [1, 200] before forwarding it
            to the service.
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum:
              - pending
              - accepted
              - revoked
              - expired
              - all
            # x-enum-varnames pins the generated Go constant names for
            # this inline parameter enum. Without it, oapi-codegen's
            # "prefix only on collision" heuristic decides package-wide
            # whether these members carry their type-name prefix, and
            # adding an unrelated enum elsewhere (e.g. the approval
            # workflow's ApprovalState, which shares `expired`) flips
            # these constants from the prefixed form the invitations
            # handler references to a bare form, breaking the build. The
            # explicit names are unique against every other enum's
            # values, so the heuristic leaves both this enum and the
            # sibling InvitationStatus enum untouched (REQ-002, PX-0002).
            x-enum-varnames:
              - ListInvitationsParamsStatusPending
              - ListInvitationsParamsStatusAccepted
              - ListInvitationsParamsStatusRevoked
              - ListInvitationsParamsStatusExpired
              - ListInvitationsParamsStatusAll
          description: |
            Optional status filter. Values outside the closed set
            surface as `400 invalid_status`. Defaults to `all`
            .
      responses:
        "200":
          description: Page of Invitations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationList"
              example:
                items:
                  - id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1"
                    domain_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
                    external_subject_pseudonym: "9f2c7c0d2a3a4b8d1e6c8a7f5b3d2e1c0a9b8c7d6e5f4a3b2c1d0e9f8a7b6c5d"
                    status: "pending"
                    expires_at: "2026-05-03T10:00:00Z"
                    created_at: "2026-05-02T10:00:00Z"
                next_cursor: null
        "400":
          description: |
            Invalid query parameter — `code` ∈
            { `invalid_cursor`, `invalid_limit`, `invalid_status` }
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/invalid-status"
                title: "Invalid Invitation Status Filter"
                status: 400
                detail: "status query parameter must be one of {pending, accepted, revoked, expired, all}"
                instance: "/v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1/invitations"
                code: "invalid_status"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller lacks the `read` ReBAC relation on the addressed
            Domain (body is a `PermissionDenied` problem) OR the
            pagination cursor was minted by a different caller and the
            per-(caller, pepper) HMAC binding rejected the replay
            (body is a `Problem` with `code = cursor_binding_mismatch`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Domain not found. Surfaced only after the authorisation
            gate has passed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
