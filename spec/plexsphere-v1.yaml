  # traceability: PX-0082, S057, REQ-002 — browser-SSH WebSocket attach gateway.
  /v1/projects/{project_id}/sessions/{session_id}/attach:
    get:
      operationId: AttachSession
      summary: Attach to a live SSH session as a bidirectional WebSocket stream.
      description: |
        Upgrades the request to a WebSocket and bridges the browser to the
        mediated SSH session identified by `{session_id}` within the owning
        Project. The handler re-runs the issuance-equivalent ReBAC check on
        the session's Resource BEFORE dialing anything, validates the Session
        is `active` and `ssh`-kind, then dials the target plexd
        `listener_endpoint` over the mesh and copies bytes bidirectionally
        between the client socket and the mesh connection.

        This operation does NOT speak JSON. On a successful upgrade the
        response is `101 Switching Protocols` and the connection body is an
        opaque, bidirectional byte stream carrying the SSH transport — the
        request and response bodies are NOT JSON documents. The
        `listener_endpoint` is never written to the client; the browser only
        ever sees the proxied stream. Error paths (before the upgrade
        completes) follow the RFC 9457 `application/problem+json` envelope.
      tags:
        - access
      security:
        - operatorBearer: []
      parameters:
        - $ref: "#/components/parameters/SessionProjectID"
        - $ref: "#/components/parameters/SessionID"
      responses:
        "101":
          description: |
            Switching Protocols. The connection is upgraded to a WebSocket
            and the body becomes an opaque, bidirectional byte stream
            carrying the SSH transport — it is NOT a JSON document. The
            gateway copies bytes between the client and the mesh connection
            until either side closes or the request context is cancelled.
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to attach to this Session's Resource.
            Body is a `PermissionDenied` problem; the gateway closes the
            socket with WebSocket close code `1008` (policy violation) when
            the denial is detected after the upgrade.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            The owning Project or the addressed Session does not exist or is
            not visible. Body is a `Problem` with `code` ∈ {
            `project_not_found`, `session_not_found` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            The addressed Session cannot be attached. Body is a `Problem`
            with `code` ∈ { `session_not_active` (the Session is revoked,
            expired, or otherwise not live), `session_not_ssh` (the Session
            is `k8s`- or `tcp`-kind — only the `ssh` kind has a browser
            terminal) }. The gateway rejects with this status BEFORE any
            mesh dial is attempted.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "426":
          description: |
            Upgrade Required. The request did not carry the WebSocket
            upgrade handshake headers, so the gateway refuses to proceed.
            Body is a `Problem` with `code: upgrade_required` and the
            response advertises `Connection: Upgrade` / `Upgrade:
            websocket`.
          headers:
            Upgrade:
              description: |
                Advertises the protocol the client must upgrade to
                (`websocket`).
              schema:
                type: string
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: |
            The access attach gateway is not yet provisioned in this build.
            The Problem body's `code` field is
            `access_attach_not_provisioned` so log scrapers can alert on the
            deferred-wiring state. Resolves once the session-lookup and
            mesh-dialer ports are wired into the v1 handler dependency cone.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/access-attach-not-provisioned"
                title: "Not Implemented"
                status: 501
                detail: "GET /v1/projects/{project_id}/sessions/{session_id}/attach requires the production wiring of the session-lookup and mesh-dialer ports. One or more ports are not yet provisioned in this build."
                instance: "/v1/projects/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0b1/sessions/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0f2/attach"
                code: "access_attach_not_provisioned"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/projects/{project_id}/sessions/{session_id}:revoke:
    post:
      operationId: RevokeSession
      summary: Instantly revoke a live mediated session.
      description: |
        Revokes the Session identified by `{session_id}` within the owning
        Project. The handler runs the revoke ReBAC check BEFORE any write,
        then writes the revocation, appends the session identifier to the
        revocation denylist, and fans a revocation event out over the
        Signed Event Bus so the target plexd tears the listener down — all
        in one transaction.

        Re-revoking an already-revoked Session is idempotent: it returns
        `204` and writes no additional rows.
      tags:
        - access
      security:
        - operatorBearer: []
      parameters:
        - $ref: "#/components/parameters/SessionProjectID"
        - $ref: "#/components/parameters/SessionID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeSessionRequest"
            example:
              revoke_reason: "operator_request"
      responses:
        "204":
          description: |
            Session revoked (or already revoked — the operation is
            idempotent). No body.
        "400":
          description: |
            Malformed id or body. Body is a `Problem` with `code` ∈ {
            `invalid_session_id`, `invalid_body` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to revoke this Session. Body is a
            `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Session not found. Body is a `Problem` with
            `code: session_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: |
            The access-orchestrator surface is not yet provisioned in this
            build. The Problem body's `code` field is
            `access_session_not_provisioned`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/nodes/{id}/sessions/{session_id}:
    post:
      operationId: PostNodeSessionCallback
      summary: Report per-kind session activity from a Node.
      description: |
        Accepts a per-kind session-activity callback from the target plexd
        and appends it to the session's append-only activity log, touching
        the session's last-active timestamp so the idle-timeout sweeper
        sees progress. The handler:

          1. Authenticates the caller against the Node Secret Key (NSK)
             plaintext supplied in the `Authorization: Bearer` header,
             rejecting revoked credentials with 401.
          2. Asserts that the NSK belongs to the Node addressed by the
             path `id`, refusing cross-Node use with 403
             `nsk_node_mismatch` so a leaked NSK cannot be replayed
             against a sibling Node's session.
          3. Appends the reported per-kind activity row. An `ssh` session
             records `command_executed` / `command_exited` activity; a
             `k8s` session records `api_request` activity; a `tcp` session
             records exactly a `session_started` and a `session_ended`
             pair — the TCP shape is deliberately payload-blind, with no
             L7 parsing.

        DEFERRED-WIRING POSTURE: until the production composition root
        supplies the callback service and its NSK validator, every request
        to this endpoint returns 501 with `code:
        access_session_not_provisioned` so log scrapers can alert on the
        deferred-wiring state.
      tags:
        - access
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Node identifier (UUIDv7) — the callback scope.
        - in: path
          name: session_id
          required: true
          schema:
            type: string
            format: uuid
          description: Session identifier (UUIDv7) the activity belongs to.
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: |
            `Bearer <NSK plaintext>` — the per-Node Node Secret Key issued
            at registration time. The NSK is bound to the Node addressed by
            the path `id`; a credential belonging to a different Node
            surfaces as 403 `nsk_node_mismatch`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionActivityRequest"
            example:
              ssh:
                command: "journalctl -u plexd"
                exit_code: 0
                started_at: "2026-05-02T10:06:00Z"
                completed_at: "2026-05-02T10:06:02Z"
      responses:
        "204":
          description: Activity recorded. No body.
        "400":
          description: |
            Callback body failed structural validation — an invalid JSON
            envelope or an activity variant that does not match the
            session's kind.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: |
            NSK in the `Authorization: Bearer` header is missing,
            malformed, or has been revoked. The Problem body's `code` field
            is `nsk_revoked` so log scrapers can distinguish credential
            revocation from generic auth failures.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            The NSK authenticates successfully but belongs to a different
            Node than the path `id`. The PermissionDenied body's `code`
            field is `nsk_node_mismatch`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            No Session resolves for the addressed `(id, session_id)` pair.
            Body is a `Problem` with `code: session_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            The Session is no longer live. Body is a `Problem` with `code`
            ∈ { `session_already_revoked`, `session_expired` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: |
            The session-callback surface is not yet provisioned in this
            build. The Problem body's `code` field is
            `access_session_not_provisioned`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/access-session-not-provisioned"
                title: "Not Implemented"
                status: 501
                detail: "POST /v1/nodes/{id}/sessions/{session_id} requires the production wiring of the session-callback service and its NSK validator. One or more ports are not yet provisioned in this build."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/sessions/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0f2"
                code: "access_session_not_provisioned"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
components:
  schemas:
    HealthStatus:
      type: object
      description: Aggregated health state of the plexsphere process.
      required:
        - status
        - checks
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
            - down
          description: Overall rollup of every sub-component check.
        checks:
          type: array
          description: Per-dependency health checks.
          items:
            $ref: "#/components/schemas/HealthCheck"
      example:
        status: ok
        checks:
          - name: database
            status: ok
            detail: "postgres reachable in 3ms"
    HealthCheck:
      type: object
      description: Single dependency probe result.
      required:
        - name
        - status
        - detail
      properties:
        name:
          type: string
          description: Stable identifier of the checked dependency.
        status:
          type: string
          description: Outcome of the probe (ok, degraded, down).
        detail:
          type: string
          description: Human-readable context for the outcome.
      example:
        name: database
        status: ok
        detail: "postgres reachable in 3ms"
    VersionInfo:
      type: object
      description: Build metadata baked into the running binary.
      required:
        - version
        - commit
        - date
      properties:
        version:
          type: string
          description: Semver tag of the release, e.g. "v0.1.0".
        commit:
          type: string
          description: Git commit SHA the binary was built from.
        date:
          type: string
          format: date-time
          description: RFC 3339 timestamp of the build.
      example:
        version: "v0.1.0"
        commit: "fdfb5ba9c1"
        date: "2026-04-19T12:00:00Z"
    Problem:
      type: object
      description: |
        RFC 9457 problem-details object. The optional `code` field is a
        plexsphere extension that carries the machine-readable error
        taxonomy (RFC 8628 device-flow codes, federation_kind_mismatch,
        etc.).
      required:
        - type
        - title
        - status
        - detail
        - instance
      properties:
        type:
          type: string
          description: URI reference that identifies the problem type.
        title:
          type: string
          description: Short, human-readable summary of the problem.
        status:
          type: integer
          description: HTTP status code generated for this occurrence.
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          description: URI reference identifying the specific occurrence.
        code:
          type: string
          description: |
            Optional machine-readable error code. Device-flow errors use
            the RFC 8628 taxonomy (`authorization_pending`, `slow_down`,
            `access_denied`, `expired_token`, `invalid_grant`); service
            token mismatches use `federation_kind_mismatch`.

            Tenancy Domain CRUD
            adds the closed taxonomy below. Each code maps to exactly one
            repo / service sentinel and one HTTP status — see
            `docs/reference/platform/http.md#tenancy-domain-crud-px-0026`:

              * `domain_slug_conflict` — 409, CreateDomain duplicate slug.
              * `mesh_cidr_overlap` — 409, mesh_cidr collides with another Domain (Create / Patch).
              * `invalid_domain` — 400, aggregate invariant rejected the body.
              * `invalid_domain_id` — 400, path `{id}` was not a non-zero UUID.
              * `domain_not_found` — 404, the addressed Domain does not exist or is not visible.
              * `slug_immutable` — 400, `PatchDomain` body carried a `slug` field.
              * `empty_patch` — 400, `PatchDomain` body had no mutable fields set.
              * `invalid_reachability_policy` — 400, `reachability` partial fill (a non-zero policy must set every threshold).
              * `mesh_cidr_invalidates_subrange` — 422, mesh_cidr retarget would orphan an existing project sub-range.
              * `domain_not_empty` — 409, `DeleteDomain` blocked by remaining child aggregates (see `DomainChildCounts`).
              * `permission_denied` — 403, ReBAC denied the operation. Emitted via the dedicated `PermissionDenied` schema (Story 8 deviation note).
              * `unauthenticated` — 401, no resolved principal on the request.
              * `invalid_limit` — 400, `ListDomains` `limit` query parameter was outside `[1, 200]`.
              * `invalid_cursor` — 400, `ListDomains` opaque cursor was tampered or malformed (HMAC mismatch).
              * `cursor_binding_mismatch` — 403, `ListDomains` cursor was minted for a different caller than the one presenting it (per-(caller, pepper) HMAC binding rejected the replay).
              * `invalid_body` — 400, request body was not a valid `DomainCreateRequest` / `DomainPatchRequest` JSON document.
              * `request_body_too_large` — 413, request body exceeded the 8 KiB tenancy ceiling.

            Tenancy Project CRUD
            adds the closed taxonomy below. Each code maps to exactly one
            repo / service sentinel and one HTTP status:

              * `project_slug_conflict` — 409, CreateProject duplicate (domain_id, slug).
              * `sub_range_overlap` — 409, sub_range_cidr overlaps a sibling Project's reservation.
              * `parent_domain_missing` — 409, FK violation on Create — the parent Domain does not exist.
              * `invalid_project` — 400, aggregate invariant rejected the body.
              * `invalid_project_id` — 400, path `{id}` was not a non-zero UUID.
              * `invalid_domain_filter` — 400, ListProjects `domain_id` query parameter was malformed.
              * `project_not_found` — 404, the addressed Project does not exist or is not visible.
              * `sub_range_invalidates_allocation` — 422, sub_range patch would invalidate an existing allocation (or contradicts itself with `release_sub_range`).
              * `project_not_empty` — 409, DeleteProject blocked by remaining child aggregates (see `ProjectChildCounts`).
              * `cursor_binding_mismatch` — 403, `ListProjects` cursor was minted for a different caller than the one presenting it (per-(caller, pepper) HMAC binding rejected the replay).

            Tenancy Identity listing + Invitations
            adds the closed taxonomy below. Each code maps to exactly one
            repo / service sentinel and one HTTP status:

              * `invalid_kind` — 400, `kind` query parameter was not `user` or `service-identity`.
              * `invalid_principal_id` — 400, path `{principalId}` was not a non-zero UUID.
              * `identity_not_found` — 404, principal does not exist or is in a different Domain.
              * `invalid_status` — 400, `status` query parameter was not in {pending, accepted, revoked, expired, all}.
              * `invalid_invitation_id` — 400, path `{invitationId}` was not a non-zero UUID.
              * `invalid_ttl` — 400, `ttl_seconds` was outside [60, 604800].
              * `too_many_initial_tuples` — 422, `initial_tuples` exceeded the 32-entry cap.
              * `invitation_object_out_of_scope` — 422, an `initial_tuples[].object` was not `domain:<this-id>` / `project:<uuid>` / `group:<uuid>`.
              * `invalid_caveat_context` — 422, an `initial_tuples[].caveat_context` was not JSON-encodable losslessly.
              * `invitation_already_pending` — 409, a pending invitation already exists for `(domain_id, external_subject)`.
              * `invitation_already_accepted` — 409, target invitation has already been accepted (Revoke / Accept races).
              * `invitation_already_expired` — 409, target invitation has already been expired.
              * `invitation_not_found` — 404, invitation does not exist or is in a different Domain.
              * `cursor_binding_mismatch` — 403, `ListIdentities` / `ListInvitations` cursor was minted for a different caller than the one presenting it (per-(caller, pepper) HMAC binding rejected the replay).

            CSRF defence-in-depth adds three 403 codes
            scoped to state-changing cookie-authenticated `/v1/*`
            requests. Bearer-authenticated requests and `GET` / `HEAD`
            requests are exempt. The codes are:

              * `csrf-token-mismatch` — 403, the `X-Plexsphere-CSRF`
                header is absent, empty, or does not byte-match the
                `plexsphere_csrf` cookie. The cookie is rotated on
                sign-in and on sign-out so a leaked token cannot
                outlive the session it was minted for.
              * `csrf-origin-mismatch` — 403, the request carried an
                `Origin` header that is not in the configured
                allowlist AND did not advertise
                `Sec-Fetch-Site: same-origin`.
              * `csrf-origin-not-configured` — 403, the deployment
                does not configure `PLEXSPHERE_CSRF_ALLOWED_ORIGINS`.
                A misconfigured production deployment surfaces this
                code on every cookie-authenticated mutation rather
                than silently bypassing the CSRF check.

            Cloud Inventory CRUD adds the closed taxonomy below. Each
            code maps to exactly one
            repo / service / validator sentinel and one HTTP status:

              * `cloud_slug_conflict` — 409, CreateCloud duplicate slug.
              * `cloud_external_id_conflict` — 409, CreateCloud duplicate `(provider, external_id)` pair.
              * `invalid_cloud` — 400, Cloud aggregate invariant rejected the body.
              * `invalid_cloud_id` — 400, path `{id}` was not a non-zero UUID.
              * `cloud_not_found` — 404, the addressed Cloud does not exist or is not visible.
              * `slug_immutable` — 400, `PatchCloud` (or `PatchDomain`) body carried a `slug` field. Shared with the tenancy taxonomy because the immutability semantics match.
              * `provider_immutable` — 400, `PatchCloud` body carried a `provider` field — provider is the validator-routing key and changing it would invalidate every previously-stored endpoint blob.
              * `unknown_provider` — 400, `provider` is not one of the supported closed-enum values (aws, azure).
              * `invalid_cloud_endpoint` — 400, per-provider validator rejected one or more fields in the `endpoint` JSONB blob.
              * `invalid_cloud_region_defaults` — 400, per-provider validator rejected one or more fields in the `region_defaults` JSONB blob.
              * `cloud_not_empty` — 409, `DeleteCloud` blocked by at least one persisted `CloudCredential` (see `CloudChildCounts`).
              * `clouds_not_provisioned` — 501, the composition root has not wired the Cloud Inventory dependency bundle yet.
              * `cursor_binding_mismatch` — 403, `ListClouds` cursor was minted for a different caller than the one presenting it (per-(caller, pepper) HMAC binding rejected the replay). Mirrors the `ListNodes` `cursor_binding_mismatch` on `/v1/nodes`.

            The operator-facing Cloud Credentials read + revoke surface
            adds the closed taxonomy below. Each code maps to exactly
            one repo / service / read-service sentinel and one HTTP
            status:

              * `invalid_cloud_credential_id` — 400, path `{id}` on `/v1/cloud-credentials/{id}` was not a non-zero UUID.
              * `invalid_revoke_reason` — 400, `RevokeCloudCredential` body `reason` was empty or whitespace-only.
              * `cloud_credential_not_found` — 404, the addressed Cloud Credential does not exist.
              * `cloud_credentials_not_provisioned` — 501, the composition root has not wired the Cloud Credentials read + revoke dependency bundle yet.

            The Cloud Credentials surface REUSES the shared
            `invalid_limit`, `invalid_cursor`, `cursor_binding_mismatch`,
            `invalid_body`, `request_body_too_large`, `unauthenticated`,
            and `internal` codes with the same semantics they carry on
            the Cloud Inventory surface above.

            The operator-facing OpenBao Credential Broker read +
            lifecycle surface adds the closed taxonomy below. Each code
            maps to exactly one repo / service / read-service sentinel
            and one HTTP status:

              * `invalid_project_id` — 400, path `{id}` on `/v1/projects/{id}/credentials` was not a non-zero UUID.
              * `invalid_credential_id` — 400, path `{id}` on `/v1/credentials/{id}` was not a non-zero UUID.
              * `invalid_revoke_reason` — 400, `RevokeCredential` body `reason` was empty or whitespace-only.
              * `invalid_rotate_material` — 400, `RotateCredential` body carried an empty payload, non-positive ttl, or otherwise malformed material.
              * `credential_not_found` — 404, the addressed credential does not exist.
              * `credential_cas_conflict` — 409, `RotateCredential` `expected_version` did not match the live broker-row version.
              * `credential_revoked` — 409, `RotateCredential` targeted an already-revoked credential.
              * `credentials_not_provisioned` — 501, the composition root has not wired the Credential Broker read + lifecycle dependency bundle yet.

            The Credential Broker surface REUSES the shared
            `invalid_limit`, `invalid_cursor`, `cursor_binding_mismatch`,
            `invalid_body`, `request_body_too_large`, `unauthenticated`,
            and `internal` codes with the same semantics they carry on
            the Cloud Inventory surface above.

            The Credential Assignment request + decision surface adds
            the closed taxonomy below. Each code maps to exactly one
            repo / service / read-service sentinel and one HTTP status:

              * `invalid_credential_assignment_id` — 400, path `{id}` on `/v1/credential-assignments/{id}/...` was not a non-zero UUID.
              * `invalid_cloud_credential_id` — 400, `RequestCredentialAssignment` body `cloud_credential_id` was not a non-zero UUID. Reuses the same code string the Cloud Credentials path id carries.
              * `invalid_decision_reason` — 400, `RejectCredentialAssignment` or `RevokeCredentialAssignment` body `reason` was empty or whitespace-only.
              * `credential_assignment_not_found` — 404, the addressed Credential Assignment does not exist.
              * `duplicate_live_assignment` — 409, a live Credential Assignment already exists for the same (Project, Cloud Credential) pair.
              * `credential_not_assignable` — 422, the named Cloud Credential is not in an assignable lifecycle state.
              * `illegal_transition` — 409, the requested lifecycle transition is not legal from the assignment's current state.
              * `self_approval_denied` — 403, the caller may not approve a Credential Assignment they themselves requested.
              * `credential_assignments_not_provisioned` — 501, the composition root has not wired the Credential Assignment dependency bundle yet.

            The Credential Assignment surface REUSES the shared
            `invalid_project_id`, `invalid_limit`, `invalid_cursor`,
            `cursor_binding_mismatch`, `invalid_body`,
            `request_body_too_large`, `unauthenticated`, and `internal`
            codes with the same semantics they carry on the Cloud
            Inventory surface above.

            The Approval Workflow dual-control surface adds the closed
            taxonomy below. Each code maps to exactly one repo / service
            sentinel and one HTTP status:

              * `invalid_approval_id` — 400, path `{id}` on `/v1/approvals/{id}`, `.../approve`, `.../reject`, or `.../break-glass` was not a non-zero UUID.
              * `invalid_break_glass_reason` — 400, `BreakGlassApproval` body `reason` was shorter than the 16-character emergency-justification floor or whitespace-only.
              * `approval_not_found` — 404, the addressed Approval does not exist or is not visible.

            The Approval Workflow surface REUSES the
            `invalid_decision_reason` (`RejectApproval` body `reason` was
            empty or whitespace-only), `self_approval_denied` (the caller
            may not approve a proposal they themselves raised), and
            `illegal_transition` (the requested lifecycle transition is
            not legal from the proposal's current state) code strings with
            the same semantics they carry on the Credential Assignment
            surface above, plus the shared `invalid_limit`,
            `invalid_cursor`, `cursor_binding_mismatch`, `invalid_body`,
            `unauthenticated`, `permission_denied`, and `internal` codes
            with the same semantics they carry on the surfaces above.

            The read-only Blueprint Catalog surface adds the closed
            taxonomy below. Each code maps to exactly one repo /
            read-service sentinel and one HTTP status:

              * `invalid_blueprint_id` — 400, path `{id}` on `/v1/blueprints/{id}` was not a non-zero UUID.
              * `blueprint_not_found` — 404, the addressed Blueprint does not exist or is not visible.
              * `blueprints_not_provisioned` — 501, the composition root has not wired the Blueprint Catalog read dependency bundle yet.

            The Blueprint Catalog surface REUSES the shared
            `invalid_limit`, `invalid_cursor`, `cursor_binding_mismatch`,
            `unauthenticated`, and `internal` codes with the same
            semantics they carry on the Cloud Inventory surface above.

            The Tenancy Resource surface adds the closed taxonomy
            below. Each code maps to exactly one repo / service
            sentinel and one HTTP status:

              * `invalid_resource_origin` — 400, `CreateResource` body `origin` was absent or not one of `adopted` / `provisioned`.
              * `invalid_resource_id` — 400, path `{id}` on `/v1/resources/{id}` was not a non-zero UUID.
              * `resource_not_found` — 404, the addressed Resource does not exist or is not visible.
              * `resources_not_provisioned` — 501, the composition root has not wired the Resource dependency bundle yet.

            The Tenancy Resource surface REUSES the shared
            `invalid_project_id`, `project_not_found`, `invalid_body`,
            `invalid_limit`, `invalid_cursor`, `cursor_binding_mismatch`,
            `request_body_too_large`, `unauthenticated`, and `internal`
            codes with the same semantics they carry on the Cloud
            Inventory and Tenancy surfaces above.

            The Bridge Orchestrator surface adds the closed taxonomy
            below. Each code maps to exactly one repo / service / domain
            sentinel and one HTTP status:

              * `resource_not_bridge` — 409, the addressed Resource exists but is not of kind `bridge`; emitted by every mutating bridge operation before any persistence write.
              * `relay_port_out_of_range` — 400, a `listen_port` (relay, user-access provider) or `remote_port` (site-to-site tunnel) was outside the closed range `1..65535`.
              * `slug_conflict` — 409, a many-aggregate create or patch collided on `(resource_id, slug)` (user-access, ingress, site-to-site) or on `(resource_id, sni_host)` (ingress).
              * `target_node_not_in_domain` — 400, an ingress rule's `target_node_id` resolves to a Node outside the bridge Resource's owning Domain.
              * `allowed_subnet_empty` — 400, a site-to-site tunnel create or patch supplied an empty `allowed_subnets` list.
              * `secret_ref_malformed` — 400, an `auth_secret_ref` (user-access, site-to-site) did not match the opaque `secret:<domain>/<project>/<name>(:<version>)?` form.

            The Bridge Orchestrator surface REUSES the shared
            `invalid_project_id`, `project_not_found`,
            `invalid_resource_id`, `resource_not_found`, `invalid_body`,
            `request_body_too_large`, `permission_denied`,
            `unauthenticated`, and `internal` codes with the same
            semantics they carry on the Tenancy Resource surface above.
        child_counts:
          allOf:
            - $ref: "#/components/schemas/DomainChildCounts"
          description: |
            Optional structured payload set EXCLUSIVELY by the
            `domain_not_empty` problem (`DELETE /v1/domains/{id}`
            blocked by remaining child aggregates). Other problem
            instances omit the field. The generated client should
            treat its presence as a strong signal the response code
            is `domain_not_empty`.
        project_child_counts:
          allOf:
            - $ref: "#/components/schemas/ProjectChildCounts"
          description: |
            Optional structured payload set EXCLUSIVELY by the
            `project_not_empty` problem (`DELETE /v1/projects/{id}`
            blocked by remaining child aggregates). Other problem
            instances omit the field. The generated client should
            treat its presence as a strong signal the response code
            is `project_not_empty`.
        cloud_child_counts:
          allOf:
            - $ref: "#/components/schemas/CloudChildCounts"
          description: |
            Optional structured payload set EXCLUSIVELY by the
            `cloud_not_empty` problem (`DELETE /v1/clouds/{id}`
            blocked by remaining child aggregates). Other problem
            instances omit the field. The generated client should
            treat its presence as a strong signal the response code
            is `cloud_not_empty`.
      example:
        type: "https://plexsphere.dev/errors/not-found"
        title: "Not Found"
        status: 404
        detail: "No route matched the request."
        instance: "/v1/unknown"
    PermissionDenied:
      type: object
      description: |
        Specialised RFC 9457 problem-details body returned on 403 from
        the ReBAC authorizer. Extends `Problem` with
        a machine-readable denial reason, the traversed relation path,
        and the correlation id that pairs the response with the matching
        audit entry emitted by `internal/audit`.

        DECISION: the schema is declared as a standalone object rather
        than via `allOf` against `Problem`. kin-openapi's validator and
        oapi-codegen both accept `allOf`, but the downstream TypeScript
        client we generate treats `allOf` members as intersections that
        collide on optional fields — duplicating the Problem fields in
        place keeps the generated Go and TS shapes identical and avoids
        the collision.
      required:
        - type
        - title
        - status
        - detail
        - instance
        - reason
        - correlation_id
      properties:
        type:
          type: string
          description: URI reference that identifies the problem type.
        title:
          type: string
          description: Short, human-readable summary of the problem.
        status:
          type: integer
          description: HTTP status code generated for this occurrence (always 403).
        detail:
          type: string
          description: Human-readable explanation for this occurrence.
        instance:
          type: string
          description: URI reference identifying the specific occurrence.
        code:
          type: string
          description: |
            Optional machine-readable error code (shared with `Problem`).
        reason:
          type: string
          enum:
            - out_of_scope
            - insufficient_relation
            - caveat_violation
          description: |
            Machine-readable denial reason. The enum
            values match `internal/audit.Reason.String` exactly:
            `out_of_scope` — the request carried no relevant subject
            binding for the object; `insufficient_relation` — a subject
            binding exists but no permission derivation grants the
            attempted action; `caveat_violation` — the tuple graph
            permitted the action but a CEL caveat (within_time_window,
            from_cidr, requires_assurance) evaluated to false.
        relation_path:
          type: array
          description: |
            Ordered sequence of relations the authorizer traversed while
            evaluating the Check. Empty when the denial was decided
            before any relation lookup (typically `out_of_scope`).
          items:
            type: string
        correlation_id:
          type: string
          description: |
            Correlation id that pairs this denial with the matching
            audit entry emitted by `internal/audit`.
      example:
        type: "https://plexsphere.dev/errors/permission-denied"
        title: "Permission Denied"
        status: 403
        detail: "request rejected by authorization policy"
        instance: "/v1/admin/groups"
        reason: insufficient_relation
        relation_path:
          - "domain:acme#admin"
          - "group:ops#parent"
        correlation_id: "01HXYZABCDEFGHJKMNPQRSTVWX"
    SignInRequest:
      type: object
      description: |
        Body for POST /v1/auth/sign-in. At least one of `domain_id` or
        `idp_binding_id` must be supplied; the router uses them to
        resolve the IdP binding against which to begin the flow
        .
      properties:
        domain_id:
          type: string
          format: uuid
          description: Domain the user is signing into.
        idp_binding_id:
          type: string
          format: uuid
          description: Explicit IdP binding override within a Domain.
        return_to:
          type: string
          description: |
            Post-sign-in redirect target. Must be an allow-listed
            relative path or absolute URL.
        prompt:
          type: string
          description: |
            Optional OIDC `prompt` parameter forwarded to the IdP
            (e.g. "login", "consent").
      example:
        domain_id: "0192f2f6-b840-7000-a123-000000000001"
        return_to: "/dashboard"
    SignInResponse:
      type: object
      description: |
        Response for POST /v1/auth/sign-in. `code_verifier_handle` is
        an opaque key the server uses to recover the PKCE verifier on
        the callback; the verifier itself never leaves the backend.
      required:
        - authorization_url
        - state
        - code_verifier_handle
        - nonce
      properties:
        authorization_url:
          type: string
          description: OIDC authorization URL the caller redirects to.
        state:
          type: string
          description: Opaque state value correlated on the callback.
        code_verifier_handle:
          type: string
          description: Opaque handle that resolves the PKCE verifier.
        nonce:
          type: string
          description: OIDC nonce passed into the ID token.
    DeviceCodeRequest:
      type: object
      description: |
        Body for POST /v1/auth/device-code — initiates RFC 8628 device
        authorization against the resolved IdP binding.
      required:
        - domain_id
        - idp_binding_id
      properties:
        domain_id:
          type: string
          format: uuid
          description: Domain the caller is authenticating against.
        idp_binding_id:
          type: string
          format: uuid
          description: IdP binding within the Domain.
        client_id:
          type: string
          description: Optional OIDC client identifier override.
    DeviceCodeResponse:
      type: object
      description: |
        Response for POST /v1/auth/device-code. Fields mirror RFC 8628
        §3.2.
      required:
        - device_code
        - user_code
        - verification_uri
        - verification_uri_complete
        - expires_in
        - interval
      properties:
        device_code:
          type: string
          description: Opaque code the client polls with.
        user_code:
          type: string
          description: Short code the end user types in a browser.
        verification_uri:
          type: string
          description: URL the end user visits to confirm the device.
        verification_uri_complete:
          type: string
          description: |
            URL with the user_code pre-filled; RFC 8628 recommends
            presenting this as a QR code.
        expires_in:
          type: integer
          description: Lifetime of the device_code in seconds.
        interval:
          type: integer
          description: Minimum polling interval in seconds.
    DeviceTokenRequest:
      type: object
      description: Body for POST /v1/auth/device-token.
      required:
        - device_code
      properties:
        device_code:
          type: string
          description: Device code returned by /v1/auth/device-code.
        client_id:
          type: string
          description: Optional OIDC client identifier override.
    DeviceApproveRequest:
      type: object
      description: |
        Body for POST /v1/auth/device/approve. The dashboard reads
        `user_code` from the URL the CLI printed
        (`?user_code=ABCD-EFGH`) and round-trips it back to the server
        verbatim — the server normalises by stripping the optional
        ASCII dash before comparing against the `user_code` produced by
        `POST /v1/auth/device-code`.
      required:
        - user_code
      properties:
        user_code:
          type: string
          description: |
            Short user-typed code from the device-code response. The
            base32 alphabet is uppercase A–Z and 2–7; an optional ASCII
            dash separating the two 4-character halves
            (e.g. `ABCD-EFGH` or `ABCDEFGH`) is accepted.
          pattern: "^[A-Z2-7]{4}-?[A-Z2-7]{4}$"
    DeviceApproveResponse:
      type: object
      description: |
        Response for POST /v1/auth/device/approve. The body is
        intentionally minimal — the polling client picks up the minted
        token via /v1/auth/device-token; this response just confirms
        the status flip so the dashboard can transition into a "you can
        close this tab" affordance.
      required:
        - status
      properties:
        status:
          type: string
          description: Always `approved` on a 200.
          enum:
            - approved
    ServiceTokenRequest:
      type: object
      description: |
        Body for POST /v1/auth/service/token. Supports
        `client_credentials` and JWT-bearer grant types.
      required:
        - grant_type
      properties:
        grant_type:
          type: string
          enum:
            - client_credentials
            - "urn:ietf:params:oauth:grant-type:jwt-bearer"
          description: OAuth2 grant type used to authenticate the service.
        client_id:
          type: string
          description: ServiceIdentity client identifier.
        client_secret:
          type: string
          description: |
            Client secret for the `client_credentials` grant. Rejected
            for the JWT-bearer grant.
        client_assertion:
          type: string
          description: |
            Signed JWT assertion for the JWT-bearer grant. Rejected for
            the `client_credentials` grant.
        scope:
          type: string
          description: Optional space-delimited OAuth2 scope list.
    ServiceTokenResponse:
      type: object
      description: |
        Response for POST /v1/auth/service/token (and the success body
        of POST /v1/auth/device-token once the flow completes).
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: Access token suitable for Bearer-authenticated requests.
        token_type:
          type: string
          description: Always "Bearer" for plexsphere-issued tokens.
        expires_in:
          type: integer
          description: Lifetime of the access token in seconds.
        scope:
          type: string
          description: Space-delimited scope string, when one was granted.
    APITokenIssueRequest:
      type: object
      description: |
        Body for POST /v1/auth/tokens. `env_prefix` is the environment
        segment embedded in the psk-shaped plaintext; the aggregate
        accepts any lowercase ASCII letter run but the public API is
        restricted to the three plexsphere-supported environments
        .
      required:
        - identity_ref
        - env_prefix
      properties:
        identity_ref:
          type: string
          description: |
            Identifier of the user or ServiceIdentity the token binds
            to. Format is `user:<uuid>` or `service:<uuid>`.
        env_prefix:
          type: string
          enum:
            - dev
            - stage
            - prod
          description: Environment segment embedded in the plaintext.
        ttl_seconds:
          type: integer
          description: |
            Optional TTL in seconds. If omitted, the server applies the
            deployment default.
    APITokenIssueResponse:
      type: object
      description: |
        Response for POST /v1/auth/tokens. Plaintext is returned
        exactly once — it can never be retrieved again. A `Sunset` response header is set when this response
        retires a previous plaintext (i.e. when the call was a
        rotation); first issuances omit the header entirely.
      required:
        - id
        - plaintext
        - env_prefix
        - expires_at
      properties:
        id:
          type: string
          format: uuid
          description: Token identifier (UUIDv7).
        plaintext:
          type: string
          description: The psk-shaped plaintext; returned exactly once.
        env_prefix:
          type: string
          description: Environment segment embedded in the plaintext.
        expires_at:
          type: string
          format: date-time
          description: RFC 3339 expiry timestamp.
    APITokenSummary:
      type: object
      description: |
        Plaintext-free summary entry for GET /v1/auth/tokens. Matches
        the persisted APIToken aggregate minus any secret material
        .
      required:
        - id
        - env_prefix
        - created_at
        - expires_at
      properties:
        id:
          type: string
          format: uuid
          description: Token identifier (UUIDv7).
        env_prefix:
          type: string
          description: Environment segment embedded in the plaintext.
        last_used_at:
          type: string
          format: date-time
          description: Most-recent authentication timestamp, if any.
        created_at:
          type: string
          format: date-time
          description: Issuance timestamp.
        expires_at:
          type: string
          format: date-time
          description: Expiry timestamp.
        rotated_at:
          type: string
          format: date-time
          description: Timestamp the token was most recently rotated.
    APITokenRotateResponse:
      type: object
      description: |
        Response for POST /v1/auth/tokens/{id}/rotate. The `Sunset`
        header names the retirement deadline of the rotated-from
        plaintext.
      required:
        - id
        - plaintext
        - env_prefix
        - expires_at
        - rotation_deadline
      properties:
        id:
          type: string
          format: uuid
          description: Token identifier (UUIDv7).
        plaintext:
          type: string
          description: New psk-shaped plaintext; returned exactly once.
        env_prefix:
          type: string
          description: Environment segment embedded in the plaintext.
        expires_at:
          type: string
          format: date-time
          description: Expiry timestamp of the new plaintext.
        rotation_deadline:
          type: string
          format: date-time
          description: |
            Retirement deadline of the rotated-from plaintext. Matches
            the value advertised in the `Sunset` response header.
    Whoami:
      type: object
      description: Resolved principal metadata for the current request.
      required:
        - principal_type
        - subject
      properties:
        principal_type:
          type: string
          enum:
            - user
            - service
          description: Whether the principal is a human user or a ServiceIdentity.
        subject:
          type: string
          description: Principal identifier (UUIDv7 serialised as a string).
        domain_id:
          type: string
          format: uuid
          description: Domain the principal belongs to.
        email:
          type: string
          description: |
            Primary email of the principal as projected by the upstream
            IdP at sign-in. Omitted when the IdP did not supply an
            `email` claim or the principal is a ServiceIdentity. The
            dashboard's SignedInBadge renders it as the human-readable
            identity label.
        acr:
          type: string
          description: Authentication Context Class Reference, if available.
        amr:
          type: array
          description: Authentication Methods References (e.g. "pwd", "mfa").
          items:
            type: string
    IdPBindingRequest:
      type: object
      description: |
        Body for POST /v1/admin/idp. Field set mirrors the
        `IdPBinding` aggregate.
      required:
        - domain_id
        - issuer
        - client_id
        - client_secret_ref
        - discovery_url
        - jit_policy
      properties:
        domain_id:
          type: string
          format: uuid
          description: Owning Domain.
        issuer:
          type: string
          description: OIDC issuer URL (absolute http/https).
        client_id:
          type: string
          description: OIDC client identifier.
        client_secret_ref:
          type: string
          description: |
            Opaque reference to the client secret held in the secret
            store — never the secret value itself.
        discovery_url:
          type: string
          description: OIDC discovery document URL (absolute http/https).
        claim_mappings:
          type: object
          additionalProperties:
            type: string
          description: |
            Mapping of plexsphere claim name → IdP claim name. An empty
            map is permitted.
        required_acr:
          type: array
          description: Required OIDC ACR values.
          items:
            type: string
        required_amr:
          type: array
          description: Required OIDC AMR values.
          items:
            type: string
        jit_policy:
          type: string
          enum:
            - allow
            - deny
          description: Just-in-time user-provisioning policy.
    IdPBindingResponse:
      type: object
      description: |
        Response echo of a persisted IdPBinding aggregate. The
        `client_secret_ref` field is included because it is an opaque
        reference, not the secret itself.
      required:
        - id
        - domain_id
        - issuer
        - client_id
        - client_secret_ref
        - discovery_url
        - jit_policy
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Binding identifier (UUIDv7).
        domain_id:
          type: string
          format: uuid
          description: Owning Domain.
        issuer:
          type: string
          description: OIDC issuer URL.
        client_id:
          type: string
          description: OIDC client identifier.
        client_secret_ref:
          type: string
          description: Opaque reference to the client secret.
        discovery_url:
          type: string
          description: OIDC discovery document URL.
        claim_mappings:
          type: object
          additionalProperties:
            type: string
          description: Plexsphere claim → IdP claim mapping.
        required_acr:
          type: array
          items:
            type: string
        required_amr:
          type: array
          items:
            type: string
        jit_policy:
          type: string
          enum:
            - allow
            - deny
        status:
          type: string
          enum:
            - active
            - inactive
            - degraded
            - deactivated
          description: Aggregate status.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    IdPBindingStatusRequest:
      type: object
      description: |
        Body for PATCH /v1/admin/idp/{id}/status. Only `active` and
        `deactivated` are supported from this endpoint; transitions
        such as `degraded` are driven by background probes and cannot
        be set manually.
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - active
            - deactivated
          description: New binding status.
    IdPBindingPatchRequest:
      type: object
      description: |
        Partial-update body for PATCH /v1/admin/idp/{id}. All fields are optional; only fields present in the
        request are mutated. the `status` field is
        intentionally absent from this schema — status transitions are
        performed exclusively through PATCH /v1/admin/idp/{id}/status.
      properties:
        discovery_url:
          type: string
          description: OIDC discovery document URL (absolute http/https).
        claim_mappings:
          type: object
          additionalProperties:
            type: string
          description: |
            Mapping of plexsphere claim name → IdP claim name. An empty
            map clears all mappings.
        required_acr:
          type: array
          description: Required OIDC ACR values.
          items:
            type: string
        required_amr:
          type: array
          description: Required OIDC AMR values.
          items:
            type: string
        jit_policy:
          type: string
          enum:
            - allow
            - deny
          description: Just-in-time user-provisioning policy.
    GroupRequest:
      type: object
      description: |
        Body for POST /v1/admin/groups. Field set mirrors the `Group`
        aggregate. DECISION: the aggregate enforces
        a source-specific invariant at construction time — `source=idp`
        requires both `idp_binding_id` (non-zero) AND `idp_claim_value`
        (non-empty); `source=manual` forbids both. Violations are
        rejected with a 400 Problem from validation rather than by a
        SQL CHECK constraint, so the failure surfaces in the transport
        layer rather than the persistence layer.
      required:
        - domain_id
        - slug
        - display_name
        - source
      properties:
        domain_id:
          type: string
          format: uuid
          description: Owning Domain.
        slug:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-z0-9]([a-z0-9-]{0,62}[a-z0-9])?$"
          description: |
            URL-safe identifier unique within `domain_id`. Lowercase
            ASCII letters, digits, and internal dashes only; cannot
            start or end with a dash.
        display_name:
          type: string
          maxLength: 128
          description: Human-friendly Group name.
        source:
          type: string
          enum:
            - manual
            - idp
          description: |
            Provenance of the Group. `manual` means the Group was
            created via this admin API; `idp` means it is reconciled
            from an IdP claim. DECISION: `source=idp` requires
            `idp_binding_id` and `idp_claim_value`; `source=manual`
            forbids both. The aggregate rejects mismatches so the
            error surfaces as 400, not as a SQL CHECK violation
            .
        idp_binding_id:
          type: string
          format: uuid
          description: |
            IdP binding the Group is reconciled from. Required when
            `source=idp`; must be omitted when `source=manual`
            .
        idp_claim_value:
          type: string
          description: |
            Verbatim IdP claim value the Group reconciles to. Required
            when `source=idp`; must be omitted when `source=manual`
            .
    GroupResponse:
      type: object
      description: |
        Response echo of a persisted Group aggregate.
      required:
        - id
        - domain_id
        - slug
        - display_name
        - source
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Group identifier (UUIDv7).
        domain_id:
          type: string
          format: uuid
          description: Owning Domain.
        slug:
          type: string
          description: |
            URL-safe identifier unique within `domain_id`
            .
        display_name:
          type: string
          description: Human-friendly Group name.
        source:
          type: string
          enum:
            - manual
            - idp
          description: Provenance of the Group.
        idp_binding_id:
          type: string
          format: uuid
          description: |
            IdP binding the Group is reconciled from. Present only
            when `source=idp`.
        idp_claim_value:
          type: string
          description: |
            Verbatim IdP claim value. Present only when `source=idp`
            .
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GroupListResponse:
      type: object
      description: |
        Page of Groups returned by GET /v1/admin/groups
        .
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GroupResponse"
          description: Groups in the current page.
        next_cursor:
          type: string
          description: |
            Continuation token for the next page. Omitted or empty
            when the iteration has reached end-of-stream
            .
    GroupUpdateRequest:
      type: object
      description: |
        Body for PATCH /v1/admin/groups/{id}. Only `display_name` is
        settable; the `slug` is immutable because it participates in
        the `(domain_id, slug)` uniqueness constraint and is referenced
        by IdP claim mappings.
      required:
        - display_name
      properties:
        display_name:
          type: string
          maxLength: 128
          description: New human-friendly Group name.
    GroupMembershipRequest:
      type: object
      description: |
        Body for POST /v1/admin/groups/{id}/members. The Membership's
        `source` MUST match the parent Group's `source`; the handler
        resolves the parent and rejects mismatches with 409
        source-conflict before a SQL round-trip.

        DECISION: the request body does NOT carry `idp_claim_value`.
        The per-Group claim mapping lives on the parent Group
        aggregate (`idp_claim_value` on `plexsphere.groups`); every
        Membership attached to an IdP-sourced Group inherits that
        mapping. Putting a claim on each row would be contract
        incoherence with the sync path (`MembershipRepo.SyncForUser`
        reads `parent.IdPClaimValue` exclusively).
      required:
        - principal_id
        - principal_kind
        - source
      properties:
        principal_id:
          type: string
          format: uuid
          description: Principal identifier (UUIDv7).
        principal_kind:
          type: string
          enum:
            - user
            - service_identity
            - group
          description: |
            Principal discriminator. The repo uses this to target the
            correct XOR column on `group_memberships`
            .
        source:
          type: string
          enum:
            - manual
            - idp
          description: |
            Provenance of the Membership. MUST equal the parent
            Group's `source`; a mismatch returns 409 source-conflict
            .
    GroupMembershipResponse:
      type: object
      description: |
        Response echo of a persisted Membership row
        .
      required:
        - group_id
        - principal_id
        - principal_kind
        - source
        - created_at
      properties:
        group_id:
          type: string
          format: uuid
          description: Group identifier (UUIDv7).
        principal_id:
          type: string
          format: uuid
          description: Principal identifier (UUIDv7).
        principal_kind:
          type: string
          enum:
            - user
            - service_identity
            - group
          description: Principal discriminator.
        source:
          type: string
          enum:
            - manual
            - idp
          description: Provenance of the Membership.
        created_at:
          type: string
          format: date-time
    GroupMembershipListResponse:
      type: object
      description: |
        List of Memberships attached to a Group.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GroupMembershipResponse"
          description: Memberships of the Group.
    ValueSchemaKind:
      type: string
      enum:
        - string
        - enum
        - numeric
        - boolean
        - regex
      description: |
        Discriminator for the five supported Label value-schema kinds
        .
    LabelValueSchema:
      type: object
      description: |
        Polymorphic descriptor of a Label Definition's value contract.
        Callers must set `kind` to one of the five supported values;
        the sibling fields that accompany each kind are optional on the
        wire but enforced by the aggregate:
          * `string` — optional `max_len` (default 256 bytes).
          * `enum` — required `values` (non-empty, unique,
            non-blank).
          * `numeric` — optional `min` / `max` (int64).
          * `boolean` — no extra fields.
          * `regex` — required `pattern` (Go regexp).
        The `kind` property doubles as the OpenAPI discriminator so
        the generated TypeScript client can fan out into per-kind
        narrowing.
      required:
        - kind
      properties:
        kind:
          $ref: "#/components/schemas/ValueSchemaKind"
        max_len:
          type: integer
          minimum: 0
          description: |
            Maximum byte length for `kind=string` (default 256 when
            omitted; 0 is equivalent to the default).
        values:
          type: array
          items:
            type: string
          description: |
            Permitted string values for `kind=enum`. Non-empty, unique,
            non-blank.
        min:
          type: integer
          format: int64
          description: |
            Inclusive lower bound for `kind=numeric`. Omit for an open
            lower bound.
        max:
          type: integer
          format: int64
          description: |
            Inclusive upper bound for `kind=numeric`. Omit for an open
            upper bound.
        pattern:
          type: string
          description: |
            Go regexp pattern for `kind=regex`. Compiled at aggregate
            build time; malformed patterns are rejected.
      discriminator:
        propertyName: kind
    LabelDefinition:
      type: object
      description: |
        Response shape echoing a persisted Label Definition aggregate
        .
      required:
        - id
        - scope
        - scope_id
        - local_key
        - qualified_key
        - value_schema
        - applicable_kinds
        - on_delete
        - cardinality
        - immutable
        - cloud_tag_propagation
        - created_by
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Label Definition identifier (UUIDv7).
        scope:
          type: string
          enum:
            - platform
            - domain
            - project
          description: |
            Scope discriminator. Platform Definitions are visible to
            every tenant; Domain and Project scope restrict the visibility
            to the respective aggregate.
        scope_id:
          type: string
          format: uuid
          description: |
            Tenancy identifier. Zero UUID when `scope=platform`;
            non-zero Domain identifier when `scope=domain`; non-zero
            Project identifier when `scope=project`.
        local_key:
          type: string
          description: |
            Unqualified key token (for example `env`, `cost-center`).
        qualified_key:
          type: string
          description: |
            Fully namespaced key (for example `platform/env`,
            `acme:checkout/owner`). Unique across the platform.
        value_schema:
          $ref: "#/components/schemas/LabelValueSchema"
        applicable_kinds:
          type: array
          items:
            type: string
          description: |
            Lowercase object-kind whitelist (resource, node, project,
            domain, workload, network, …). Assignments whose
            `object.kind` is not in this set are rejected with
            `scope-mismatch`.
        on_delete:
          type: string
          enum:
            - block
            - cascade
            - orphan
          description: |
            Policy applied when the Definition is deleted while
            Assignments still exist.
        cardinality:
          type: integer
          description: |
            Declared per-object cardinality cap for Assignments of
            this Definition. `1` means at most one Assignment per
            object; `0` means unlimited (bounded only by the global
            64-per-object ceiling).
          default: 1
        immutable:
          type: boolean
          description: |
            When `true`, the value schema is frozen and Assignments of
            this Definition may not have their value replaced
            .
        cloud_tag_propagation:
          type: boolean
          description: |
            When `true`, matching cloud tags are synchronised onto
            cloud resources by the Provisioning Broker.
        description:
          type: string
          description: Optional human description (at most 512 chars).
        created_by:
          type: string
          enum:
            - user
            - system
          description: |
            Provenance of the aggregate. `system` is reserved for seed
            Definitions owned by the platform itself.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LabelDefinitionRequest:
      type: object
      description: |
        Body for POST /v1/label-definitions. Mirrors the DDD
        `CreateDefinitionParams` shape: the caller names the scope as
        a discriminator + optional UUID, the local key, and the value
        contract. The services layer performs the `manage` ReBAC check
        on the scope-object before persisting.
      required:
        - scope
        - local_key
        - value_schema
        - applicable_kinds
      properties:
        scope:
          type: string
          enum:
            - platform
            - domain
            - project
          description: Scope discriminator.
        scope_id:
          type: string
          format: uuid
          description: |
            Tenancy identifier. Required when `scope` is `domain` or
            `project`; omitted when `scope=platform`.
        local_key:
          type: string
          description: |
            Unqualified key token — lowercase letters, digits,
            `.`, `_`, `-`; 1–64 characters; no leading or trailing
            separator.
        description:
          type: string
          maxLength: 512
        value_schema:
          $ref: "#/components/schemas/LabelValueSchema"
        applicable_kinds:
          type: array
          items:
            type: string
          minItems: 1
        required:
          type: boolean
          description: |
            When `true`, Assignments of this Definition are mandatory
            on every object of the applicable kinds.
        default_value:
          description: |
            Optional default value used when `required=true` and an
            object has no explicit Assignment.
        immutable:
          type: boolean
        cloud_tag_propagation:
          type: boolean
        on_delete:
          type: string
          enum:
            - block
            - cascade
            - orphan
          description: |
            On-delete policy. Defaults to `block` when omitted
            .
        cardinality:
          type: integer
          description: |
            Declared per-object cardinality cap for Assignments of
            this Definition. Defaults to `1` when omitted
            .
    LabelDefinitionUpdateRequest:
      type: object
      description: |
        Body for PATCH /v1/label-definitions/{id}. Only mutable fields
        may be changed. `scope`, `scope_id`, `local_key`, and
        `immutable` are frozen after creation. Immutable Definitions
        reject `value_schema` changes with 409 `immutable-violation`
        .
      properties:
        description:
          type: string
          maxLength: 512
        value_schema:
          $ref: "#/components/schemas/LabelValueSchema"
        applicable_kinds:
          type: array
          items:
            type: string
        required:
          type: boolean
        default_value: {}
        cloud_tag_propagation:
          type: boolean
        on_delete:
          type: string
          enum:
            - block
            - cascade
            - orphan
    LabelDefinitionListResponse:
      type: object
      description: |
        Page of Label Definitions returned by GET /v1/label-definitions
        .
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LabelDefinition"
        next_cursor:
          type: string
          description: |
            Continuation token for the next page. Omitted or empty
            when the iteration has reached end-of-stream.
    LabelAssignment:
      type: object
      description: |
        Response shape echoing a persisted Label Assignment aggregate
        .
      required:
        - definition_id
        - qualified_key
        - object_kind
        - object_id
        - value
        - assigned_by
        - assigned_at
      properties:
        definition_id:
          type: string
          format: uuid
          description: Parent Label Definition identifier (UUIDv7).
        qualified_key:
          type: string
          description: Fully-qualified Label key (denormalised).
        object_kind:
          type: string
          description: Lowercase object-kind discriminator.
        object_id:
          type: string
          format: uuid
          description: Object identifier (UUIDv7).
        value:
          description: |
            JSON-typed Assignment value. Shape is validated against the
            parent Definition's `value_schema` at build time
            .
        assigned_by:
          type: string
          description: |
            Provenance marker — `user` for human callers, `system` for
            seed Assignments.
        assigned_at:
          type: string
          format: date-time
          description: RFC 3339 timestamp of the most recent write.
    LabelAssignmentRequest:
      type: object
      description: |
        Body for PUT /v1/objects/{kind}/{id}/labels. Identifies the
        Label Definition by id and supplies the value to upsert
        .
      required:
        - definition_id
        - value
      properties:
        definition_id:
          type: string
          format: uuid
          description: |
            Parent Label Definition. DECISION: addressed by id rather
            than qualified key — the transport resolves qualified keys
            to ids at decode time, and Assignment.Put must round-trip
            the exact aggregate that produced the snapshot.
        value:
          description: |
            JSON-typed Assignment value. Shape must satisfy the
            parent Definition's `value_schema`.
    LabelAssignmentList:
      type: object
      description: |
        Array wrapper for the Label Assignments attached to an object
        .
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LabelAssignment"
    LabelSelectorASTNode:
      type: object
      description: |
        Parsed selector AST node. The `op` discriminator names the
        clause kind; sibling fields carry the clause payload. AND
        composition nests via `children` so a consumer can walk the
        tree without a second schema.
      required:
        - op
      properties:
        op:
          type: string
          enum:
            - eq
            - neq
            - in
            - exists
            - absent
            - and
          description: Clause discriminator.
        key:
          type: string
          description: |
            Label key the clause targets. Present for `eq`, `neq`,
            `in`, `exists`, `absent`. Absent for `and`.
        value:
          type: string
          description: Value literal for `eq` and `neq`.
        values:
          type: array
          items:
            type: string
          description: Value set for `in`.
        children:
          type: array
          items:
            $ref: "#/components/schemas/LabelSelectorASTNode"
          description: AND children.
    LabelSelectorError:
      type: object
      description: |
        Parse-time error report carrying the byte offset and a
        human-readable message so editor integrations can render
        inline squiggles.
      required:
        - position
        - message
      properties:
        position:
          type: integer
          minimum: 0
          description: Byte offset of the offending token.
        message:
          type: string
          description: Human-readable error detail.
    LabelSelectorPreviewRequest:
      type: object
      description: |
        Body for POST /v1/labels/selectors/preview. Carries the raw
        selector expression to parse.
      required:
        - expression
      properties:
        expression:
          type: string
          description: |
            Raw label-selector expression (for example
            `env=prod, owner in (alice, bob)`).
    LabelSelectorPreviewResponse:
      type: object
      description: |
        Response for POST /v1/labels/selectors/preview. Either `ast`
        is populated with the parsed AST or `errors` lists the parse
        failures — the arrays are mutually exclusive for a single
        call. HTTP status is always 200 on a well-formed body; the
        handler never raises on syntax failure.
      properties:
        ast:
          allOf:
            - $ref: "#/components/schemas/LabelSelectorASTNode"
          description: Parsed AST root, when parsing succeeded.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/LabelSelectorError"
          description: Parse errors, when parsing failed.
    BootstrapTokenIssueRequest:
      type: object
      description: |
        Body for POST /v1/projects/{project_id}/bootstrap-tokens.
        Field set mirrors the BootstrapToken aggregate's issuance
        invariants. The aggregate rejects
        unknown `kind` values, malformed `env_prefix`, and TTL values
        outside `[300, 86400]` seconds with a 400 Problem.

        DECISION: the `issued_by_user_id` field is intentionally absent.
        The handler binds the persisted `issued_by_user_id` to the
        authenticated principal id from the request context, NOT to a
        client-supplied value. Earlier revisions accepted the field
        from the request body, which let a privileged caller forge an
        arbitrary issuer attribution into the audit trail. Removing
        the field from the wire schema makes that spoof impossible at
        the schema-validation boundary.
      required:
        - kind
        - env_prefix
        - ttl_seconds
      properties:
        kind:
          type: string
          enum:
            - node
            - bridge
          description: |
            Discriminates the redemption surface — `node` tokens are
            redeemed at the Node bootstrap endpoint, `bridge` tokens at
            the Bridge bootstrap endpoint.
        env_prefix:
          type: string
          minLength: 1
          maxLength: 32
          pattern: "^[a-z]+$"
          description: |
            Lowercase ASCII letter run encoded as the environment
            segment of the plaintext. Same regex enforced by the
            aggregate and the parser, so the surface and the storage
            layer agree on the allowed alphabet.
        ttl_seconds:
          type: integer
          minimum: 300
          maximum: 86400
          description: |
            Lifetime of the BootstrapToken in seconds. Bounded by the
            aggregate's `[MinTTL=5m, MaxTTL=24h]` window so a forgotten
            token cannot become a long-lived bearer credential
            .
      example:
        kind: node
        env_prefix: prod
        ttl_seconds: 3600
    BootstrapTokenIssueResponse:
      type: object
      description: |
        Response body for POST /v1/projects/{project_id}/bootstrap-tokens.
        The plaintext `token` is returned exactly once — subsequent
        reads (GetBootstrapTokenMetadata, ListBootstrapTokens) NEVER
        include it because the persistence layer stores only the
        Argon2id hash. Operators MUST capture the plaintext from this
        response and hand it to the redeeming Node/Bridge out-of-band
        .
      required:
        - token_id
        - token
        - issued_at
        - expires_at
      properties:
        token_id:
          type: string
          format: uuid
          description: BootstrapToken identifier (UUIDv7).
        token:
          type: string
          x-plexsphere-once: true
          description: |
            Plaintext bearer string in the documented
            `psb_<env>_<projectId>_<kind>_<random>` format (matches
            `^psb_[a-z]+_[a-z2-7]+_(node|bridge)_[a-z2-7]{20,}$`).
            **Shown exactly once** — there is no API surface
            that ever returns the plaintext again. The Spectral rule policed by task 4.2 keys off
            the `x-plexsphere-once: true` extension on this property.
        issued_at:
          type: string
          format: date-time
          description: Issuance timestamp (UTC).
        expires_at:
          type: string
          format: date-time
          description: |
            Absolute expiry derived from `issued_at + ttl_seconds`. After
            this point the token is no longer redeemable.
      example:
        token_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
        token: "psb_prod_aebagbafaydqqbrhibbsa3kqaq_node_xxxxxxxxxxxxxxxxxxxxxxxxxx"
        issued_at: "2026-04-25T10:00:00Z"
        expires_at: "2026-04-25T11:00:00Z"
    BootstrapTokenMetadata:
      type: object
      description: |
        Hash-only metadata view of a persisted BootstrapToken aggregate
        . The plaintext is intentionally absent — it
        is only ever surfaced by `BootstrapTokenIssueResponse` and that
        window closes when the issue response is written. `consumed_at`
        and `revoked_at` are nullable because both transitions are
        terminal but optional.
      required:
        - id
        - project_id
        - kind
        - env_prefix
        - issued_at
        - expires_at
        - issued_by_user_id
      properties:
        id:
          type: string
          format: uuid
          description: BootstrapToken identifier (UUIDv7).
        project_id:
          type: string
          format: uuid
          description: Project the token is scoped to.
        kind:
          type: string
          enum:
            - node
            - bridge
          description: |
            Redemption surface discriminator.
        env_prefix:
          type: string
          description: |
            Environment segment encoded in the plaintext at issuance
            time.
        issued_at:
          type: string
          format: date-time
          description: Issuance timestamp (UTC).
        expires_at:
          type: string
          format: date-time
          description: Absolute expiry timestamp (UTC).
        consumed_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Redemption timestamp, or null when the token has not yet
            been redeemed. A non-null value is terminal — a consumed
            token cannot be redeemed again.
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Revocation timestamp, or null when the token is still
            live. A non-null value is terminal — a revoked token
            rejects redemption regardless of expiry.
        issued_by_user_id:
          type: string
          format: uuid
          description: |
            User who issued the token.
      example:
        id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
        project_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a2"
        kind: node
        env_prefix: prod
        issued_at: "2026-04-25T10:00:00Z"
        expires_at: "2026-04-25T11:00:00Z"
        consumed_at: null
        revoked_at: null
        issued_by_user_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0"
    BootstrapTokenList:
      type: object
      description: |
        Page of BootstrapToken metadata returned by GET
        /v1/projects/{project_id}/bootstrap-tokens.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BootstrapTokenMetadata"
          description: BootstrapToken metadata in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. Null or omitted
            when the iteration has reached end-of-stream.
    RegisterRequest:
      type: object
      description: |
        Body for POST /v1/register. Carries every
        field a freshly-installed plexd agent submits at registration
        time: the tenant scope (`project_id` + `resource_id`), the
        one-shot BootstrapToken plaintext, a replay-protection
        nonce, and the agent's WireGuard X25519 public key.

        Field order in the wire shape mirrors the
        `internal/identity/nodes/registration.RegisterCommand`
        value-object the handler builds before invoking the
        application service. The handler validates `public_key`
        BEFORE attempting any BootstrapToken consumption so a
        malformed key cannot also waste a token.
      required:
        - project_id
        - resource_id
        - bootstrap_token
        - nonce
        - public_key
      properties:
        project_id:
          type: string
          format: uuid
          description: |
            Project the redeeming substrate is enrolling into. Must
            match the `project_id` segment of the plaintext
            `bootstrap_token`; a mismatch surfaces as 403 with
            `reason=project_mismatch`.
        resource_id:
          type: string
          minLength: 1
          description: |
            Human-readable Resource handle (e.g. `edge-router-01`)
            the registering Node binds to. The handler resolves this
            against the Resource aggregate; an unknown handle
            surfaces as 404 with `code=resource_not_found`.
        bootstrap_token:
          type: string
          minLength: 1
          description: |
            Plaintext BootstrapToken in the documented
            `psb_<env>_<projectId>_<kind>_<random>` format (matches
            `^psb_[a-z]+_[a-z2-7]+_(node|bridge)_[a-z2-7]{20,}$`)
            . The Validator parses the prefix to
            discover the env + project-id + kind triple before
            running the candidate scan.
        nonce:
          type: string
          minLength: 1
          description: |
            Request-side replay-protection nonce. The persistence
            layer holds a partial UNIQUE on (project_id,
            consumed_nonce); a duplicate surfaces as 403 with
            `reason=nonce_collision`.
        public_key:
          type: string
          minLength: 44
          maxLength: 44
          pattern: '^[A-Za-z0-9+/]{43}=$'
          description: |
            32-byte X25519 (WireGuard) public key, base64-encoded
            with standard padding. RFC 7748 §5 fixes the curve to a
            32-byte little-endian point encoding so any other byte
            length surfaces as 400 with `code=public_key_invalid`;
            the all-zero degenerate value (a known small-order
            point) is also rejected with the same code. The fixed length-44 base64 canonical form is
            the standard `RawStdEncoding`-with-padding result for a
            32-byte payload.
        requested_resource_id:
          type: string
          nullable: true
          description: |
            Optional override the operator can supply when the
            substrate's own naming differs from the platform handle
            (e.g. the Node identifies itself as `node-12` while the
            platform Resource is `edge-router-01`). Empty or omitted
            means "no override; use `resource_id` verbatim"
            .
      example:
        project_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0"
        resource_id: "edge-router-01"
        bootstrap_token: "psb_prod_aebagbafaydqqbrhibbsa3kqaq_node_xxxxxxxxxxxxxxxxxxxxxxxxxx"
        nonce: "f3f8c0b8-7a0a-8a0a-a0a0-a0a0a0a0a0a0"
        public_key: "AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8="
    RegisterResponse:
      type: object
      description: |
        Response body for POST /v1/register. Bundles every artifact plexd needs to finish its
        bootstrap: the freshly-allocated `node_id` + `mesh_ip`, the
        Domain's signing public key + key id (for SSE event
        verification), the per-Node NSK plaintext (returned EXACTLY
        ONCE — see the `x-plexsphere-once: true` marker on the
        `nsk` field), the initial wireguard peer snapshot for table
        programming, and the Domain's mesh CIDR for routing-table
        programming.

        Operators MUST capture the `nsk` plaintext from this
        response and persist it locally on the registering Node —
        no API surface ever returns it again. The Spectral
        `plexsphere-write-once-post-must-be-issue-response` rule
        polices the `x-plexsphere-once: true` marker so the
        plaintext cannot accidentally appear on any other operation
        .
      required:
        - node_id
        - mesh_ip
        - signing_public_key
        - signing_key_id
        - nsk
        - peer_snapshot
        - domain_mesh_cidr
      properties:
        node_id:
          type: string
          format: uuid
          description: |
            Freshly-allocated Node aggregate id (UUIDv7). Echoed in
            the response so plexd records its own identity.
        mesh_ip:
          type: string
          minLength: 1
          description: |
            Allocator-assigned mesh address inside the Domain's mesh
            CIDR. Canonical `netip.Addr` string form (`100.64.0.1`,
            never zero-padded).
        signing_public_key:
          type: string
          minLength: 1
          description: |
            Domain's active signing public key, base64-encoded.
            Plexd pins this and uses it to verify signed SSE events
            delivered.
        signing_key_id:
          type: string
          minLength: 1
          description: |
            Identifier (kid) the Domain's active signing key is
            indexed under (e.g. a DID-URL fragment). Carried so
            plexd can rotate-aware verify SSE events whose header
            references a non-current kid during a rotation grace
            window.
        nsk:
          type: string
          minLength: 1
          x-plexsphere-once: true
          description: |
            Per-Node Node Secret Key plaintext (32 bytes, base64-
            encoded). **Shown exactly once** — there is no API
            surface that ever returns the plaintext again because
            the persistence layer stores only the wrapped form.
            Operators MUST capture it from this response and pin it
            on the registering Node out-of-band.
            The Spectral rule polices this guarantee against any
            future schema that would leak the marker outside this
            single response.
        peer_snapshot:
          type: array
          items:
            $ref: "#/components/schemas/RegisterPeer"
          description: |
            Initial wireguard peer set the registering Node needs
            to bring its table up. Empty for the first Node
            enrolled into a Domain. Subsequent
            membership churn is delivered through the SSE
            stream rather than re-issued here.
        domain_mesh_cidr:
          type: string
          minLength: 1
          description: |
            Domain's mesh CIDR (e.g. `100.64.0.0/10`). Carried so
            plexd can program its routing table without a follow-up
            Domain lookup.
      example:
        node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a3"
        mesh_ip: "100.64.0.1"
        signing_public_key: "MCowBQYDK2VwAyEA0123456789abcdefghijklmnopqrstuvwxyz0123="
        signing_key_id: "did:web:plexsphere.dev#key-2026-04"
        nsk: "AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8="
        peer_snapshot: []
        domain_mesh_cidr: "100.64.0.0/10"
    RegisterPeer:
      type: object
      description: |
        Minimal projection of an existing Domain member that the
        freshly-registered Node needs in order to bring its
        WireGuard table up. The shape is deliberately narrow:
        anything else (labels, resource handle, audit metadata)
        belongs on later state-pull responses, not on the bootstrap
        payload.
      required:
        - node_id
        - mesh_ip
        - public_key
      properties:
        node_id:
          type: string
          format: uuid
          description: |
            Peer's Node identifier. Plexd's reconcile loop keys
            peers by id.
        mesh_ip:
          type: string
          minLength: 1
          description: |
            Peer's allocator-assigned mesh address. Plexd programs
            the wireguard endpoint from this field.
        public_key:
          type: string
          minLength: 44
          maxLength: 44
          pattern: '^[A-Za-z0-9+/]{43}=$'
          description: |
            Peer's WireGuard public key, base64-encoded with
            standard padding.
        fallback_endpoint:
          type: string
          description: |
            Canonical bridge `host:port` that plexd programs as a
            NAT-traversal relay when direct peer-to-peer connectivity
            is unavailable. Empty or absent means no bridge is
            currently assigned for this peer. Format:
            `<inet-or-hostname>:<port>`.
    NodeStateSnapshot:
      type: object
      description: |
        Canonical reconciliation-pull envelope for a single Node
        . The four wire blocks — `peers`,
        `policy`, `bridge`, `state`, and `reports` — are always
        present so plexd's reconcile loop can diff by field presence
        rather than absence; later stories (policy fan-out, bridge orchestrator, node-state reports) populate
        the currently-empty blocks without changing the wire shape.
        Empty `peers` is `[]` (never `null`); the other blocks may
        be `null` until their owning story lands.
      required:
        - peers
        - policy
        - bridge
        - state
        - reports
        - reachability
      properties:
        peers:
          type: array
          items:
            $ref: "#/components/schemas/NodeStatePeer"
          description: |
            Peer set the addressed Node should program into its
            WireGuard table. One entry per other Node in the
            addressed Node's Domain — the addressed Node itself is
            excluded so plexd does not program a self-peer
            . Ordered by `node_id` ascending so
            two consecutive pulls against the same ledger snapshot
            are byte-equal.
        reachability:
          allOf:
            - $ref: "#/components/schemas/Reachability"
          description: |
            Latest `Reachability` projection for the addressed Node,
            carried inside the reconciliation-pull payload so plexd
            sees the same health view that
            `GET /v1/nodes/{id}/reachability` exposes without an
            additional round-trip.
        policy:
          allOf:
            - $ref: "#/components/schemas/NodeStatePolicy"
          nullable: true
          description: |
            Policy block — present-but-empty placeholder
            populates the wire shape. May be `null` until then; the
            field itself is always present so plexd's reconcile loop
            can diff by field presence.
        bridge:
          allOf:
            - $ref: "#/components/schemas/NodeStateBridge"
          nullable: true
          description: |
            Bridge orchestrator block — present-but-empty placeholder
             populates the wire shape. May be `null` until
            then; the field itself is always present.
        state:
          allOf:
            - $ref: "#/components/schemas/NodeStateReports"
          nullable: true
          description: |
            Node-state block for the addressed Node: its node-state
            entries fanned into the `metadata`, `data`, and `reports`
            buckets of `NodeStateReports`. Populated after a successful
            reconciliation pull — each bucket is `[]` (never `null`) when
            the Node carries no entry of that kind. The field is always
            present so plexd's reconcile loop can diff by field presence;
            it is `null` only when the snapshot carries no node-state
            projection at all.
        reports:
          allOf:
            - $ref: "#/components/schemas/NodeStateReports"
          nullable: true
          description: |
            Forward-compatibility mirror of `state`: the controller
            points it at the same `NodeStateReports` value so the
            convergence with the SSE event taxonomy stays explicit and a
            future split between live state and rolled-up reports lands
            without an OpenAPI break. Always equals `state` today. The
            field is always present and is `null` only when `state` is.
    NodeStatePeer:
      type: object
      description: |
        Minimal projection of a Domain peer that the addressed Node
        needs in order to program its WireGuard table. The shape is
        deliberately narrow and mirrors `RegisterPeer` so the
        reconciliation pull and the registration bootstrap converge
        on the same wire contract.
      required:
        - node_id
        - mesh_ip
        - public_key
      properties:
        node_id:
          type: string
          format: uuid
          description: |
            Peer's Node identifier. Plexd's reconcile loop keys
            peers by id.
        mesh_ip:
          type: string
          minLength: 1
          description: |
            Peer's allocator-assigned mesh address. Plexd programs
            the WireGuard endpoint from this field.
        public_key:
          type: string
          minLength: 44
          maxLength: 44
          pattern: '^[A-Za-z0-9+/]{43}=$'
          description: |
            Peer's WireGuard public key, base64-encoded with
            standard padding.
        fallback_endpoint:
          type: string
          description: |
            Canonical bridge `host:port` that plexd programs as a
            NAT-traversal relay when direct peer-to-peer connectivity
            is unavailable. Empty or absent means no bridge is
            currently assigned for this peer. Format:
            `<inet-or-hostname>:<port>`.
    NodeStatePolicy:
      type: object
      description: |
        Per-Node compiled policy fan-out block. Carries the merged
        rule list the controller projected for the addressed Node,
        the base64-encoded SHA-256 fingerprint that plexd uses to
        short-circuit reconcile when the locally-applied ruleset
        already matches, and the revision identifier of the
        policy-id-ascending first matched Policy. The block is
        `null` on the `NodeStateSnapshot` envelope when no compiled
        ruleset row exists for the addressed Node (the per-Node
        selector did not match any active Policy revision).

        Multi-policy semantics: the controller persists one
        `plexsphere.policy_compiled_ruleset` row per (Node, Policy)
        tuple. When a Node matches multiple Policies, the snapshot
        composer merges those rows by sorting on `policy_id` and
        concatenating each row's `rule_payload` bytes in ascending
        order. `rules` decodes the merged byte stream into the
        canonical wire shape; `fingerprint` is
        `sha256.Sum256(payload_0 || payload_1 || ...)` over the
        same byte stream; `revision_id` is drawn from the
        policy-id-ascending first row so a single uuid remains on
        the wire. Plexd treats the fingerprint as an opaque
        comparison key — it is stable for a given (Node, set of
        matched Policy revisions, rule_payload byte streams) tuple
        and changes whenever any contributing row changes.
      required:
        - revision_id
        - fingerprint
        - rules
      properties:
        revision_id:
          type: string
          format: uuid
          description: |
            Identifier of the Policy revision the merged ruleset
            anchors on — drawn from the policy-id-ascending first
            row when the addressed Node matches multiple Policies.
            A Node matching a single Policy carries that Policy's
            revision id directly.
        fingerprint:
          type: string
          format: byte
          minLength: 44
          maxLength: 44
          description: |
            SHA-256 digest over the merged `rule_payload` byte
            stream the controller persisted in
            `plexsphere.policy_compiled_ruleset`. Exactly 32 bytes
            once decoded; on the wire the field is base64-encoded
            with standard padding (44 ASCII characters). For a
            Node matching a single Policy the digest equals
            `sha256.Sum256(rule_payload)`; for a Node matching
            multiple Policies it equals `sha256.Sum256(payload_0
            || payload_1 || ...)` with `payload_i` ordered by
            ascending `policy_id`. The digest is an opaque
            comparison key — plexd compares it byte-for-byte
            against its locally-applied ruleset's stored digest
            and does not re-derive it from the `rules` array.
        rules:
          type: array
          items:
            $ref: "#/components/schemas/NodeStateCompiledRule"
          description: |
            Canonical, deterministically-sorted L3/L4 rule list the
            addressed Node MUST program. For multi-policy matches
            the array is the per-Policy concatenation of each
            row's canonical rule list in policy-id-ascending order.
            Empty array is a legitimate state — it means the Node
            matches at least one Policy's selector pair but no
            Policy contributed any rules (or every rule was
            filtered out).
    NodeStateCompiledRule:
      type: object
      description: |
        Single canonicalised L3/L4 rule the controller projected
        for the addressed Node. The five-tuple
        `(source_cidr, destination_cidr, protocol, ports, action)`
        mirrors `PolicyRule` so plexd's reconcile loop can reuse
        the same rule programmer regardless of whether the rule
        came from the operator-facing Policy aggregate or the
        compiled fan-out. `ports` MUST be omitted for `icmp` and
        `any` and MUST be populated for `tcp` and `udp` — the
        protocol/port coherence check is enforced at the policy
        aggregate boundary, so a compiled rule that reaches the
        wire is guaranteed coherent.
      required:
        - action
        - protocol
        - source_cidr
        - destination_cidr
      properties:
        action:
          $ref: "#/components/schemas/PolicyAction"
        protocol:
          $ref: "#/components/schemas/PolicyProtocol"
        source_cidr:
          type: string
          description: |
            IPv4 or IPv6 prefix in CIDR notation (e.g.
            `10.0.0.0/8`, `2001:db8::/32`). Source and destination
            agree on address family by aggregate-boundary
            invariant.
        destination_cidr:
          type: string
          description: |
            IPv4 or IPv6 prefix in CIDR notation. Address family
            matches `source_cidr`.
        ports:
          $ref: "#/components/schemas/PolicyPortRange"
    PolicyUpdatedPayload:
      type: object
      description: |
        Wire payload carried by a `policy_updated` SSE envelope. The
        controller emits one envelope per per-(Node, Policy)
        compiled-ruleset row whenever the compile arm persists a new
        revision, and one empty-rules envelope per previously-
        addressed Node when a Policy is deleted. The payload fields
        mirror the `NodeStatePolicy` block plexd consumes on the
        reconciliation-pull path so the same rule programmer applies
        the wire delta and the snapshot delta without branching.

        The `fingerprint` field is the base64-encoded SHA-256 digest
        over the canonical `rule_payload` byte stream the controller
        persisted; plexd compares it byte-for-byte against the
        locally-applied ruleset's digest and short-circuits reconcile
        when the two match. Empty `rules` is a legitimate state — a
        policy-deletion fan-out emits `rules: []` and the canonical
        empty-ruleset fingerprint so a consumer observing only the
        wire stream converges to the same projection as a consumer
        that re-reads the snapshot column.
      required:
        - node_id
        - policy_id
        - revision_id
        - fingerprint
        - rules
      properties:
        node_id:
          type: string
          format: uuid
          description: |
            Addressed Node the compiled-ruleset projection targets.
            Equals the `{id}` path parameter of the SSE subscription
            the envelope is delivered on.
        policy_id:
          type: string
          format: uuid
          description: |
            Identifier of the Policy aggregate the compiled-ruleset
            row was projected from. Two Policies addressing the same
            Node produce two envelopes carrying distinct `policy_id`
            values; the consumer merges them by sorting on
            `policy_id` ascending.
        revision_id:
          type: string
          format: uuid
          description: |
            Identifier of the Policy revision the compiled ruleset
            anchors on. Equals the head revision id at compile time;
            re-emission for the same revision is idempotent under the
            publisher's deduplication window.
        fingerprint:
          type: string
          format: byte
          minLength: 44
          maxLength: 44
          description: |
            SHA-256 digest over the canonical `rule_payload` byte
            stream the controller persisted. Exactly 32 bytes once
            decoded; on the wire the field is base64-encoded with
            standard padding (44 ASCII characters). The digest is an
            opaque comparison key — plexd compares it byte-for-byte
            against its locally-applied ruleset's stored digest and
            does not re-derive it from the `rules` array.
        rules:
          type: array
          items:
            $ref: "#/components/schemas/NodeStateCompiledRule"
          description: |
            Canonical, deterministically-sorted L3/L4 rule list the
            addressed Node MUST program for the named Policy. An
            empty array is a legitimate state — it means the Node
            no longer matches the Policy (e.g. the Policy was
            deleted or its selector no longer captures the Node).
    # traceability: PX-0073, S038, REQ-010 — Per-(Node, bridge Resource)
    # delivered-config SSE payload.
    BridgeConfigUpdatedPayload:
      type: object
      description: |
        Wire payload carried by a `bridge_config_updated` SSE envelope.
        The controller emits one envelope per (Node, bridge Resource)
        delivered-config projection whenever the bridge orchestrator
        persists a new effective configuration, and one empty-config
        envelope per previously-addressed Node when a bridge Resource is
        deleted. The payload mirrors the `NodeStateBridge` block plexd
        consumes on the reconciliation-pull path so the same reconcile
        loop applies the wire delta and the snapshot delta without
        branching.
      required:
        - node_id
        - bridge_resource_id
        - effective_config
      properties:
        node_id:
          type: string
          format: uuid
          description: |
            Addressed Node the delivered-config projection targets.
            Equals the `{id}` path parameter of the SSE subscription
            the envelope is delivered on.
        bridge_resource_id:
          type: string
          format: uuid
          description: |
            Identifier of the bridge Resource aggregate the
            delivered-config projection was derived from. Two bridge
            Resources addressing the same Node produce two envelopes
            carrying distinct `bridge_resource_id` values; the consumer
            merges them by sorting on `bridge_resource_id` ascending.
        effective_config:
          allOf:
            - $ref: "#/components/schemas/NodeStateBridge"
          description: |
            The per-Node bridge-orchestrator delivered-config block the
            addressed Node MUST program for the named bridge Resource.
            Each child block is present-but-nullable so plexd's reconcile
            loop can diff by field presence; an all-null block is a
            legitimate state — it means the Node no longer matches the
            bridge Resource (e.g. the Resource was deleted or its
            selector no longer captures the Node).
    # traceability: PX-0072, S037 — Per-Node bridge-orchestrator
    # delivered-config projection blocks.
    NodeStateBridge:
      type: object
      description: |
        Per-Node bridge-orchestrator delivered-config block. Carries the
        relay configuration, the user-access providers, the public
        ingress rules, and the site-to-site tunnels the addressed Node
        must program. Each child block is present-but-nullable so plexd's
        reconcile loop can diff by field presence.
      properties:
        relay:
          allOf:
            - $ref: "#/components/schemas/NodeStateBridgeRelay"
          nullable: true
          description: |
            Relay configuration the Node must program. `null` when no
            relay is configured on the owning bridge Resource.
        user_access:
          allOf:
            - $ref: "#/components/schemas/NodeStateBridgeUserAccess"
          nullable: true
          description: |
            User-access providers the Node must program. `null` when the
            owning bridge Resource defines none.
        ingress:
          allOf:
            - $ref: "#/components/schemas/NodeStateBridgeIngress"
          nullable: true
          description: |
            Public-ingress rules the Node must program. `null` when the
            owning bridge Resource defines none.
        site_to_site:
          allOf:
            - $ref: "#/components/schemas/NodeStateBridgeSiteToSite"
          nullable: true
          description: |
            Site-to-site tunnels the Node must program. `null` when the
            owning bridge Resource defines none.
    NodeStateBridgeRelay:
      type: object
      description: |
        Per-Node projection of the bridge relay configuration paired with
        the per-peer fallback-endpoint assignments the Node must program.
      required:
        - enabled
        - listen_port
        - assignments
      properties:
        enabled:
          type: boolean
          description: Whether the relay is active.
        listen_port:
          type: integer
          minimum: 1
          maximum: 65535
          description: UDP port the relay listens on.
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/NodeStateBridgeRelayAssignment"
          description: |
            Per-peer relay fallback-endpoint assignments, ordered
            deterministically by `peer_node_id` so two consecutive pulls
            against the same ledger snapshot are byte-equal. An empty
            array is a legitimate state.
    NodeStateBridgeRelayAssignment:
      type: object
      description: |
        One per-peer relay fallback assignment: the peer the Node may
        relay for and the fallback endpoint that peer dials. Population
        lands with the effective-config story; an empty `assignments`
        list is the interim state.
      required:
        - peer_node_id
        - fallback_endpoint
        - fallback_endpoint_port
      properties:
        peer_node_id:
          type: string
          format: uuid
          description: Peer Node the relay fallback applies to.
        fallback_endpoint:
          type: string
          description: Host the peer dials when direct connectivity is unavailable.
        fallback_endpoint_port:
          type: integer
          minimum: 1
          maximum: 65535
          description: Port on the fallback endpoint the peer dials.
    NodeStateBridgeUserAccess:
      type: object
      description: |
        Per-Node projection of the bridge user-access providers the Node
        must program. Reuses the `BridgeUserAccessProviderResponse` wire
        shape so the delivered config matches the management-surface
        bytes for the same provider.
      required:
        - providers
      properties:
        providers:
          type: array
          items:
            $ref: "#/components/schemas/BridgeUserAccessProviderResponse"
          description: User-access providers ordered by slug ascending.
    NodeStateBridgeIngress:
      type: object
      description: |
        Per-Node projection of the bridge public-ingress rules the Node
        must program. Reuses the `BridgeIngressRuleResponse` wire shape so
        the delivered config matches the management-surface bytes for the
        same rule.
      required:
        - rules
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/BridgeIngressRuleResponse"
          description: Public-ingress rules ordered by slug ascending.
    NodeStateBridgeSiteToSite:
      type: object
      description: |
        Per-Node projection of the bridge site-to-site tunnels the Node
        must program. Reuses the `BridgeSiteToSiteTunnelResponse` wire
        shape so the delivered config matches the management-surface
        bytes for the same tunnel.
      required:
        - tunnels
      properties:
        tunnels:
          type: array
          items:
            $ref: "#/components/schemas/BridgeSiteToSiteTunnelResponse"
          description: Site-to-site tunnels ordered by slug ascending.
    NodeStateReports:
      type: object
      # traceability: PX-0080, REQ-001, REQ-002, REQ-003
      description: |
        Per-Node node-state block carried on the `NodeStateSnapshot`
        envelope. The addressed Node's node-state entries are fanned
        into three buckets by kind: operator-visible, platform-owned
        `metadata`; platform-owned `data`; and upstream,
        workload-authored `reports`. Each bucket is a required array of
        `StateEntry` and is `[]` (never `null`) when the Node carries no
        entry of that kind, so plexd's reconcile loop can diff by field
        presence. Entries within a bucket are ordered by `key` ascending
        so two consecutive pulls against the same ledger snapshot are
        byte-equal.
      required:
        - metadata
        - data
        - reports
      properties:
        metadata:
          type: array
          items:
            $ref: "#/components/schemas/StateEntry"
          description: |
            Operator-visible, platform-owned metadata entries for the
            addressed Node, ordered by `key` ascending.
        data:
          type: array
          items:
            $ref: "#/components/schemas/StateEntry"
          description: |
            Platform-owned operational data entries for the addressed
            Node, ordered by `key` ascending.
        reports:
          type: array
          items:
            $ref: "#/components/schemas/StateEntry"
          description: |
            Upstream, workload-authored report entries for the addressed
            Node, ordered by `key` ascending.
    StateEntry:
      type: object
      # traceability: PX-0080, REQ-001, REQ-002
      description: |
        A single node-state entry within a `NodeStateReports` bucket.
        The triple (`key`, `value`, `workload_tag`) is the minimum plexd
        needs to correlate a reported entry with the workload that
        produced it.
      required:
        - key
        - value
      properties:
        key:
          type: string
          minLength: 1
          maxLength: 128
          description: The entry's stable identity within its bucket.
        value:
          type: string
          description: The entry's reported value, carried opaquely.
        workload_tag:
          type: string
          description: |
            Tag of the workload that produced the entry. Absent or empty
            when the entry is not attributed to a workload.
    NodeStateReportRequest:
      type: object
      # traceability: PX-0080, REQ-005
      description: |
        Body for `PUT /v1/nodes/{id}/state/reports/{key}`. Carries the
        upstream, workload-authored report value the addressed Node is
        recording for the addressed key.
      required:
        - value
      properties:
        value:
          type: string
          maxLength: 4096
          description: |
            The report value to store for the addressed key. Capped at
            4096 bytes; an over-size value is rejected with 400.
        workload_tag:
          type: string
          description: |
            Optional tag of the workload producing the report. Stored
            verbatim and echoed back on the next reconciliation pull.
    NodeStateReportResponse:
      type: object
      # traceability: PX-0080, REQ-005
      description: |
        Result of an accepted `PUT /v1/nodes/{id}/state/reports/{key}`.
        Echoes the stored key and the server wall-clock time at which the
        report write was accepted.
      required:
        - accepted_at
        - key
      properties:
        accepted_at:
          type: string
          format: date-time
          description: |
            Server wall-clock time at which the report write was
            accepted and durably recorded.
        key:
          type: string
          description: The report key that was written.
    HeartbeatRequest:
      type: object
      description: |
        Body for POST /v1/nodes/{id}/heartbeat. Carries the per-Node liveness signal plexd
        emits at a 30s cadence: the client wall-clock (for skew
        detection), the SHA-256 of the running plexd binary (for
        tamper-evidence and rollout tracking), the human-readable
        plexd version string, and a free-form NAT summary that the
        controller correlates with the per-Domain bridge view in
        later stories.
      required:
        - client_now
        - binary_checksum
        - binary_version
        - nat_summary
      properties:
        client_now:
          type: string
          format: date-time
          description: |
            Client wall-clock timestamp at the moment the heartbeat
            was assembled. The handler rejects the request with 400
            `clock_skew` if the value drifts more than 60 seconds
            from server now.
        binary_checksum:
          type: string
          format: byte
          minLength: 32
          maxLength: 64
          description: |
            SHA-256 digest of the running plexd binary. The wire form
            is the 32-byte raw digest encoded as either lowercase hex
            (64 characters) or base64 with standard padding (44
            characters); the handler decodes both forms and rejects
            anything else with 400 `binary_checksum_empty`.
        binary_version:
          type: string
          minLength: 1
          description: |
            Human-readable plexd version string (e.g.
            `plexd-v0.4.2-ge5f3a1c`). Non-empty per the application-
            boundary invariants — the handler rejects an empty value
            with 400 `binary_version_empty`.
        nat_summary:
          type: object
          additionalProperties: true
          description: |
            Free-form NAT discovery summary produced by plexd. Empty
            object is permitted — later stories define the
            schema once the per-Domain bridge orchestrator lands
            .
    HeartbeatResponse:
      type: object
      description: |
        Body for POST /v1/nodes/{id}/heartbeat success responses
        . Carries the server-side commit
        timestamp and two reconciliation hints. both flags
        default to `false`; later stories flip them when the
        controller wants the caller to issue a fresh reconciliation
        pull or rotate its NSK.
      required:
        - accepted_at
        - reconcile
        - rotate_keys
      properties:
        accepted_at:
          type: string
          format: date-time
          description: |
            Server-side timestamp at which the heartbeat fact was
            committed. Distinct from `client_now` so the caller can
            estimate one-way latency and clock-skew.
        reconcile:
          type: boolean
          description: |
            When `true`, the controller is asking the caller to issue
            a fresh `GET /v1/nodes/{id}/state` reconciliation pull
            because the snapshot the caller is operating against has
            drifted. Defaults to `false` — later stories flip
            this flag when the controller observes a divergence
            .
        rotate_keys:
          type: boolean
          description: |
            When `true`, a mesh-key rotation is pending for the
            heartbeating Node: the caller MUST generate a fresh
            Curve25519 keypair and complete the rotation via
            `POST /v1/keys/rotate`. This flag is load-bearing — it is
            the heartbeat-channel half of the two-channel rotation
            dispatch (the SSE `rotate_keys` event is the other half),
            so a Node that reconnected rather than holding a live SSE
            stream still learns it must rotate within one heartbeat
            interval. `false` when no `peer_key_rotation` row is
            pending for the Node.
    EndpointRequest:
      type: object
      description: |
        Body for PUT /v1/nodes/{id}/endpoint. Carries a single NAT-
        observed transport endpoint the plexd agent saw the local
        Node arrive on, plus the agent's classification of the NAT
        traversal posture and the wall-clock at which the observation
        was made.
      required:
        - endpoint
        - nat_type
        - reported_at
      properties:
        endpoint:
          type: string
          minLength: 1
          description: |
            Canonical `host:port` wire form of the observed transport
            endpoint. The host is an IPv4 dotted quad or an IPv6
            address bracketed per RFC 5952 (`[2001:db8::1]:51820`);
            the port is in the RFC 6056 ephemeral range 1..65535.
            Loopback, link-local, and unspecified addresses are
            refused with 400 `endpoint_unparseable`.
        nat_type:
          type: string
          enum:
            - full_cone
            - restricted
            - port_restricted
            - symmetric
            - unknown
          description: |
            Agent-classified NAT traversal posture. The handler
            forwards the value verbatim to the Peer aggregate; the
            controller correlates the value with the per-Domain
            bridge view in later stories. `unknown` is permitted for
            agents that have not yet completed STUN probing.
        reported_at:
          type: string
          format: date-time
          description: |
            Agent wall-clock at the moment the observation was made.
            The handler rejects the request with 400
            `endpoint_clock_skew` if the value drifts more than 60
            seconds from server now.
    EndpointResponse:
      type: object
      description: |
        Body for PUT /v1/nodes/{id}/endpoint success responses. Carries
        the server-side commit timestamp and the freshness deadline
        the agent must beat before the per-Domain sweeper tombstones
        the endpoint.
      required:
        - accepted_at
        - stale_after
      properties:
        accepted_at:
          type: string
          format: date-time
          description: |
            Server-side timestamp at which the endpoint observation
            was committed. Distinct from `reported_at` so the caller
            can estimate one-way latency and clock-skew.
        stale_after:
          type: string
          format: date-time
          description: |
            Server-side deadline by which the agent must submit a
            fresh observation before the per-Domain endpoint sweeper
            stamps the endpoint as stale and emits a tombstone event.
            Equal to `accepted_at` plus the per-Domain endpoint TTL
            (defaults to 5 minutes).
    CapabilityManifestRequest:
      type: object
      description: |
        Body for PUT /v1/nodes/{id}/capabilities. Carries the per-Node
        capability manifest snapshot plexd reports on agent boot and
        whenever the running binary, host-key, or declared hooks
        change: the agent binary semver, the SHA-256 of the running
        binary (for tamper-evidence and rollout tracking), the
        optional SSH host-key fingerprint (for the downstream integrity
        correlator), and the optional list of hooks the agent
        advertises. The handler canonicalises the envelope through the
        `tenancy.NewCapabilityManifest` value-object constructor; every
        invariant is enforced at the aggregate boundary before the
        recorder ever touches Postgres.
      required:
        - binary_version
        - binary_checksum
      properties:
        binary_version:
          type: string
          minLength: 1
          description: |
            Human-readable plexd agent version string (e.g.
            `plexd-v0.4.2-ge5f3a1c`). Non-empty after trimming
            whitespace — the handler rejects an empty value with 400
            `binary_version_empty`.
        binary_checksum:
          type: string
          format: byte
          description: |
            SHA-256 digest of the running plexd binary, 32 bytes
            base64-encoded with standard padding. Anything that does
            not decode to exactly 32 bytes is rejected with 400
            `binary_checksum_invalid`.
        ssh_host_key_fingerprint:
          type: string
          nullable: true
          description: |
            Optional OpenSSH SHA-256 host-key fingerprint of the
            running agent, rendered as `SHA256:<base64>`. Empty or
            absent values are accepted; a non-empty value that does
            not match the canonical form is rejected with 400
            `ssh_host_key_fingerprint_invalid`. Downstream integrity
            correlators branch on `host_key_changed` in the response
            to detect a host-key rotation between snapshots.
        declared_hooks:
          type: array
          maxItems: 128
          description: |
            Optional list of hook declarations the agent advertises.
            Each entry pairs a hook name with the SHA-256 digest of
            the hook payload so the integrity correlator can detect a
            hook-content change without re-fetching the payload. The
            manifest invariants reject duplicate names (400
            `declared_hook_duplicate`), more than 128 entries (400
            `declared_hooks_too_many`), and any per-entry violation
            (400 `declared_hook_invalid`).
          items:
            $ref: "#/components/schemas/DeclaredHook"
        plexd_hooks:
          type: array
          maxItems: 128
          description: |
            Optional list of Kubernetes PlexdHook custom resources the
            agent discovered in its cluster and advertises read-only.
            Distinct from `declared_hooks`: each entry carries an OCI
            image digest, a free-form parameter map, an execution
            timeout, and a sandbox flag rather than a payload checksum.
            Discovery is read-only — plexsphere records what plexd
            observed and never writes PlexdHook objects back. The
            manifest invariants reject duplicate names (422
            `plexd_hook_duplicate`), more than 128 entries (422
            `plexd_hooks_too_many`), and any per-entry violation (422
            `plexd_hook_invalid`).
          items:
            $ref: "#/components/schemas/PlexdHook"
    DeclaredHook:
      type: object
      description: |
        Single hook declaration inside a CapabilityManifestRequest's
        `declared_hooks` list. The pair (name, checksum) lets the
        integrity correlator detect a hook-content change without
        re-fetching the hook payload.
      required:
        - name
        - checksum
      properties:
        name:
          type: string
          minLength: 1
          description: |
            Hook identifier (e.g. `post-install`). Non-empty after
            trimming whitespace; a violation surfaces as 400
            `declared_hook_invalid`.
        checksum:
          type: string
          format: byte
          description: |
            SHA-256 digest of the hook payload, 32 bytes base64-encoded
            with standard padding. Anything that does not decode to
            exactly 32 bytes surfaces as 400 `declared_hook_invalid`.
    PlexdHook:
      type: object
      description: |
        Single discovered Kubernetes PlexdHook custom resource inside a
        CapabilityManifestRequest's `plexd_hooks` list. Distinct from
        `DeclaredHook` (the declared script hook): a PlexdHook carries an
        OCI image digest, a free-form parameter map, an execution
        timeout, and a sandbox flag rather than a payload checksum.
        Discovery is read-only on the plexsphere side — the manifest
        only records what plexd observed in the customer cluster;
        plexsphere never writes PlexdHook objects back nor resolves the
        digest against a registry. Per-entry invariants surface as 422
        `plexd_hook_invalid`.
      required:
        - name
        - image_digest
      properties:
        name:
          type: string
          minLength: 1
          description: |
            PlexdHook resource name (e.g. `nightly-backup`). Non-empty
            after trimming whitespace; a violation surfaces as 422
            `plexd_hook_invalid`.
        image_digest:
          type: string
          description: |
            OCI image digest of the hook image in canonical
            `sha256:<64 lowercase hex>` form. Format-only validation —
            plexsphere performs no registry lookup. Anything that does
            not match surfaces as 422 `plexd_hook_invalid`.
        parameters:
          type: object
          additionalProperties:
            type: string
          description: |
            Optional free-form string-to-string parameter map copied
            verbatim from the discovered PlexdHook spec.
        timeout_seconds:
          type: integer
          format: int64
          minimum: 0
          description: |
            Optional execution timeout in whole seconds. Non-negative; a
            negative value surfaces as 422 `plexd_hook_invalid`. The
            domain owns this as a duration — the `_seconds` suffix is the
            wire encoding only.
        sandbox:
          type: boolean
          description: |
            Optional flag indicating the discovered hook requests
            sandboxed execution. Absent is treated as `false`.
    CapabilityManifestResponse:
      type: object
      description: |
        Body for PUT /v1/nodes/{id}/capabilities success responses.
        Carries the server-side commit timestamp and the diff against
        the prior persisted snapshot: `fields_changed` enumerates the
        manifest fields that transitioned (sorted alphabetically so
        the wire response is byte-stable across runs), and
        `host_key_changed` is broken out as its own boolean because
        SSH host-key transitions are security-load-bearing and
        downstream consumers branch on the flag without parsing
        `fields_changed`. An idempotent PUT (no diff) emits an empty
        `fields_changed` array and `host_key_changed: false`.
      required:
        - accepted_at
        - fields_changed
        - host_key_changed
      properties:
        accepted_at:
          type: string
          format: date-time
          description: |
            Server-side timestamp at which the capability manifest
            snapshot was committed.
        fields_changed:
          type: array
          description: |
            Alphabetically-sorted list of manifest fields that
            transitioned versus the prior persisted snapshot. Possible
            entries: `binary_version`, `binary_checksum`,
            `ssh_host_key_fingerprint`, `declared_hooks`, `plexd_hooks`.
            Empty on an idempotent no-op PUT.
          items:
            type: string
        host_key_changed:
          type: boolean
          description: |
            `true` when the SSH host-key fingerprint transitioned
            versus the prior persisted snapshot (including a transition
            into or out of the unset state). Always present so
            downstream security correlators can branch on the flag
            without parsing `fields_changed`.
    IntegrityViolationsRequest:
      type: object
      description: |
        Body for POST /v1/nodes/{id}/integrity-violations. Carries a
        batch of integrity-violation reports plexd detected on the
        local Node and is pushing upstream for persistence and alert
        emission. The handler canonicalises every entry through the
        `tenancy.NewIntegrityViolation` value-object constructor and
        the batch through the Node aggregate's
        `RecordIntegrityViolations` method before any database write.
      required:
        - violations
      properties:
        violations:
          type: array
          minItems: 1
          maxItems: 128
          description: |
            The per-violation reports the agent observed. Empty or
            larger-than-128 batches are rejected with 400
            `integrity_violations_empty` or
            `integrity_violations_too_many` respectively.
          items:
            $ref: "#/components/schemas/IntegrityViolationRequest"
    IntegrityViolationRequest:
      type: object
      description: |
        Single integrity-violation report inside an
        `IntegrityViolationsRequest`. The `kind` field discriminates
        between the three artifact classes the agent monitors. For
        `binary_checksum` and `hook_checksum` the entry carries the
        observed and (optionally) expected 32-byte SHA-256 digests; for
        `ssh_host_key` it carries the observed and (optionally)
        expected `SHA256:<base64>` fingerprints. Cross-kind column
        leakage (a `binary_checksum` carrying a fingerprint, or an
        `ssh_host_key` carrying a checksum) is rejected with 400
        `integrity_violation_kind_mismatch`.
      required:
        - kind
        - detected_by
        - artifact_id
      properties:
        kind:
          type: string
          enum:
            - binary_checksum
            - hook_checksum
            - ssh_host_key
          description: |
            Artifact class the divergence applies to. A value outside
            this closed set is rejected with 400
            `integrity_violation_kind_invalid`.
        detected_by:
          type: string
          enum:
            - startup_scan
            - inotify
            - pre_dispatch
          description: |
            On-Node detector that surfaced the violation: the agent's
            startup self-check, an inotify-triggered re-check during
            normal operation, or a pre-dispatch verification before
            running a hook. A value outside this closed set is
            rejected with 400
            `integrity_violation_detected_by_invalid`.
        artifact_id:
          type: string
          minLength: 1
          description: |
            Stable identifier of the affected artifact (hook name,
            binary path label, or host-key file label). Non-empty
            after trimming whitespace; a violation surfaces as 400
            `integrity_violation_artifact_id_empty`.
        observed_checksum:
          type: string
          format: byte
          nullable: true
          description: |
            SHA-256 digest the agent observed for the artifact, 32
            bytes base64-encoded with standard padding. REQUIRED for
            the `binary_checksum` and `hook_checksum` kinds; MUST be
            empty or absent for the `ssh_host_key` kind. Anything that
            does not decode to exactly 32 bytes (when expected) is
            rejected with 400
            `integrity_violation_checksum_invalid`. A non-empty value
            on an `ssh_host_key` entry surfaces as 400
            `integrity_violation_kind_mismatch`.
        expected_checksum:
          type: string
          format: byte
          nullable: true
          description: |
            Optional SHA-256 digest the agent expected for the
            artifact, 32 bytes base64-encoded. Accepted only for the
            `binary_checksum` and `hook_checksum` kinds. When present,
            anything that does not decode to exactly 32 bytes is
            rejected with 400
            `integrity_violation_checksum_invalid`.
        observed_fingerprint:
          type: string
          nullable: true
          pattern: "^SHA256:[A-Za-z0-9+/]+={0,2}$"
          description: |
            OpenSSH SHA-256 host-key fingerprint the agent observed,
            rendered as `SHA256:<base64>`. REQUIRED for the
            `ssh_host_key` kind; MUST be empty or absent for the
            checksum kinds. A non-empty value on a checksum kind
            surfaces as 400 `integrity_violation_kind_mismatch`; a
            value that does not match the canonical form surfaces as
            400 `integrity_violation_host_key_fingerprint_invalid`.
        expected_fingerprint:
          type: string
          nullable: true
          pattern: "^SHA256:[A-Za-z0-9+/]+={0,2}$"
          description: |
            Optional OpenSSH SHA-256 host-key fingerprint the agent
            expected, rendered as `SHA256:<base64>`. Accepted only for
            the `ssh_host_key` kind. A value that does not match the
            canonical form is rejected with 400
            `integrity_violation_host_key_fingerprint_invalid`.
    IntegrityViolationsResponse:
      type: object
      description: |
        Body for POST /v1/nodes/{id}/integrity-violations success
        responses. Carries the server-side commit timestamp and the
        echoed count of persisted violations so the agent can
        reconcile the batch with its local replay-queue.
      required:
        - accepted_at
        - violation_count
      properties:
        accepted_at:
          type: string
          format: date-time
          description: |
            Server-side timestamp at which the integrity-violations
            batch was committed.
        violation_count:
          type: integer
          minimum: 1
          maximum: 128
          description: |
            Number of `IntegrityViolation` rows persisted by this
            request. Matches the `violations` array length on input.
    MetricSample:
      type: object
      description: |
        A single metric sample in a `POST /v1/nodes/{id}/metrics` batch.
        The batch body is a JSON array of `MetricSample` objects. Each
        sample is tagged server-side with the originating Node's Domain
        and Project — the wire body never carries an identity subject or
        email — so dashboards and alerts scope through the platform label
        model rather than through caller-supplied identity. `group`,
        `name`, `value`, and `timestamp` are required; `labels` is an
        optional dimension map.
      required:
        - group
        - name
        - value
        - timestamp
      properties:
        group:
          type: string
          enum:
            - node_resources
            - tunnel_health
            - peer_latency
            - agent_stats
          # x-enum-varnames pins the generated Go constant names for this
          # inline enum so oapi-codegen's "prefix only on collision"
          # heuristic cannot flip the constant form when a sibling enum is
          # added or removed elsewhere in the document.
          # traceability: PX-0083, REQ-001
          x-enum-varnames:
            - MetricSampleGroupNodeResources
            - MetricSampleGroupTunnelHealth
            - MetricSampleGroupPeerLatency
            - MetricSampleGroupAgentStats
          description: |
            The metric group the sample belongs to. The closed set
            (`node_resources`, `tunnel_health`, `peer_latency`,
            `agent_stats`) is the roster the ingest parser validates each
            record against; a value outside the set is rejected with
            `400 ingest_batch_malformed`.
        name:
          type: string
          description: |
            The metric name within its group (e.g. `cpu_seconds_total`).
            Required and non-empty.
        value:
          type: number
          description: |
            The numeric sample value. Required.
        labels:
          type: object
          additionalProperties:
            type: string
          description: |
            Optional dimension map carried with the sample. Keys and
            values are caller-supplied label dimensions; the platform adds
            the Domain, Project, and Node tags itself and never reads an
            identity subject or email from this map.
        timestamp:
          type: string
          format: date-time
          description: |
            RFC 3339 timestamp at which the sample was observed on the
            Node. Required.
      example:
        group: node_resources
        name: cpu_seconds_total
        value: 12345.6
        labels:
          cpu: "0"
          mode: user
        timestamp: "2026-04-27T10:15:30Z"
    LogLine:
      type: object
      description: |
        A single structured log line in a `POST /v1/nodes/{id}/logs`
        batch. The batch body is newline-delimited JSON
        (`application/x-ndjson`), one `LogLine` object per line. Like every
        ingest record the line is tagged server-side with the originating
        Node's Domain and Project and routed to Grafana Loki; the platform
        never reads an identity subject or email off the line. `severity`,
        `message`, and `timestamp` are required; `unit` and `hostname` are
        optional.
      required:
        - severity
        - message
        - timestamp
      properties:
        severity:
          type: string
          enum:
            - emerg
            - alert
            - crit
            - err
            - warning
            - notice
            - info
            - debug
          # DECISION: the README ("severity, unit, hostname, and message")
          # does NOT enumerate the severity values, so the closed set is the
          # syslog severity keyword roster journald lines map onto — the
          # exact set the ingest parser validates against (the logSeverities
          # set in internal/observability/ingest/batch.go, whose DECISION
          # block requires this OpenAPI schema to mirror it). Alternative
          # considered: leave severity a free-form string and rely on the
          # parser alone. REJECTED — the parser already enforces the closed
          # set, so advertising it on the wire contract keeps generated
          # clients and the parser in lockstep instead of letting them drift.
          # x-enum-varnames keeps the generated constant form stable against
          # the "prefix only on collision" heuristic. Reviewer: please verify
          # the keyword set against the parser.
          # traceability: PX-0083, REQ-001
          x-enum-varnames:
            - LogLineSeverityEmerg
            - LogLineSeverityAlert
            - LogLineSeverityCrit
            - LogLineSeverityErr
            - LogLineSeverityWarning
            - LogLineSeverityNotice
            - LogLineSeverityInfo
            - LogLineSeverityDebug
          description: |
            Syslog severity keyword of the log line. A value outside the
            closed set is rejected with `400 ingest_batch_malformed`.
        unit:
          type: string
          description: |
            Optional originating unit (the systemd unit or file-glob source)
            the line was collected from.
        hostname:
          type: string
          description: |
            Optional hostname the line was emitted on.
        message:
          type: string
          description: |
            The log message body. Required and non-empty. PII that a line
            inadvertently carries is the customer's ingest-side
            responsibility; an optional per-Domain redaction filter can be
            enabled at ingest.
        timestamp:
          type: string
          format: date-time
          description: |
            RFC 3339 timestamp at which the line was emitted. Required.
      example:
        severity: info
        unit: plexd.service
        hostname: edge-node-7
        message: "tunnel established to peer edge-node-3"
        timestamp: "2026-04-27T10:15:30Z"
    AuditEvent:
      type: object
      description: |
        A single normalised audit event in a `POST /v1/nodes/{id}/audit`
        batch. The batch body is newline-delimited JSON
        (`application/x-ndjson`), one `AuditEvent` object per line. The
        closed `source` set mirrors the audit sources the README pins
        (Linux auditd via AF_AUDIT Netlink, or Kubernetes audit-log
        tailing). Events are tagged server-side with the originating Node's
        Domain and Project and routed to Grafana Loki with a separate
        retention class; the wire body never carries an identity subject or
        email. `source`, `action`, `outcome`, and `timestamp` are required.
      required:
        - source
        - action
        - outcome
        - timestamp
      properties:
        source:
          type: string
          enum:
            - auditd
            - k8s
          # x-enum-varnames pins the generated Go constant names for this
          # inline enum so oapi-codegen's "prefix only on collision"
          # heuristic cannot flip the constant form when a sibling enum is
          # added or removed elsewhere in the document.
          # traceability: PX-0083, REQ-001
          x-enum-varnames:
            - AuditEventSourceAuditd
            - AuditEventSourceK8s
          description: |
            The audit source the event was normalised from. A value outside
            the closed set (`auditd`, `k8s`) is rejected with
            `400 ingest_batch_malformed`.
        action:
          type: string
          description: |
            The audited action (e.g. the syscall name or Kubernetes verb).
            Required and non-empty.
        outcome:
          type: string
          description: |
            The outcome of the audited action (e.g. `success` / `failure`).
            Required and non-empty.
        timestamp:
          type: string
          format: date-time
          description: |
            RFC 3339 timestamp at which the event occurred. Required.
      example:
        source: auditd
        action: execve
        outcome: success
        timestamp: "2026-04-27T10:15:30Z"
    IngestReceipt:
      type: object
      description: |
        Body for the `202 Accepted` response of the three observability
        ingest operations (`POST /v1/nodes/{id}/metrics`, `.../logs`, and
        `.../audit`). Carries the server-side acceptance timestamp and the
        echoed count of records buffered, so the agent can reconcile the
        batch with its local replay queue. Mirrors the shape of
        `IntegrityViolationsResponse`.
      required:
        - accepted_at
        - records
      properties:
        accepted_at:
          type: string
          format: date-time
          description: |
            Server-side timestamp at which the batch was accepted and
            handed to the ingest buffer.
        records:
          type: integer
          minimum: 1
          description: |
            Number of records accepted from the batch. Matches the number
            of array elements (metrics) or non-blank NDJSON lines (logs /
            audit) on input.
      example:
        accepted_at: "2026-04-27T10:15:30.123Z"
        records: 42
    KeysRotateRequest:
      type: object
      description: |
        Body for POST /v1/keys/rotate. Carries the single artifact a
        rotating plexd Node submits to complete a mesh-key rotation:
        the freshly-generated Curve25519 public key.
      required:
        - new_public_key
      properties:
        new_public_key:
          type: string
          format: byte
          description: |
            The Node's freshly-generated Curve25519 (WireGuard) public
            key, 32 bytes, base64-encoded with standard padding. RFC
            7748 §5 fixes the curve to a 32-byte little-endian point
            encoding, so any other decoded length is rejected with 422
            `keys_rotate_public_key_invalid`; the all-zero degenerate
            value (a known small-order point) is rejected with the
            same code. A key byte-identical to the Node's current
            public key is rejected with 422
            `keys_rotate_public_key_unchanged`.
      example:
        new_public_key: "AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8="
    KeysRotateResponse:
      type: object
      description: |
        Body for POST /v1/keys/rotate success responses. Carries the
        receipt of the completed rotation: the `peer_key_rotation` row
        id and the `(kid, wrap_key_version)` reference of the
        re-issued pairwise PSK.

        The response deliberately carries NO PSK plaintext and NO
        ciphertext — only the `(kid, wrap_key_version)` reference. The
        rotating Node already holds its NSK and resolves the PSK
        wrapping locally; the control plane never re-emits secret
        material on this surface.
      required:
        - rotation_id
        - kid
        - wrap_key_version
      properties:
        rotation_id:
          type: string
          format: uuid
          description: |
            Identifier of the `peer_key_rotation` row this submission
            flipped from `pending` to `completed`. The Node records it
            so a later audit query can correlate the rotation back to
            the re-issued PSK row.
        kid:
          type: string
          minLength: 1
          description: |
            Key id of the freshly-wrapped pairwise PSK the rotation
            re-issued. Paired with `wrap_key_version` it is the
            reference plexd uses to resolve the PSK without the
            control plane re-transmitting secret material.
        wrap_key_version:
          type: integer
          description: |
            Version of the active wrap key under which the re-issued
            PSK was wrapped. Paired with `kid` it pins the exact
            wrapping epoch.
      example:
        rotation_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a4"
        kid: "did:web:plexsphere.dev#psk-2026-04"
        wrap_key_version: 7
    RotationImpactEdge:
      type: object
      description: |
        Single peer edge whose pairwise PSK would be re-issued by a
        mesh-key rotation against the previewed Node. Carries the
        peer Node identifier together with the `(kid,
        wrap_key_version)` reference of the PSK currently in force —
        the same reference the mutating
        `POST /v1/keys/rotate` would replace.
      required:
        - peer_node_id
        - current_kid
        - current_wrap_key_version
      properties:
        peer_node_id:
          type: string
          format: uuid
          description: |
            Peer at the other end of the affected edge — joins back
            to the per-Node read surfaces for drill-down.
        current_kid:
          type: string
          minLength: 1
          description: |
            Key id of the PSK currently in force on this edge. Mirrors
            the `kid` field on `KeysRotateResponse` so a renderer can
            display "before / after" the dry-run with a single
            mapping.
        current_wrap_key_version:
          type: integer
          description: |
            Version of the active wrap key under which the in-force
            PSK is wrapped. Paired with `current_kid` it pins the
            exact wrapping epoch the rotation would supersede.
      example:
        peer_node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a6"
        current_kid: "did:web:plexsphere.dev#psk-2026-04"
        current_wrap_key_version: 7
    RotationImpactPreview:
      type: object
      description: |
        Body for GET /v1/nodes/{id}/keys/rotate/preview success
        responses. Carries a non-mutating dry-run of the fleet impact
        a mesh-key rotation against the addressed Node would have:
        the live Peer the rotation would target, the listing of peer
        edges whose PSK would be re-issued, whether a rotation is
        already in flight, and an estimated wall-clock duration so
        the dashboard confirmation dialog can size its progress
        indicator.

        The response carries NO PSK plaintext and NO ciphertext, and
        the handler appends NO `peer_key_rotation` row, NO
        `rotate_keys` outbox event, and NO audit row beyond the read-
        side ReBAC decision — calling this surface twice in a row is
        guaranteed to be a no-op against the persistence layer.
      required:
        - node_id
        - peer_id
        - affected_peer_count
        - affected_edges
        - already_pending
        - estimated_duration_seconds
      properties:
        node_id:
          type: string
          format: uuid
          description: |
            The Node whose rotation is being previewed. Echoes the
            path parameter so a renderer can sanity-check the
            response against the request URL.
        peer_id:
          type: string
          format: uuid
          description: |
            Identifier of the live Peer the rotation would target.
            Mirrors `RotationTriggerResponse.peer_id` so the preview
            and the mutating trigger share a single mapping.
        affected_peer_count:
          type: integer
          minimum: 0
          description: |
            Number of peers whose pairwise PSK would be re-issued by
            the rotation. Equal to the length of `affected_edges`;
            duplicated as a top-level scalar so a renderer can show
            the count without expanding the edge listing.
        affected_edges:
          type: array
          description: |
            Explicit listing of peer edges that would receive a fresh
            pairwise PSK. Order is stable but unspecified — renderers
            MUST NOT rely on the listing order for layout.
          items:
            $ref: "#/components/schemas/RotationImpactEdge"
        already_pending:
          type: boolean
          description: |
            True when a `peer_key_rotation` row is already pending for
            the addressed Node — i.e. a live
            `POST /v1/nodes/{id}/keys/rotate` would surface the same
            flag and append no second event. Operators switch on this
            flag to distinguish a fresh trigger from an idempotent
            no-op before confirming the rotation.
        estimated_duration_seconds:
          type: integer
          minimum: 0
          description: |
            Estimated wall-clock seconds the rotation will take,
            based on the current SSE fan-out and the affected peer
            count. Capacity planning hint — not a guarantee.
      example:
        node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0"
        peer_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a5"
        affected_peer_count: 2
        affected_edges:
          - peer_node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a6"
            current_kid: "did:web:plexsphere.dev#psk-2026-04"
            current_wrap_key_version: 7
          - peer_node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a7"
            current_kid: "did:web:plexsphere.dev#psk-2026-04"
            current_wrap_key_version: 7
        already_pending: false
        estimated_duration_seconds: 12
    RotationTriggerResponse:
      type: object
      description: |
        Body for POST /v1/nodes/{id}/keys/rotate success responses.
        Carries the rotation handle an operator uses to track a
        triggered mesh-key rotation: the `peer_key_rotation` row id,
        the live Peer the rotation targets, and whether the response
        reflects a pre-existing in-flight rotation.
      required:
        - rotation_id
        - peer_id
        - already_pending
      properties:
        rotation_id:
          type: string
          format: uuid
          description: |
            Identifier of the `peer_key_rotation` row the request
            recorded — freshly inserted, or the in-flight row when
            `already_pending` is true.
        peer_id:
          type: string
          format: uuid
          description: |
            Identifier of the live Peer whose mesh key the rotation
            targets.
        already_pending:
          type: boolean
          description: |
            True when the response reflects a pre-existing pending
            rotation — an idempotent re-request that surfaced the
            in-flight row — rather than a freshly recorded request.
            Operators switch on this flag to distinguish a newly
            dispatched `rotate_keys` command from an idempotent no-op.
      example:
        rotation_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a4"
        peer_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a5"
        already_pending: false
    MeshEdge:
      type: object
      description: |
        Single directed edge in the per-Domain mesh-topology
        projection. Mirrors a SSE peer-delta row one-for-one — a
        renderer that consumes the live stream and a renderer that
        polls `GET /v1/domains/{domainId}/mesh/topology` converge on
        byte-identical state.
      required:
        - source_node_id
        - target_node_id
        - mode
        - relay_node_id
        - status
      properties:
        source_node_id:
          type: string
          format: uuid
          description: |
            Node from which the WireGuard handshake originates. Pinned
            against the live Peer aggregate so a stale read never
            returns an edge for a retired Node.
        target_node_id:
          type: string
          format: uuid
          description: |
            Peer Node the handshake terminates against. Same liveness
            guarantee as `source_node_id`.
        mode:
          type: string
          enum:
            - direct
            - relayed
          description: |
            `direct` when the edge is using a direct WireGuard
            handshake against the peer's NAT-observed endpoint;
            `relayed` when the bridge fallback endpoint assigned to
            this pair is currently in use.
        relay_node_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Bridge Node currently serving as the relay fallback for
            this edge. Always populated when `mode` is `relayed`;
            always `null` when `mode` is `direct`.
        status:
          type: string
          enum:
            - healthy
            - stale
            - unreachable
          description: |
            Derived edge health, computed by applying the per-Domain
            reachability policy thresholds to the per-edge handshake
            observation. The handshake telemetry itself is deliberately
            NOT exposed on this envelope — see the `MeshTopologyPage`
            handshake-telemetry follow-up anchor for the rationale and
            the planned schema extension. Uses the same enum values as
            the per-Node `Reachability` projection so a single renderer
            can colour both surfaces from one mapping.
      example:
        source_node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
        target_node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a2"
        mode: direct
        relay_node_id: null
        status: healthy
    MeshTopology:
      type: object
      description: |
        Envelope returned by `GET /v1/domains/{domainId}/mesh/topology`.
        Carries a snapshot of every anchored Node in the Domain and
        the directed edges between them, captured at `generated_at`.
        The snapshot is a coherent read of the SSE peer-delta
        projection — partial pages are never emitted; a renderer can
        replace the entire view on each pull.
      required:
        - domain_id
        - generated_at
        - nodes
        - edges
      properties:
        domain_id:
          type: string
          format: uuid
          description: |
            The Domain the topology describes. Echoes the path
            parameter so a renderer can sanity-check the response
            against the request URL.
        generated_at:
          type: string
          format: date-time
          description: |
            Server-side timestamp at which the snapshot was assembled.
            Renderers display it alongside the topology so an operator
            can spot a stale view.
        nodes:
          type: array
          description: |
            Every anchored Peer Node in the Domain at `generated_at`.
            Order is stable but unspecified — renderers MUST NOT rely
            on the listing order for layout.
          items:
            $ref: "#/components/schemas/MeshTopologyNode"
        edges:
          type: array
          description: |
            Every directed mesh edge between two Nodes in `nodes` at
            `generated_at`. Edges are directional; a fully meshed pair
            of Nodes produces two entries.
          items:
            $ref: "#/components/schemas/MeshEdge"
      example:
        domain_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0"
        generated_at: "2026-05-25T10:00:00Z"
        nodes:
          - node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
            mesh_ip: "10.42.0.11"
            reachability: healthy
          - node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a2"
            mesh_ip: "10.42.0.12"
            reachability: healthy
        edges:
          - source_node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
            target_node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a2"
            mode: direct
            relay_node_id: null
            status: healthy
    MeshTopologyNode:
      type: object
      description: |
        Minimal Node projection embedded in the `nodes` array of
        `MeshTopology`. Carries only the fields the mesh-map view
        needs — a richer Node view lives on the per-Node read
        surfaces (`GET /v1/nodes/{id}/...`).
      required:
        - node_id
        - mesh_ip
        - reachability
      properties:
        node_id:
          type: string
          format: uuid
          description: |
            Node identifier (UUIDv7). Joins back to the per-Node read
            surfaces for drill-down.
        mesh_ip:
          type: string
          description: |
            The Node's allocator-assigned mesh address — IPv4 or IPv6
            depending on the Domain's mesh CIDR family.
        reachability:
          type: string
          enum:
            - healthy
            - stale
            - unreachable
          description: |
            Per-Node reachability state at `generated_at`. Mirrors the
            enum values of the `Reachability` schema so a single
            renderer can colour Node markers and edge lines from one
            mapping.
      example:
        node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
        mesh_ip: "10.42.0.11"
        reachability: healthy
    Reachability:
      type: object
      description: |
        Per-Node reachability projection driven by the heartbeat
        handler. The state-machine
        transitions `healthy` → `stale` after 90 seconds without an
        accepted heartbeat and `stale` → `unreachable` after 300
        seconds. `last_heartbeat_at` is `null` until the first
        heartbeat is accepted; `changed_at` is always present and
        tracks the most recent state transition.
      required:
        - state
        - changed_at
      properties:
        state:
          type: string
          enum:
            - healthy
            - stale
            - unreachable
          description: |
            Current reachability state. `healthy` means the most
            recent heartbeat is younger than 90s; `stale` means it is
            between 90s and 300s old; `unreachable` means it is older
            than 300s or no heartbeat has ever been accepted
            .
        last_heartbeat_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Server-side timestamp of the most recently accepted
            heartbeat, or `null` until the first heartbeat is
            accepted.
        changed_at:
          type: string
          format: date-time
          description: |
            Server-side timestamp of the most recent transition into
            the current `state`. Always present — for a Node that has
            never sent a heartbeat this is the timestamp at which the
            reachability row was first materialised.
    AuditReason:
      type: string
      description: |
        Frozen ReBAC decision-reason taxonomy attached to every audit
        chain row. The value set
        mirrors `internal/audit.Reason.String` exactly: any new
        reason is a breaking change and MUST be appended to this enum
        in lockstep with the Go side. The `unknown` sentinel is the
        renderer fallback for an out-of-range ordinal — its presence
        on the wire is itself an audit anomaly worth alerting on.
      enum:
        - granted
        - out_of_scope
        - insufficient_relation
        - caveat_violation
        - unknown
    AuditSubject:
      type: object
      description: |
        Subject-side projection on an audit row. `pseudonym` is the per-Domain HMAC of the subject
        identity — the chain-input form, never plaintext. The
        `identity_id_ref` is a pointer to the live Identity row when
        one is still resolvable; it is `null` after the right-to-
        erasure workflow has purged the `audit_subject_pii` mapping
        for the subject.
      required:
        - pseudonym
      properties:
        pseudonym:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: |
            Per-Domain pseudonym of the subject (32 bytes, lowercase
            hex). Stable for the lifetime of the chain and never
            reversible to plaintext from the chain alone.
        identity_id_ref:
          type: string
          format: uuid
          nullable: true
          description: |
            Live Identity id the pseudonym maps to, or `null` if the
            mapping has been erased. Cleared by `EraseIdentityFromAudit`
            .
    AuditObject:
      type: object
      description: |
        Object-side projection on an audit row — the SpiceDB tuple
        object the ReBAC check addressed.
      required:
        - type
        - id
      properties:
        type:
          type: string
          description: SpiceDB object type (e.g. `domain`, `node`, `resource`).
        id:
          type: string
          description: Opaque object identifier within `type`.
    AuditDecision:
      type: object
      description: |
        Decision-side projection on an audit row. `result` is the
        rendered Reason; `caveat_context` lists the caveat field
        NAMES referenced by the check — values never cross this
        boundary. The `x-plexsphere-names-only`
        marker on `caveat_context` flags the names-only invariant for
        review tooling and is policed by the
        `plexsphere-audit-caveat-names-only` Spectral rule.
      required:
        - result
        - caveat_context
      properties:
        result:
          $ref: "#/components/schemas/AuditReason"
        caveat_context:
          type: object
          description: |
            Map from caveat NAME to the array of caveat-parameter
            NAMES referenced by the check. Values are never present
            on the wire — is structural: the only string
            content here is identifiers. `internal/audit.Entry` and
            `internal/audit.AppendInput` enforce the same discipline
            structurally on the Go side.
          additionalProperties:
            type: array
            items:
              type: string
          x-plexsphere-names-only: true
    AuditRequestContext:
      type: object
      description: |
        Inbound request context recorded alongside the decision. Both
        fields are optional because the audit row may be emitted from
        a code path with no live HTTP request (e.g. a background
        reconciler). The IP is the network-level client IP after
        proxy unwrapping and is recorded for incident triage; the
        user agent is recorded verbatim and is not parsed.
      properties:
        ip:
          type: string
          description: Client IP after proxy unwrapping (IPv4 or IPv6 textual form).
        user_agent:
          type: string
          description: Verbatim `User-Agent` header value.
    AuditEntry:
      type: object
      description: |
        Single audit chain row exposed on the read surface. Mirrors the `internal/audit.Entry`
        aggregate plus the per-row provenance (`entry_hash`,
        `prev_hash`) the verifier consumes. `archive_etag`
        and `archived_at` are populated once the object-store mirror
        worker has uploaded the row to the per-Domain bucket; both are `null` on rows still in flight from the
        append path.
      required:
        - seq
        - domain_id
        - occurred_at
        - reason
        - subject
        - relation
        - object
        - decision
        - correlation_id
        - request_context
        - entry_hash
        - prev_hash
      properties:
        seq:
          type: integer
          format: int64
          minimum: 1
          description: |
            Per-Domain monotonic sequence number assigned at append
            time.
        domain_id:
          type: string
          format: uuid
          description: Owning Domain.
        occurred_at:
          type: string
          format: date-time
          description: |
            Server-side timestamp the decision was reached (RFC 3339,
            UTC).
        reason:
          $ref: "#/components/schemas/AuditReason"
        subject:
          $ref: "#/components/schemas/AuditSubject"
        relation:
          type: string
          description: SpiceDB relation label that was checked.
        object:
          $ref: "#/components/schemas/AuditObject"
        decision:
          $ref: "#/components/schemas/AuditDecision"
        correlation_id:
          type: string
          description: |
            Inbound request correlation id propagated from the
            transport layer.
        request_context:
          $ref: "#/components/schemas/AuditRequestContext"
        entry_hash:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: |
            `sha256(prev_hash || sha256(canonical_bytes))` for this
            row, lowercase hex.
        prev_hash:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: |
            `entry_hash` of the preceding row, or 64 zero hex
            characters on the genesis row (`seq=1`).
        archive_etag:
          type: string
          nullable: true
          description: |
            Object-store ETag of the per-Domain mirror copy, or `null`
            until the drain worker has uploaded the row.
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Server-side timestamp the mirror upload completed, or
            `null` while the row is still in flight.
    AuditEntryList:
      type: object
      description: |
        Cursor-paginated page returned by `ListAuditEntries`. The
        `next_cursor` field is the value to pass back as the `cursor`
        query parameter on the next call; it is `null` (or absent)
        when the page is short — that is the end-of-stream signal
        callers stop on.
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
          description: Audit rows in ascending `seq` order.
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque, HMAC-signed cursor scoped to the addressed Domain.
            Replaying a cursor minted for a different Domain surfaces
            as 400 with `code: cursor_invalid`.
    AuditEntryProof:
      type: object
      description: |
        Single audit row plus the canonical-bytes proof needed to
        recompute its hash off-line. The verifier
        recomputes `sha256(prev_hash || sha256(canonical_bytes))` and
        compares the result against `entry_hash` row by row.
      required:
        - entry
        - proof
      properties:
        entry:
          $ref: "#/components/schemas/AuditEntry"
        proof:
          type: object
          description: Forensic proof material for off-line verification.
          required:
            - prev_hash
            - entry_hash
            - canonical_bytes
          properties:
            prev_hash:
              type: string
              pattern: "^[0-9a-f]{64}$"
              description: Same value as `entry.prev_hash` (lowercase hex).
            entry_hash:
              type: string
              pattern: "^[0-9a-f]{64}$"
              description: Same value as `entry.entry_hash` (lowercase hex).
            canonical_bytes:
              type: string
              format: byte
              description: |
                Canonical-encoded chain input for this row, base64-
                encoded. Re-hashing
                `sha256(prev_hash || sha256(canonical_bytes))` reproduces
                `entry_hash` byte-for-byte.
    AuditChainVerifyRequest:
      type: object
      description: |
        Bounds for the verify run. Omit both fields to verify the
        full chain anchored at the genesis row.
      properties:
        from_seq:
          type: integer
          format: int64
          minimum: 1
          description: |
            Inclusive lower bound on `seq`. Defaults to `1` when
            absent — i.e. the genesis row.
        to_seq:
          type: integer
          format: int64
          minimum: 1
          description: |
            Inclusive upper bound on `seq`. Defaults to the current
            chain head when absent.
    AuditChainVerifyResult:
      type: object
      description: |
        Outcome of a verify run. DIVERGENCE IS NOT
        AN ERROR — a tampered chain surfaces here as `ok: false` with
        the offending `divergent_seq` and the expected/observed
        hashes pinned. The handler MUST NEVER return a 5xx for
        tampering; the 5xx channel is reserved for infrastructure
        faults the verifier cannot reason about.
      required:
        - ok
        - segment_from
        - segment_to
      properties:
        ok:
          type: boolean
          description: |
            `true` when every row in the inspected segment hashes
            correctly and chains to its predecessor; `false` when the
            verifier observed a divergence at `divergent_seq`.
        divergent_seq:
          type: integer
          format: int64
          nullable: true
          description: |
            Seq of the first row whose recomputed hash did not match
            the stored value, or whose `prev_hash` did not match the
            previous row's `entry_hash`. `null` on a clean run.
        expected_hash:
          type: string
          pattern: "^[0-9a-f]{64}$"
          nullable: true
          description: |
            Hash the verifier computed for `divergent_seq`, lowercase
            hex. `null` on a clean run.
        observed_hash:
          type: string
          pattern: "^[0-9a-f]{64}$"
          nullable: true
          description: |
            Hash actually stored at `divergent_seq`, lowercase hex.
            `null` on a clean run.
        segment_from:
          type: integer
          format: int64
          minimum: 1
          description: Inclusive lower bound the verifier actually walked.
        segment_to:
          type: integer
          format: int64
          minimum: 1
          description: Inclusive upper bound the verifier actually walked.
    AuditEraseIdentityRequest:
      type: object
      description: |
        Inbound right-to-erasure request. The
        endpoint is idempotent on `subject_pseudonym` — replaying the
        request after a successful erasure is safe.
      required:
        - identity_id
      properties:
        identity_id:
          type: string
          format: uuid
          description: |
            Identity whose `audit_subject_pii` mapping must be purged
            from the addressed Domain. The pseudonym is derived
            server-side from `(domain_id, identity_id)` and the
            per-Domain pepper; clients never compute it themselves
            .
    AuditEraseIdentityResponse:
      type: object
      description: |
        Idempotent erasure-recorded response. `subject_pseudonym` is
        returned so operators can correlate the self-audit
        `audit.erase-identity` entry without re-deriving it.
      required:
        - subject_pseudonym
        - erased_at
      properties:
        subject_pseudonym:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: |
            Per-Domain pseudonym derived from `identity_id` (32 bytes,
            lowercase hex).
        erased_at:
          type: string
          format: date-time
          description: |
            Server-side timestamp the erasure was recorded. Reflects
            the time the self-audit `audit.erase-identity` entry was
            appended, not the wall-clock time of the original
            `audit_subject_pii` row's birth.
    DomainReachabilityPolicy:
      type: object
      description: |
        Per-Domain heartbeat policy carried on Domain create / patch
        bodies and the Domain response. The three thresholds are linked: the
        aggregate rejects a partial fill (`invalid_reachability_policy`,
        400) and replaces a fully-zero policy with the platform default.

        DECISION: durations are encoded as Go-style strings ("30s",
        "5m") rather than seconds-int. The policy is operator-facing
        config — every other duration in the platform is rendered as a
        Go-style string in dashboards and CLI output, and the parser at
        the aggregate boundary already accepts the same syntax. The
        seconds-int alternative was rejected because it forced the
        dashboard to render a unit-less integer that operators would
        misread on first glance.
      required:
        - heartbeat_interval
        - stale_after
        - unreachable_after
      properties:
        heartbeat_interval:
          type: string
          description: |
            Cadence agents must honour. Floor 10s, ceiling 1h. Encoded
            as a Go duration string (e.g. `30s`, `1m`).
          example: "30s"
        stale_after:
          type: string
          description: |
            Grace window before a Node is declared stale. Must be at
            least `3 × heartbeat_interval` and at most 1h.
          example: "90s"
        unreachable_after:
          type: string
          description: |
            Grace window before a Node is declared unreachable. Must
            be at least `2 × stale_after` and at most 1h.
          example: "300s"
    DomainResponse:
      type: object
      description: |
        Hydrated projection of a tenancy Domain aggregate. The shape is shared by `CreateDomain`,
        `GetDomain`, `ListDomains`, and `PatchDomain` — every read
        surface returns the same wire bytes for the same Domain so
        clients only need one binding.
      required:
        - id
        - name
        - slug
        - mesh_cidr
        - reachability
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Domain identifier (UUIDv7).
        name:
          type: string
          description: Human-readable Domain name (trimmed at the aggregate).
        slug:
          type: string
          description: |
            Kebab-case URL handle. Stable for the lifetime of the
            Domain — see the `tenancy` tag description for the
            immutability rationale.
        description:
          type: string
          description: |
            Optional free-form description. Empty string when the
            operator did not set one (the wire shape never carries
            `null` for this field).
        region:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          maxLength: 64
          description: |
            The region the Domain is pinned to. Unlike `description`,
            this field is OMITTED from the wire entirely when the
            Domain is unpinned — it is never carried as an empty
            string, so an absent key means "no region".
        mesh_cidr:
          type: string
          description: |
            Canonical RFC 4632 mesh-IP pool the Domain owns. Cross-
            Domain non-overlap is enforced by the SQL GIST exclusion
            constraint.
          example: "10.42.0.0/16"
        reachability:
          $ref: "#/components/schemas/DomainReachabilityPolicy"
        created_at:
          type: string
          format: date-time
          description: Aggregate creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: |
            Last-modified timestamp (UTC). Bumped by every mutator —
            `Rename`, `ChangeDescription`, `RetargetMeshCIDR`, and
            `ChangeReachabilityPolicy`.
    DomainCreateRequest:
      type: object
      description: |
        Body for `POST /v1/domains`. Field set
        mirrors the Domain aggregate's `NewDomain` invariants. The
        handler authorises the call against the platform-level
        `manage` relation BEFORE invoking the service so an
        unauthorised caller never produces a `DomainCreated` outbox
        row.
      required:
        - name
        - slug
        - mesh_cidr
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable Domain name. Whitespace-only is rejected.
        slug:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          description: |
            Kebab-case URL handle. The aggregate's `ParseSlug` enforces
            the same regex; surfacing the pattern here lets the
            generated client validate before the round-trip.
        description:
          type: string
          maxLength: 1024
          description: |
            Optional free-form description. Whitespace-only strings are
            rejected by the aggregate (the operator most likely fat-
            fingered the field instead of meaning to clear it).
        region:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          maxLength: 64
          description: |
            Optional region the Domain is pinned to at creation;
            absent or empty means the Domain is left unpinned. The
            aggregate's `ParseRegion` enforces the same regex, so
            surfacing the pattern here lets the generated client
            validate before the round-trip.
        mesh_cidr:
          type: string
          description: |
            Canonical RFC 4632 mesh-IP pool. Cross-Domain non-overlap
            is enforced by the SQL GIST exclusion constraint and
            surfaces as `409 mesh_cidr_overlap`.
          example: "10.42.0.0/16"
        reachability:
          $ref: "#/components/schemas/DomainReachabilityPolicy"
    DomainPatchRequest:
      type: object
      description: |
        Body for `PATCH /v1/domains/{id}`. All
        properties are optional — but the body MUST set at least one
        of `name`, `description`, `region`, `mesh_cidr`, or
        `reachability`. An empty body is rejected at the handler with
        `400 empty_patch`.

        x-domain-slug-immutable: The `slug` is intentionally absent
        from this schema. The handler rejects any request body that
        carries a `slug` key (even with the same value) at decode time
        with `400 slug_immutable`. See the `tenancy` tag description
        and the DECISION block on `tenancy.Domain` for the rationale.
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: |
            New human-readable Domain name. The aggregate's `Rename`
            mutator validates the same constraints as `NewDomain`.
        description:
          type: string
          maxLength: 1024
          description: |
            New free-form description. The empty string clears the
            description; a whitespace-only string is rejected so an
            operator typo cannot silently wipe the field.
        region:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          maxLength: 64
          description: |
            Re-pin the Domain to a region. The aggregate's
            `ParseRegion` enforces the same regex. Unlike the immutable
            `slug`, the region is freely re-pinnable through this
            mutator.
        mesh_cidr:
          type: string
          description: |
            New canonical RFC 4632 mesh-IP pool. Triggers the cross-
            Domain GIST exclusion check (`409 mesh_cidr_overlap`) and
            the service-level containment guard against
            `project_mesh_ip_reservations.sub_range`
            (`422 mesh_cidr_invalidates_subrange`).
          example: "10.43.0.0/16"
        reachability:
          $ref: "#/components/schemas/DomainReachabilityPolicy"
    DomainList:
      type: object
      description: |
        Page of Domains returned by `GET /v1/domains`. The window is computed by the persistence layer in
        slug order; per-row visibility is layered on top so the
        `items` array is the subset the caller is authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DomainResponse"
          description: Domains in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream. The encoding
            is HMAC-signed by the server so a tampered cursor surfaces
            as `400` on the next call.
        empty_reason:
          type: string
          nullable: true
          enum:
            - no_rebac_membership
          description: |
            Disambiguates the `items: []` page. Omitted (or `null`)
            when `items` is non-empty OR when the persistence layer
            itself returned zero rows (the "no Domains exist" case).
            Set to `no_rebac_membership` when the persistence layer
            returned at least one row but the per-row ReBAC visibility
            filter dropped every one — the chicken-and-egg state a
            freshly-provisioned operator hits before any
            `domain#admin` / `domain#auditor` / `domain#member` tuple
            has been seeded for the calling Principal. Operators
            triaging "domain list is empty after sign-in" key off this
            hint and run the canonical post-login bootstrap step
            (the `grant-domain-admin` step on the
            `identity-e2e-demo` binary, mirrored by `make dev` for the
            dev stack — see
            `docs/contexts/identity/rebac.md#domaincreated-owner-tuple-seed`).
    DomainChildCounts:
      type: object
      description: |
        Per-aggregate count of children still attached to a Domain at
        the moment a `DeleteDomain` call ran. Returned in the Problem
        detail of a `409 domain_not_empty` response so the operator
        knows exactly which sub-aggregate is blocking the delete
        .
      required:
        - projects
        - groups
        - identities
        - idp_bindings
        - nodes
      properties:
        projects:
          type: integer
          minimum: 0
          description: Number of `Project` aggregates still attached.
        groups:
          type: integer
          minimum: 0
          description: Number of `Group` aggregates still attached.
        identities:
          type: integer
          minimum: 0
          description: |
            Number of identities (users + service identities) still
            attached.
        idp_bindings:
          type: integer
          minimum: 0
          description: Number of `IdPBinding` rows still attached.
        nodes:
          type: integer
          minimum: 0
          description: Number of `Node` aggregates still attached.
    ProjectResponse:
      type: object
      description: |
        Hydrated projection of a tenancy Project aggregate. The shape is shared by `CreateProject`,
        `GetProject`, `ListProjects`, and `PatchProject` — every read
        surface returns the same wire bytes for the same Project so
        clients only need one binding.
      required:
        - id
        - domain_id
        - name
        - slug
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Project identifier (UUIDv7).
        domain_id:
          type: string
          format: uuid
          description: Parent Domain identifier (UUIDv7).
        name:
          type: string
          description: Human-readable Project name (trimmed at the aggregate).
        slug:
          type: string
          description: |
            Kebab-case URL handle. Stable for the lifetime of the
            Project — see the `tenancy` tag description for the
            immutability rationale.
        description:
          type: string
          description: |
            Optional free-form description. Empty string when the
            operator did not set one (the wire shape never carries
            `null` for this field).
        sub_range_cidr:
          type: string
          nullable: true
          description: |
            Optional canonical RFC 4632 sub-range reservation inside
            the parent Domain's mesh_cidr. Cross-Project non-overlap
            within the parent Domain is enforced by the SQL GIST
            exclusion constraint on
            `plexsphere.project_mesh_ip_reservations`.
          example: "10.42.4.0/22"
        created_at:
          type: string
          format: date-time
          description: Aggregate creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: |
            Last-modified timestamp (UTC). Bumped by every mutator —
            `Rename`, `ChangeDescription`, `ReserveSubRange`,
            `ResizeSubRange`, `ReleaseSubRange`.
    ProjectCreateRequest:
      type: object
      description: |
        Body for `POST /v1/projects`. Field set
        mirrors the Project aggregate's `NewProject` invariants. The
        handler authorises the call against the parent Domain's
        `manage` ReBAC relation BEFORE invoking the service so an
        unauthorised caller never produces a `ProjectCreated` outbox
        row.
      required:
        - domain_id
        - name
        - slug
      properties:
        domain_id:
          type: string
          format: uuid
          description: |
            Parent Domain identifier (UUIDv7). The handler authorises
            `manage` on `domain:<id>` BEFORE invoking the service
            .
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable Project name. Whitespace-only is rejected.
        slug:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          description: |
            Kebab-case URL handle. The aggregate's `ParseSlug` enforces
            the same regex; surfacing the pattern here lets the
            generated client validate before the round-trip.
        description:
          type: string
          maxLength: 1024
          description: |
            Optional free-form description. Whitespace-only strings
            are rejected by the aggregate (the operator most likely
            fat-fingered the field instead of meaning to clear it).
        sub_range_cidr:
          type: string
          description: |
            Optional canonical RFC 4632 sub-range reservation. Must
            be contained in the parent Domain's mesh_cidr and must
            not overlap a sibling Project's reservation. Surfaces as
            `409 sub_range_overlap` on conflict.
          example: "10.42.4.0/22"
    ProjectPatchRequest:
      type: object
      description: |
        Body for `PATCH /v1/projects/{id}`. All
        properties are optional — but the body MUST set at least one
        of `name`, `description`, `sub_range_cidr`, or
        `release_sub_range`. An empty body is rejected at the handler
        with `400 empty_patch`.

        x-project-slug-immutable: The `slug` is intentionally absent
        from this schema. The handler rejects any request body that
        carries a `slug` key (even with the same value) at decode
        time with `400 slug_immutable`. See the `tenancy` tag
        description for the rationale.
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: |
            New human-readable Project name. The aggregate's `Rename`
            mutator validates the same constraints as `NewProject`.
        description:
          type: string
          maxLength: 1024
          description: |
            New free-form description. The empty string clears the
            description; a whitespace-only string is rejected so an
            operator typo cannot silently wipe the field.
        sub_range_cidr:
          type: string
          description: |
            New canonical RFC 4632 sub-range reservation. Triggers
            the in-tx sibling-overlap guard inside the parent Domain
            (`409 sub_range_overlap` /
            `422 sub_range_invalidates_allocation`).
          example: "10.42.8.0/22"
        release_sub_range:
          type: boolean
          description: |
            When `true`, clears the existing sub-range reservation.
            Mutually exclusive with `sub_range_cidr` — the service
            rejects bodies that carry both with
            `422 sub_range_invalidates_allocation`.
    ProjectList:
      type: object
      description: |
        Page of Projects returned by `GET /v1/projects`. The window is computed by the persistence layer in
        slug order; per-row visibility is layered on top so the
        `items` array is the subset the caller is authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectResponse"
          description: Projects in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream. The
            encoding is HMAC-signed by the server so a tampered
            cursor surfaces as `400` on the next call.
        empty_reason:
          type: string
          nullable: true
          enum:
            - no_rebac_membership
          description: |
            Disambiguates the `items: []` page. Omitted (or `null`)
            when `items` is non-empty OR when the persistence layer
            itself returned zero rows (the "no Projects exist" case
            — possibly scoped by a `domain_id` filter). Set to
            `no_rebac_membership` when the persistence layer returned
            at least one row but the per-row ReBAC visibility filter
            dropped every one — the chicken-and-egg state a
            freshly-provisioned operator hits before any
            `project#admin` (or parent `domain#admin` /
            `domain#member`) tuple has been seeded for the calling
            Principal. Mirrors the field of the same name on
            `DomainList`.
    ProjectChildCounts:
      type: object
      description: |
        Per-aggregate count of children still attached to a Project at
        the moment a `DeleteProject` call ran. Returned in the Problem
        detail of a `409 project_not_empty` response so the operator
        knows exactly which sub-aggregate is blocking the delete
        .
      required:
        - resources
        - nodes
        - relation_tuples
      properties:
        resources:
          type: integer
          minimum: 0
          description: Number of `Resource` aggregates still attached.
        nodes:
          type: integer
          minimum: 0
          description: Number of `Node` aggregates still attached.
        relation_tuples:
          type: integer
          minimum: 0
          description: Number of relation tuples still referencing the Project.
    CloudProvider:
      type: string
      enum:
        - aws
        - azure
      description: |
        Closed-set discriminator naming the upstream cloud provider
        for a Cloud aggregate. The two values mirror the
        `cloud.ParseProvider` allowlist and the SQL CHECK constraint
        on `plexsphere.clouds.provider`. The provider is the
        validator-routing key for the per-provider validator family
        and is INTENTIONALLY immutable post-creation — see the
        `cloud` tag description for the rationale.
    CloudResponse:
      type: object
      description: |
        Hydrated projection of a Cloud aggregate. The shape is shared
        by `CreateCloud`, `GetCloud`, `ListClouds`, and `PatchCloud` —
        every read surface returns the same wire bytes for the same
        Cloud so clients only need one binding.
      required:
        - id
        - display_name
        - slug
        - provider
        - endpoint
        - region_defaults
        - external_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Cloud identifier (UUIDv7).
        display_name:
          type: string
          maxLength: 256
          description: Human-readable Cloud name (trimmed at the aggregate).
        slug:
          type: string
          minLength: 1
          maxLength: 63
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          description: |
            Kebab-case URL handle. Stable for the lifetime of the
            Cloud — see the `cloud` tag description for the
            immutability rationale.
        provider:
          $ref: "#/components/schemas/CloudProvider"
        endpoint:
          type: object
          additionalProperties: true
          description: |
            Provider-specific connection metadata stored as a JSONB
            blob. The per-provider validator owns the field-shape
            contract; this schema only declares the wire envelope.
        region_defaults:
          type: object
          additionalProperties: true
          description: |
            Provider-specific region/default metadata stored as a
            JSONB blob. The per-provider validator owns the field-
            shape contract.
        external_id:
          type: string
          minLength: 1
          description: |
            Upstream provider account identifier (e.g. AWS account id,
            Azure tenant id). Combined with `provider` it must be
            unique across all Clouds.
        created_at:
          type: string
          format: date-time
          description: Aggregate creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: |
            Last-modified timestamp (UTC). Bumped by every mutator —
            `Rename`, `ChangeEndpoint`, `ChangeRegionDefaults`.
    CloudCreateRequest:
      type: object
      description: |
        Body for `POST /v1/clouds`. Field set mirrors the
        Cloud aggregate's `NewCloud` invariants. The handler authorises
        the call against the platform-level `manage` relation BEFORE
        invoking the service so an unauthorised caller never produces
        a `CloudCreated` outbox row.
      required:
        - display_name
        - slug
        - provider
        - endpoint
        - region_defaults
        - external_id
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 256
          description: Human-readable Cloud name. Whitespace-only is rejected.
        slug:
          type: string
          minLength: 1
          maxLength: 63
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          description: |
            Kebab-case URL handle. The aggregate's `ParseSlug` enforces
            the same regex; surfacing the pattern here lets the
            generated client validate before the round-trip.
        provider:
          $ref: "#/components/schemas/CloudProvider"
        endpoint:
          type: object
          additionalProperties: true
          description: |
            Provider-specific connection metadata. The per-provider
            validator runs at decode time; field-level rejections
            surface as `400 invalid_cloud_endpoint`.
        region_defaults:
          type: object
          additionalProperties: true
          description: |
            Provider-specific region/default metadata. The per-
            provider validator runs at decode time; field-level
            rejections surface as `400 invalid_cloud_region_defaults`.
        external_id:
          type: string
          minLength: 1
          description: |
            Upstream provider account identifier. Combined with
            `provider` must be unique across all Clouds.
    CloudPatchRequest:
      type: object
      description: |
        Body for `PATCH /v1/clouds/{id}`. All properties are
        optional — but the body MUST set at least one of
        `display_name`, `endpoint`, or `region_defaults`. An empty
        body is rejected at the handler with `400 empty_patch`.

        x-cloud-slug-immutable: The `slug` is intentionally absent
        from this schema. The handler rejects any request body that
        carries a `slug` key (even with the same value) at decode time
        with `400 slug_immutable`.

        x-cloud-provider-immutable: The `provider` is intentionally
        absent from this schema. Provider is the validator-routing
        key for the per-provider validator family — changing it would
        invalidate every previously-stored endpoint blob. The handler
        rejects any request body that carries a `provider` key with
        `400 provider_immutable`.

        See the `cloud` tag description and the DECISION block on
        `cloud.Cloud` for the rationale.
      additionalProperties: false
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 256
          description: |
            New human-readable Cloud name. The aggregate's `Rename`
            mutator validates the same constraints as `NewCloud`.
        endpoint:
          type: object
          additionalProperties: true
          description: |
            New provider-specific connection metadata. Triggers a
            re-run of the per-provider validator on the merged next-
            state.
        region_defaults:
          type: object
          additionalProperties: true
          description: |
            New provider-specific region/default metadata. Triggers a
            re-run of the per-provider validator on the merged next-
            state.
    CloudList:
      type: object
      description: |
        Page of Clouds returned by `GET /v1/clouds`. The
        window is computed by the persistence layer in slug order;
        per-row visibility is layered on top so the `items` array is
        the subset the caller is authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CloudResponse"
          description: Clouds in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream. The
            encoding is HMAC-signed by the server so a tampered
            cursor surfaces as `400` on the next call.
    CloudChildCounts:
      type: object
      description: |
        Per-aggregate count of children still attached to a Cloud at
        the moment a `DeleteCloud` call ran. Returned in the Problem
        detail of a `409 cloud_not_empty` response so the operator
        knows how many credentials are still attached.
      required:
        - cloud_credentials
      properties:
        cloud_credentials:
          type: integer
          minimum: 0
          description: Number of `CloudCredential` rows still attached.
    CloudCredentialStatus:
      type: string
      enum:
        - active
        - expired
        - revoked
      description: |
        Derived lifecycle status of a Cloud Credential. `revoked` when
        `revoked_at` is set; otherwise `expired` when `expired_at` is
        set or `expires_at` is in the past; otherwise `active`. The
        status is computed by the read surface from the lifecycle
        timestamps — it is not a stored column.
    CloudCredentialResponse:
      type: object
      description: |
        Metadata-only projection of a Cloud Credential. The shape is
        shared by `GetCloudCredential`, `ListCloudCredentials`, and
        `RevokeCloudCredential` so clients only need one binding.

        The projection deliberately omits the KV mount, KV path, KV
        version, and every byte of secret material — the storage
        location is a storage-internal detail the operator-facing
        surface has no reason to expose.
      required:
        - id
        - cloud_id
        - display_name
        - version
        - status
        - expires_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Cloud Credential identifier (UUIDv7).
        cloud_id:
          type: string
          format: uuid
          description: |
            Identifier of the owning Cloud — the residency pivot the
            ReBAC gate authorises against.
        display_name:
          type: string
          maxLength: 256
          description: Human-readable Cloud Credential name.
        version:
          type: integer
          format: int64
          minimum: 1
          description: |
            Monotonic broker-row version. Starts at 1 on issuance and
            increments on every rotate.
        status:
          $ref: "#/components/schemas/CloudCredentialStatus"
        expires_at:
          type: string
          format: date-time
          description: Wall-clock expiry budget (UTC).
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Revocation timestamp (UTC). `null` until the credential is
            revoked by an operator.
        expired_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Expiry-observed timestamp (UTC). `null` until the sweeper
            marks the credential expired.
        created_at:
          type: string
          format: date-time
          description: Aggregate creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: |
            Last-modified timestamp (UTC). Bumped by every lifecycle
            mutator — rotate, revoke, expire.
    CloudCredentialList:
      type: object
      description: |
        Page of Cloud Credentials returned by
        `GET /v1/clouds/{id}/cloud-credentials`. The window is computed
        by the persistence layer in creation order; per-row visibility
        is layered on top so the `items` array is the subset the caller
        is authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CloudCredentialResponse"
          description: Cloud Credentials in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream. The encoding
            is HMAC-signed by the server so a tampered cursor surfaces
            as `400` on the next call.
    CloudCredentialRevokeRequest:
      type: object
      description: |
        Body for `POST /v1/cloud-credentials/{id}/revoke`. The `reason`
        is recorded on the `CloudCredentialRevoked` outbox event so the
        revocation carries an operator-supplied audit string.
      required:
        - reason
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 1024
          description: |
            Operator-supplied revocation rationale. Non-empty —
            whitespace-only is rejected with `400 invalid_revoke_reason`.
    BlueprintParameter:
      type: object
      description: |
        A single typed parameter declaration inside a
        BlueprintVersion's parameter schema. The parameter type is
        drawn from the closed scalar taxonomy the Crossplane rendering
        path accepts; object and array types are intentionally not
        modelled.
      required:
        - name
        - type
        - required
      properties:
        name:
          type: string
          minLength: 1
          description: |
            Parameter name an operator fills in at provisioning time.
        type:
          type: string
          enum:
            - boolean
            - integer
            - string
          description: |
            Closed-set scalar type of the parameter value. Mirrors the
            Blueprint Catalog's supported parameter-type taxonomy.
        required:
          type: boolean
          description: |
            Whether the operator MUST supply a value. A non-required
            parameter may carry a `default`.
        # DECISION: the operation `example` blocks deliberately omit a
        # `default` key. Spectral's oas3-valid-schema-example validator
        # rejects an example object carrying a property named `default`
        # (the JSON-Schema annotation keyword). The property stays in
        # the schema and is exercised by the generated types and tests;
        # only the inline examples skip it. Reviewer: do not re-add a
        # `default` value to a parameter_schema example.
        default:
          oneOf:
            - type: boolean
            - type: integer
            - type: string
          description: |
            Optional default value applied when a non-required
            parameter is omitted. Present only when the parameter
            declares one; its JSON type matches `type`. Absent for
            required parameters and for optional parameters with no
            declared default.
    BlueprintVersionResponse:
      type: object
      description: |
        A single version of a Blueprint. A version is keyed by its
        parent Blueprint and its `version` string and carries the
        typed `parameter_schema` an operator fills in when
        provisioning a Resource. The Crossplane XRD and Composition
        manifests are storage-internal and are deliberately not
        exposed on this read surface.
      required:
        - version
        - provider_kinds
        - injection_strategy
        - parameter_schema
        - created_at
      properties:
        version:
          type: string
          minLength: 1
          description: Version identifier, unique within the parent Blueprint.
        provider_kinds:
          type: array
          items:
            type: string
            enum:
              - aws
              - gcp
              - hetzner
              - openstack
          minItems: 1
          description: |
            Closed-set infrastructure substrates this version can
            target. Non-empty.
        injection_strategy:
          type: string
          enum:
            - cloud-init-user-data
            - helm-values
            - provider-secret
          description: |
            Closed-set discriminator naming how this version threads
            request parameters into the rendered Composite Resource.
        parameter_schema:
          type: array
          items:
            $ref: "#/components/schemas/BlueprintParameter"
          description: |
            Typed parameter declarations an operator fills in when
            provisioning a Resource from this version. May be empty
            when the version declares no parameters.
        created_at:
          type: string
          format: date-time
          description: Version creation timestamp (UTC).
    BlueprintResponse:
      type: object
      description: |
        Hydrated projection of a Blueprint Catalog entry. The shape is
        shared by `ListBlueprints` and `GetBlueprint` — `ListBlueprints`
        returns it with an empty `versions` array, `GetBlueprint`
        returns it with the Blueprint's ordered versions.
      required:
        - id
        - slug
        - display_name
        - status
        - created_at
        - updated_at
        - versions
      properties:
        id:
          type: string
          format: uuid
          description: Blueprint identifier (UUIDv7).
        slug:
          type: string
          minLength: 1
          maxLength: 63
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          description: Kebab-case URL handle, unique across the catalogue.
        domain_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Owning Domain when the Blueprint is scoped to a single
            Domain. `null` when the entry is catalogue-wide.
        display_name:
          type: string
          minLength: 1
          maxLength: 256
          description: Human-readable Blueprint name.
        description:
          type: string
          description: |
            Optional free-form Blueprint description. Empty when the
            catalogue entry declares none.
        status:
          type: string
          enum:
            - active
            - retired
          description: |
            Lifecycle status. `active` entries are offerable;
            `retired` entries remain readable but are no longer
            offered for new Resources.
        created_at:
          type: string
          format: date-time
          description: Blueprint creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: Last-modified timestamp (UTC).
        versions:
          type: array
          items:
            $ref: "#/components/schemas/BlueprintVersionResponse"
          description: |
            Ordered Blueprint versions. Empty on the `ListBlueprints`
            projection; populated on `GetBlueprint`.
    BlueprintList:
      type: object
      description: |
        Page of Blueprints returned by `GET /v1/blueprints`. The
        window is computed by the persistence layer in slug order;
        per-row visibility is layered on top so the `items` array is
        the subset the caller is authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BlueprintResponse"
          description: Blueprints in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream. The encoding
            is HMAC-signed by the server so a tampered cursor surfaces
            as `400` on the next call.
    ResourceOrigin:
      type: string
      enum:
        - adopted
        - provisioned
      description: |
        Closed-set discriminator on a Resource: `adopted` for a
        Resource that entered the platform through an out-of-band
        channel; `provisioned` for a Resource whose substrate is
        owned by the Provisioning Broker. The wire values are
        intentionally lowercase; the handler maps them onto the
        domain's `Adopted` / `Provisioned` literals.
    ProvisionedResourcePhase:
      type: string
      enum:
        - Pending
        - Provisioning
        - Enrolling
        - Ready
        - Failed
        - Deregistering
        - Deprovisioning
        - Deleted
      description: |
        Closed-set lifecycle phase of a broker-owned ProvisionedResource.
        `Pending` is the entry phase set when the broker accepts a
        provisioning declaration; the reconcile loop drives the
        aggregate forward through `Provisioning` and `Enrolling` to
        the terminal `Ready` or `Failed`. `Deregistering` and
        `Deprovisioning` are teardown phases entered when an operator
        deletes the parent Resource; `Deleted` is the post-teardown
        terminal.
    ResourceCreateRequest:
      # DECISION: ResourceCreateRequest is modelled as a single object
      # whose `origin` enum field discriminates the two creation flows,
      # not as a `oneOf` with an OpenAPI `discriminator`. Alternative
      # considered: a discriminated `oneOf` over ResourceAdoptRequest
      # and ResourceProvisionRequest member schemas. REJECTED for this
      # spec deliverable to keep the wire envelope flat and avoid the
      # generated-client surface bloat a discriminated union induces
      # in both the Go and TypeScript clients. Flow-specific field
      # requirements (e.g. `blueprint_version_id` and
      # `cloud_credential_id` for the provisioned flow) are documented
      # on each property rather than enforced statically here; the
      # handler validates them once `origin` is known and rejects a
      # cross-flow payload with `400 invalid_resource_origin` or
      # `400 invalid_body`. Reviewer: a future revision may migrate
      # to the discriminated union without breaking the wire contract.
      type: object
      description: |
        Body for `POST /v1/projects/{project_id}/resources`. The
        `origin` field discriminates the two creation flows:

          * `origin=adopted` requires `kind`; `external_ref` is
            optional. The handler persists the Resource and returns
            `201` with the hydrated `ResourceResponse`.
          * `origin=provisioned` requires `kind`,
            `blueprint_version_id`, and `cloud_credential_id`; the
            optional `parameters` object carries the typed values
            validated against the BlueprintVersion's
            `parameter_schema`. The handler creates the Resource,
            mints a Pending `ProvisionedResource` via the broker, and
            returns `202` with a `Location` header.

        A body with `origin` absent or outside `{adopted, provisioned}`
        is rejected with `400 invalid_resource_origin`. A body that
        mixes flow-specific fields with the wrong `origin` (e.g. a
        `blueprint_version_id` on `origin=adopted`) is rejected with
        `400 invalid_body`.
      required:
        - origin
        - kind
      additionalProperties: false
      properties:
        origin:
          $ref: "#/components/schemas/ResourceOrigin"
        kind:
          type: string
          minLength: 1
          maxLength: 64
          description: |
            Resource kind discriminator. Trimmed and bounded by the
            tenancy aggregate's `resourceKindMaxLen`.
        external_ref:
          type: string
          minLength: 1
          maxLength: 256
          description: |
            Optional external-system reference for the adopted flow
            (URN, ARN, vendor-opaque id). Trimmed; whitespace-only is
            rejected. Omit on the provisioned flow.
        blueprint_version_id:
          type: string
          format: uuid
          description: |
            BlueprintVersion the broker should render. REQUIRED on
            `origin=provisioned`; omit on `origin=adopted`. A missing
            version row surfaces as `422` with `code:
            blueprint_not_found`.
        cloud_credential_id:
          type: string
          format: uuid
          description: |
            Cloud Credential the broker uses to provision the
            substrate. REQUIRED on `origin=provisioned`; omit on
            `origin=adopted`. A missing credential row surfaces as
            `422` with `code: cloud_credential_not_found`.
        parameters:
          type: object
          additionalProperties: true
          description: |
            Typed parameter values for `origin=provisioned`, validated
            against the BlueprintVersion's typed `parameter_schema`.
            Omit on `origin=adopted`. The wire envelope is opaque
            here; type-shape rejections surface at the handler.
    ResourceProvisioning:
      type: object
      description: |
        Broker provisioning state attached to an `Origin=Provisioned`
        Resource. Absent on `Origin=Adopted` Resources. The phase is
        the reconcile loop's most recently observed snapshot and is
        guaranteed to advance only toward a terminal.
      required:
        - phase
        - provisioned_resource_id
      properties:
        phase:
          $ref: "#/components/schemas/ProvisionedResourcePhase"
        provisioned_resource_id:
          type: string
          format: uuid
          description: |
            Identifier of the broker-owned ProvisionedResource bound
            to this Resource (UUIDv7).
    ResourceResponse:
      type: object
      description: |
        Hydrated projection of a Tenancy Resource. The shape is shared
        by `CreateResource`, `GetResource`, and `ListProjectResources`
        — every read surface returns the same wire bytes for the same
        Resource so clients only need one binding. The `provisioning`
        sub-object is present only on `Origin=Provisioned` Resources.
      required:
        - id
        - project_id
        - domain_id
        - kind
        - origin
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Resource identifier (UUIDv7).
        project_id:
          type: string
          format: uuid
          description: |
            Owning Project (UUIDv7) — exactly-one-parent rule.
        domain_id:
          type: string
          format: uuid
          description: |
            Owning Domain (UUIDv7). Denormalised from the parent
            Project so cross-Domain checks do not have to reload the
            Project on every Resource read.
        kind:
          type: string
          minLength: 1
          maxLength: 64
          description: Resource kind discriminator.
        external_ref:
          type: string
          nullable: true
          description: |
            Optional external-system reference. `null` when the
            Resource declared none.
        origin:
          $ref: "#/components/schemas/ResourceOrigin"
        created_at:
          type: string
          format: date-time
          description: Resource creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: Last-modified timestamp (UTC).
        provisioning:
          allOf:
            - $ref: "#/components/schemas/ResourceProvisioning"
          description: |
            Broker provisioning state. Present only on
            `Origin=Provisioned` Resources; omitted on
            `Origin=Adopted` Resources.
    ResourceList:
      type: object
      description: |
        Page of Resources returned by
        `GET /v1/projects/{project_id}/resources`. The window is
        computed by the persistence layer in creation order; per-row
        visibility is layered on top so the `items` array is the
        subset the caller is authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ResourceResponse"
          description: Resources in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream. The encoding
            is HMAC-signed by the server so a tampered cursor surfaces
            as `400` on the next call.
    CredentialAssignmentState:
      type: string
      enum:
        - requested
        - approved
        - rejected
        - revoked
      description: |
        Lifecycle state of a Credential Assignment. `requested` is the
        opening state; `approved` materialises the binding; `rejected`
        closes an unapproved request; `revoked` tears down a previously
        approved binding. The state is a stored column advanced only
        by the application service's transition rules.
    CredentialAssignmentResponse:
      type: object
      description: |
        Metadata projection of a Credential Assignment. The shape is
        shared by `RequestCredentialAssignment`,
        `ListCredentialAssignments`, `ApproveCredentialAssignment`,
        `RejectCredentialAssignment`, and `RevokeCredentialAssignment`
        so clients only need one binding.
      required:
        - id
        - project_id
        - cloud_credential_id
        - state
        - materialised
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Credential Assignment identifier (UUIDv7).
        project_id:
          type: string
          format: uuid
          description: |
            Identifier of the owning Project — the residency pivot the
            ReBAC gate authorises against.
        cloud_credential_id:
          type: string
          format: uuid
          description: |
            Identifier of the Cloud Credential bound to the Project by
            this assignment.
        state:
          $ref: "#/components/schemas/CredentialAssignmentState"
        materialised:
          type: boolean
          description: |
            Whether the assignment's binding is currently live. `true`
            only while the assignment is in the `approved` state;
            `false` for `requested`, `rejected`, and `revoked`.
        created_at:
          type: string
          format: date-time
          description: Aggregate creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: |
            Last-modified timestamp (UTC). Bumped by every lifecycle
            transition — approve, reject, revoke.
    CredentialAssignmentList:
      type: object
      description: |
        Page of Credential Assignments returned by
        `GET /v1/projects/{id}/credential-assignments`. The window is
        computed by the persistence layer in creation order; per-row
        visibility is layered on top so the `items` array is the
        subset the caller is authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CredentialAssignmentResponse"
          description: Credential Assignments in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream. The encoding
            is HMAC-signed by the server so a tampered cursor surfaces
            as `400` on the next call.
    CredentialAssignmentRequest:
      type: object
      description: |
        Body for `POST /v1/projects/{id}/credential-assignments`. Names
        the Cloud Credential to bind to the Project.
      required:
        - cloud_credential_id
      additionalProperties: false
      properties:
        cloud_credential_id:
          type: string
          format: uuid
          description: |
            Identifier of the Cloud Credential to bind. Must be a
            non-zero UUID — a malformed value is rejected with
            `400 invalid_cloud_credential_id`.
    CredentialAssignmentDecisionRequest:
      type: object
      description: |
        Body for `POST /v1/credential-assignments/{id}/reject` and
        `POST /v1/credential-assignments/{id}/revoke`. The `reason` is
        recorded on the lifecycle outbox event so the decision carries
        an approver- or operator-supplied audit string.
      required:
        - reason
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 1024
          description: |
            Decision rationale. Non-empty — whitespace-only is
            rejected with `400 invalid_decision_reason`.
    ApprovalState:
      type: string
      enum:
        - proposed
        - pending-approval
        - approved
        - rejected
        - expired
      description: |
        Lifecycle state of an Approval. `proposed` is the opening state
        before the policy is evaluated; `pending-approval` means the
        Domain's `ApprovalPolicy` gated the proposal and it awaits an
        operator decision; `approved` is the terminal accept state
        (reached by an operator decision, the empty-policy short-circuit,
        or a break-glass override); `rejected` is the terminal state an
        operator decision declines into; `expired` is the terminal state
        the background sweeper drives an un-decided proposal into past
        its deadline. The state is a stored column advanced only by the
        application service's transition rules.
    Approval:
      type: object
      description: |
        Metadata projection of an Approval. The shape is shared by
        `ListApprovals`, `GetApproval`, `ApproveApproval`,
        `RejectApproval`, and `BreakGlassApproval` so clients only need
        one binding.
      required:
        - id
        - domain_id
        - proposer_subject
        - action_kind
        - target_resource
        - state
        - created_at
        - expires_at
      properties:
        id:
          type: string
          format: uuid
          description: Approval identifier (UUIDv7).
        domain_id:
          type: string
          format: uuid
          description: |
            Identifier of the owning Domain — the residency pivot the
            ReBAC gate authorises against.
        proposer_subject:
          type: string
          description: |
            ReBAC subject string of the principal that raised the
            proposal. A caller may never approve a proposal whose
            `proposer_subject` is themselves.
        action_kind:
          type: string
          description: |
            Kind of action the proposal would perform once approved.
            Matched against the Domain `ApprovalPolicy` rules to decide
            whether the proposal is gated.
        target_resource:
          type: string
          description: |
            Resource the proposed action targets. Matched against the
            optional `target_resource` of a policy rule.
        payload:
          type: object
          additionalProperties: true
          description: |
            Raw JSON action payload applied verbatim once the proposal
            is approved. Opaque to the approval workflow — it carries
            the parameters of the action the proposer intends to run.
        state:
          $ref: "#/components/schemas/ApprovalState"
        created_at:
          type: string
          format: date-time
          description: Aggregate creation timestamp (UTC).
        decided_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp the proposal reached a terminal state (UTC).
            `null` or omitted while the proposal is still `proposed` or
            `pending-approval`.
        decided_by_subject:
          type: string
          nullable: true
          description: |
            ReBAC subject string of the principal that decided the
            proposal. `null` or omitted while undecided and for the
            unattended `expired` path.
        decision_reason:
          type: string
          nullable: true
          description: |
            Free-text rationale recorded with the decision. `null` or
            omitted while undecided and for the unattended `expired`
            path. For a break-glass override the rationale value is PII
            and is NOT surfaced here verbatim — only its field name is
            projected onto `caveat_context`.
        expires_at:
          type: string
          format: date-time
          description: |
            Deadline past which the background sweeper expires an
            un-decided proposal (UTC).
        caveat_context:
          type: object
          description: |
            Names-only projection of the caveat field NAMES referenced
            on the decision's audit row — for a break-glass override
            this carries the `reason` field name. Values never cross
            this boundary: the map keys are caveat NAMES and the arrays
            are caveat-parameter NAMES, mirroring the Platform Audit Log
            invariant. `null` or omitted while the proposal carries no
            decision audit row.
          additionalProperties:
            type: array
            items:
              type: string
          x-plexsphere-names-only: true
          nullable: true
    ApprovalList:
      type: object
      description: |
        Page of Approvals returned by `GET /v1/approvals`. The window is
        computed by the persistence layer in creation order; per-row
        visibility is layered on top so the `items` array is the subset
        the caller is authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Approval"
          description: Approvals in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream. The encoding
            is HMAC-signed by the server so a tampered cursor surfaces
            as `400` on the next call.
    ExecutionStatus:
      type: string
      enum:
        - pending
        - ack
        - started
        - succeeded
        - failed
        - cancelled
        - timeout
      # x-enum-varnames pins the generated Go constant names for this
      # enum so oapi-codegen's "prefix only on collision" heuristic
      # cannot flip the constant form when a sibling enum is added or
      # removed. The explicit, document-unique names keep this enum and
      # its siblings stable (REQ-001, PX-0076).
      x-enum-varnames:
        - ExecutionStatusPending
        - ExecutionStatusAck
        - ExecutionStatusStarted
        - ExecutionStatusSucceeded
        - ExecutionStatusFailed
        - ExecutionStatusCancelled
        - ExecutionStatusTimeout
      description: |
        Lifecycle status of an action invocation on a single target Node,
        and — when projected onto the Execution header — the aggregate
        status. `pending` is the initial state before the dispatch is
        acknowledged; `ack` is set when the Node acknowledges receipt;
        `started` is set when the Node begins executing; `succeeded`,
        `failed`, `cancelled`, and `timeout` are the terminal states. The
        legal advances form a state machine
        (`pending → ack → started → (succeeded | failed | cancelled)`,
        with `timeout` reachable from any non-terminal state).
    ActionKind:
      type: string
      enum:
        - builtin
        - hook
      # x-enum-varnames pins the generated Go constant names for this
      # enum so the "prefix only on collision" heuristic cannot flip the
      # constant form when a sibling enum is added or removed (REQ-002,
      # PX-0076).
      x-enum-varnames:
        - ActionKindBuiltin
        - ActionKindHook
      description: |
        Kind of remote action a dispatch invokes: `builtin` names a
        built-in action shipped with the Node agent; `hook` names a
        user-declared hook action.
    OutputRef:
      type: object
      description: |
        Tagged union pointing at an action invocation's collected output.
        The `inline` variant carries the bounded output bytes (≤ 16 KiB)
        inside the control plane; the `object_store` variant carries the
        `(bucket, key, sha256)` coordinates addressing the over-ceiling
        output uploaded to the object store.
      required:
        - kind
      properties:
        kind:
          type: string
          enum:
            - inline
            - object_store
          # x-enum-varnames pins the generated Go constant names for this
          # union discriminator so the "prefix only on collision"
          # heuristic cannot flip the constant form (REQ-007, PX-0076).
          x-enum-varnames:
            - OutputRefKindInline
            - OutputRefKindObjectStore
          description: |
            Union discriminator: `inline` for control-plane-resident
            output bytes, `object_store` for an uploaded object.
        inline_bytes:
          type: string
          format: byte
          description: |
            Base64-encoded output bytes. Present only on the `inline`
            variant; bounded at 16 KiB.
        bucket:
          type: string
          description: |
            Object-store bucket holding the uploaded output. Present only
            on the `object_store` variant.
        key:
          type: string
          description: |
            Object-store key addressing the uploaded output. Present only
            on the `object_store` variant.
        sha256:
          type: string
          description: |
            Hex-encoded SHA-256 digest of the uploaded output. Present
            only on the `object_store` variant.
    ExecutionTarget:
      type: object
      description: |
        Per-Node invocation projection — one target the Execution fanned
        out to, with its current status and (once collected) a pointer to
        the output it produced.
      required:
        - node_id
        - status
        - created_at
        - updated_at
      properties:
        node_id:
          type: string
          format: uuid
          description: Identifier of the target Node (UUIDv7).
        status:
          $ref: "#/components/schemas/ExecutionStatus"
        created_at:
          type: string
          format: date-time
          description: Target creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: Timestamp of the target's most recent status advance (UTC).
        output_ref:
          allOf:
            - $ref: "#/components/schemas/OutputRef"
          description: |
            Pointer to the output the invocation produced. Present only
            once the target reaches a terminal status that collected
            output; omitted otherwise.
    ExecutionEvent:
      type: object
      description: |
        Append-only event row recording one status advance in an
        Execution's history.
      required:
        - id
        - status
        - occurred_at
      properties:
        id:
          type: string
          format: uuid
          description: Event identifier (UUIDv7).
        status:
          $ref: "#/components/schemas/ExecutionStatus"
        occurred_at:
          type: string
          format: date-time
          description: Timestamp the status advance occurred (UTC).
        detail:
          type: string
          nullable: true
          description: |
            Optional free-text detail recorded with the advance — for a
            failed status this carries the reported error text.
    Execution:
      type: object
      description: |
        Metadata-only projection of an action Execution. The shape is
        shared by `DispatchExecution`, `ListExecutions`, and
        `GetExecution`. It carries the action identity, the owning
        Project and Domain, the aggregate status, and the per-Node
        targets — but no secret or token columns.
      required:
        - id
        - project_id
        - domain_id
        - action
        - type
        - status
        - created_at
        - updated_at
        - targets
      properties:
        id:
          type: string
          format: uuid
          description: Execution identifier (UUIDv7).
        project_id:
          type: string
          format: uuid
          description: Identifier of the owning Project (UUIDv7).
        domain_id:
          type: string
          format: uuid
          description: |
            Identifier of the owning Domain (UUIDv7) — the residency pivot
            the per-Domain concurrent-execution budget is counted against.
        action:
          type: string
          description: Name of the dispatched action.
        type:
          $ref: "#/components/schemas/ActionKind"
        status:
          allOf:
            - $ref: "#/components/schemas/ExecutionStatus"
          description: |
            Aggregate status of the Execution, derived from its per-Node
            targets.
        created_at:
          type: string
          format: date-time
          description: Aggregate creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: Timestamp of the Execution's most recent advance (UTC).
        targets:
          type: array
          items:
            $ref: "#/components/schemas/ExecutionTarget"
          description: Per-Node invocations the Execution fanned out to.
    ExecutionList:
      type: object
      description: |
        Page of Executions returned by
        `GET /v1/projects/{project_id}/executions`. The window is computed
        by the persistence layer in creation order.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Execution"
          description: Executions in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted when
            the iteration has reached end-of-stream. The encoding is
            HMAC-signed by the server so a tampered cursor surfaces as
            `400` on the next call.
    DispatchExecutionRequest:
      type: object
      description: |
        Body for `POST /v1/projects/{project_id}/executions:dispatch`. It
        names the action to dispatch, the parameters to pass, and the
        target set. The target is EXACTLY ONE of a single `node_id` or an
        opaque label `selector` — supplying both, or neither, is rejected.
      required:
        - action
      properties:
        action:
          type: string
          description: Name of the action to dispatch.
        type:
          allOf:
            - $ref: "#/components/schemas/ActionKind"
          description: |
            Kind of action to dispatch (`builtin` or `hook`). Defaults to
            `builtin` when omitted.
        parameters:
          type: object
          additionalProperties: true
          description: |
            Opaque JSON parameter document passed verbatim to the action.
        timeout_seconds:
          type: integer
          description: |
            Per-dispatch execution timeout in whole seconds. A background
            reconciler times out an invocation whose Node never reports a
            terminal result within this window.
        selector:
          type: string
          description: |
            Opaque label selector resolving the target cohort. Supply
            EXACTLY ONE of `selector` or `node_id`; supplying both, or
            neither, is rejected.
        node_id:
          type: string
          format: uuid
          description: |
            Identifier of a single target Node (UUIDv7). Supply EXACTLY
            ONE of `node_id` or `selector`; supplying both, or neither, is
            rejected.
    ExecutionCallbackRequest:
      type: object
      description: |
        Body a Node POSTs to
        `POST /v1/nodes/{id}/executions/{exec_id}` to report a status
        advance for its invocation. The reported `status` drives the
        closed state machine; the optional `output` carries the action's
        collected output, either inline (≤ 16 KiB) or — for an over-
        ceiling body — the object-store coordinates of the uploaded
        object.
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/ExecutionStatus"
        exit_code:
          type: integer
          nullable: true
          description: |
            Process exit code the action reported. Present on terminal
            callbacks that ran the action to completion.
        error:
          type: string
          nullable: true
          description: |
            Free-text error the action reported. Present on a `failed`
            terminal callback.
        declared_output_bytes:
          type: integer
          description: |
            Size in bytes the Node declares it intends to upload. A value
            over the 16 KiB ceiling drives the over-ceiling presign mint
            on the first callback.
        output:
          type: object
          description: |
            Collected action output. Carries the inline bytes for a
            bounded output, or the object-store coordinates of an
            already-uploaded over-ceiling output.
          properties:
            inline:
              type: string
              format: byte
              description: |
                Base64-encoded inline output bytes (≤ 16 KiB). An inline
                body over the ceiling is refused with 413.
            object_key:
              type: string
              description: |
                Object-store key of the uploaded over-ceiling output, set
                on the final callback after the Node has uploaded the body
                to the presigned URL.
            sha256:
              type: string
              description: |
                Hex-encoded SHA-256 digest of the uploaded over-ceiling
                output.
    ExecutionCallbackResponse:
      type: object
      description: |
        Body of a successful `PostNodeExecutionCallback`. Carries the new
        invocation status, and — only on the FIRST over-ceiling callback —
        the presigned object-store PUT URL the Node uploads the full
        output to.
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/ExecutionStatus"
        output_upload_url:
          type: string
          nullable: true
          description: |
            Presigned object-store PUT URL the Node uploads its over-
            ceiling output to. Present ONLY on the first callback that
            declares an over-ceiling output; omitted on every other
            callback.
    SessionKind:
      type: string
      enum:
        - ssh
        - k8s
        - tcp
      # x-enum-varnames pins the generated Go constant names for this enum
      # so oapi-codegen's "prefix only on collision" heuristic cannot flip
      # the constant form when a sibling enum is added or removed. The
      # explicit, document-unique names keep this enum and its siblings
      # stable (REQ-012, PX-0077).
      x-enum-varnames:
        - SessionKindSsh
        - SessionKindK8s
        - SessionKindTcp
      description: |
        Kind of mediated access a Session grants: `ssh` is a mediated SSH
        session, `k8s` a mediated Kubernetes API session, `tcp` a generic
        protocol-opaque TCP tunnel.
    SessionStatus:
      type: string
      enum:
        - active
        - revoked
        - expired
      # x-enum-varnames pins the generated Go constant names for this enum
      # against the prefix-flip heuristic (REQ-012, PX-0077).
      x-enum-varnames:
        - SessionStatusActive
        - SessionStatusRevoked
        - SessionStatusExpired
      description: |
        Lifecycle status of a Session. `active` is the initial live state;
        `revoked` is set on an explicit or swept revocation; `expired` is
        set when the TTL elapses without a revocation.
    RevokeReason:
      type: string
      enum:
        - operator_request
        - policy_violation
        - identity_compromise
        - resource_decommissioned
        - ttl_expired
        - idle_timeout
      # x-enum-varnames pins the generated Go constant names for this enum
      # against the prefix-flip heuristic (REQ-012, PX-0077).
      x-enum-varnames:
        - RevokeReasonOperatorRequest
        - RevokeReasonPolicyViolation
        - RevokeReasonIdentityCompromise
        - RevokeReasonResourceDecommissioned
        - RevokeReasonTtlExpired
        - RevokeReasonIdleTimeout
      description: |
        Reason a Session was revoked. The first four are operator-driven
        revocations supplied on the explicit revoke call; `ttl_expired`
        and `idle_timeout` are set by the background sweeper.
    SessionTargetSSH:
      type: object
      description: |
        SSH session target — the login user and the optional allowed-
        command allowlist the mediated SSH session is constrained to.
      required:
        - user
      properties:
        user:
          type: string
          description: Login user the mediated SSH session connects as.
        allowed_commands:
          type: array
          maxItems: 64
          items:
            type: string
          description: |
            Optional allowlist of commands the session may run. An empty
            or omitted list grants an unconstrained interactive session;
            bounded at 64 entries.
    SessionTargetK8s:
      type: object
      description: |
        Kubernetes session target — the impersonated user and the optional
        impersonation groups the mediated kubectl session asserts.
      required:
        - user
      properties:
        user:
          type: string
          description: User the mediated Kubernetes session impersonates.
        impersonate_groups:
          type: array
          maxItems: 32
          items:
            type: string
          description: |
            Optional impersonation groups the session asserts. Bounded at
            32 entries.
    SessionTargetTCP:
      type: object
      description: |
        Generic TCP session target — the host and port the protocol-opaque
        tunnel forwards to. No L7 shape is recorded or interpreted.
      required:
        - host
        - port
      properties:
        host:
          type: string
          description: Target host the tunnel forwards to.
        port:
          type: integer
          minimum: 1
          maximum: 65535
          description: Target port the tunnel forwards to.
    SessionTarget:
      type: object
      description: |
        Per-kind target of a Session. EXACTLY ONE of `ssh`, `k8s`, or
        `tcp` is populated, matching the Session's `kind`. The target
        carries the operator-supplied connection coordinates the plexd
        listener binds against — it is metadata, not credential material.
      properties:
        ssh:
          allOf:
            - $ref: "#/components/schemas/SessionTargetSSH"
          description: |
            Populated only when `kind` is `ssh`.
        k8s:
          allOf:
            - $ref: "#/components/schemas/SessionTargetK8s"
          description: |
            Populated only when `kind` is `k8s`.
        tcp:
          allOf:
            - $ref: "#/components/schemas/SessionTargetTCP"
          description: |
            Populated only when `kind` is `tcp`.
    Session:
      type: object
      description: |
        Metadata-only projection of a mediated Session. The shape is
        shared by `IssueSession` (nested in the issue response),
        `ListSessions`, and `GetSession`. It carries the session identity,
        the owning Project / Domain / Resource / Identity, the aggregate
        status, the issuance / expiry / last-active timestamps, and the
        per-kind target — but NEVER the signed token. The token is
        delivered exactly once, in the issue response, and never re-exposed
        through this projection.
      required:
        - id
        - project_id
        - domain_id
        - resource_id
        - identity_id
        - kind
        - status
        - issued_at
        - expires_at
        - last_active_at
        - target
      properties:
        id:
          type: string
          format: uuid
          description: |
            Session identifier (UUIDv7). Equals the issued token's `jti`.
        project_id:
          type: string
          format: uuid
          description: Identifier of the owning Project (UUIDv7).
        domain_id:
          type: string
          format: uuid
          description: |
            Identifier of the owning Domain (UUIDv7) — the residency pivot
            the per-Domain session policy and concurrency budgets count
            against.
        resource_id:
          type: string
          format: uuid
          description: Identifier of the targeted Resource (UUIDv7).
        identity_id:
          type: string
          format: uuid
          description: Identifier of the Identity the Session was issued to.
        kind:
          $ref: "#/components/schemas/SessionKind"
        status:
          allOf:
            - $ref: "#/components/schemas/SessionStatus"
          description: Aggregate lifecycle status of the Session.
        issued_at:
          type: string
          format: date-time
          description: Issuance timestamp (UTC).
        expires_at:
          type: string
          format: date-time
          description: |
            Expiry timestamp (UTC) — issuance time plus the clamped TTL.
        last_active_at:
          type: string
          format: date-time
          description: |
            Timestamp of the most recent recorded activity (UTC); drives
            the idle-timeout sweeper.
        idle_timeout_seconds:
          type: integer
          description: |
            Idle window in whole seconds — the Session is reclaimed when
            `last_active_at + idle_timeout` passes.
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Revocation timestamp (UTC); `null` while the Session is live.
        revoke_reason:
          allOf:
            - $ref: "#/components/schemas/RevokeReason"
          description: |
            Reason the Session was revoked. Omitted while the Session is
            live.
        target:
          $ref: "#/components/schemas/SessionTarget"
    SessionList:
      type: object
      description: |
        Page of Sessions returned by
        `GET /v1/projects/{project_id}/sessions`. The window is computed by
        the persistence layer in issuance order.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Session"
          description: Sessions in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted when
            the iteration has reached end-of-stream. The encoding is
            HMAC-signed by the server so a tampered cursor surfaces as
            `400` on the next call.
    # traceability: PX-0082, S057, REQ-001 — operator-facing Secret Store inventory projections.
    ProjectSecretRef:
      type: object
      description: |
        One entry of a Project's Secret Store inventory — the secret `name`
        and its `current_version`. The projection is metadata-only and NEVER
        carries a secret payload, an OpenBao path, or any wrapping material.
      required:
        - name
        - current_version
      properties:
        name:
          type: string
          pattern: "^[a-z][a-z0-9_-]{0,62}$"
          description: |
            Secret name within the owning Project. Lower-case, starts with a
            letter, and is limited to letters, digits, hyphen, and underscore
            (1 to 63 characters).
        current_version:
          type: integer
          format: int32
          minimum: 1
          description: |
            The currently-served KV v2 version of the secret — a small,
            monotonically-increasing integer that starts at 1.
    ProjectSecretList:
      type: object
      description: |
        Page of Secret Store inventory entries returned by
        `GET /v1/projects/{project_id}/secrets`. The window is computed by
        the persistence layer in ascending name order.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectSecretRef"
          description: Secret inventory entries in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted when
            the iteration has reached end-of-stream. The encoding is
            HMAC-signed by the server so a tampered cursor surfaces as
            `400` on the next call.
    IssueSessionRequest:
      type: object
      description: |
        Body for `POST /v1/projects/{project_id}/sessions`. It names the
        targeted Resource, the session kind, the matching per-kind target,
        and the optional TTL and idempotency key. The `target` must carry
        EXACTLY the variant that matches `kind`.
      required:
        - resource_id
        - kind
        - target
      properties:
        resource_id:
          type: string
          format: uuid
          description: Identifier of the Resource to open a session against.
        kind:
          $ref: "#/components/schemas/SessionKind"
        target:
          $ref: "#/components/schemas/SessionTarget"
        requested_ttl_seconds:
          type: integer
          minimum: 1
          description: |
            Operator-requested TTL in whole seconds. Omitted falls back to
            the per-Domain default; a value above the per-Domain maximum is
            silently clamped, not rejected — the response `expires_at`
            reflects the effective TTL.
        idempotency_key:
          type: string
          description: |
            Optional idempotency key. A repeat issuance with the same
            `(identity, idempotency_key)` within the dedupe window returns
            the original Session and token rather than minting a new one.
    IssuedSession:
      type: object
      description: |
        Body of a successful `IssueSession`. Carries the metadata-only
        Session projection, the signed EdDSA JWT (delivered EXACTLY ONCE,
        here — it is never persisted server-side beyond the identifier and
        expiry, and never re-exposed through the list or read projections),
        the per-kind plexd listener endpoint the operator's client
        connects to, and the expiry.
      required:
        - session_id
        - token
        - expires_at
        - session
      properties:
        session_id:
          type: string
          format: uuid
          description: |
            Identifier of the issued Session (UUIDv7). Equals the token's
            `jti`.
        token:
          type: string
          description: |
            The signed, session-scoped EdDSA JWT. Delivered exactly once,
            in this response. Treat as a bearer secret.
        expires_at:
          type: string
          format: date-time
          description: |
            Expiry timestamp (UTC) of the issued Session and its token.
        listener_endpoint:
          type: string
          description: |
            The on-Node endpoint (`host:port`) the operator's client
            connects to for this session kind.
        session:
          $ref: "#/components/schemas/Session"
    RevokeSessionRequest:
      type: object
      description: |
        Body for `POST /v1/projects/{project_id}/sessions/{session_id}:revoke`.
        Carries the operator's revocation reason.
      required:
        - revoke_reason
      properties:
        revoke_reason:
          allOf:
            - $ref: "#/components/schemas/RevokeReason"
          description: |
            Reason for the revocation. Only the operator-driven values are
            accepted here — the sweeper reasons (`ttl_expired`,
            `idle_timeout`) are set internally, never by this call.
    SessionActivitySSH:
      type: object
      description: |
        Per-command SSH activity row a Node posts for an `ssh` session.
      required:
        - command
      properties:
        command:
          type: string
          maxLength: 1024
          description: |
            The command the session executed, captured as raw text bounded
            at 1 KiB.
        exit_code:
          type: integer
          nullable: true
          description: Process exit code the command reported, when settled.
        started_at:
          type: string
          format: date-time
          description: Timestamp the command started (UTC).
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp the command completed (UTC), when settled.
    SessionActivityK8s:
      type: object
      description: |
        Per-request Kubernetes activity row a Node posts for a `k8s`
        session.
      required:
        - verb
      properties:
        verb:
          type: string
          description: Kubernetes API verb the request issued.
        resource_kind:
          type: string
          description: Kubernetes resource kind the request addressed.
        namespace:
          type: string
          description: Namespace the request addressed, when namespaced.
        name:
          type: string
          description: Resource name the request addressed, when named.
        status_code:
          type: integer
          description: HTTP status the API server returned.
        duration_ms:
          type: integer
          description: Request duration in milliseconds.
    SessionActivityTCP:
      type: object
      description: |
        TCP session lifecycle activity a Node posts for a `tcp` session.
        The shape is deliberately payload-blind — exactly a start and an
        end with byte counters, no L7 interpretation.
      required:
        - phase
      properties:
        phase:
          type: string
          enum:
            - session_started
            - session_ended
          # x-enum-varnames pins the generated Go constant names against
          # the prefix-flip heuristic (REQ-012, PX-0077).
          x-enum-varnames:
            - SessionActivityTCPPhaseSessionStarted
            - SessionActivityTCPPhaseSessionEnded
          description: |
            Lifecycle phase: `session_started` opens the tunnel,
            `session_ended` closes it.
        target_host:
          type: string
          description: |
            Target host the tunnel connected to. Present on
            `session_started`.
        target_port:
          type: integer
          description: |
            Target port the tunnel connected to. Present on
            `session_started`.
        bytes_in:
          type: integer
          description: |
            Bytes forwarded from the operator to the target. Present on
            `session_ended`.
        bytes_out:
          type: integer
          description: |
            Bytes forwarded from the target to the operator. Present on
            `session_ended`.
        terminated_by:
          type: string
          enum:
            - ttl_expired
            - idle_timeout
            - plexd_close
            - operator_revoke
          # x-enum-varnames pins the generated Go constant names against
          # the prefix-flip heuristic (REQ-012, PX-0077).
          x-enum-varnames:
            - SessionActivityTCPTerminatedByTtlExpired
            - SessionActivityTCPTerminatedByIdleTimeout
            - SessionActivityTCPTerminatedByPlexdClose
            - SessionActivityTCPTerminatedByOperatorRevoke
          description: |
            What closed the tunnel. Present on `session_ended`.
    SessionActivityRequest:
      type: object
      description: |
        Body a Node POSTs to `POST /v1/nodes/{id}/sessions/{session_id}` to
        report per-kind session activity. EXACTLY ONE of `ssh`, `k8s`, or
        `tcp` is populated, matching the addressed Session's kind.
      properties:
        ssh:
          allOf:
            - $ref: "#/components/schemas/SessionActivitySSH"
          description: Populated only for an `ssh` session.
        k8s:
          allOf:
            - $ref: "#/components/schemas/SessionActivityK8s"
          description: Populated only for a `k8s` session.
        tcp:
          allOf:
            - $ref: "#/components/schemas/SessionActivityTCP"
          description: Populated only for a `tcp` session.
    SSEEventSessionSetup:
      type: object
      description: |
        Payload of the `session_setup` Signed Event Bus event delivered to
        the target Node's event stream. The Node opens its on-node listener
        for the session from this envelope.
      required:
        - session_id
        - jti
        - kind
        - target
        - expires_at
        - callback_url
      properties:
        session_id:
          type: string
          format: uuid
          description: Identifier of the Session being set up (UUIDv7).
        jti:
          type: string
          description: |
            The issued token's `jti`. Equals the session identifier.
        kind:
          $ref: "#/components/schemas/SessionKind"
        target:
          $ref: "#/components/schemas/SessionTarget"
        expires_at:
          type: string
          format: date-time
          description: Expiry timestamp (UTC) the listener tears down at.
        idle_timeout_seconds:
          type: integer
          description: |
            Idle window in whole seconds the listener applies locally.
        callback_url:
          type: string
          description: |
            The per-session callback URL under
            `/v1/nodes/{id}/sessions/{session_id}` the Node posts per-kind
            activity to.
    SSEEventSessionRevoked:
      type: object
      description: |
        Payload of the `session_revoked` Signed Event Bus event delivered
        to the target Node's event stream (and to any operator-side
        subscriber). The Node tears the listener down on receipt.
      required:
        - session_id
        - jti
        - revoked_at
        - revoke_reason
      properties:
        session_id:
          type: string
          format: uuid
          description: Identifier of the revoked Session (UUIDv7).
        jti:
          type: string
          description: |
            The revoked token's `jti`. Equals the session identifier.
        revoked_at:
          type: string
          format: date-time
          description: Revocation timestamp (UTC).
        revoke_reason:
          $ref: "#/components/schemas/RevokeReason"
    ApprovalPolicy:
      type: object
      description: |
        Dual-control policy stored on the owning Domain's
        `approval_policy` JSONB column. It declares which proposed
        actions require approval. An empty policy (no `rules`, marshalled
        as `{}`) is the wired-but-empty default that gates nothing — the
        machinery is in place but no action is held for approval until an
        operator adds a rule. This schema documents the stored column
        shape; it is not the body of any approval operation.
      properties:
        rules:
          type: array
          description: |
            Matching rules. A nil or empty list is the empty policy and
            gates no action.
          items:
            type: object
            required:
              - action_kind
              - approvers_required
            additionalProperties: false
            properties:
              action_kind:
                type: string
                description: |
                  Action kind the rule matches. Must be non-empty for
                  the rule to be valid.
              target_resource:
                type: string
                description: |
                  Optional resource the rule narrows to. An empty value
                  is a wildcard that matches any target for the given
                  action kind.
              approvers_required:
                type: integer
                minimum: 1
                description: |
                  Number of distinct approvers the matched action
                  requires. Must be at least one.
    RejectApprovalRequest:
      type: object
      description: |
        Body for `POST /v1/approvals/{id}/reject`. The `reason` is
        recorded on the decision so the rejection carries an
        operator-supplied audit string.
      required:
        - reason
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 1024
          description: |
            Decision rationale. Non-empty — whitespace-only is rejected
            with `400 invalid_decision_reason`.
    BreakGlassRequest:
      type: object
      description: |
        Body for `POST /v1/approvals/{id}/break-glass`. The `reason` is
        the mandatory emergency justification for the override. The
        value is PII recorded only by its field NAME on the decision's
        audit caveat context and routed to a PII-safe sink — it never
        crosses the contract boundary verbatim.
      required:
        - reason
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 16
          maxLength: 1024
          description: |
            Emergency justification. At least 16 characters — a shorter
            value is rejected with `400 invalid_break_glass_reason`.
    CredentialResponse:
      type: object
      description: |
        Metadata-only projection of an OpenBao-brokered credential. The
        shape is shared by `GetCredential`, `ListProjectCredentials`,
        `RevokeCredential`, and `RotateCredential` so clients only need
        one binding.

        The projection deliberately omits the KV mount, KV path, KV
        version, and every byte of secret material — the storage
        location is a storage-internal detail the operator-facing
        surface has no reason to expose.
      required:
        - id
        - project_id
        - version
        - status
        - expires_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Credential identifier (UUIDv7).
        project_id:
          type: string
          format: uuid
          description: |
            Identifier of the owning Project — the residency pivot the
            ReBAC gate authorises against.
        version:
          type: integer
          format: int64
          minimum: 1
          description: |
            Monotonic broker-row version. Starts at 1 on issuance and
            increments on every rotate.
        status:
          allOf:
            - $ref: "#/components/schemas/CloudCredentialStatus"
          description: |
            Derived lifecycle status of the credential. `revoked` when
            `revoked_at` is set; otherwise `expired` when `expired_at`
            is set or `expires_at` is in the past; otherwise `active`.
            Computed by the read surface from the lifecycle timestamps —
            it is not a stored column. Reuses the shared
            `CloudCredentialStatus` closed enum (identical
            active/expired/revoked vocabulary and precedence) rather
            than declaring a byte-identical parallel enum.
        expires_at:
          type: string
          format: date-time
          description: Wall-clock expiry budget (UTC).
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Revocation timestamp (UTC). `null` until the credential is
            revoked by an operator.
        expired_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Expiry-observed timestamp (UTC). `null` until the sweeper
            marks the credential expired.
        created_at:
          type: string
          format: date-time
          description: Aggregate creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: |
            Last-modified timestamp (UTC). Bumped by every lifecycle
            mutator — rotate, revoke, expire.
    CredentialList:
      type: object
      description: |
        Page of credentials returned by
        `GET /v1/projects/{id}/credentials`. The window is computed by
        the persistence layer in creation order; per-row visibility is
        layered on top so the `items` array is the subset the caller is
        authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CredentialResponse"
          description: Credentials in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream. The encoding
            is HMAC-signed by the server so a tampered cursor surfaces
            as `400` on the next call.
    CredentialRevokeRequest:
      type: object
      description: |
        Body for `POST /v1/credentials/{id}/revoke`. The `reason` is
        recorded on the `CredentialRevoked` outbox event so the
        revocation carries an operator-supplied audit string.
      required:
        - reason
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 1024
          description: |
            Operator-supplied revocation rationale. Non-empty —
            whitespace-only is rejected with `400 invalid_revoke_reason`.
    CredentialRotateMaterial:
      type: object
      description: |
        The new secret material the broker writes into OpenBao KV-v2 on
        rotate. Accepted INBOUND only — no field of this object is ever
        echoed back on any read surface.
      required:
        - payload
        - ttl_seconds
      additionalProperties: false
      properties:
        payload:
          type: string
          format: byte
          minLength: 1
          maxLength: 4096
          description: |
            Base64-encoded secret bytes written under `data.payload` in
            KV-v2. Empty payload is rejected with
            `400 invalid_rotate_material`.
        ttl_seconds:
          type: integer
          format: int64
          minimum: 1
          maximum: 31536000
          description: |
            Expiry budget in seconds from which the broker derives the
            refreshed `expires_at`. Must be a positive whole number of
            seconds (≤ 365 days).
        key_values:
          type: object
          additionalProperties:
            type: string
          description: |
            Optional flat data map written alongside the payload in
            KV-v2. Keys and values are caller-owned and never returned.
    CredentialRotateRequest:
      type: object
      description: |
        Body for `POST /v1/credentials/{id}/rotate`. `expected_version`
        is the broker-row version the caller observed via a prior read;
        a mismatch surfaces as `409 credential_cas_conflict` so
        concurrent rotations fail closed.
      required:
        - expected_version
        - material
      additionalProperties: false
      properties:
        expected_version:
          type: integer
          format: int64
          minimum: 1
          description: |
            The broker-row `version` the caller observed. The Custodian
            performs a compare-and-swap against this value.
        material:
          $ref: "#/components/schemas/CredentialRotateMaterial"
    NamespacePhase:
      type: string
      enum:
        - Pending
        - Provisioning
        - Ready
        - Degraded
        - Terminating
        - Deleted
      description: |
        Lifecycle phase of a Project's namespace on its management
        cluster, advanced only by the reconciliation loop (and to
        `Terminating` by the operator terminate endpoint). `Pending`
        before the cluster is first observed; `Provisioning` while
        resources converge; `Ready` once the verify gate passes;
        `Degraded` after a previously-Ready namespace loses a resource;
        `Terminating` once teardown is requested; `Deleted` once all
        resources are removed.
    ManagementClusterResponse:
      type: object
      description: |
        Metadata-only projection of a registered management cluster.
        The shape is shared by `RegisterManagementCluster`,
        `ListManagementClusters`, and `GetManagementCluster`. It
        deliberately omits the kubeconfig Secret reference contents —
        only the operator-supplied reference name is a storage-internal
        detail the surface has no reason to expose.
      required:
        - id
        - name
        - slug
        - region
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Management cluster identifier (UUIDv7).
        name:
          type: string
          maxLength: 256
          description: Human-readable cluster name.
        slug:
          type: string
          maxLength: 256
          description: |
            Unique human-facing shard key. Stable for the cluster's
            lifetime and used for deterministic region selection.
        region:
          type: string
          description: |
            Region the cluster serves. Empty string when the fleet is
            a single unscoped cluster.
        status:
          type: string
          description: |
            Last-observed lifecycle status string maintained by the
            reconciliation loop (for example `active`).
        created_at:
          type: string
          format: date-time
          description: Aggregate creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: Last-modified timestamp (UTC).
    ManagementClusterList:
      type: object
      description: |
        The slug-ordered registered management fleet returned by
        `GET /v1/management-clusters`.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ManagementClusterResponse"
          description: Registered management clusters, slug-ordered.
    RegisterManagementClusterRequest:
      type: object
      description: |
        Body for `POST /v1/management-clusters`. `slug` is the unique
        human-facing shard key; a duplicate surfaces as
        `409 management_cluster_conflict`.
      required:
        - name
        - slug
        - kubeconfig_secret_ref
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: Human-readable cluster name.
        slug:
          type: string
          minLength: 1
          maxLength: 256
          description: |
            Unique human-facing shard key. Required and immutable once
            registered.
        region:
          type: string
          maxLength: 256
          description: |
            Region the cluster serves. Optional; omit or send an empty
            string for a single unscoped cluster.
        kubeconfig_secret_ref:
          type: string
          minLength: 1
          maxLength: 256
          description: |
            Name of the Kubernetes Secret holding the cluster
            kubeconfig. This is a reference NAME only — no credential
            material crosses this surface.
        status:
          type: string
          maxLength: 256
          description: |
            Initial lifecycle status string. Optional; defaults to
            `active` when omitted.
    ProjectClusterAssignmentResponse:
      type: object
      description: |
        Read-side projection of a Project ↔ management-cluster
        assignment. The shape is shared by
        `GetProjectManagementClusterAssignment`,
        `ListManagementClusterAssignments`, and
        `TerminateProjectManagementClusterAssignment`.
      required:
        - project_id
        - management_cluster_id
        - region
        - namespace_name
        - namespace_phase
        - assigned_at
        - updated_at
      properties:
        project_id:
          type: string
          format: uuid
          description: Placed Project identifier (UUIDv7).
        management_cluster_id:
          type: string
          format: uuid
          description: |
            Identifier of the management cluster the Project is placed
            onto.
        region:
          type: string
          description: Region the assignment landed in.
        namespace_name:
          type: string
          description: |
            Derived per-Project namespace name on the management
            cluster (`plexsphere-project-<project-uuid>`).
        namespace_phase:
          $ref: "#/components/schemas/NamespacePhase"
        assigned_at:
          type: string
          format: date-time
          description: Assignment creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: |
            Last-modified timestamp (UTC); bumped on every phase
            advance.
    ProjectClusterAssignmentList:
      type: object
      description: |
        The project-id-ordered set of Project assignments placed on a
        management cluster, returned by
        `GET /v1/management-clusters/{id}/assignments`.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectClusterAssignmentResponse"
          description: Project assignments on the cluster.
    IdentityKind:
      type: string
      enum:
        - user
        - service-identity
      description: |
        Closed-set discriminator distinguishing human users from
        machine principals on the per-Domain identity-listing surface.
        The two values mirror the database CHECK constraint and the
        ReBAC schema's principal kinds.
    IdentitySummary:
      type: object
      description: |
        Read-side projection of a Domain principal — user OR service
        identity — exposed on the listing surface. The summary intentionally omits plaintext
        `external_subject` and `email` and instead carries
        `external_subject_pseudonym` so a `domain:<id>#read` caller
        without the `auditor` relation never observes raw IdP-side PII.
        Auditor callers receive the richer `IdentityDetail` projection
        on the by-id surface.
      required:
        - id
        - kind
        - domain_id
        - display_name
        - external_subject_pseudonym
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: |
            Stable principal identifier (UUIDv7). For users this is the
            User aggregate id; for service identities the
            ServiceIdentity aggregate id.
        kind:
          $ref: "#/components/schemas/IdentityKind"
        domain_id:
          type: string
          format: uuid
          description: Owning Domain identifier (UUIDv7).
        display_name:
          type: string
          description: |
            Operator-facing display string. For users this is the IdP-
            sourced full name; for service identities it is the
            operator-supplied label.
        external_subject_pseudonym:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: |
            Per-Domain pseudonym of the IdP-side `external_subject` (32
            bytes, lowercase hex). Always present so the listing
            surface is queryable without exposing plaintext PII to
            non-auditor callers.
        last_sign_in_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp of the most recent successful sign-in for this
            principal, or `null` when the principal has never signed
            in (typical for service identities and freshly invited
            users).
        created_at:
          type: string
          format: date-time
          description: Aggregate creation timestamp (UTC).
    IdentityDetail:
      type: object
      description: |
        Auditor-facing projection of a Domain principal returned by
        `GET /v1/domains/{id}/identities/{principalId}`. Extends
        `IdentitySummary` with optional `external_subject` and `email`
        plaintext fields. The plaintext fields are populated ONLY when
        the calling principal carries the `auditor` relation on the
        addressed Domain (`domain:<id>#auditor`); a `read`-only caller
        receives the same shape with the plaintext fields elided so a
        client cannot escalate by reading the wire bytes.
      required:
        - id
        - kind
        - domain_id
        - display_name
        - external_subject_pseudonym
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: |
            Stable principal identifier (UUIDv7), matching
            `IdentitySummary.id`.
        kind:
          $ref: "#/components/schemas/IdentityKind"
        domain_id:
          type: string
          format: uuid
          description: Owning Domain identifier (UUIDv7).
        display_name:
          type: string
          description: |
            Operator-facing display string, matching
            `IdentitySummary.display_name`.
        external_subject_pseudonym:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: |
            Per-Domain pseudonym of the IdP-side `external_subject` (32
            bytes, lowercase hex), matching
            `IdentitySummary.external_subject_pseudonym`.
        external_subject:
          type: string
          description: |
            Plaintext IdP-side `external_subject` (the OIDC `sub`
            claim or service identity token name). Populated ONLY for
            callers who carry the `auditor` ReBAC relation on the
            addressed Domain; non-auditor callers see this field
            elided from the response body so the wire bytes never
            carry raw PII to a `read`-only caller.
        email:
          type: string
          description: |
            Plaintext IdP-side email address. Populated ONLY for
            callers who carry the `auditor` ReBAC relation on the
            addressed Domain. Service identities do not carry an
            `email` value and the field is omitted in that case
            regardless of the caller's relation.
        last_sign_in_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp of the most recent successful sign-in, matching
            `IdentitySummary.last_sign_in_at` semantics.
        created_at:
          type: string
          format: date-time
          description: Aggregate creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: |
            Last-modified timestamp (UTC). Bumped by every aggregate
            mutator, including `last_sign_in_at` updates from the OIDC
            sign-in callback.
    IdentityList:
      type: object
      description: |
        Page of identities returned by
        `GET /v1/domains/{id}/identities`. The
        window is computed by the persistence layer in
        (created_at DESC, id DESC) order; per-row visibility is layered
        on top so the `items` array is the subset the caller is
        authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/IdentitySummary"
          description: Identities in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream. The encoding
            is HMAC-signed by the server so a tampered cursor surfaces
            as `400 invalid_cursor` on the next call.
    InvitationStatus:
      type: string
      enum:
        - pending
        - accepted
        - revoked
        - expired
      description: |
        Closed-set lifecycle status of an Invitation. `pending` is the
        initial state; `accepted`, `revoked`, and `expired` are
        absorbing terminal states. The four values mirror the
        plexsphere.invitations.status CHECK constraint and the
        aggregate's `Status` enum.
    InvitationInitialTuple:
      type: object
      description: |
        Relation tuple consumed atomically when an Invitation is
        accepted. The aggregate stores the tuples as a bounded jsonb
        array (max 32) on `plexsphere.invitations.initial_tuples` and
        rejects entries whose `object` is not in the closed prefix set
        `{domain:<this-id>, project:<uuid>, group:<uuid>}` — cross-
        Domain or platform-scoped objects surface as
        `422 invitation_object_out_of_scope`. The aggregate also
        rejects a non-JSON-encodable `caveat_context` with
        `422 invalid_caveat_context`.
      required:
        - relation
        - object
      properties:
        relation:
          type: string
          minLength: 1
          description: |
            SpiceDB relation the tuple grants on `object` (e.g.
            `member`, `viewer`). Whitespace-only is rejected by the
            aggregate.
        object:
          type: string
          minLength: 1
          description: |
            SpiceDB object reference the tuple targets. Allowed prefix
            set is closed: `domain:<this-domain-id>`,
            `project:<uuid>`, or `group:<uuid>`. The handler validates
            the prefix BEFORE the aggregate constructor so an out-of-
            scope object surfaces as `422
            invitation_object_out_of_scope` rather than a generic
            `invalid_body`.
          example: "project:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa"
        caveat_context:
          type: object
          additionalProperties: true
          description: |
            Optional CEL caveat context forwarded verbatim to SpiceDB
            on accept. The aggregate enforces JSON-encodable lossless
            round-trip — a value that fails the round-trip surfaces
            as `422 invalid_caveat_context`.
    InvitationCreateRequest:
      type: object
      description: |
        Body for `POST /v1/domains/{id}/invitations`. The handler authorises the call against the parent
        Domain's `manage` ReBAC relation BEFORE invoking the service
        so an unauthorised caller never produces an
        `InvitationCreated` outbox row. The plaintext
        `external_subject` is intentionally NOT echoed in the response
        — only the per-Domain pseudonym is — so a server-side log of
        the response body never carries raw IdP-side PII.
      required:
        - external_subject
      properties:
        external_subject:
          type: string
          minLength: 1
          maxLength: 255
          description: |
            IdP-side subject identifier (typically the OIDC `sub`
            claim or operator-known login name) the invitation is
            staged for. Whitespace-only is rejected by the aggregate
            .
        ttl_seconds:
          type: integer
          minimum: 60
          maximum: 604800
          default: 86400
          description: |
            Lifetime of the invitation in seconds, applied to
            `created_at` to derive `expires_at`. Out-of-range values
            surface as `400 invalid_ttl`. Defaults to 86400 (24h);
            ceiling is 7 days.
        initial_tuples:
          type: array
          maxItems: 32
          items:
            $ref: "#/components/schemas/InvitationInitialTuple"
          description: |
            Optional bounded list (max 32) of relation tuples to write
            into SpiceDB atomically when the invitation is accepted.
            Exceeding the cap surfaces as
            `422 too_many_initial_tuples`.
    InvitationResponse:
      type: object
      description: |
        Hydrated projection of an Invitation aggregate. The shape is shared by `CreateInvitation`,
        `GetInvitation`, and `ListInvitations`. Note that the
        plaintext `external_subject` is intentionally absent — the
        wire shape only carries the per-Domain pseudonym so a
        `read`-only caller never observes raw IdP-side PII through the
        invitation surface.
      required:
        - id
        - domain_id
        - external_subject_pseudonym
        - status
        - expires_at
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Invitation identifier (UUIDv7).
        domain_id:
          type: string
          format: uuid
          description: Owning Domain identifier (UUIDv7).
        external_subject_pseudonym:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: |
            Per-Domain pseudonym of the IdP-side `external_subject`
            (32 bytes, lowercase hex). The plaintext form is never
            echoed on the invitation read surface.
        status:
          $ref: "#/components/schemas/InvitationStatus"
        expires_at:
          type: string
          format: date-time
          description: |
            Wall-clock timestamp the invitation transitions to
            `expired` if no Accept / Revoke has fired. Derived from
            `created_at + ttl_seconds`. The expiry sweeper flips
            elapsed pending rows to `expired` and appends the
            matching outbox event.
        created_at:
          type: string
          format: date-time
          description: Aggregate creation timestamp (UTC).
        accepted_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp the invitation transitioned to `accepted`.
            Populated only when `status == accepted`.
        accepted_user_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Identifier of the User aggregate the OIDC sign-in
            callback resolved when accepting the invitation.
            Populated only when `status == accepted`.
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp the invitation transitioned to `revoked`.
            Populated only when `status == revoked`.
        expired_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp the expiry sweeper flipped the row to
            `expired`. Populated only when `status == expired`
            .
        initial_tuples:
          type: array
          maxItems: 32
          items:
            $ref: "#/components/schemas/InvitationInitialTuple"
          description: |
            Bounded list of relation tuples staged on the invitation.
            Returned verbatim from the persistence layer so the
            operator can preview which tuples will land on Accept
            .
    InvitationList:
      type: object
      description: |
        Page of invitations returned by
        `GET /v1/domains/{id}/invitations`. The
        window is computed by the persistence layer in
        (created_at DESC, id DESC) order; per-row visibility is layered
        on top so the `items` array is the subset the caller is
        authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/InvitationResponse"
          description: Invitations in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream. The encoding
            is HMAC-signed by the server so a tampered cursor surfaces
            as `400 invalid_cursor` on the next call.
    RebacCheckRequest:
      type: object
      description: |
        Body for `POST /v1/authz/check`. Triple addressing
        `(subject, relation, resource)` mirrors the canonical ReBAC
        tuple shape; an optional `caveat_context` carries the field
        NAMES the caveat program reads — never values.
      required:
        - subject
        - relation
        - resource
      properties:
        subject:
          type: string
          minLength: 1
          description: |
            Object reference of the subject performing the check
            (e.g. `user:0190a8b8-...`, `service-identity:...`).
        relation:
          type: string
          minLength: 1
          description: |
            Relation name to evaluate (e.g. `read`, `manage`,
            `maintainer`). The accepted set is fixed by the schema in
            `schema/authz.zed`.
        resource:
          type: string
          minLength: 1
          description: |
            Object reference of the resource the relation is
            evaluated against (e.g. `project:0190a8b8-...`,
            `domain:...`).
        caveat_context:
          type: object
          additionalProperties: true
          description: |
            Optional set of caveat field NAMES the request makes
            available to the caveat program. Values are never carried
            across the contract boundary; the field type is `object`
            for forward-compatibility but the contract requires
            NAMES-only payloads.
    RebacCheckResponse:
      type: object
      description: |
        Result of `POST /v1/authz/check`. `decision` is the
        machine-readable outcome; `relation_path` is set only on
        `allowed`; `reason` is set only on `denied`. `correlation_id`
        is always set and pairs the response with the matching audit
        entry.
      required:
        - decision
        - correlation_id
      properties:
        decision:
          type: string
          enum:
            - allowed
            - denied
          description: |
            ReBAC decision. `allowed` is the affirmative outcome;
            `denied` is a policy denial — NEVER an HTTP error.
        relation_path:
          type: array
          description: |
            Ordered sequence of relations the authorizer traversed
            while evaluating the Check. Set only when `decision` is
            `allowed`. Empty array when the decision was reached
            without a relation lookup (typically a direct-binding
            allowance).
          items:
            type: string
        reason:
          type: string
          enum:
            - granted
            - out_of_scope
            - insufficient_relation
            - caveat_violation
            - unknown
          description: |
            Machine-readable denial reason. Set only when `decision`
            is `denied`. Values match `internal/audit.Reason.String`
            extended with `granted` (allowance bookkeeping) and
            `unknown` (defensive default the authorizer never emits
            on a happy path). `out_of_scope`, `insufficient_relation`,
            and `caveat_violation` mirror the `PermissionDenied.reason`
            enum used by the 403 surface elsewhere in this spec.
        correlation_id:
          type: string
          description: |
            Correlation id that pairs this decision with the matching
            audit entry emitted by `internal/audit`.
    LookupResourcesRequest:
      type: object
      description: |
        Body for `POST /v1/authz/lookup-resources`. Enumerates the
        resources of `resource_type` the `subject` can reach via
        `relation`. An optional `caveat_context` carries the field
        NAMES the caveat program reads — never values.
      required:
        - subject
        - relation
        - resource_type
      properties:
        subject:
          type: string
          minLength: 1
          description: |
            Object reference of the subject whose reachable resources
            are enumerated (e.g. `user:0190a8b8-...`,
            `service-identity:...`).
        relation:
          type: string
          minLength: 1
          description: |
            Relation name to evaluate (e.g. `read`, `manage`). The
            accepted set is fixed by the schema in `schema/authz.zed`.
        resource_type:
          type: string
          minLength: 1
          description: |
            Object type whose instances are enumerated (e.g.
            `project`, `domain`). Returned `items` are
            `<resource_type>:<id>` object references.
        caveat_context:
          type: object
          additionalProperties: true
          description: |
            Optional set of caveat field NAMES the request makes
            available to the caveat program. Values are never carried
            across the contract boundary; the field type is `object`
            for forward-compatibility but the contract requires
            NAMES-only payloads.
    LookupSubjectsRequest:
      type: object
      description: |
        Body for `POST /v1/authz/lookup-subjects`. The dual of
        `LookupResourcesRequest`: enumerates the subjects of
        `subject_type` that can reach `resource` via `relation`. An
        optional `caveat_context` carries the field NAMES the caveat
        program reads — never values.
      required:
        - subject_type
        - relation
        - resource
      properties:
        subject_type:
          type: string
          minLength: 1
          description: |
            Object type whose instances are enumerated (e.g. `user`,
            `service-identity`). Returned `items` are
            `<subject_type>:<id>` object references.
        relation:
          type: string
          minLength: 1
          description: |
            Relation name to evaluate (e.g. `read`, `manage`). The
            accepted set is fixed by the schema in `schema/authz.zed`.
        resource:
          type: string
          minLength: 1
          description: |
            Object reference of the resource whose authorised subjects
            are enumerated (e.g. `project:0190a8b8-...`, `domain:...`).
        caveat_context:
          type: object
          additionalProperties: true
          description: |
            Optional set of caveat field NAMES the request makes
            available to the caveat program. Values are never carried
            across the contract boundary; the field type is `object`
            for forward-compatibility but the contract requires
            NAMES-only payloads.
    RebacLookupResponse:
      type: object
      description: |
        Result of `POST /v1/authz/lookup-resources` and
        `POST /v1/authz/lookup-subjects`. `items` is the full
        materialised set of object references — an empty array is a
        normal answer, never an error. `correlation_id` pairs the
        result with the matching audit entry.
      required:
        - items
        - correlation_id
      properties:
        items:
          type: array
          description: |
            Full materialised set of object references the lookup
            resolved (`<type>:<id>`). Ordering is the authorizer's
            insertion order; callers that need a stable order MUST
            sort client-side.
          items:
            type: string
        correlation_id:
          type: string
          description: |
            Correlation id that pairs this lookup with the matching
            audit entry emitted by `internal/audit`.
    RelationTuple:
      type: object
      description: |
        Hydrated projection of a relation tuple aggregate. The shape
        is shared by `CreateRelationTuple`, `PatchRelationTuple`, and
        `ListRelationTuples` so clients only need one binding.
      required:
        - id
        - subject
        - relation
        - resource
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Relation tuple identifier (UUIDv7).
        subject:
          type: string
          description: Object reference of the subject side.
        relation:
          type: string
          description: Relation name (e.g. `maintainer`, `read`).
        resource:
          type: string
          description: Object reference of the resource side.
        caveat_context:
          type: object
          additionalProperties: true
          description: |
            Optional set of caveat field NAMES the tuple binds. NAMES
            only — values never cross the contract boundary.
        created_at:
          type: string
          format: date-time
          description: Aggregate creation timestamp (UTC).
    RelationTupleList:
      type: object
      description: |
        Page of relation tuples returned by
        `GET /v1/authz/relation-tuples`. Per-row visibility is layered
        on top of the persistence-level page so `items` is the subset
        the caller is authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RelationTuple"
          description: Relation tuples in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream. The encoding
            is HMAC-signed by the server so a tampered cursor surfaces
            as `400` on the next call.
    RelationTupleCreateRequest:
      type: object
      description: |
        Body for `POST /v1/authz/relation-tuples`. Field set mirrors
        the relation-tuple aggregate's `NewRelationTuple` invariants.
      required:
        - subject
        - relation
        - resource
      properties:
        subject:
          type: string
          minLength: 1
          description: Object reference of the subject side.
        relation:
          type: string
          minLength: 1
          description: Relation name.
        resource:
          type: string
          minLength: 1
          description: Object reference of the resource side.
        caveat_name:
          type: string
          description: |
            Optional caveat program name to attach to the tuple. When
            set, SpiceDB evaluates the caveat against the supplied
            `caveat_context` at every Check.
        caveat_context:
          type: object
          additionalProperties: true
          description: |
            Optional set of caveat field NAMES the tuple binds. NAMES
            only — values never cross the contract boundary.
    RelationTuplePatchRequest:
      type: object
      description: |
        Body for `PATCH /v1/authz/relation-tuples/{id}`. The handler
        implements Delete-then-Write semantics, so the body is the
        FULL replacement tuple — there are no partially-mutable
        fields.
      required:
        - subject
        - relation
        - resource
      properties:
        subject:
          type: string
          minLength: 1
          description: New object reference of the subject side.
        relation:
          type: string
          minLength: 1
          description: New relation name.
        resource:
          type: string
          minLength: 1
          description: New object reference of the resource side.
        caveat_name:
          type: string
          description: |
            Optional caveat program name to attach to the replacement
            tuple. When set, SpiceDB evaluates the caveat against the
            supplied `caveat_context` at every Check.
        caveat_context:
          type: object
          additionalProperties: true
          description: |
            Optional set of caveat field NAMES the new tuple binds.
            NAMES only — values never cross the contract boundary.
    # Feature: PX-0045, REQ-008 — `kind` and `name` are projected from
    # the Resource aggregate referenced by the Node row; the per-row
    # read in `GET /v1/nodes` does not yet join the resources table,
    # so until that join lands the fields are omitted from the wire
    # envelope rather than rendered as empty strings.
    NodeSummary:
      type: object
      description: |
        Hydrated summary projection of a Node aggregate. The shape is
        shared by `ListNodes`; richer per-Node read surfaces (events,
        state, heartbeat, reachability) live under
        `/v1/nodes/{id}/...`.

        `kind` and `name` are optional today: they are projected from
        the `Resource` aggregate the `Node` row references, and the
        per-row read in `GET /v1/nodes` does not yet join the
        `resources` table. Until that join lands the fields are
        omitted from the wire envelope; clients MUST treat them as
        absent rather than as empty strings.
      required:
        - id
        - domain_id
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Node identifier (UUIDv7).
        name:
          type: string
          description: |
            Human-readable Node name, sourced from the `Resource`
            aggregate the Node row references. Optional — see the
            schema-level note above for the deferred projection
            contract.
        domain_id:
          type: string
          format: uuid
          description: Parent Domain identifier (UUIDv7).
        kind:
          type: string
          description: |
            Node kind discriminator, sourced from the `Resource`
            aggregate the Node row references. Today the cluster
            recognises `vm`, `bridge`, and `worker`; the field is
            intentionally modelled as an open string rather than an
            enum so a future kind addition does not require a contract
            version bump. Optional — see the schema-level note above
            for the deferred projection contract.
          example: "bridge"
        created_at:
          type: string
          format: date-time
          description: Aggregate creation timestamp (UTC).
    NodeList:
      type: object
      description: |
        Page of Nodes returned by `GET /v1/nodes`. Per-row visibility
        is layered on top of the persistence-level page so `items` is
        the subset the caller is authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/NodeSummary"
          description: Nodes in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream. The encoding
            is HMAC-signed by the server so a tampered cursor surfaces
            as `400` on the next call.
    # traceability: PX-0063 — Policy aggregate, revisions, rules,
    # selectors, diff, dry-run, and request/response envelopes for the
    # network Policy editor. DECISION: rule address-family fields are
    # `source_cidr` / `destination_cidr` (CIDR prefixes) because the
    # domain model (internal/policy/rule.go) holds netip.Prefix
    # there; the per-Policy selector pair lives on `PolicyRevision`,
    # not on each `PolicyRule`. DECISION: `etag` is intentionally
    # omitted — optimistic concurrency rides on `expected_revision_id`
    # in `PolicyUpdateRequest`, matching the partial-unique head
    # invariant on the persistence side.
    Policy:
      type: object
      description: |
        Network Policy aggregate. Each Policy belongs to exactly one
        Project (the ReBAC parent), carries an append-only revision
        history, and has at any moment exactly one live head revision.
        The head pointer advances atomically inside the same
        transaction that lands a new revision; a concurrent PATCH that
        loses the partial-unique-head race surfaces as
        `409 revision_conflict`.
      required:
        - id
        - project_id
        - slug
        - head_revision_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Policy identifier (UUIDv7).
        project_id:
          type: string
          format: uuid
          description: Owning Project (UUIDv7).
        slug:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-z][a-z0-9-]*$"
          description: |
            Stable kebab-case handle for the Policy. Unique within the
            owning Project — a duplicate `(project_id, slug)` rejects
            with `409 policy_slug_taken`.
        display_name:
          type: string
          description: |
            Human-readable label. Optional — falls back to `slug` in
            renderings when empty.
        head_revision_id:
          type: string
          format: uuid
          description: |
            Identifier of the current head revision. Advances every
            PATCH inside the same transaction that inserts the new
            revision row.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          description: |
            Timestamp of the last head-revision advance. Equal to
            `created_at` on a freshly-created Policy.
        head:
          allOf:
            - $ref: "#/components/schemas/PolicyRevision"
          description: |
            Fully-hydrated head revision. Returned on `GET` of a single
            Policy; intentionally omitted from list entries to keep the
            page payload bounded — callers that need rule lists per row
            iterate the list and then `GET` each Policy.
    PolicyRevision:
      type: object
      description: |
        Append-only entry in a Policy's version history. Each PATCH on
        the parent Policy lands a new Revision row; the head pointer
        on the Policy aggregate advances atomically inside the same
        transaction.
      required:
        - id
        - policy_id
        - selector
        - rules
        - created_at
        - created_by
      properties:
        id:
          type: string
          format: uuid
          description: Revision identifier (UUIDv7).
        policy_id:
          type: string
          format: uuid
          description: Parent Policy identifier.
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Predecessor revision identifier. `null` on the initial
            revision of a fresh Policy; non-null on every subsequent
            revision.
        selector:
          $ref: "#/components/schemas/PolicySelector"
        rules:
          type: array
          maxItems: 1024
          items:
            $ref: "#/components/schemas/PolicyRule"
          description: |
            Ordered rule list at this revision. Capped at 1024 entries
            by the aggregate; the cap is mirrored as a CHECK constraint
            in the persistence layer so a wire-level oversize is
            rejected before it reaches the editor.
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
          description: |
            Identifier of the principal that authored the revision.
        correlation_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Upstream request correlation identifier propagated into the
            audit row and outbox event. `null` when the revision was
            authored outside an inbound HTTP request.
    PolicyRule:
      type: object
      description: |
        Single L3/L4 rule on a Policy revision. The five-tuple
        `(source_cidr, destination_cidr, protocol, ports, action)`
        describes which packets the rule governs and what verdict to
        apply. `ports` MUST be omitted for `icmp` and `any` and MUST
        be populated for `tcp` and `udp` — the protocol/port coherence
        check is enforced at the aggregate boundary.
      required:
        - action
        - protocol
        - source_cidr
        - destination_cidr
      properties:
        action:
          $ref: "#/components/schemas/PolicyAction"
        protocol:
          $ref: "#/components/schemas/PolicyProtocol"
        source_cidr:
          type: string
          description: |
            IPv4 or IPv6 prefix in CIDR notation (e.g. `10.0.0.0/8`,
            `2001:db8::/32`). Source and destination MUST agree on
            address family; a mismatch surfaces as
            `422 cidr_family_mismatch`.
        destination_cidr:
          type: string
          description: |
            IPv4 or IPv6 prefix in CIDR notation. Address family MUST
            match `source_cidr`.
        ports:
          $ref: "#/components/schemas/PolicyPortRange"
    PolicyAction:
      type: string
      enum:
        - allow
        - deny
        - log
      description: |
        Verdict pronounced on a matching packet. Closed set — values
        outside this enum reject at the aggregate boundary with
        `422 unknown_action`.
    PolicyProtocol:
      type: string
      enum:
        - tcp
        - udp
        - icmp
        - any
      description: |
        L3/L4 protocol the rule governs. L7-aware matching is out of
        scope by design. Closed set — values outside this enum reject
        with `422 unknown_protocol`. `icmp` and `any` MUST be paired
        with an absent `ports` field.
    PolicyPortRange:
      type: object
      description: |
        Inclusive `[from, to]` L4 port range. Required when the
        sibling `protocol` is `tcp` or `udp`; MUST be omitted for
        `icmp` and `any`. `from` MUST be ≤ `to` — an inverted range
        surfaces as `422 port_range_inverted`.
      required:
        - from
        - to
      properties:
        from:
          type: integer
          minimum: 1
          maximum: 65535
        to:
          type: integer
          minimum: 1
          maximum: 65535
    PolicySelector:
      type: object
      description: |
        Source / destination selector pair scoping the Policy to a
        subset of the Project's Nodes. The selector grammar is the
        same label-selector grammar exposed at
        `POST /v1/labels/selectors/preview` — `key=value`,
        `key in (a, b)`, `key`, `!key`, comma-separated AND. Empty
        source or destination rejects at the aggregate boundary with
        `422 selector_syntax_error`.
      required:
        - source
        - destination
      properties:
        source:
          type: string
          minLength: 1
          description: |
            Raw label-selector expression matching the originating
            side of governed traffic (e.g.
            `env=prod, role in (api, web)`).
        destination:
          type: string
          minLength: 1
          description: |
            Raw label-selector expression matching the terminating
            side of governed traffic.
    PolicyDiffPair:
      type: object
      description: |
        Before / after pair for a rule whose action flipped between
        two revisions. The pair shares a stable rule key
        `(source_cidr, destination_cidr, protocol, ports)`; only
        `action` differs.
      required:
        - before
        - after
      properties:
        before:
          $ref: "#/components/schemas/PolicyRule"
        after:
          $ref: "#/components/schemas/PolicyRule"
    PolicyDiff:
      type: object
      description: |
        Structural difference between two canonicalised Policy rule
        lists. Canonicalisation sorts the list into a deterministic
        order so a reorder-only edit produces empty `added`, `removed`,
        and `modified` arrays.
      required:
        - added
        - removed
        - modified
      properties:
        added:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRule"
          description: Rules present in the target revision but not the source.
        removed:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRule"
          description: Rules present in the source revision but not the target.
        modified:
          type: array
          items:
            $ref: "#/components/schemas/PolicyDiffPair"
          description: |
            Rules sharing a stable key on both sides where only the
            `action` field differs.
    PolicyDryRunRequest:
      type: object
      description: |
        Body for the Policy dry-run endpoint. Carries a candidate
        selector + rule list to evaluate against the current Project
        state. Evaluation is read-only — no rows are written, no
        events are emitted, and no audit entry is appended for the
        evaluation itself.
      required:
        - selector
        - rules
      properties:
        selector:
          $ref: "#/components/schemas/PolicySelector"
        rules:
          type: array
          minItems: 1
          maxItems: 1024
          items:
            $ref: "#/components/schemas/PolicyRule"
    PolicyDryRunResponse:
      type: object
      description: |
        Response for the Policy dry-run endpoint. Reports the Project
        Nodes the candidate selector matches, the structural diff
        against the Policy's current head revision, and the count of
        peer pairs whose connectivity verdict would change.
        `unreachable_node_ids` lists matched Nodes the calling subject
        cannot read — opaque identifiers only, never display names —
        so the editor can warn the operator about cross-references it
        cannot resolve.
      required:
        - matched_node_ids
        - rule_diff
        - peer_pairs_affected
        - unreachable_node_ids
      properties:
        matched_node_ids:
          type: array
          items:
            type: string
            format: uuid
        rule_diff:
          $ref: "#/components/schemas/PolicyDiff"
        peer_pairs_affected:
          type: integer
          minimum: 0
        unreachable_node_ids:
          type: array
          items:
            type: string
            format: uuid
    PolicyCreateRequest:
      type: object
      description: |
        Body for creating a Policy. Lands the Policy aggregate row and
        its initial revision in one transaction. The initial revision
        carries the supplied `selector` and `rules`; the head pointer
        is set to the new revision's identifier.
      required:
        - slug
        - selector
        - rules
      properties:
        slug:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-z][a-z0-9-]*$"
        display_name:
          type: string
        selector:
          $ref: "#/components/schemas/PolicySelector"
        rules:
          type: array
          minItems: 1
          maxItems: 1024
          items:
            $ref: "#/components/schemas/PolicyRule"
    PolicyUpdateRequest:
      type: object
      description: |
        Body for patching a Policy. Any field set lands a new revision
        carrying the updated values; unset fields inherit from the
        current head revision. `expected_revision_id` enables
        optimistic concurrency — a stale value loses the
        partial-unique-head race and surfaces as
        `409 revision_conflict`, giving the caller the opportunity to
        re-fetch the current head and rebase the edit.
      properties:
        display_name:
          type: string
        selector:
          $ref: "#/components/schemas/PolicySelector"
        rules:
          type: array
          minItems: 1
          maxItems: 1024
          items:
            $ref: "#/components/schemas/PolicyRule"
        expected_revision_id:
          type: string
          format: uuid
          description: |
            Revision identifier the client believes is current. When
            present, the PATCH only succeeds if the persisted head
            still matches; otherwise the call surfaces as
            `409 revision_conflict`.
    PolicyListResponse:
      type: object
      description: |
        Cursor-paginated page of Policies in a Project. Per-row
        visibility is layered on top of the persistence-level page so
        `items` is the subset the caller is authorised to see;
        `next_cursor` always reflects the persistence-level boundary,
        not the filtered count, so callers cannot infer the size of
        the hidden set from the cursor.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Policy"
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream.
    PolicyRevisionListResponse:
      type: object
      description: |
        Cursor-paginated page of revisions for a single Policy in
        descending `created_at` order so the most recent revision
        leads the page.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRevision"
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted
            when the iteration has reached end-of-stream.
    PlexdArtifact:
      type: object
      description: |
        One indexed plexd release line returned by `GetPlexdArtifact`.
        It carries the release `version`, every per-architecture build,
        the lifecycle `support_status`, and the `verdict` the
        supply-chain verification gate pronounced. The verbatim Sigstore
        bundle attesting each build is served separately by the
        `.sigstore` companion endpoint rather than inlined here.
      required:
        - version
        - support_status
        - verdict
        - architectures
      properties:
        version:
          type: string
          minLength: 1
          description: |
            Upstream plexd release tag the registry indexes (for example
            a semver tag such as `v1.4.2`).
        support_status:
          type: string
          enum:
            - supported
            - deprecated
            - withdrawn
          description: |
            Closed-set lifecycle status of the release line. `supported`
            is a fully supported, eligible upgrade target; `deprecated`
            still verifies and is served but operators should migrate
            off it; `withdrawn` is no longer a valid upgrade target. The
            wire values are intentionally lowercase and map onto the
            domain's support-status literals.
        verdict:
          type: string
          enum:
            - verified
            - unverified
          description: |
            Closed-set verification verdict the supply-chain gate
            pronounced on the release. `verified` means every artifact
            passed the Sigstore bundle and checksum verification gate;
            `unverified` marks a record that has not passed the gate and
            is never served as an eligible upgrade target.
        architectures:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PlexdArtifactArch"
          description: |
            The per-architecture builds of this release. At least one
            build is always present, and no two builds share an
            architecture.
    PlexdArtifactArch:
      type: object
      description: |
        One per-architecture build of a plexd release — its target
        architecture and the recorded SHA-256 checksum of the build's
        plexd binary.
      required:
        - architecture
        - checksum
      properties:
        architecture:
          type: string
          minLength: 1
          description: |
            Target CPU architecture of the build (for example `amd64` or
            `arm64`). The set is owned by the upstream release pipeline,
            not by plexsphere, so it is not constrained to a closed enum.
        checksum:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: |
            Recorded SHA-256 checksum of the build's plexd binary — the
            raw 32-byte digest, hex-encoded as 64 lowercase hex
            characters.
    # traceability: PX-0071 — Phase-3 capability inventory list schemas.
    CapabilityStatus:
      type: string
      enum:
        - match
        - drift
        - unknown
      # x-enum-varnames pins the generated Go constant names for this
      # enum. The value `unknown` already appears on AuditReason,
      # EndpointRequestNatType, and RebacCheckResponseReason, so without
      # an explicit pin oapi-codegen's "prefix only on collision"
      # heuristic could flip the generated constant form when a sibling
      # enum is added or removed. The explicit, document-unique names
      # keep this enum and its siblings stable (REQ-001, PX-0071).
      x-enum-varnames:
        - CapabilityStatusMatch
        - CapabilityStatusDrift
        - CapabilityStatusUnknown
      description: |
        Checksum status of a Node's reported agent binary against the
        known-good artifact set: `match` when the reported checksum
        equals a known-good artifact, `drift` when it differs, and
        `unknown` when no known-good artifact is on record.
    CapabilityRow:
      type: object
      description: |
        One per-Node capability inventory row returned by
        `ListCapabilities` — a metadata-only projection of the Node's
        reported capability manifest paired with its checksum status.
      required:
        - node_id
        - domain_id
        - binary_version
        - status
        - reported_at
      properties:
        node_id:
          type: string
          format: uuid
          description: Node the capability row describes (UUIDv7).
        domain_id:
          type: string
          format: uuid
          description: |
            Owning Domain (UUIDv7) — the residency pivot the per-row
            visibility filter authorises against.
        binary_version:
          type: string
          description: |
            Reported plexd agent version string of the Node's running
            binary.
        binary_checksum:
          type: string
          format: byte
          nullable: true
          description: |
            SHA-256 digest of the running binary, 32 bytes
            base64-encoded with standard padding. Absent when the Node
            has not yet reported a checksum.
        status:
          $ref: "#/components/schemas/CapabilityStatus"
        reported_at:
          type: string
          format: date-time
          description: |
            Timestamp at which the capability manifest snapshot was last
            reported (UTC).
    CapabilityRowList:
      type: object
      description: |
        Page of capability rows returned by `ListCapabilities`. Per-row
        visibility is layered on the persistence-level page so `items`
        is the subset the caller is authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CapabilityRow"
          description: Capability rows in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted when
            the iteration has reached end-of-stream. The encoding is
            HMAC-signed so a tampered cursor surfaces as `400` on the
            next call.
    # traceability: PX-0071 — Phase-3 integrity-violation triage list schemas.
    IntegrityViolationKind:
      type: string
      enum:
        - binary
        - hook
        - host_key
      # x-enum-varnames pins the generated Go constant names so these
      # operator-facing kind values stay stable regardless of sibling
      # enums (REQ-001, PX-0071).
      x-enum-varnames:
        - IntegrityViolationKindBinary
        - IntegrityViolationKindHook
        - IntegrityViolationKindHostKey
      description: |
        Artifact class an integrity violation applies to: `binary` for a
        mismatched agent-binary checksum, `hook` for a tampered hook
        payload, and `host_key` for a rotated SSH host key.
    IntegrityViolationStatus:
      type: string
      enum:
        - open
        - acknowledged
        - resolved
      # x-enum-varnames pins the generated Go constant names so these
      # lifecycle values stay stable regardless of sibling enums
      # (REQ-001, PX-0071).
      x-enum-varnames:
        - IntegrityViolationStatusOpen
        - IntegrityViolationStatusAcknowledged
        - IntegrityViolationStatusResolved
      description: |
        Triage lifecycle state of an integrity violation: `open` on
        intake, `acknowledged` once an operator records a reason, and
        `resolved` once the underlying divergence is cleared.
    IntegrityViolationRow:
      type: object
      description: |
        One integrity-violation row returned by
        `ListIntegrityViolations` — a metadata-only projection scoped to
        the owning Domain.
      required:
        - id
        - node_id
        - domain_id
        - kind
        - status
        - artifact_id
        - detected_at
      properties:
        id:
          type: string
          format: uuid
          description: Integrity-violation identifier (UUIDv7).
        node_id:
          type: string
          format: uuid
          description: Node that reported the violation (UUIDv7).
        domain_id:
          type: string
          format: uuid
          description: |
            Owning Domain (UUIDv7) — the residency pivot the per-row
            visibility filter authorises against.
        kind:
          $ref: "#/components/schemas/IntegrityViolationKind"
        status:
          $ref: "#/components/schemas/IntegrityViolationStatus"
        artifact_id:
          type: string
          description: |
            Stable identifier of the affected artifact (hook name,
            binary path label, or host-key file label).
        detected_at:
          type: string
          format: date-time
          description: Timestamp the agent detected the violation (UTC).
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp an operator acknowledged the violation (UTC).
            `null` or omitted while the violation is still `open`.
        acknowledged_by_subject:
          type: string
          nullable: true
          description: |
            Subject string of the operator that acknowledged the
            violation. `null` or omitted while the violation is still
            `open`.
        acknowledge_reason:
          type: string
          nullable: true
          description: |
            Free-text rationale recorded with the acknowledgement.
            `null` or omitted while the violation is still `open`.
    IntegrityViolationList:
      type: object
      description: |
        Page of integrity-violation rows returned by
        `ListIntegrityViolations`. Per-row visibility is layered on the
        persistence-level page so `items` is the subset the caller is
        authorised to see.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/IntegrityViolationRow"
          description: Integrity-violation rows in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted when
            the iteration has reached end-of-stream. The encoding is
            HMAC-signed so a tampered cursor surfaces as `400` on the
            next call.
