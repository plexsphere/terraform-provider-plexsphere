        - integrity
      parameters:
        - $ref: "#/components/parameters/IntegrityViolationID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrityViolationAcknowledgeRequest"
            example:
              reason: "Confirmed planned binary upgrade rolled out by the platform on-call"
      responses:
        "200":
          description: |
