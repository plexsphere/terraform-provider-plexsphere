            not satisfy the required ACR for this elevated action — the
            body carries the `acr_values` the caller must step up to.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to acknowledge integrity violations.
            Body is a `PermissionDenied` problem.
