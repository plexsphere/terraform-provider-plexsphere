    # traceability: PX-0071 — Phase-3 plexd artifact registry list schemas.
    PlexdArtifactRef:
      type: object
      description: |
        One indexed plexd release line returned by `ListPlexdArtifacts`
        — a list-row projection carrying the release version, the
        lifecycle support status, the supply-chain verdict, the
        per-architecture checksums, and the index timestamps. The
        verbatim Sigstore bundle is served separately by the per-version
        `.sigstore` endpoint rather than inlined here.
      required:
        - version
        - support_status
        - verdict
        - architectures
      properties:
        version:
          type: string
          minLength: 1
          description: Upstream plexd release tag the registry indexes.
        support_status:
          type: string
          enum:
            - supported
            - deprecated
            - withdrawn
          # x-enum-varnames pins the generated Go constant names. The
          # `supported`/`deprecated`/`withdrawn` values are shared with
          # the existing PlexdArtifact schema, whose constants generate
          # bare (Supported/Deprecated/Withdrawn); without an explicit
          # pin here, adding this second enum with the same values would
          # collide in oapi-codegen's "prefix only on collision"
          # heuristic and silently flip those existing bare constants,
          # breaking the artifacts handler. The distinct pinned names
          # keep this enum out of the bare-name pool (REQ-006, PX-0071).
          x-enum-varnames:
            - PlexdArtifactRefSupportStatusSupported
            - PlexdArtifactRefSupportStatusDeprecated
            - PlexdArtifactRefSupportStatusWithdrawn
          description: |
            Lifecycle status of the release line. `supported` is a fully
            supported, eligible upgrade target; `deprecated` still
            verifies but operators should migrate off it; `withdrawn` is
            no longer a valid upgrade target.
        verdict:
          type: string
          enum:
            - verified
            - unverified
          # x-enum-varnames pins these names for the same reason as
          # support_status above: the `verified`/`unverified` values are
          # shared with PlexdArtifact's bare constants (REQ-006,
          # PX-0071).
          x-enum-varnames:
            - PlexdArtifactRefVerdictVerified
            - PlexdArtifactRefVerdictUnverified
          description: |
            Supply-chain verification verdict. `verified` means every
            artifact passed the Sigstore bundle and checksum gate;
            `unverified` marks a record that has not passed the gate.
        architectures:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PlexdArtifactArch"
          description: |
            The per-architecture builds of this release with their
            recorded SHA-256 checksums.
        created_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp the registry first indexed this release line
            (UTC). Absent when the registry does not record it.
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp the registry last refreshed this release line
            (UTC). Absent when the registry does not record it.
    PlexdArtifactRefList:
      type: object
      description: |
        Page of indexed plexd releases returned by
        `ListPlexdArtifacts`.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PlexdArtifactRef"
          description: Indexed plexd releases in the current page.
        next_cursor:
          type: string
          nullable: true
          description: |
            Continuation token for the next page. `null` or omitted when
            the iteration has reached end-of-stream. The encoding is
            HMAC-signed so a tampered cursor surfaces as `400` on the
            next call.
    # traceability: PX-0072, S037 — Bridge Orchestrator request, response,
    # enum, and list schemas backing the four bridge path families.
    BridgeUserAccessProviderKind:
      type: string
      enum:
        - netbird
        - tailscale
        - wireguard
      # x-enum-varnames pins the generated Go constant names for this
      # enum. The value `wireguard` is shared with BridgeSiteToSiteTunnelKind,
      # so without an explicit pin oapi-codegen's "prefix only on collision"
      # heuristic could flip the generated constant form when a sibling enum
      # is added or removed. The explicit, type-name-prefixed names are
      # document-unique and keep both kinds stable (REQ-001, PX-0072).
      x-enum-varnames:
        - BridgeUserAccessProviderKindNetbird
        - BridgeUserAccessProviderKindTailscale
        - BridgeUserAccessProviderKindWireguard
      description: |
        User-access provider technology: `netbird`, `tailscale`, or
        `wireguard`. Selects the agent-side driver that programs the
        provider on the addressed Node.
    BridgeSiteToSiteTunnelKind:
      type: string
      enum:
        - wireguard
        - ipsec
        - openvpn
      # x-enum-varnames pins the generated Go constant names for this
      # enum. The value `wireguard` is shared with
      # BridgeUserAccessProviderKind, so the type-name prefix disambiguates
      # the two collision members and keeps oapi-codegen's "prefix only on
      # collision" heuristic from flipping either enum's constants
      # (REQ-001, PX-0072).
      x-enum-varnames:
        - BridgeSiteToSiteTunnelKindWireguard
        - BridgeSiteToSiteTunnelKindIpsec
        - BridgeSiteToSiteTunnelKindOpenvpn
      description: |
        Site-to-site tunnel technology: `wireguard`, `ipsec`, or
        `openvpn`. Selects the agent-side driver that establishes the
        tunnel to the remote endpoint.
    BridgeSiteToSiteTunnelRoutingPolicy:
      type: string
      enum:
        - bidirectional
        - ingress_only
        - egress_only
      # x-enum-varnames pins the generated Go constant names for this
      # enum. The members are document-unique, but the explicit pin keeps
      # the generated constants on their type-name-prefixed form so a
      # future sibling enum sharing a member cannot flip them through
      # oapi-codegen's "prefix only on collision" heuristic
      # (REQ-001, PX-0072).
      x-enum-varnames:
        - BridgeSiteToSiteTunnelRoutingPolicyBidirectional
        - BridgeSiteToSiteTunnelRoutingPolicyIngressOnly
        - BridgeSiteToSiteTunnelRoutingPolicyEgressOnly
      description: |
        Traffic direction the tunnel carries: `bidirectional` routes both
        ways, `ingress_only` admits remote-initiated traffic, and
        `egress_only` admits locally-initiated traffic.
    BridgeRelayConfigureRequest:
      type: object
      # DECISION: the relay PUT is last-writer-wins full-replace with no
      # optimistic-concurrency token — no `If-Match` header, no body
      # `revision` field. Alternative considered: a body `revision` /
      # `If-Match` precondition guarding the write. Rejected because the
      # BridgeRelay is a per-Resource singleton with no revision/version
      # column in the 0042 migration, and the service already
      # short-circuits an identical-config PUT as an idempotent no-op
      # (SameConfigAs). A concurrency token would invent a persistence
      # column the aggregate does not carry and guard a write that is
      # already idempotent. (REQ-017, PX-0072)
      description: |
        Full replacement of the per-Resource relay configuration. The
        relay is a singleton keyed on the Resource; this body replaces it
        wholesale (last-writer-wins). An identical-config PUT is an
        idempotent no-op.
      required:
        - enabled
        - listen_port
      properties:
        enabled:
          type: boolean
          description: |
            Whether the relay is active. A disabled relay keeps its
            configuration but programs no listener on the Node.
        listen_port:
          type: integer
          minimum: 1
          maximum: 65535
          description: |
            UDP port the relay listens on. Outside `1..65535` the write
            is rejected with `400 relay_port_out_of_range`.
    BridgeRelayResponse:
      type: object
      description: |
        Hydrated projection of the per-Resource relay singleton. Returned
        by `GetBridgeRelay` and `ConfigureBridgeRelay`.
      required:
