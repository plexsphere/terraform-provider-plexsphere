            (domain_id, issuer) pair.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    get:
      operationId: GetAdminIdPList
      summary: List IdP bindings (optionally filtered by Domain).
      tags:
        - admin
      parameters:
        - in: query
          name: domain_id
          required: false
          schema:
            type: string
            format: uuid
          description: Optional Domain filter.
      responses:
        "200":
          description: List of IdP bindings.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdPBindingResponse"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to read IdP bindings in the
            addressed Domain. Body is a `PermissionDenied` problem
            carrying the ReBAC denial `reason`, traversed
            `relation_path`, and the `correlation_id` that pairs with
            the audit entry.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/admin/idp/{id}:
    get:
      operationId: GetAdminIdPByID
      summary: Read an IdP binding by identifier.
      description: |
        Returns the persisted IdP binding aggregate identified by `id`
        . A 404 is returned with `binding-not-found`
        semantics when no binding with the given identifier exists or
        the caller may not observe it.
      tags:
        - admin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Binding identifier (UUIDv7).
      responses:
        "200":
          description: Binding found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdPBindingResponse"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to read the IdP binding. Body is a
            `PermissionDenied` problem carrying the ReBAC denial
            `reason`, traversed `relation_path`, and the
            `correlation_id` that pairs with the audit entry
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: Binding not found (`binding-not-found`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    delete:
      operationId: DeleteAdminIdPByID
      summary: Delete an IdP binding.
      tags:
        - admin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Binding identifier (UUIDv7).
      responses:
        "204":
          description: Binding deleted.
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to delete the IdP binding. Body is
            a `PermissionDenied` problem carrying the ReBAC denial
            `reason`, traversed `relation_path`, and the
            `correlation_id` that pairs with the audit entry
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: Binding not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    patch:
      operationId: PatchAdminIdP
      summary: Partially update an IdP binding.
      description: |
        Applies a partial update to the IdP binding aggregate identified
        by `id`. Only the fields present in
        the request body are mutated; omitted fields are left unchanged.
        The `status` field is intentionally NOT mutable through this
        endpoint — use `PATCH /v1/admin/idp/{id}/status` instead. The
        `domain_id` and `issuer` columns are NOT exposed by
        `IdPBindingPatchRequest`, so this operation cannot collide with
        the partial unique index `idp_bindings_active_domain_issuer_uq`.

        Concurrent PATCH callers are serialised via an optimistic-
        concurrency compare-and-swap on the binding's `version`
        column: each PATCH transaction reads the row under
        `SELECT... FOR UPDATE`, captures the version, and gates its
        UPDATE on `version = expected_version`. Two concurrent PATCHes
        therefore race deterministically — exactly ONE wins (response
        `200` with the new aggregate) and the loser receives a
        `409 binding-conflict` Problem so the client can refresh and
        retry against the post-winner state (,; review
        #1, comment 2).
      tags:
        - admin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Binding identifier (UUIDv7).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdPBindingPatchRequest"
      responses:
        "200":
          description: Binding updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdPBindingResponse"
        "400":
          description: |
            Invalid patch body — for example malformed JSON, an empty
            patch, or an unsupported `jit_policy` value.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to update the IdP binding. Body is
            a `PermissionDenied` problem carrying the ReBAC denial
            `reason`, traversed `relation_path`, and the
            `correlation_id` that pairs with the audit entry
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: Binding not found (`binding-not-found`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            Optimistic-concurrency conflict (`binding-conflict`). Two
            PATCH callers raced on the same binding: one committed first
            and bumped the row's `version`; this caller's UPDATE saw a
            stale expected version and matched zero rows. The client
            should re-read the binding (GET /v1/admin/idp/{id}) and
            re-apply the patch on top of the fresh aggregate.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/admin/idp/{id}/status:
    patch:
      operationId: PatchAdminIdPStatus
      summary: Activate or deactivate an IdP binding.
      description: |
        Toggles the `status` of the named binding between `active` and
        `deactivated`. The response echoes the full updated binding
        .
