          application/json:
            schema:
              $ref: "#/components/schemas/IdPBindingStatusRequest"
      responses:
        "200":
          description: Status updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdPBindingResponse"
        "400":
          description: Unsupported status value.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to toggle the IdP binding status.
            Body is a `PermissionDenied` problem carrying the ReBAC
            denial `reason`, traversed `relation_path`, and the
            `correlation_id` that pairs with the audit entry
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: Binding not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/admin/groups:
    post:
      operationId: PostAdminGroup
      summary: Create a Group within a Domain.
      description: |
        Creates a Group aggregate scoped to the supplied Domain
        . The aggregate enforces the source-specific
        invariant: `source=idp` requires both `idp_binding_id` and
        `idp_claim_value`; `source=manual` forbids them. Violations
        surface as a 400 Problem from validation, not as a SQL CHECK
        failure.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupRequest"
      responses:
        "201":
          description: Group created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "400":
          description: Invalid Group body or source/idp invariant violated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to manage Groups. Body is a
            `PermissionDenied` problem carrying the ReBAC denial
            `reason`, traversed `relation_path`, and the
            `correlation_id` that pairs with the audit entry
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "409":
          description: |
            Conflict — another Group with the same `(domain_id, slug)`
            pair already exists.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    get:
      operationId: GetAdminGroupList
