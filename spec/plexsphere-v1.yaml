  /v1/projects/{project_id}/resources/{resource_id}/bridge/ingress:
    post:
      operationId: CreateBridgeIngressRule
      summary: Create a bridge public-ingress rule.
      description: |
        Creates a public-ingress rule on the addressed bridge Resource.
        Rules are a many-aggregate keyed by `(resource_id, slug)` with an
        additional `(resource_id, sni_host)` uniqueness constraint. The
        handler runs the `manage` ReBAC check on the addressed Resource
        BEFORE any persistence write and refuses a non-bridge Resource
        with `409 resource_not_bridge`. A duplicate slug or `sni_host`
        surfaces as `409 slug_conflict`.
      tags:
        - bridge
      parameters:
        - $ref: "#/components/parameters/ResourceProjectID"
        - $ref: "#/components/parameters/BridgeResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BridgeIngressRuleCreateRequest"
            example:
              slug: "public-api"
              sni_host: "api.acme.example"
              target_node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0e3"
              target_port: 8443
              acme_account_ref: "secret:acme/field/acme-account"
      responses:
        "201":
          description: Public-ingress rule created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeIngressRuleResponse"
        "400":
          description: |
            Body rejected. Body is a `Problem` with `code` ∈
            { `relay_port_out_of_range`, `target_node_not_in_domain`,
            `invalid_body` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/target-node-not-in-domain"
                title: "Target Node Not In Domain"
                status: 400
                detail: "target_node_id resolves to a Node outside the bridge Resource's Domain"
                instance: "/v1/projects/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1/resources/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d2/bridge/ingress"
                code: "target_node_not_in_domain"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to manage the addressed Resource.
            Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            The addressed Resource was not found. Body is a `Problem`
            with `code: resource_not_found`. The bridge handler never
            resolves a parent Project, so `project_not_found` is not
            emitted on this surface.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            Body is a `Problem` with `code` ∈ { `resource_not_bridge`
            (the addressed Resource is not kind `bridge`), `slug_conflict`
            (a rule with the same slug or `sni_host` already exists on
            this Resource), `bridge_port_conflict` (the rule's
            `(target_node_id, target_port)` pair is already claimed by a
            sibling ingress rule within the bridge — refused by the
            cross-aggregate validator before persistence) }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/bridge-port-conflict"
                title: "Bridge Port Conflict"
                status: 409
                detail: "target_node_id 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0e3 target_port 8443 is already claimed by a sibling ingress rule within the bridge"
                instance: "/v1/projects/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1/resources/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d2/bridge/ingress"
                code: "bridge_port_conflict"
        "413":
          description: |
            Request body exceeded the bridge body ceiling.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: |
            The `acme_account_ref` names an ACME directory that is
            unreachable, returned a server error, timed out, or advertised
            a malformed directory document. Body is a `Problem` with
            `code: acme_directory_unreachable`. The request is well-formed
            but the certificate issuance the rule requires cannot be
            provisioned, so the cross-aggregate validator refuses it
            before persistence.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/acme-directory-unreachable"
                title: "ACME Directory Unreachable"
                status: 422
                detail: "the ACME directory for the configured acme_account_ref is unreachable"
                instance: "/v1/projects/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1/resources/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d2/bridge/ingress"
                code: "acme_directory_unreachable"
        "500":
          description: Internal server error.
          content:
