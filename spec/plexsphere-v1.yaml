          description: SpiceDB object type to filter on (e.g. `cloud`, `platform`).
        - in: query
          name: object_id
          required: false
          schema:
            type: string
          description: Opaque object identifier within `object_type`.
        - in: query
          name: reason
          required: false
          schema:
            $ref: "#/components/schemas/AuditReason"
          description: |
            Filter by ReBAC decision reason.
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive lower bound on `occurred_at` (RFC 3339).
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive upper bound on `occurred_at` (RFC 3339).
        - in: query
          name: correlation_id
          required: false
          schema:
            type: string
          description: Filter by inbound request correlation id.
      responses:
        "200":
          description: |
            Page of audit entries on the platform-residency chain.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEntryList"
        "400":
          description: |
            Invalid query parameter — typically a malformed cursor
            (`code: cursor_invalid`), a non-hex `subject`, or a `to`
            earlier than `from`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller lacks the `auditor` ReBAC relation on the platform
            object. Body is a `PermissionDenied` problem carrying the
            denial reason and traversed relation path.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "500":
          description: |
            Internal error: persistence-layer failure, authz-check
            crash, or canonical-encode crash on the read path. Body
            is a generic Problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: |
            Audit query subsystem not yet provisioned in this build —
            the composition root has not threaded the audit query
            service onto the handler. Body is a Problem with
            `code: audit_not_provisioned`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/platform/audit/entries/{seq}:
    get:
      operationId: GetPlatformAuditEntry
      summary: Read a single platform audit entry with its hash-chain proof.
      description: |
        Returns the audit entry at `seq` on the platform-residency
        chain, together with the forensic proof needed to recompute
        and verify the entry's hash off-line. The proof carries
        `prev_hash`, `entry_hash`, and the canonical bytes the chain
        hashed — `sha256(prev_hash || sha256(canonical_bytes))` is
        the computed `entry_hash`, and comparing it against the
        stored value pins divergence at the offending row.

        UNAUTHORISED READS COLLAPSE ONTO 404. Unlike
        ListPlatformAuditEntries and VerifyPlatformAuditChain, this
        surface deliberately maps a missing `auditor` relation to 404
        (not 403) so the response is byte-indistinguishable from "row
        does not exist". The seq id is monotonic from 1 — a 403 would
        otherwise leak chain length and let an attacker probe for the
        existence of arbitrary rows.
      tags:
        - audit
      parameters:
        - in: path
          name: seq
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
          description: |
            Monotonic sequence number assigned at append time.
            Sequences start at 1 (the genesis row) and never reset.
      responses:
        "200":
          description: |
            Audit entry plus the canonical-bytes proof needed to
            recompute its hash.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEntryProof"
        "400":
          description: |
            Invalid `seq` path parameter (e.g. `seq < 1`) or other
            client-side input fault.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: |
            No entry at this `seq`. Returned for unknown sequences
            AND for callers who lack the `auditor` ReBAC relation on
            the platform object — the unauthorised-read leg
            deliberately collapses onto 404 so the response is
            byte-indistinguishable from "row does not exist". See the
            operation description for the full probe-oracle rationale
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: |
            Internal error: persistence-layer failure, authz-check
            crash, or canonical-encode crash on the read path
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: |
            Audit chain store / authorizer not yet provisioned in
            this build. Body is a Problem with
            `code: audit_not_provisioned`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/platform/audit/verify:
    post:
      operationId: VerifyPlatformAuditChain
      summary: Verify the platform-residency hash chain or a segment of it.
      description: |
        Recomputes `sha256(prev_hash || sha256(canonical_bytes))` for
        every row in the requested segment of the platform-residency
        chain and reports the first divergence, if any. Omit both
        `from_seq` and `to_seq` to verify the full chain anchored at
        the genesis row (`seq=1`, `prev_hash` = 32 zero bytes);
        supply one or both to verify a bounded segment without paging
        the entire chain into memory.

        DIVERGENCE IS NOT AN ERROR. A tampered chain surfaces as
        `200 { ok: false, divergent_seq, expected_hash, observed_hash }`
        — the handler MUST NEVER return a 5xx for tampering. The 5xx
        channel is reserved for infrastructure faults (database
        unreachable, decode error on a malformed row); divergence is
        a finding the handler hands the operator alongside `200`. This
        distinction matters because divergence triggers an incident
        playbook while a 5xx triggers an oncall page.
      tags:
        - audit
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditChainVerifyRequest"
            example:
              from_seq: 1
              to_seq: 1000
      responses:
        "200":
          description: |
            Verifier completed. Inspect `ok` to decide whether the
            chain is healthy. On `ok: false`, `divergent_seq`,
            `expected_hash`, and `observed_hash` pin the offending
            row.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditChainVerifyResult"
        "400":
          description: |
            Invalid verify request (e.g. `to_seq` < `from_seq`,
            negative seq).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller lacks the `auditor` ReBAC relation on the platform
            object.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "500":
          description: |
            Internal error: persistence-layer failure, authz-check
            crash, or canonical-encode crash on the verifier path.
            DIVERGENCE IS NOT A 5xx — see the operation description
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: |
            Audit chain store / authorizer not yet provisioned in
            this build. Body is a Problem with
            `code: audit_not_provisioned`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/platform/audit/erase-identity:
    post:
      operationId: EraseIdentityFromPlatformAudit
      summary: Erase an identity's PII mapping from the platform audit log.
      description: |
        Right-to-erasure entry point. Drops the `audit_subject_pii`
        row for the platform-residency pseudonym derived from
        `identity_id`, then appends an `audit.erase-identity`
        self-audit entry to the platform-residency chain so the
        erasure event is itself auditable. The hash chain remains
        verifiable: rows reference the pseudonym, and the pseudonym is
        preserved — only the plaintext mapping is removed.

        The endpoint is IDEMPOTENT on `subject_pseudonym`. A second
        call after a successful erasure is a no-op on the
        `audit_subject_pii` table (the row is already gone) and may
        emit a second self-audit entry; callers MAY safely retry
        after a partial network failure. The 202 status reflects the
        idempotent contract: a successful erasure has been recorded,
        even if the underlying PII row was already absent.
      tags:
        - audit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditEraseIdentityRequest"
            example:
              identity_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0"
      responses:
        "202":
          description: |
            Erasure recorded (idempotent on `subject_pseudonym`). The
            response carries the platform-residency pseudonym derived
            from `identity_id` so operators can correlate the
            self-audit entry without re-deriving it.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEraseIdentityResponse"
              example:
                subject_pseudonym: "9f2c7c0d2a3a4b8d1e6c8a7f5b3d2e1c0a9b8c7d6e5f4a3b2c1d0e9f8a7b6c5d"
                erased_at: "2026-04-28T10:00:00Z"
        "400":
          description: |
            Invalid erase request (malformed `identity_id`,
            empty body).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller lacks the `manage` ReBAC permission on the platform
            object.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "500":
          description: |
            Internal error: persistence-layer failure, authz-check
            crash, or pseudonym derivation failure on the response
            leg.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: |
            Audit erase service / authorizer / pepper resolver not
            yet provisioned in this build. Body is a Problem with
            `code: audit_not_provisioned`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  # traceability: PX-0063 — Network Policy editor paths. Path-param
  # naming follows the spec-wide convention (snake_case `project_id`,
  # `policy_id`, `revision_id`). OperationIds use the spec's PascalCase
  # style (`ListPolicies`, `CreatePolicy`, …). Every mutating op
  # declares both a 403 PermissionDenied response and the standard
  # Problem responses; the integration test in
  # tests/integration/policy_openapi_lint_test.go pins the contract.
  /v1/projects/{project_id}/policies:
    get:
      operationId: ListPolicies
      summary: List Policies in a Project.
      description: |
        Returns Policies in the named Project in deterministic order
        with cursor pagination. Per-row visibility filtering layers on
        top of the persistence-level page so `items` is the subset the
        caller can read; `next_cursor` always reflects the
        persistence-level boundary so the hidden set cannot be sized
        from the cursor.
      tags:
        - policy
      parameters:
        - $ref: "#/components/parameters/PolicyProjectID"
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: |
            Opaque continuation token returned by a previous call's
            `next_cursor`.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: |
            Maximum number of items to return in a single page.
            Clamped to 200 server-side.
      responses:
        "200":
          description: Page of Policies.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyListResponse"
        "400":
          description: Invalid query parameters.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to list Policies in the target
            Project. Body is a `PermissionDenied` problem carrying the
            ReBAC denial `reason`, traversed `relation_path`, and
            `correlation_id` that pairs with the audit entry.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: Project not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    post:
      operationId: CreatePolicy
      summary: Create a Policy in a Project.
      description: |
        Creates a Policy and its initial revision in one transaction.
        The handler performs the dual ReBAC check (`policy#manage` on
        the to-be-created Policy through its parent Project, plus
        `project#operator` on the Project itself) and emits a single
        audit entry on the outcome. A duplicate `(project_id, slug)`
        surfaces as `409 policy_slug_taken`.
      tags:
        - policy
      parameters:
        - $ref: "#/components/parameters/PolicyProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyCreateRequest"
      responses:
        "201":
          description: |
            Policy created. The `Location` header points at the
            new aggregate's canonical resource.
          headers:
            Location:
              schema:
                type: string
              description: |
                Canonical URL of the newly-created Policy
                (`/v1/projects/{project_id}/policies/{policy_id}`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400":
          description: Invalid body.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller failed the dual ReBAC check. Body is a
            `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: Project not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            A Policy with the same `(project_id, slug)` already exists.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: |
            Aggregate invariant violated — unknown action, unknown
            protocol, CIDR family mismatch, inverted port range, empty
            selector, or rule-count out of range.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/projects/{project_id}/policies/{policy_id}:
    get:
      operationId: GetPolicy
      summary: Fetch a Policy with its head revision.
      description: |
        Returns the Policy and its fully-hydrated head revision (rule
        list and selector). The handler gates on `policy#read`.
      tags:
