                $ref: "#/components/schemas/ResourceList"
        "400":
          description: |
            Invalid query parameters — typically a malformed Project
            id, a tampered or malformed cursor, or an out-of-range
            `limit`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to observe the parent Project
            (body is a `PermissionDenied` problem) OR the pagination
            cursor was minted by a different caller and the
            per-(caller, pepper) HMAC binding rejected the replay
            (body is a `Problem` with `code = cursor_binding_mismatch`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "500":
          description: Internal server error.
