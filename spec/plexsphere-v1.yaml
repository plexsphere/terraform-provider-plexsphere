# Feature: PX-0002 — S002 OpenAPI-first contract.
# Feature: PX-0008 — identity model with per-domain OIDC bindings.
# See docs/contributing/openapi.md for authoring rules.
#
# DECISION: No `servers` block is specified here. Server URLs are
# environment-dependent (dev, staging, prod, on-prem tenants) and are
# layered in by the deployment manifests that consume this spec, so
# baking them into the contract would be misleading rather than helpful.
# DECISION: Problem responses use `application/problem+json` per RFC 9457
# so error payloads are machine-distinguishable from successful bodies.
openapi: 3.1.0
info:
  title: plexsphere API
  version: v1
  description: |
    HTTP contract for plexsphere's meta endpoints (health, version,
    self-describing OpenAPI), the identity sign-in / token endpoints
    , and the admin IdP-binding management
    surface. The specification is the single source of truth — server
    stubs, clients, and documentation are generated from this file
    .

    CSRF defence-in-depth (issue #181): every state-changing
    cookie-authenticated `/v1/*` request (`POST`, `PATCH`, `PUT`,
    `DELETE`) is required to carry both an Origin / Sec-Fetch-Site
    signal AND echo the `plexsphere_csrf` cookie value in the
    `X-Plexsphere-CSRF` header. Violations surface as
    `403 application/problem+json` with `code` ∈
    { `csrf-token-mismatch`, `csrf-origin-mismatch`,
    `csrf-origin-not-configured` }. Bearer-authenticated requests
    (`Authorization: Bearer …`) are exempt because the bearer scheme
    is not auto-attached by browsers; the sign-in surface
    (`/v1/auth/*`) is exempt because it cannot carry a Principal yet.
  license:
    # DECISION: Both `name` and `identifier` (SPDX) are declared. Per the
    # OpenAPI 3.1 License Object, `identifier` is mutually exclusive only
    # with `url` (unset here), so it coexists with `name`. The earlier
    # `name`-only form was rejected because strict validators
    # (`openapi-generator validate`) treat a missing
    # `info.license.identifier` as a hard error; kin-openapi >= 0.136.0
    # parses the SPDX `identifier` as a first-class 3.1 field, so the
    # workspace validation gate accepts the pair as well.
    name: BUSL-1.1
    identifier: BUSL-1.1
tags:
  - name: meta
    description: Liveness, build-info, and self-description endpoints.
  - name: artifacts
    description: |
      plexd release registry surface. Operators read one indexed plexd
      release line by version — its per-architecture builds, recorded
      SHA-256 checksums, lifecycle support status, and the verification
      verdict the supply-chain gate pronounced — and fetch the verbatim
      upstream Sigstore bundle so the attestation can be re-verified
      independently with cosign or sigstore-go. The surface is
      read-only: indexing happens out of band against the upstream OCI
      release stream.
  - name: auth
    description: |
      Identity sign-in, OIDC callback, device-code, service-identity,
      API-token, and whoami endpoints.
  - name: admin
    description: |
      Administrative surface for managing IdP bindings per Domain
      .
  - name: labels
    description: |
      Label Definitions, Assignments, and selector preview surface
      . Every mutating endpoint
      performs the dual ReBAC check (manage/assign on the Definition's
      scope-object and maintainer on the target object); denials
      surface as `application/problem+json` with the
      `PermissionDenied` schema.
  - name: bootstrap-tokens
    description: |
      BootstrapToken administration surface for issuing, listing,
      inspecting, and revoking the one-shot bearer credentials that
      Nodes and Bridges redeem at provisioning time. Every issuance returns the plaintext token
      exactly once — the plaintext is never re-fetchable — and each
      revocation closes the redemption window with the consumed-or-
      already-revoked race surfacing as 409.
  - name: mesh
    description: |
      Plexsphere mesh / signed event bus. Per-Node SSE replay surface
      backed by JetStream, carrying canonical signed `Envelope`
      records.
  - name: audit
    description: |
      Platform Audit Log surface — read, prove, verify, and erase rows
      on the per-Domain hash-chained audit log. Every read is gated by the
      `auditor` ReBAC relation on the addressed Domain; every
      `caveat_context` carries NAMES only — values never cross a
      contract boundary. Verification is a non-fatal finding:
      tampering surfaces as `200 { ok: false }`, never as a 5xx
      .
  - name: tenancy
    description: |
      Tenancy Domain administration surface.
      Operators create, list, inspect, patch, and delete `Domain`
      aggregates — the top-level tenancy boundary every Project, Group,
      Identity, IdP binding, and Node hangs off. The Domain `slug` is
      INTENTIONALLY immutable (it is the URL handle exported into
      cached dashboard links and outbox projections); the `PatchDomain`
      body therefore omits `slug` and the handler rejects any client
      that sneaks a `slug` field through with `400 slug_immutable`.
      `DeleteDomain` enforces an empty-aggregate guard — at least one
      child Project, Group, Identity, IdP binding, or Node forces a
      `409 domain_not_empty` carrying the structured `DomainChildCounts`
      detail so the operator knows exactly which sub-aggregate is still
      attached. The mesh-pool retarget on `PatchDomain` runs an extra
      service-level containment guard against
      `project_mesh_ip_reservations.sub_range`; a retarget that would
      orphan an existing reservation surfaces as
      `422 mesh_cidr_invalidates_subrange` with the offending
      `project_id` in the Problem detail.
  - name: authz
    description: |
      ReBAC permission checks and relation-tuple administration.
      Denials are data, not transport errors: `POST /v1/authz/check`
      returns `200` with `decision: denied` and a machine-readable
      reason rather than `403`, so callers can branch on the body
      without conflating policy denials with infrastructure failures.
      Mutations on the relation-tuple surface
      emit audit rows on the per-Domain hash-chained log; the
      `caveat_context` field carries field NAMES only — values never
      cross a contract boundary, mirroring the audit constraint.
  - name: approvals
    description: |
      Dual-control approval queue. A proposed action is recorded as an
      `Approval` and, when the owning Domain's `ApprovalPolicy` matches
      the proposed `action_kind` / `target_resource`, the proposal is
      gated into the `pending-approval` state to await an operator
      decision; an empty policy gates nothing and the proposal is
      approved in place. Operators approve or reject a pending proposal;
      a rejection records a mandatory rationale on the decision. The
      emergency break-glass override forces a pending proposal to
      `approved` without a second-party decision and requires the caller
      to hold the `domain#emergency_approver` relation on the owning
      Domain — the ordinary `approve` relation is not sufficient. A
      caller may never approve a proposal they themselves raised:
      self-approval is rejected with `403 self_approval_denied`. The
      break-glass `reason` is an emergency-justification string recorded
      by NAME only on the decision's audit `caveat_context` — the value
      itself is PII and never crosses the contract boundary.
  - name: nodes
    description: |
      Node aggregates (VM/Bridge/Worker) the cluster knows about.
      Per-row authz read filter; cursor pagination identical to
      /v1/projects.
  - name: cloud
    description: |
      Cloud Inventory administration surface.
      Operators create, list, inspect, patch, and delete `Cloud`
      aggregates — one row per upstream cloud-provider account that
      every CloudCredential, downstream provisioning job, and
      Cloud-Inventory dashboard row hangs off. Both the Cloud `slug`
      AND `provider` are INTENTIONALLY immutable: the slug is the URL
      handle exported into cached dashboard links and outbox
      projections, the provider is the validator-routing key for the
      per-provider validator family — changing either would silently
      break references or invalidate every previously-stored endpoint
      blob. The `PatchCloud` body therefore omits both fields and the
      handler rejects any client that sneaks a `slug` field through
      with `400 slug_immutable` or a `provider` field with
      `400 provider_immutable`. `DeleteCloud` enforces an empty-
      aggregate guard — at least one child `CloudCredential` forces a
      `409 cloud_not_empty` carrying the structured `CloudChildCounts`
      detail so the operator knows how many credentials are still
      attached. The per-provider validator runs at decode time on
      `endpoint` / `region_defaults` and surfaces field-level
      rejections as `400 invalid_cloud_endpoint` /
      `400 invalid_cloud_region_defaults`.
  - name: management-fleet
    description: |
      Management Fleet operator surface. The fleet is the set of
      registered management clusters every Project's namespace is
      placed onto by the internal reconciliation loop. Operators
      register a cluster, list the fleet, inspect one cluster and its
      Project assignments, look up a single Project's assignment, and
      request teardown of a Project's namespace. Assignment CREATION
      and re-pointing stay reconciliation/broker-only — the
      assignment-immutability invariant (a Project that already owns
      provisioned resources cannot be re-pointed to a different
      cluster) is enforced inside the domain and is NOT exposed as an
      API mutation. The only assignment mutation on this surface is
      `TerminateProjectManagementClusterAssignment`, which advances the
      namespace lifecycle phase to `Terminating` and is idempotent. All
      reads project a metadata-only shape; no kubeconfig material is
      ever exposed.
  - name: provisioning-credentials
    description: |
      OpenBao Credential Broker operator surface. Every credential is
      project-scoped secret material the broker materialises into
      OpenBao KV-v2 and projects into the platform through the
      transactional outbox. Operators list a Project's credentials,
      inspect one credential's lifecycle metadata, revoke a
      credential, and rotate its underlying secret. Issuance stays
      Custodian-only — there is deliberately NO HTTP issue path. Every
      read projects a metadata-only shape: the KV mount, KV path, KV
      version, and every byte of secret material are structurally
      absent because surfacing the storage location would widen the
      credential's blast radius. Secret material is accepted INBOUND
      on `RotateCredential` but is NEVER returned. The Custodian
      remains the only mutation entry point and the fail-closed
      Domain-resolution posture (a Project that cannot be mapped onto
      a Domain is refused before any KV-v2 write) is preserved
      end-to-end.
  - name: blueprint
    description: |
      Read-only Blueprint Catalog surface — list the catalogue and
      fetch a single Blueprint with its versions and typed parameter
      schemas. Every read is gated by the `blueprint#user` ReBAC
      relation, checked before the persistence read so an unauthorised
      caller never observes catalogue existence.
  - name: resource
    description: |
      Tenancy Resource surface — create a Resource (adopted or
      broker-provisioned), list a Project's Resources, read a single
      Resource with its provisioning phase, and delete a Resource.
      Mutations are gated by the Project `deploy` ReBAC relation; the
      provisioned flow additionally requires the `cloud_credential#uses`
      relation on the named Cloud Credential.
  # traceability: PX-0063 — Network Policy editor surface.
  - name: policy
    description: |
      Network Policy authoring surface. Operators create, list,
      inspect, patch, and delete Policies inside a Project; each
      mutating call lands a new append-only revision and advances the
      head pointer atomically. The `dry-run` endpoint evaluates a
      candidate ruleset against the current Project state without
      writing rows or emitting events. The `diff` endpoint reports the
      structural difference between two canonicalised revisions —
      reorder-only edits canonicalise to empty diffs. Every mutating
      endpoint performs a dual ReBAC check (`policy#manage` or
      `policy#edit` on the Policy plus `project#operator` on the
      parent Project); denials surface as `application/problem+json`
      with the `PermissionDenied` schema.
  # traceability: PX-0071 — Phase-3 capability inventory read surface.
  - name: capabilities
    description: |
      Operator-facing capability inventory. Lists the per-Node
      capability manifest snapshots the agents reported and classifies
      each Node's running binary against the known-good artifact set as
      a match, a drift, or an unknown release. Read-only — the manifest
      itself is ingested on the per-Node mesh surface.
  # traceability: PX-0071 — Phase-3 integrity-violation triage read surface.
  - name: integrity
    description: |
      Operator-facing integrity-violation triage. Lists the
      tamper-evidence violations the agents reported — mismatched binary
      checksums, tampered hooks, and rotated host keys — and supports
      acknowledging a violation with a recorded reason. Scoped per
      owning Domain.
  # traceability: PX-0071 — Phase-3 discovered-hook catalog read surface.
  - name: hooks
    description: |
      Operator-facing discovered-hook catalog. Lists the Kubernetes hook
      custom resources the agents discovered in their clusters and flags
      whether each discovered image digest matches the declared one.
      Strictly read-only — plexsphere never writes hook objects back
      into customer clusters.
  # traceability: PX-0072, S037 — Bridge Orchestrator surface tag.
  - name: bridge
    description: |
      Bridge Orchestrator — per-Resource relay, user-access providers,
      public ingress rules, and site-to-site tunnels for a Resource of
      kind bridge. Every mutating operation runs a ReBAC manage check on
      the addressed Resource and refuses a non-bridge Resource.
  # traceability: PX-0076, S052 — Action Orchestrator surface tag.
  - name: actions
    description: |
      Action Orchestrator — dispatches a built-in action or a hook to a
      single Node or a label-selected cohort, then settles per-Node
      invocations as the agents report status back over the NSK-
      authenticated callback. The operator-facing dispatch and read
      operations are scoped per Project; the result callback is a per-Node
      surface authenticated by the Node Secret Key.
  - name: access
    description: |
      Access Orchestrator — issues short-lived, session-scoped EdDSA JWTs
      for the three mediated-access kinds (`ssh`, `k8s`, `tcp`), gates each
      issuance on a per-Resource ReBAC check and an optional fresh step-up,
      enforces per-Domain TTL / idle / concurrency / rate limits, and fans
      an instant-revocation event out over the Signed Event Bus. The
      operator-facing issue, list, read, and revoke operations are scoped
      per Project; the per-Node session callback is authenticated by the
      Node Secret Key. The signed token is delivered exactly once, on
      issuance — the list and read projections are metadata-only and never
      re-expose it.
  # traceability: PX-0082, S057 — operator-facing Secret Store inventory tag.
  - name: secrets
    description: |
      Secret Store inventory — the operator-facing, read-only listing of the
      secret names and current versions a Project exposes. The projection is
      metadata-only and never carries a secret value, an OpenBao path, or any
      wrapping material; the node-facing rewrap proxy that serves the actual
      ciphertext lives on the `mesh` surface. Every inventory read runs a
      ReBAC check on the owning Project before any persistence read.
paths:
  /v1/health:
    get:
      operationId: GetHealth
      summary: Report the process health and sub-component checks.
      tags:
        - meta
      responses:
        "200":
          description: Current health snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok
                checks:
                  - name: database
                    status: ok
                    detail: "postgres reachable in 3ms"
                  - name: bridge
                    status: ok
                    detail: "last heartbeat 1s ago"
        "404":
          description: Endpoint not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/not-found"
                title: "Not Found"
                status: 404
                detail: "No route matched GET /v1/health-typo"
                instance: "/v1/health-typo"
        "500":
          description: Internal server error while computing health.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/internal"
                title: "Internal Server Error"
                status: 500
                detail: "health probe panicked"
                instance: "/v1/health"
  /v1/version:
    get:
      operationId: GetVersion
      summary: Return build metadata for the running binary.
      tags:
        - meta
      responses:
        "200":
          description: Build metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"
              example:
                version: "v0.1.0"
                commit: "fdfb5ba9c1"
                date: "2026-04-19T12:00:00Z"
        "404":
          description: Endpoint not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/not-found"
                title: "Not Found"
                status: 404
                detail: "No route matched GET /v1/versiom"
                instance: "/v1/versiom"
        "500":
          description: Internal server error reading build metadata.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/internal"
                title: "Internal Server Error"
                status: 500
                detail: "build metadata unavailable"
                instance: "/v1/version"
  /v1/openapi.json:
    get:
      operationId: GetOpenAPI
      summary: Serve the live OpenAPI document describing this API.
      tags:
        - meta
      responses:
        "200":
          description: The OpenAPI document as JSON.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: |
                  Free-form OpenAPI document. Clients that need a typed
                  view should fetch the YAML artifact at
                  api/openapi/plexsphere-v1.yaml instead.
              example:
                openapi: "3.1.0"
                info:
                  title: "plexsphere API"
                  version: "v1"
        "404":
          description: Endpoint not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/not-found"
                title: "Not Found"
                status: 404
                detail: "No route matched GET /v1/openapi.yml"
                instance: "/v1/openapi.yml"
        "500":
          description: Internal server error rendering the spec.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/internal"
                title: "Internal Server Error"
                status: 500
                detail: "failed to marshal OpenAPI document"
                instance: "/v1/openapi.json"
  /v1/docs:
    get:
      operationId: GetDocs
      summary: Serve the embedded ReDoc UI for the v1 OpenAPI document.
      description: |
        Returns the self-contained HTML page that bootstraps the ReDoc
        renderer against `/v1/openapi.json`.
        The bundle is vendored into the binary so the documentation UI
        works in air-gapped deployments without reaching out to a CDN.
      tags:
        - meta
      responses:
        "200":
          description: ReDoc HTML shell.
          content:
            text/html:
              schema:
                type: string
                description: |
                  Self-contained HTML document that loads the vendored
                  ReDoc bundle from `/v1/docs/assets/{asset}` and points
                  it at `/v1/openapi.json`.
        "404":
          description: Endpoint not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/not-found"
                title: "Not Found"
                status: 404
                detail: "No route matched GET /v1/doc"
                instance: "/v1/doc"
        "500":
          description: Internal server error rendering the docs shell.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/internal"
                title: "Internal Server Error"
                status: 500
                detail: "failed to render embedded ReDoc shell"
                instance: "/v1/docs"
  /v1/docs/assets/{asset}:
    get:
      operationId: GetDocsAsset
      summary: Serve a vendored ReDoc bundle asset.
      description: |
        Serves the requested asset from the vendored ReDoc bundle that
        backs the embedded UI at `/v1/docs`.
        The handler restricts the `asset` parameter to the bundle's
        allow-list so the endpoint cannot be used as a generic file
        server.
      tags:
        - meta
      parameters:
        - in: path
          name: asset
          required: true
          schema:
            type: string
          description: |
            Bundle asset filename (e.g. the ReDoc standalone JavaScript
            bundle). The handler matches the value against the vendored
            allow-list and returns 404 for anything outside it.
      responses:
        "200":
          description: ReDoc bundle asset.
          content:
            application/javascript:
              schema:
                type: string
                description: |
                  Raw JavaScript bundle bytes from the vendored ReDoc
                  distribution.
        "404":
          description: Asset not found in the vendored bundle.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/not-found"
                title: "Not Found"
                status: 404
                detail: "No vendored ReDoc asset named redoc.unknown.js"
                instance: "/v1/docs/assets/redoc.unknown.js"
        "500":
          description: Internal server error reading the bundle asset.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/internal"
                title: "Internal Server Error"
                status: 500
                detail: "failed to read vendored ReDoc asset"
                instance: "/v1/docs/assets/redoc.standalone.js"
  # traceability: PX-0071 — Phase-3 plexd artifact registry list surface.
  /v1/artifacts/plexd:
    get:
      operationId: ListPlexdArtifacts
      summary: List indexed plexd releases.
      description: |
        Returns a cursor-paginated page of indexed plexd release lines —
        each with its lifecycle support status, the supply-chain
        verification verdict, the per-architecture checksums, and the
        index timestamps. The registry is platform-global; the handler
        runs the platform read gate before the persistence read.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`,
        and `limit` is clamped to `[1, 200]` rather than rejected.
      tags:
        - artifacts
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: |
            Opaque continuation token returned by a previous call's
            `next_cursor`. The encoding is HMAC-signed by the server so
            a tampered cursor surfaces as `400`.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: |
            Maximum number of items to return in a single page. The
            handler clamps the value to [1, 200] before forwarding it to
            the read service.
      responses:
        "200":
          description: Page of indexed plexd releases.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlexdArtifactRefList"
              example:
                items:
                  - version: "v1.4.2"
                    support_status: "supported"
                    verdict: "verified"
                    architectures:
                      - architecture: "amd64"
                        checksum: "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8"
                      - architecture: "arm64"
                        checksum: "6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b"
                next_cursor: null
        "400":
          description: |
            Invalid query parameters — typically a tampered or malformed
            cursor or an out-of-range `limit`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to read the artifact registry (body
            is a `PermissionDenied` problem) OR the pagination cursor was
            minted by a different caller and the per-(caller, pepper)
            HMAC binding rejected the replay (body is a `Problem` with
            `code = cursor_binding_mismatch`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/artifacts/plexd/{version}:
    get:
      operationId: GetPlexdArtifact
      summary: Fetch one indexed plexd release by version.
      description: |
        Returns the indexed plexd release line identified by `{version}`
        — every per-architecture build with its recorded SHA-256
        checksum, the lifecycle `support_status`, and the `verdict` the
        supply-chain verification gate pronounced. The record is
        read-only; indexing happens out of band against the upstream OCI
        release stream. A version that has never been indexed surfaces as
        `404 release_not_found`.

        The verbatim Sigstore bundle attesting each build is NOT inlined
        in this record; fetch it from the `{version}/sigstore` companion
        endpoint so an operator can re-verify the attestation independently.
      tags:
        - artifacts
      parameters:
        - $ref: "#/components/parameters/ArtifactVersion"
        - $ref: "#/components/parameters/Authorization"
      responses:
        "200":
          description: plexd release found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlexdArtifact"
              example:
                version: "v1.4.2"
                support_status: "supported"
                verdict: "verified"
                architectures:
                  - architecture: "amd64"
                    checksum: "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8"
                  - architecture: "arm64"
                    checksum: "6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: |
            plexd release not found. Body is a `Problem` with
            `code: release_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/release-not-found"
                title: "Release Not Found"
                status: 404
                detail: "no indexed plexd release with version v1.4.2"
                instance: "/v1/artifacts/plexd/v1.4.2"
                code: "release_not_found"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/artifacts/plexd/{version}/sigstore:
    get:
      operationId: GetPlexdArtifactSignature
      summary: Fetch the verbatim Sigstore bundle for a plexd release.
      description: |
        Returns the raw, verbatim upstream Sigstore bundle the registry
        cached for the plexd release identified by `{version}`, served
        back byte-for-byte as `application/octet-stream`. The bundle is
        the canonical keyless attestation an operator re-verifies
        independently — pipe it into `cosign verify-blob` or a
        `sigstore-go` verifier against the pinned release-signing
        identity to confirm the build provenance without trusting this
        server. A version that has never been indexed, or whose cached
        bundle is absent, surfaces as `404 release_not_found`.
      tags:
        - artifacts
      parameters:
        - $ref: "#/components/parameters/ArtifactVersion"
        - $ref: "#/components/parameters/Authorization"
      responses:
        "200":
          description: |
            The verbatim Sigstore bundle bytes for the addressed release.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: |
            plexd release or its cached Sigstore bundle not found. Body
            is a `Problem` with `code: release_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/release-not-found"
                title: "Release Not Found"
                status: 404
                detail: "no indexed plexd release with version v1.4.2"
                instance: "/v1/artifacts/plexd/v1.4.2/sigstore"
                code: "release_not_found"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/auth/sign-in:
    post:
      operationId: PostAuthSignIn
      summary: Initiate an end-user OIDC sign-in (authorization code + PKCE).
      description: |
        Starts the OIDC authorization-code + PKCE flow against the
        resolved per-Domain IdP binding. Returns the
        authorization URL the caller should redirect to plus the opaque
        state/code-verifier handle that /v1/auth/callback consumes to
        finish the exchange.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInRequest"
      responses:
        "200":
          description: Authorization URL and opaque handles to complete the flow.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignInResponse"
        "400":
          description: Invalid request body (missing domain / binding resolution failed).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: No active IdP binding found for the requested Domain.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error while preparing the flow.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/auth/callback:
    get:
      operationId: GetAuthCallback
      summary: OIDC redirect callback — exchanges `code` for a session.
      description: |
        Receives the OIDC redirect after the end user completes sign-in
        at the IdP. Validates `state` and `nonce`, exchanges the
        authorization code for tokens, provisions/updates the user via
        the JIT policy, issues a plexsphere session
        cookie, and 303 See Other-redirects the browser to the SPA root
        (`/`). The endpoint is invoked exclusively via top-level
        browser navigation per RFC 6749 §4.1.2; clients that need a
        machine-readable session shape should call `GET
        /v1/auth/whoami` once the session cookie is set
        .

        Failure responses are content-negotiated via the `Accept`
        request header:

        - **Browser-leg failure** — when `Accept` is absent, `*/*`, or
          includes `text/html`, the server responds with `303 See
          Other` to `/?auth_error_kind=...&auth_error_status=...&auth_error_detail=...`
          so the SPA can render the error inline next to the sign-in
          form. No session cookie is issued.
        - **JSON-leg failure** — when `Accept` includes
          `application/json` or `application/problem+json`, the server
          returns the original status (`400`, `500`, or `502`) with an
          `application/problem+json` body conforming to RFC 7807.
      tags:
        - auth
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
          description: Authorization code issued by the IdP.
        - in: query
          name: state
          required: true
          schema:
            type: string
          description: Opaque value used to correlate the redirect.
      responses:
        "303":
          description: |
            Session established; the response carries the
            `plexsphere_session` cookie and a `Location: /` redirect so
            the browser lands on the SPA root. The cookie is issued
            with `Path=/v1/`, `HttpOnly`, and `SameSite=Strict`; the
            `Secure` attribute is set when the request was served over
            TLS or when `X-Forwarded-Proto: https` was honoured via
            `PLEXSPHERE_AUTH_TRUST_PROXY_HEADERS`. The same status is
            also used for browser-leg failure redirects to
            `/?auth_error_kind=...&auth_error_status=...&auth_error_detail=...`,
            in which case no `Set-Cookie` is emitted.
          headers:
            Location:
              description: Absolute or root-relative URL the browser must follow.
              schema:
                type: string
                example: "/"
            Set-Cookie:
              description: Issues the `plexsphere_session` cookie (success path only).
              schema:
                type: string
        "400":
          description: |
            state/nonce mismatch, expired verifier, or token exchange
            rejected by the IdP. Returned only on the JSON-leg; the
            browser-leg surfaces this as a 303 redirect carrying
            `auth_error_kind` and `auth_error_status=400` query
            parameters.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: |
            Internal server error while completing the callback.
            Returned only on the JSON-leg; the browser-leg surfaces
            this as a 303 redirect carrying `auth_error_status=500`
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "502":
          description: |
            Upstream IdP failure during discovery, token exchange, or
            id_token verification. Returned only on the JSON-leg; the
            browser-leg surfaces this as a 303 redirect carrying
            `auth_error_status=502`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/auth/device-code:
    post:
      operationId: PostAuthDeviceCode
      summary: Initiate an RFC 8628 device-authorization flow.
      description: |
        Issues a `device_code` / `user_code` pair the CLI can present to
        the end user so they can authenticate in a browser on a second
        device (RFC 8628). The client then polls
        /v1/auth/device-token.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceCodeRequest"
      responses:
        "200":
          description: Device-code issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCodeResponse"
        "400":
          description: Invalid request body (missing domain or binding).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: No active IdP binding for the requested Domain.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/auth/device-token:
    post:
      operationId: PostAuthDeviceToken
      summary: Poll for the RFC 8628 device-authorization result.
      description: |
        Exchanges a `device_code` for an access token once the user has
        completed the browser flow. Errors use the RFC 8628 taxonomy
        (`authorization_pending`, `slow_down`, `access_denied`,
        `expired_token`, `invalid_grant`) surfaced in the Problem
        body's `code` field.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceTokenRequest"
      responses:
        "200":
          description: Access token issued; the flow is complete.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceTokenResponse"
        "400":
          description: |
            RFC 8628 error — Problem.code carries the taxonomy value
            (`authorization_pending`, `slow_down`, `access_denied`,
            `expired_token`, `invalid_grant`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/auth/device/approve:
    post:
      operationId: PostAuthDeviceApprove
      summary: Approve a pending RFC 8628 device-authorization session.
      description: |
        Flips a pending `DeviceSession` (looked up by the operator-typed
        `user_code`) to `status=approved` and pins the authenticated
        principal onto it so the next `POST /v1/auth/device-token` poll
        mints a token bound to that user.

        Authentication: requires the `plexsphere_session` cookie minted
        by the OIDC callback. The CSRF middleware additionally requires
        the `X-Plexsphere-CSRF` header to echo the `plexsphere_csrf`
        cookie value (issue #181).

        Errors use the RFC 8628-adjacent taxonomy in `Problem.code`:
        `device-code-not-found` (404 — unknown user_code),
        `device-code-expired` (409 — session past `expires_at`),
        `device-code-already-approved` (409 — already approved by an
        earlier request), `csrf-token-mismatch` /
        `csrf-origin-mismatch` (403 — see /v1/auth/sign-in for the
        taxonomy).
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceApproveRequest"
      responses:
        "200":
          description: Device session approved; the polling client now mints a token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceApproveResponse"
        "400":
          description: Invalid request body (missing or malformed user_code).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            CSRF check failed — Problem.code carries the
            `csrf-token-mismatch` / `csrf-origin-mismatch` /
            `csrf-origin-not-configured` taxonomy.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: |
            No device session matches the supplied `user_code`
            (Problem.code = `device-code-not-found`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            Session is already approved or expired
            (Problem.code = `device-code-already-approved` /
            `device-code-expired`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/auth/service/token:
    post:
      operationId: PostAuthServiceToken
      summary: Issue an access token for a ServiceIdentity.
      description: |
        Mints an access token for a registered ServiceIdentity using
        either `client_credentials` (RFC 6749 §4.4) or
        `urn:ietf:params:oauth:grant-type:jwt-bearer` (RFC 7523) with
        a SPIFFE JWT-SVID. The grant must match the
        ServiceIdentity's `federation_kind`; a mismatch returns
        `403 Problem{code: federation_kind_mismatch}` (also raised
        when the verified SPIFFE assertion's `sub` does not match
        the ServiceIdentity's `Subject`). The JWT-bearer path
        verifies the assertion against the IdPBinding's SPIFFE trust
        bundle and emits one `identity.ServiceIdentityAuthenticated`
        outbox row alongside the bearer mint, matching the
        client_credentials branch.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceTokenRequest"
      responses:
        "200":
          description: Access token issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceTokenResponse"
        "400":
          description: |
            Malformed request, unsupported grant_type, or missing
            required field for the chosen grant.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: |
            Client authentication failed. `Problem.code` is one of:
            `invalid_client` (unknown client_id), or
            `spiffe_verification_failed` (SPIFFE JWT-SVID signature,
            expiry, issuer, or audience did not validate — includes
            unknown-`kid`-after-one-refresh).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            `Problem.code = federation_kind_mismatch`. Either the
            grant type does not match the ServiceIdentity's
            `federation_kind`, or the verified SPIFFE assertion's
            `sub` claim does not match the resolved
            ServiceIdentity's `Subject`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: |
            `Problem.code = not_provisioned`. Returned by the
            jwt-bearer branch when the deployment has not wired a
            SPIFFE verifier; the federation_kind gate already
            passed so the failure is observably verifier-side.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "502":
          description: |
            Upstream verification failure. `Problem.code` is one of:
            `invalid_client` (upstream IdP rejected
            client_credentials), `spiffe_bundle_unreachable` (SPIFFE
            trust bundle endpoint failed and no cached copy was
            available), or `spiffe_bundle_unconfigured` (the
            IdPBinding has no `spiffe_bundle_url` recorded).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/auth/tokens:
    post:
      operationId: PostAuthTokens
      summary: Issue a new API token (psk-shaped) for the caller identity.
      description: |
        Mints a psk-shaped API token bound to the supplied identity
        reference. The plaintext is returned exactly
        once in this response; subsequent reads surface only summary
        metadata.
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/APITokenIssueRequest"
      responses:
        "201":
          description: Token issued; plaintext is included exactly once.
          headers:
            Sunset:
              description: |
                RFC 8594 sunset timestamp for the rotated-from token.
                Present only on rotation responses — omitted on first
                issuance.
              schema:
                type: string
                format: http-date
              required: false
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITokenIssueResponse"
        "400":
          description: Invalid body (bad env_prefix, missing identity_ref).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    get:
      operationId: GetAuthTokens
      summary: List the caller's API tokens (no plaintext).
      description: |
        Returns the caller's API-token summaries. Plaintext is never
        included — it is only available at issuance time
        .
      tags:
        - auth
      responses:
        "200":
          description: List of token summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APITokenSummary"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/auth/tokens/{id}:
    delete:
      operationId: DeleteAuthTokenByID
      summary: Immediately revoke an API token.
      description: |
        Revokes the token identified by `id` with no grace period
        . Subsequent authentications with the
        plaintext fail closed.
      tags:
        - auth
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Token identifier (UUIDv7).
      responses:
        "204":
          description: Token revoked.
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Token not found (or does not belong to caller).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/auth/tokens/{id}/rotate:
    post:
      operationId: PostAuthTokenRotate
      summary: Rotate an API token; old plaintext is retired with Sunset.
      description: |
        Issues a replacement plaintext for the named token and marks the
        previous plaintext for retirement. A `Sunset` header names the
        RFC 8594 retirement deadline of the rotated-from token
        .
      tags:
        - auth
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Token identifier (UUIDv7).
      responses:
        "200":
          description: Token rotated; plaintext is returned exactly once.
          headers:
            Sunset:
              description: RFC 8594 sunset timestamp for the retired plaintext.
              schema:
                type: string
                format: http-date
              required: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITokenRotateResponse"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Token not found (or does not belong to caller).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/auth/whoami:
    get:
      operationId: GetAuthWhoami
      summary: Describe the authenticated principal.
      description: |
        Returns the resolved principal metadata for the current request
        — useful both for debugging and for CLIs that need to render a
        "you are signed in as" banner.
      tags:
        - auth
      responses:
        "200":
          description: Principal description.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Whoami"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    delete:
      operationId: DeleteAuthSession
      summary: Sign the current caller out.
      description: |
        Terminates the caller's authenticated session and clears the
        session cookie. The endpoint is
        idempotent and unauthenticated: callers without a session
        cookie, or with a stale or already-revoked one, still receive
        a 204 with the cookie cleared. No information about whether a
        session existed is disclosed in the response body. Because the
        handler treats every caller as a successful 204 by design (the
        four behaviour scenarios are documented on
        `internal/transport/http/v1/auth/signout.go`), this operation
        advertises only the 204 response — no 401 or 500 path is
        reachable from the handler (-1 Q4).
      tags:
        - auth
      responses:
        "204":
          description: Session terminated (or no active session existed).
  /v1/auth/sign-out/global:
    post:
      operationId: PostAuthSignOutGlobal
      summary: Sign out of every active session for the caller.
      description: |
        Revokes every server-side `plexsphere_session` bound to the
        authenticated user (regardless of which device originally
        issued it) and clears the current cookie. Intended for the
        dashboard's "Sign out everywhere" affordance and for the
        compromise / password-reset / IdP-driven force-logout paths.

        The endpoint is authenticated: callers without an interactive
        cookie receive `401 Unauthorized`. An `api_token` principal —
        a `psk_`-prefixed cookie value — is rejected with `403
        Forbidden` because the cross-credential boundary forbids a
        leaked API token from bulk-revoking its owner's interactive
        sessions. The cookie-clearing `Set-Cookie` header is emitted
        on every response (including the 401 / 403 paths) so a stale
        browser tab drops whatever value it held.

        On success the response body is empty and the audit pipeline
        records a single `identity.UserSignedOut` event whose payload
        carries `cookie_cleared=true`, `sessions_revoked=N` (the count
        of evicted server-side sessions, possibly 0 on a re-click
        after the first response landed) and `reason=user-initiated`.
      tags:
        - auth
      responses:
        "204":
          description: |
            Every server-side session for the caller has been
            invalidated and the response carries the canonical
            cookie-clearing `Set-Cookie` header.
        "401":
          description: |
            Caller is not authenticated. The response still clears
            the session cookie so a stale browser tab drops its
            copy.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller authenticated as an `api_token` principal (the
            `plexsphere_session` cookie value carries the `psk_`
            prefix). Global sign-out is reserved for interactive
            sessions; revoke the API token via `DELETE
            /v1/auth/tokens/{id}` instead.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/authz/check:
    post:
      operationId: PostAuthzCheck
      summary: Run a ReBAC permission check.
      description: |
        Evaluates the ReBAC tuple graph and (optional) caveat program
        for the addressed (`subject`, `relation`, `resource`) triple
        and returns the decision as data on `200`.

        DECISION: a denial surfaces as `200 { decision: denied, reason
        }`, NEVER as `403`. The HTTP layer reserves `403` for transport
        denials (the caller is not even authorised to USE the check
        endpoint). Mixing the two would force callers to disambiguate
        infrastructure failures from policy outcomes by parsing the
        Problem body, defeating the point of treating denials as a
        first-class result.

        The `correlation_id` echoed on every response pairs the result
        with the matching audit entry emitted by `internal/audit`.
      tags:
        - authz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RebacCheckRequest"
            example:
              subject: "user:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
              relation: "read"
              resource: "project:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa"
      responses:
        "200":
          description: |
            ReBAC decision. The body always carries `decision` and
            `correlation_id`. `decision: allowed` additionally carries
            `relation_path`; `decision: denied` carries `reason`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RebacCheckResponse"
              example:
                decision: allowed
                relation_path:
                  - "domain:acme#admin"
                  - "project:acme-web#parent"
                correlation_id: "01HXYZABCDEFGHJKMNPQRSTVWX"
        "400":
          description: |
            Body could not be decoded or carried a malformed subject /
            relation / resource. Body is a `Problem` with `code` ∈
            { `invalid_body`, `invalid_check_request` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "413":
          description: |
            Request body exceeded the 8 KiB ceiling enforced by the
            handler.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/authz/relation-tuples:
    get:
      operationId: ListRelationTuples
      summary: List relation tuples scoped to a Project.
      description: |
        Returns a page of relation tuples persisted under the addressed
        Project (selected by the required `project_id` query
        parameter). Per-row visibility is layered on top of the page —
        rows the caller cannot `read` are filtered out so the response
        items are a subset of the persistence-level page. Cursor
        pagination mirrors `/v1/projects` exactly.
      tags:
        - authz
      parameters:
        - in: query
          name: project_id
          required: true
          schema:
            type: string
            format: uuid
          description: |
            Owning Project (UUIDv7). Relation-tuple administration is
            scoped per Project so every list call resolves to a single
            Project's tuples.
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: |
            Opaque continuation token returned by a previous call's
            `next_cursor`. The encoding is HMAC-signed by the server
            so a tampered cursor surfaces as `400`.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: |
            Maximum number of items to return in a single page. The
            handler clamps the value to [1, 200] before forwarding it
            to the service.
      responses:
        "200":
          description: Page of relation tuples.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelationTupleList"
        "400":
          description: |
            Invalid query parameters — typically a missing or malformed
            `project_id`, a tampered cursor, or an out-of-range limit.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to list relation tuples on the
            addressed Project. Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    post:
      operationId: CreateRelationTuple
      summary: Create a relation tuple under a Project.
      description: |
        Persists a new relation tuple `(subject, relation, resource)`
        scoped to the addressed Project (selected by the required
        `project_id` query parameter). The handler authorises `manage`
        on `project:<id>` BEFORE invoking the service so an
        unauthorised caller never produces a `RelationTupleCreated`
        outbox row.

        The optional `caveat_context` is the set of caveat field
        NAMES the tuple carries — never values. Carrying values across
        the contract boundary would leak request-time data into
        persisted ReBAC state; the audit row records the same NAMES-
        only projection so the cross-boundary invariant survives
        through the projection layer.
      tags:
        - authz
      parameters:
        - in: query
          name: project_id
          required: true
          schema:
            type: string
            format: uuid
          description: Owning Project (UUIDv7).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelationTupleCreateRequest"
            example:
              subject: "user:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
              relation: "maintainer"
              resource: "project:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa"
      responses:
        "201":
          description: Relation tuple created.
          headers:
            Location:
              description: |
                Absolute or root-relative URL of the persisted tuple
                (e.g. `/v1/authz/relation-tuples/<id>`).
              schema:
                type: string
                example: "/v1/authz/relation-tuples/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelationTuple"
        "400":
          description: |
            Aggregate invariant rejected the body — empty subject /
            relation / resource, malformed object reference, etc. Body
            is a `Problem` with `code` ∈ { `invalid_relation_tuple`,
            `invalid_body` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to create relation tuples on the
            addressed Project. Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Owning Project does not exist or is not visible to the
            caller. Body is a `Problem` with `code: project_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "413":
          description: |
            Request body exceeded the 8 KiB ceiling enforced by the
            handler.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/authz/relation-tuples/{id}:
    patch:
      operationId: PatchRelationTuple
      summary: Replace a relation tuple's contents (delete-then-write).
      description: |
        Replaces the relation tuple identified by `{id}`. The
        handler implements Delete-then-Write semantics — the existing
        tuple is deleted and a new tuple persisted in the same
        transaction so cursor-paginated readers never observe a
        half-applied state.
      tags:
        - authz
      parameters:
        - $ref: "#/components/parameters/RelationTupleID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelationTuplePatchRequest"
      responses:
        "200":
          description: Relation tuple replaced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelationTuple"
        "400":
          description: |
            Path `{id}` was not a non-zero UUID, body was empty, or the
            new tuple invariants were rejected. Body is a `Problem`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to replace the addressed relation
            tuple. Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Relation tuple not found. Body is a `Problem` with
            `code: relation_tuple_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "413":
          description: |
            Request body exceeded the 8 KiB ceiling enforced by the
            handler.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    delete:
      operationId: DeleteRelationTuple
      summary: Delete a relation tuple.
      description: |
        Deletes the relation tuple identified by `{id}`. The
        operation is idempotent — a `{id}` that was already deleted
        surfaces as `404 relation_tuple_not_found` rather than `204`,
        so a caller racing two deletes can distinguish "I deleted it"
        from "someone else got there first" without leaking existence
        side-channels (the read path runs the same authz check before
        the lookup).
      tags:
        - authz
      parameters:
        - $ref: "#/components/parameters/RelationTupleID"
      responses:
        "204":
          description: Relation tuple deleted.
        "400":
          description: |
            Path `{id}` was not a non-zero UUID. Body is a `Problem`
            with `code: invalid_relation_tuple_id`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to delete the addressed relation
            tuple. Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Relation tuple not found. Body is a `Problem` with
            `code: relation_tuple_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/authz/lookup-resources:
    post:
      operationId: PostAuthzLookupResources
      summary: List the resources a subject can reach via a relation.
      description: |
        Enumerates every resource of `resource_type` on which the
        addressed `subject` holds `relation`, evaluating the ReBAC
        tuple graph and the optional caveat program.

        DECISION: the enumeration is materialised data on `200`, like
        `/v1/authz/check`. An empty result is a normal answer, NEVER
        an HTTP error, and there is no `403` — mirroring the Check
        endpoint's posture that ReBAC outcomes are first-class data,
        not transport failures.

        The `correlation_id` echoed on the response pairs the result
        with the matching audit entry emitted by `internal/audit`.
      tags:
        - authz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LookupResourcesRequest"
            example:
              subject: "user:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
              relation: "read"
              resource_type: "project"
      responses:
        "200":
          description: |
            Materialised list of resource object ids the subject can
            reach. `items` is the full result set; an empty array is
            a normal answer.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RebacLookupResponse"
              example:
                items:
                  - "project:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa"
                  - "project:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0bb"
                correlation_id: "01HXYZABCDEFGHJKMNPQRSTVWX"
        "400":
          description: |
            Body could not be decoded or carried a malformed subject /
            relation / resource_type. Body is a `Problem` with `code`
            ∈ { `invalid_body`, `invalid_lookup_request` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "413":
          description: |
            Request body exceeded the 8 KiB ceiling enforced by the
            handler.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/authz/lookup-subjects:
    post:
      operationId: PostAuthzLookupSubjects
      summary: List the subjects that can reach a resource via a relation.
      description: |
        The dual of `/v1/authz/lookup-resources`: enumerates every
        subject of `subject_type` that holds `relation` on the
        addressed `resource`, evaluating the ReBAC tuple graph and the
        optional caveat program.

        DECISION: identical posture to `/v1/authz/lookup-resources`
        and `/v1/authz/check` — the enumeration is materialised data
        on `200`, an empty result is a normal answer, and there is no
        `403`.

        The `correlation_id` echoed on the response pairs the result
        with the matching audit entry emitted by `internal/audit`.
      tags:
        - authz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LookupSubjectsRequest"
            example:
              subject_type: "user"
              relation: "read"
              resource: "project:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa"
      responses:
        "200":
          description: |
            Materialised list of subject object ids that can reach the
            resource. `items` is the full result set; an empty array
            is a normal answer.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RebacLookupResponse"
              example:
                items:
                  - "user:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
                  - "user:0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a2"
                correlation_id: "01HXYZABCDEFGHJKMNPQRSTVWX"
        "400":
          description: |
            Body could not be decoded or carried a malformed
            subject_type / relation / resource. Body is a `Problem`
            with `code` ∈ { `invalid_body`, `invalid_lookup_request` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "413":
          description: |
            Request body exceeded the 8 KiB ceiling enforced by the
            handler.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/admin/idp:
    post:
      operationId: PostAdminIdP
      summary: Create an IdP binding for a Domain.
      description: |
        Creates a new IdP binding. The response
        echoes the persisted aggregate but never includes the client
        secret itself — only the opaque `client_secret_ref`.
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdPBindingRequest"
      responses:
        "201":
          description: Binding created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdPBindingResponse"
        "400":
