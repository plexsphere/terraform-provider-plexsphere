  /v1/projects/{project_id}/bootstrap-tokens:
    post:
      operationId: IssueBootstrapToken
      summary: Issue a BootstrapToken for a Project.
      description: |
        Mints a fresh BootstrapToken scoped to the supplied Project
        . The aggregate enforces the issuance
        invariants (`kind` in `{node, bridge}`, `env_prefix` matches
        `^[a-z]+$`, TTL inside `[300, 86400]` seconds); violations
        surface as a 400 Problem from validation, not as a SQL CHECK
        failure.

        The response body is the **only** time the plaintext token is
        ever exposed. The persistence layer stores an Argon2id hash
        only, so once the response has been written the plaintext can
        no longer be retrieved through any API surface. Operators MUST capture the plaintext from
        this response and hand it to the redeeming Node/Bridge
        out-of-band; a lost plaintext requires re-issuing the token.
      tags:
        - bootstrap-tokens
      parameters:
        - $ref: "#/components/parameters/BootstrapTokenProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapTokenIssueRequest"
            example:
              kind: node
              env_prefix: prod
              ttl_seconds: 3600
      responses:
        "201":
          description: |
            BootstrapToken issued. The `token` field carries the
            plaintext exactly once; subsequent reads return only the
            metadata view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapTokenIssueResponse"
              example:
                token_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
                token: "psb_prod_aebagbafaydqqbrhibbsa3kqaq_node_xxxxxxxxxxxxxxxxxxxxxxxxxx"
                issued_at: "2026-04-25T10:00:00Z"
                expires_at: "2026-04-25T11:00:00Z"
        "400":
          description: |
            Invalid issue body (unknown `kind`, malformed `env_prefix`,
            TTL out of range).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to issue BootstrapTokens in the
            target Project. Body is a `PermissionDenied` problem
            carrying the ReBAC denial `reason`, traversed
            `relation_path`, and `correlation_id` that pairs with the
            audit entry.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: Project not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    get:
      operationId: ListBootstrapTokens
      summary: List BootstrapTokens issued for a Project.
      description: |
        Returns BootstrapToken metadata for the supplied Project in
        deterministic order with cursor pagination. The plaintext is
        NEVER included in this response — only the hash-derived
        metadata view.
      tags:
        - bootstrap-tokens
      parameters:
        - $ref: "#/components/parameters/BootstrapTokenProjectID"
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: |
            Opaque continuation token returned by a previous call's
            `next_cursor`.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: |
            Maximum number of items to return in a single page
            .
      responses:
        "200":
          description: Page of BootstrapToken metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapTokenList"
        "400":
          description: Invalid query parameters.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to list BootstrapTokens in the
            target Project. Body is a `PermissionDenied` problem
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: Project not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/projects/{project_id}/bootstrap-tokens/{id}:
    get:
      operationId: GetBootstrapTokenMetadata
      summary: Fetch BootstrapToken metadata by identifier.
      description: |
        Returns metadata for the BootstrapToken identified by `{id}`
        within the target Project. The plaintext is NEVER returned —
        the persistence layer holds only an Argon2id hash, and the
        plaintext window closed when the issue response was written
        .
      tags:
        - bootstrap-tokens
      parameters:
        - $ref: "#/components/parameters/BootstrapTokenProjectID"
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: BootstrapToken identifier (UUIDv7).
      responses:
        "200":
          description: BootstrapToken metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapTokenMetadata"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to read BootstrapTokens in the
            target Project. Body is a `PermissionDenied` problem
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: BootstrapToken or Project not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    delete:
      operationId: RevokeBootstrapToken
      summary: Revoke a BootstrapToken.
      description: |
        Revokes the BootstrapToken identified by `{id}` so a future
        redemption attempt is rejected even if the plaintext is still
        in flight. Revocation is a
        terminal aggregate transition: a token that is already
        consumed or already revoked rejects the call with 409 so the
        operator can distinguish "I beat the redeemer" from "the
        redeemer beat me".
      tags:
        - bootstrap-tokens
      parameters:
        - $ref: "#/components/parameters/BootstrapTokenProjectID"
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: BootstrapToken identifier (UUIDv7).
      responses:
        "204":
          description: BootstrapToken revoked.
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to revoke BootstrapTokens in the
            target Project. Body is a `PermissionDenied` problem
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: BootstrapToken or Project not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            BootstrapToken has already been consumed or revoked — the
            redemption window is closed and a fresh token must be
            issued.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/register:
    post:
      operationId: PostRegister
      summary: Redeem a BootstrapToken to enrol a Node into a Domain.
      description: |
        Consumes a previously-issued BootstrapToken plaintext and
        provisions a complete Node identity inside the redeeming
        Domain. The handler:

          1. Validates the inbound public key (length 32 after base64
             decode, all-zero rejection) BEFORE any token consumption
             attempt so a malformed key cannot also waste a token
             .
          2. Runs the BootstrapToken plaintext through
             `bootstraptokens.Validator.Consume` for one-shot,
             project-scoped, kind-scoped enforcement.
          3. Allocates a mesh-IP from the Domain's pool — flat by
             default, drawn from the optional Project sub-range when
             one applies.
          4. Issues the per-Node Node Secret Key (NSK) plaintext +
             wrapped persistence form through the configured wrap-key
             adapter.
          5. Persists Node + IP-allocation + NSK + outbox event in
             one pgx transaction; a partial failure rolls back every
             step including the BootstrapToken consume.

        The endpoint is the unauthenticated bootstrap seam — the
        BootstrapToken plaintext IS the credential the redeeming
        substrate presents — so the caller does NOT pass an
        Authorization header here. The Spectral
        `plexsphere-write-once-post-must-be-issue-response` rule
        guards the `nsk` field's `x-plexsphere-once: true` marker so
        the plaintext is only ever returned by THIS one operation
        .
      tags:
        - bootstrap-tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              project_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0"
              resource_id: "edge-router-01"
              bootstrap_token: "psb_prod_aebagbafaydqqbrhibbsa3kqaq_node_xxxxxxxxxxxxxxxxxxxxxxxxxx"
              nonce: "f3f8c0b8-7a0a-8a0a-a0a0-a0a0a0a0a0a0"
              public_key: "AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8="
      responses:
        "200":
          description: |
            BootstrapToken redeemed successfully. The redeeming Node
            is now bound to the named Project + Resource; the
            response carries the freshly-allocated mesh-IP, the
            per-Node NSK plaintext (returned exactly once — see the
            `x-plexsphere-once: true` marker on the `nsk` field), the
            Domain's signing public key + key id, the initial
            wireguard peer snapshot, and the Domain's mesh CIDR
            .
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: |
            Inbound `public_key` failed the structural validation gate
            — wrong byte length after base64 decode, all-zero
            degenerate value, or unparseable encoding. The
            BootstrapToken is NOT consumed when this branch fires;
            the operator can retry with a corrected key against the
            same plaintext.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Plaintext BootstrapToken failed the Validator precedence
            check. The `code` field on the `Problem` body carries
            the canonical denial reason: `kind_mismatch`,
            `project_mismatch`, `token_consumed`, `token_expired`,
            `token_revoked`, or `nonce_collision`. The schema is
            `Problem` (not `PermissionDenied`) because /v1/register
            is the unauthenticated bootstrap seam — denials surface
            from BootstrapToken validation, NOT from a ReBAC check
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: |
            Project or Resource named in the RegisterRequest body
            could not be resolved. The BootstrapToken is NOT consumed
            when this branch fires — a missing Resource is an
            operator-actionable misconfiguration, not a replay
            invitation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: |
            RegisterRequest body parsed but failed the application-
            boundary invariant checks (e.g. an empty
            `bootstrap_token`, a zero-valued `project_id` UUID, an
            empty `resource_id`). Distinct from 400 (which is
            reserved for `public_key` shape failures) so operators
            can disambiguate the two cleanly.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "503":
          description: |
            Mesh-IP allocator could not place the Node: either the
            flat Domain pool or a strict-mode Project sub-range is
            exhausted, or the per-Domain advisory lock was contended
            past the configured wait budget. The Problem `code`
            field carries the canonical reason (`pool_exhausted`,
            `subrange_exhausted`, `allocator_contention`). The
            BootstrapToken is NOT consumed when this branch fires —
            pool exhaustion is an operator-actionable capacity event,
            not a replay invitation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: |
            Internal server error. NSK issuance failures, outbox
            append failures, or any other infrastructure-side fault
            inside the registration tx surface here. The
            BootstrapToken is NOT consumed because the registration
            transaction rolls back atomically.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/domains:
    post:
      operationId: CreateDomain
      summary: Create a tenancy Domain.
      description: |
        Creates a new top-level tenancy Domain. The
        aggregate enforces every issuance invariant — non-empty Name,
        kebab-case Slug, canonical RFC 4632 mesh_cidr, and a complete
        ReachabilityPolicy (a fully-zero policy is replaced with the
        platform default; a partial policy is rejected). Cross-Domain
        mesh_cidr non-overlap is policed by the SQL GIST exclusion on
        `plexsphere.domains.mesh_cidr` and surfaces as
        `409 mesh_cidr_overlap`; a duplicate slug surfaces as
        `409 domain_slug_conflict`.

        On success the handler emits a `domain.create` audit row and
        appends a `DomainCreated` outbox event in the same transaction
        .
      tags:
        - tenancy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainCreateRequest"
            example:
              name: "Acme Production"
              slug: "acme-prod"
              description: "Acme Corp production tenancy boundary."
              mesh_cidr: "10.42.0.0/16"
              reachability:
                heartbeat_interval: "30s"
                stale_after: "90s"
                unreachable_after: "300s"
      responses:
        "201":
          description: Domain created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainResponse"
              example:
                id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
                name: "Acme Production"
                slug: "acme-prod"
                description: "Acme Corp production tenancy boundary."
                mesh_cidr: "10.42.0.0/16"
                reachability:
                  heartbeat_interval: "30s"
                  stale_after: "90s"
                  unreachable_after: "300s"
                created_at: "2026-05-02T10:00:00Z"
                updated_at: "2026-05-02T10:00:00Z"
        "400":
          description: |
            Aggregate invariant rejected the body — empty Name,
            malformed Slug, malformed `mesh_cidr`, partial
            `reachability` policy, or otherwise. Body is a
            `Problem` with `code` ∈ { `invalid_domain`,
            `invalid_reachability_policy` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/invalid-domain"
                title: "Invalid Domain"
                status: 400
                detail: "Domain.Name must not be empty or whitespace-only "
                instance: "/v1/domains"
                code: "invalid_domain"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to create Domains. Body is a
            `PermissionDenied` problem carrying the ReBAC denial
            `reason`, `relation_path`, and `correlation_id`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "409":
          description: |
            Conflict — the proposed Domain collides with a persisted
            Domain. Body is a `Problem` with `code` ∈
            { `domain_slug_conflict`, `mesh_cidr_overlap` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/mesh-cidr-overlap"
                title: "Mesh CIDR Overlap"
                status: 409
                detail: "mesh_cidr 10.42.0.0/16 overlaps an existing Domain"
                instance: "/v1/domains"
                code: "mesh_cidr_overlap"
        "413":
          description: |
            Request body exceeded the 8 KiB tenancy ceiling enforced by
            the handler.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    get:
      operationId: ListDomains
      summary: List tenancy Domains.
      description: |
        Returns a slug-ordered page of tenancy Domains the caller is
        authorised to see. Per-row
        visibility is layered on top of the page: rows the caller
        cannot `read` are filtered out so the response items are a
        subset of the persistence-level page.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`.
      tags:
        - tenancy
      parameters:
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: |
            Opaque continuation token returned by a previous call's
            `next_cursor`. The encoding is HMAC-signed by the server
            so a tampered cursor surfaces as `400`.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: |
            Maximum number of items to return in a single page. The
            handler clamps the value to [1, 200] before forwarding it
            to the service.
      responses:
        "200":
          description: Page of Domains.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainList"
              example:
                items:
                  - id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
                    name: "Acme Production"
                    slug: "acme-prod"
                    description: "Acme Corp production tenancy boundary."
                    mesh_cidr: "10.42.0.0/16"
                    reachability:
                      heartbeat_interval: "30s"
                      stale_after: "90s"
                      unreachable_after: "300s"
                    created_at: "2026-05-02T10:00:00Z"
                    updated_at: "2026-05-02T10:00:00Z"
                next_cursor: "eyJzbHVnIjoiYWNtZS1wcm9kIn0.signed"
        "400":
          description: |
            Invalid query parameters — typically a tampered or
            malformed cursor.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to list Domains (body is a
            `PermissionDenied` problem) OR the pagination cursor was
            minted by a different caller and the per-(caller, pepper)
            HMAC binding rejected the replay (body is a `Problem`
            with `code = cursor_binding_mismatch`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/domains/{id}:
    get:
      operationId: GetDomain
      summary: Fetch a Domain by identifier.
      description: |
        Returns the Domain identified by `{id}`. The
        handler runs the `read` ReBAC check BEFORE the persistence
        read; an unauthorised caller therefore receives `403` without
        the existence side-channel a "load-then-check" flow would
        leak. A missing aggregate surfaces as `404 domain_not_found`.
      tags:
        - tenancy
      parameters:
        - $ref: "#/components/parameters/DomainID"
      responses:
        "200":
          description: Domain found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainResponse"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to read the addressed Domain.
            Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Domain not found. Body is a `Problem` with
            `code: domain_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/domain-not-found"
                title: "Domain Not Found"
                status: 404
                detail: "no Domain with id 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
                instance: "/v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
                code: "domain_not_found"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    patch:
      operationId: PatchDomain
      summary: Patch mutable fields on a Domain.
      description: |
        Patches the Domain identified by `{id}`.
        The body MUST set at least one of `name`, `description`,
        `mesh_cidr`, or `reachability` — an empty body surfaces as
        `400 empty_patch`.

        DECISION: `slug` is intentionally NOT a patchable field. The
        slug is the URL handle exported into cached dashboard links and
        outbox projections; allowing it to mutate would silently rot
        every cached reference. The handler rejects any body that
        carries a `slug` key (even with the same value) at decode time
        with `400 slug_immutable`. See the `tenancy` tag description
        for the full rationale.

        Retargeting `mesh_cidr` triggers two extra checks beyond the
        aggregate invariant: the SQL GIST exclusion still polices
        cross-Domain non-overlap (`409 mesh_cidr_overlap`), and the
        service-level containment guard refuses a retarget that would
        orphan an existing `project_mesh_ip_reservations.sub_range`
        (`422 mesh_cidr_invalidates_subrange`, with the offending
        `project_id` in the Problem detail).
      tags:
        - tenancy
      parameters:
        - $ref: "#/components/parameters/DomainID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainPatchRequest"
            example:
              description: "Acme Corp production — Q3 reorg."
              mesh_cidr: "10.43.0.0/16"
      responses:
        "200":
          description: Domain patched.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainResponse"
        "400":
          description: |
            Invalid body. Body is a `Problem` with `code` ∈
            { `invalid_domain`, `invalid_reachability_policy`,
            `slug_immutable`, `empty_patch` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/slug-immutable"
                title: "Slug Immutable"
                status: 400
                detail: "Domain.Slug is immutable; remove the slug field from the patch body"
                instance: "/v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
                code: "slug_immutable"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to manage the addressed Domain.
            Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Domain not found. Body is a `Problem` with
            `code: domain_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            mesh_cidr retarget collides with another Domain's mesh
            pool. Body is a `Problem` with `code: mesh_cidr_overlap`
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "413":
          description: |
            Request body exceeded the 8 KiB tenancy ceiling
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: |
            Mesh CIDR retarget would orphan an existing project
            sub-range. Body is a `Problem` with
            `code: mesh_cidr_invalidates_subrange` carrying the
            offending `project_id` in `detail`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/mesh-cidr-invalidates-subrange"
                title: "Mesh CIDR Invalidates Sub-range"
                status: 422
                detail: "proposed mesh_cidr 10.43.0.0/24 invalidates project_id 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0aa sub_range 10.43.4.0/22"
                instance: "/v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
                code: "mesh_cidr_invalidates_subrange"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    delete:
      operationId: DeleteDomain
      summary: Delete a Domain.
      description: |
        Deletes the Domain identified by `{id}`.
        The empty-aggregate guard runs inside the same transaction as
        the row delete; at least one persisted Project, Group,
        Identity, IdP binding, or Node forces `409 domain_not_empty`
        with the `DomainChildCounts` payload in the Problem detail so
        the operator knows which sub-aggregate to drain first. A
        concurrent INSERT racing the guard is caught by
        defense-in-depth — the foreign-key violation surfaces as the
        same `409` so the caller never observes a half-deleted Domain.
      tags:
        - tenancy
      parameters:
        - $ref: "#/components/parameters/DomainID"
      responses:
        "204":
          description: Domain deleted.
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to delete the addressed Domain.
            Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Domain not found. Body is a `Problem` with
            `code: domain_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            Domain still owns at least one child aggregate. Body is a
            `Problem` with `code: domain_not_empty` and the optional
            `child_counts` extension carrying the structured
            `DomainChildCounts` so the operator knows which sub-
            aggregate is still attached.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/domain-not-empty"
                title: "Domain Not Empty"
                status: 409
                detail: "Domain has 2 projects, 1 group, 5 identities, 0 idp_bindings, 3 nodes still attached"
                instance: "/v1/domains/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a1"
                code: "domain_not_empty"
                child_counts:
                  projects: 2
                  groups: 1
                  identities: 5
                  idp_bindings: 0
                  nodes: 3
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/clouds:
    post:
      operationId: CreateCloud
      summary: Create a Cloud Inventory entry.
      description: |
        Creates a new Cloud aggregate — one upstream cloud-provider
        account with its connection metadata. The aggregate enforces
        every issuance invariant — non-empty `display_name`, kebab-case
        `slug`, closed-enum `provider`, valid JSON `endpoint` and
        `region_defaults`, non-empty `external_id`. The per-provider
        validator runs BEFORE the aggregate so a malformed payload
        never appends a `CloudCreated` outbox row; field-level
        rejections surface as `400 invalid_cloud_endpoint` or
        `400 invalid_cloud_region_defaults`. A duplicate slug surfaces
        as `409 cloud_slug_conflict`; a duplicate
        `(provider, external_id)` pair surfaces as
        `409 cloud_external_id_conflict`.

        On success the handler emits a `cloud.create` audit row and
        appends a `CloudCreated` outbox event in the same transaction.
      tags:
        - cloud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloudCreateRequest"
            example:
              display_name: "Acme AWS Production"
              slug: "acme-aws-prod"
              provider: "aws"
              endpoint:
                region: "us-east-1"
                role_arn: "arn:aws:iam::123456789012:role/PlexsphereProvisioner"
              region_defaults:
                vpc_cidr: "10.42.0.0/16"
              external_id: "123456789012"
      responses:
        "201":
          description: Cloud created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudResponse"
              example:
                id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1"
                display_name: "Acme AWS Production"
                slug: "acme-aws-prod"
                provider: "aws"
                endpoint:
                  region: "us-east-1"
                  role_arn: "arn:aws:iam::123456789012:role/PlexsphereProvisioner"
                region_defaults:
                  vpc_cidr: "10.42.0.0/16"
                external_id: "123456789012"
                created_at: "2026-05-02T10:00:00Z"
                updated_at: "2026-05-02T10:00:00Z"
        "400":
          description: |
            Aggregate or validator rejected the body — empty
            `display_name`, malformed `slug`, malformed `endpoint` or
            `region_defaults`, unknown `provider`, or per-provider
            field-level validator rejection. Body is a `Problem` with
            `code` ∈ { `invalid_cloud`, `unknown_provider`,
            `invalid_cloud_endpoint`,
            `invalid_cloud_region_defaults`, `invalid_body` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/invalid-cloud-endpoint"
                title: "Invalid Cloud Endpoint"
                status: 400
                detail: "Cloud endpoint payload rejected by aws validator"
                instance: "/v1/clouds"
                code: "invalid_cloud_endpoint"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to create Clouds. Body is a
            `PermissionDenied` problem carrying the ReBAC denial
            `reason`, `relation_path`, and `correlation_id`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "409":
          description: |
            Conflict — the proposed Cloud collides with a persisted
            row. Body is a `Problem` with `code` ∈
            { `cloud_slug_conflict`, `cloud_external_id_conflict` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/cloud-slug-conflict"
                title: "Cloud Slug Conflict"
                status: 409
                detail: "slug acme-aws-prod is already taken"
                instance: "/v1/clouds"
                code: "cloud_slug_conflict"
        "413":
          description: |
            Request body exceeded the 8 KiB Cloud Inventory ceiling
            enforced by the handler.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    get:
      operationId: ListClouds
      summary: List Cloud Inventory entries.
      description: |
        Returns a slug-ordered page of Cloud aggregates the caller is
        authorised to see. Per-row visibility is layered on top of the
        page: rows the caller cannot `read` are filtered out so the
        response items are a subset of the persistence-level page.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`.
      tags:
        - cloud
      parameters:
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: |
            Opaque continuation token returned by a previous call's
            `next_cursor`. The encoding is HMAC-signed by the server
            so a tampered cursor surfaces as `400`.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: |
            Maximum number of items to return in a single page. The
            handler clamps the value to [1, 200] before forwarding it
            to the service.
      responses:
        "200":
          description: Page of Clouds.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudList"
              example:
                items:
                  - id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1"
                    display_name: "Acme AWS Production"
                    slug: "acme-aws-prod"
                    provider: "aws"
                    endpoint:
                      region: "us-east-1"
                      role_arn: "arn:aws:iam::123456789012:role/PlexsphereProvisioner"
                    region_defaults:
                      vpc_cidr: "10.42.0.0/16"
                    external_id: "123456789012"
                    created_at: "2026-05-02T10:00:00Z"
                    updated_at: "2026-05-02T10:00:00Z"
                next_cursor: "eyJzbHVnIjoiYWNtZS1hd3MtcHJvZCJ9.signed"
        "400":
          description: |
            Invalid query parameters — typically a tampered or
            malformed cursor or an out-of-range `limit`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to list Clouds (body is a
            `PermissionDenied` problem) OR the pagination cursor was
            minted by a different caller and the per-(caller, pepper)
            HMAC binding rejected the replay (body is a `Problem`
            with `code = cursor_binding_mismatch`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/clouds/{id}:
    get:
      operationId: GetCloud
      summary: Fetch a Cloud by identifier.
      description: |
        Returns the Cloud identified by `{id}`. The handler runs the
        `read` ReBAC check BEFORE the persistence read; an unauthorised
        caller therefore receives `403` without the existence side-
        channel a "load-then-check" flow would leak. A missing
        aggregate surfaces as `404 cloud_not_found`.
      tags:
        - cloud
      parameters:
        - $ref: "#/components/parameters/CloudID"
      responses:
        "200":
          description: Cloud found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudResponse"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to read the addressed Cloud.
            Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Cloud not found. Body is a `Problem` with
            `code: cloud_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/cloud-not-found"
                title: "Cloud Not Found"
                status: 404
                detail: "no Cloud with id 0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1"
                instance: "/v1/clouds/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1"
                code: "cloud_not_found"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    patch:
      operationId: PatchCloud
      summary: Patch mutable fields on a Cloud.
      description: |
        Patches the Cloud identified by `{id}`. The body MUST set at
        least one of `display_name`, `endpoint`, or `region_defaults`
        — an empty body surfaces as `400 empty_patch`.

        DECISION: BOTH `slug` and `provider` are intentionally NOT
        patchable fields. The slug is the URL handle exported into
        cached dashboard links and outbox projections; the provider is
        the validator-routing key for the per-provider validator
        family — changing either would silently break references or
        invalidate every previously-stored endpoint blob. The handler
        rejects any body that carries a `slug` key (even with the same
        value) at decode time with `400 slug_immutable`, and any body
        that carries a `provider` key with `400 provider_immutable`.
        See the `cloud` tag description for the full rationale.

        Mutating `endpoint` or `region_defaults` re-runs the per-
        provider validator on the merged next-state so a stale
        `region_defaults` cannot silently invalidate the merged record;
        field-level validator rejections surface as
        `400 invalid_cloud_endpoint` or
        `400 invalid_cloud_region_defaults`.
      tags:
        - cloud
      parameters:
        - $ref: "#/components/parameters/CloudID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloudPatchRequest"
            example:
              display_name: "Acme AWS Production — renamed"
              region_defaults:
                vpc_cidr: "10.43.0.0/16"
      responses:
        "200":
          description: Cloud patched.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudResponse"
        "400":
          description: |
            Invalid body. Body is a `Problem` with `code` ∈
            { `invalid_cloud`, `invalid_cloud_endpoint`,
            `invalid_cloud_region_defaults`, `slug_immutable`,
            `provider_immutable`, `empty_patch`, `invalid_body` }.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/slug-immutable"
                title: "Slug Immutable"
                status: 400
                detail: "Cloud.Slug is immutable; remove the slug field from the patch body"
                instance: "/v1/clouds/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1"
                code: "slug_immutable"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to manage the addressed Cloud.
            Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Cloud not found. Body is a `Problem` with
            `code: cloud_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "413":
          description: |
            Request body exceeded the 8 KiB Cloud Inventory ceiling.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    delete:
      operationId: DeleteCloud
      summary: Delete a Cloud.
      description: |
        Deletes the Cloud identified by `{id}`. The empty-aggregate
        guard runs inside the same transaction as the row delete; at
        least one persisted `CloudCredential` forces
        `409 cloud_not_empty` with the `CloudChildCounts` payload in
        the Problem detail so the operator knows how many credentials
        are still attached. A concurrent INSERT racing the guard is
        caught by defense-in-depth — the foreign-key violation
        surfaces as the same `409` so the caller never observes a
        half-deleted Cloud.
      tags:
        - cloud
      parameters:
        - $ref: "#/components/parameters/CloudID"
      responses:
        "204":
          description: Cloud deleted.
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to delete the addressed Cloud.
            Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Cloud not found. Body is a `Problem` with
            `code: cloud_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            Cloud still owns at least one child aggregate. Body is a
            `Problem` with `code: cloud_not_empty` and the optional
            `cloud_child_counts` extension carrying the structured
            `CloudChildCounts` so the operator knows how many
            credentials are still attached.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/cloud-not-empty"
                title: "Cloud Not Empty"
                status: 409
                detail: "Cloud still owns: cloud_credentials=2"
                instance: "/v1/clouds/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1"
                code: "cloud_not_empty"
                cloud_child_counts:
                  cloud_credentials: 2
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/clouds/{id}/cloud-credentials:
    get:
      operationId: ListCloudCredentials
      summary: List Cloud Credentials owned by a Cloud.
      description: |
        Returns a creation-ordered page of Cloud Credential lifecycle
        metadata for the Cloud identified by `{id}`. The handler runs a
        top-level `observe` ReBAC check on the parent Cloud BEFORE the
        persistence read, then layers a per-row `observe` filter on top
        so the response items are the subset of the persistence-level
        page the caller is authorised to see.

        The projection is metadata-only: it carries the credential
        identity, version, lifecycle timestamps, and a derived status.
        It NEVER exposes the KV mount, KV path, KV version, or any
        secret material — the storage location is deliberately omitted
        as a storage-internal detail.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym, so a cursor minted by one
        principal cannot be replayed by another — the cross-caller
        replay surfaces as `403 cursor_binding_mismatch`. A tampered
        envelope or unknown version byte stays on `400 invalid_cursor`.
      tags:
        - cloud
      parameters:
        - $ref: "#/components/parameters/CloudID"
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: |
            Opaque continuation token returned by a previous call's
            `next_cursor`. The encoding is HMAC-signed by the server
            so a tampered cursor surfaces as `400`.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: |
            Maximum number of items to return in a single page. The
            handler clamps the value to [1, 200] before forwarding it
            to the read service.
      responses:
        "200":
          description: Page of Cloud Credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudCredentialList"
              example:
                items:
                  - id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0d1"
                    cloud_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1"
                    display_name: "Acme AWS provisioner secret"
                    version: 1
                    status: "active"
                    expires_at: "2026-08-02T10:00:00Z"
                    revoked_at: null
                    expired_at: null
                    created_at: "2026-05-02T10:00:00Z"
                    updated_at: "2026-05-02T10:00:00Z"
                next_cursor: "eyJjIjoiMDE5MGE4YjgifQ.signed"
        "400":
          description: |
            Invalid query parameters — typically a tampered or
            malformed cursor, an out-of-range `limit`, or a malformed
            Cloud id.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to observe the parent Cloud (body
            is a `PermissionDenied` problem) OR the pagination cursor
            was minted by a different caller and the per-(caller,
            pepper) HMAC binding rejected the replay (body is a
            `Problem` with `code = cursor_binding_mismatch`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/cloud-credentials/{id}:
    get:
      operationId: GetCloudCredential
      summary: Fetch a Cloud Credential's lifecycle metadata.
      description: |
        Returns the lifecycle metadata for the Cloud Credential
        identified by `{id}`. The credential id does not encode its
        owning Cloud, so the handler must read the row to learn which
        Cloud to authorise against; the ReBAC `observe` check runs on
        the resolved parent Cloud and a denial returns `403` via the
        audit-first permission-denied path. A missing row surfaces as
        `404 cloud_credential_not_found`.

        The projection is metadata-only and NEVER exposes the KV mount,
        KV path, KV version, or any secret material.
      tags:
        - cloud
      parameters:
        - $ref: "#/components/parameters/CloudCredentialID"
      responses:
        "200":
          description: Cloud Credential found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudCredentialResponse"
        "400":
          description: |
            Malformed Cloud Credential id. Body is a `Problem` with
            `code: invalid_cloud_credential_id`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to observe the parent Cloud.
            Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: |
            Cloud Credential not found. Body is a `Problem` with
            `code: cloud_credential_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
