  # traceability: PX-0071 — Phase-3 capability inventory list surface.
  /v1/projects/{project_id}/capabilities:
    get:
      operationId: ListCapabilities
      summary: List per-Node capability manifests in a Project.
      description: |
        Returns a cursor-paginated page of per-Node capability rows in
        the named Project. Each row pairs a Node's reported agent binary
        with a checksum status — `match` when the reported checksum
        equals a known-good artifact, `drift` when it differs, and
        `unknown` when no known-good artifact is on record. The handler
        runs the platform read gate before the persistence read, then
        layers a per-row visibility filter on the Domain owning each
        Node so `items` is the subset the caller is authorised to see.

        The pagination cursor is HMAC-signed and bound to the
        per-(caller, pepper) pseudonym; a cross-caller replay surfaces
        as `403 cursor_binding_mismatch`, and a tampered or malformed
        cursor surfaces as `400 invalid_cursor`. `limit` is clamped to
        `[1, 200]` rather than rejected.
      tags:
        - capabilities
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
            format: uuid
          description: |
            Owning Project (UUIDv7). The capability inventory is scoped
            to Nodes in this Project.
        - in: query
          name: node_id
          required: false
          schema:
            type: string
            format: uuid
          description: |
            Optional Node filter. When present, only the capability row
            for the named Node is returned.
        - in: query
          name: status
          required: false
          schema:
            $ref: "#/components/schemas/CapabilityStatus"
          description: |
            Optional checksum-status filter. When present, only rows in
            the named status are returned.
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: |
            Opaque continuation token returned by a previous call's
            `next_cursor`. The encoding is HMAC-signed so a tampered
            cursor surfaces as `400`.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: |
            Maximum number of items to return in a single page. The
            handler clamps the value to [1, 200] before forwarding it to
            the read service.
      responses:
        "200":
          description: Page of capability rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilityRowList"
              example:
                items:
                  - node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0c1"
                    domain_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0b1"
                    binary_version: "plexd-v0.4.2-ge5f3a1c"
                    binary_checksum: "XohImNooBHFR0OVvjcYpJ3NgPQ1qq73WKhHvch0VQtg="
                    status: "match"
                    reported_at: "2026-05-02T10:00:00Z"
                next_cursor: null
        "400":
          description: |
            Invalid query parameters — typically a tampered or malformed
            cursor, an out-of-range `limit`, or a malformed `node_id`
            filter.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to read the capability inventory
            (body is a `PermissionDenied` problem) OR the pagination
            cursor was minted by a different caller and the
            per-(caller, pepper) HMAC binding rejected the replay (body
            is a `Problem` with `code = cursor_binding_mismatch`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
