        - listen_port
        - created_at
        - updated_at
      properties:
        resource_id:
          type: string
          format: uuid
          description: Owning bridge Resource (UUIDv7) — the relay primary key.
        enabled:
          type: boolean
          description: Whether the relay is active.
        listen_port:
          type: integer
          minimum: 1
          maximum: 65535
          description: UDP port the relay listens on.
        created_at:
          type: string
          format: date-time
          description: Relay creation timestamp (UTC).
        updated_at:
          type: string
          format: date-time
          description: Last-modified timestamp (UTC).
