      responses:
        "200":
          description: Policy found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller lacks `policy#read`. Body is a `PermissionDenied`
            problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: Policy not found or not visible.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    patch:
      operationId: UpdatePolicy
      summary: Update a Policy by landing a new revision.
      description: |
        Patches the Policy by landing a new revision carrying the
        supplied fields (unset fields inherit from the current head).
        The handler performs the dual ReBAC check (`policy#manage` on
        the Policy plus `project#operator` on the parent Project) and
        advances the head pointer atomically. A stale
        `expected_revision_id` loses the partial-unique-head race and
        surfaces as `409 revision_conflict`.
      tags:
        - policy
      parameters:
        - $ref: "#/components/parameters/PolicyProjectID"
        - $ref: "#/components/parameters/PolicyID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyUpdateRequest"
      responses:
        "200":
          description: Policy updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400":
          description: Invalid body.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller failed the dual ReBAC check. Body is a
            `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: Policy not found or not visible.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            Concurrent PATCH lost the partial-unique-head race
            (`revision_conflict`). The caller should re-fetch the
            current head and rebase the edit.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: Aggregate invariant violated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    delete:
      operationId: DeletePolicy
      summary: Delete a Policy and cascade its revisions.
      description: |
        Deletes the Policy aggregate. Revision children cascade by
        foreign-key. The handler performs the dual ReBAC check
        (`policy#manage` on the Policy plus `project#operator` on the
        parent Project) and emits a single audit entry plus the
        `policy_deleted` outbox event on the outcome.
      tags:
        - policy
      parameters:
        - $ref: "#/components/parameters/PolicyProjectID"
        - $ref: "#/components/parameters/PolicyID"
      responses:
        "204":
          description: Policy deleted.
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller failed the dual ReBAC check. Body is a
            `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: Policy not found or not visible.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
