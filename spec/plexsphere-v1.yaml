          description: |
            The batch exceeded a size cap. The Problem body's `code` field
            is `ingest_body_too_large` when the compressed wire body or the
            inflated batch exceeds its byte cap, or
            `ingest_batch_too_many_records` when the batch carries more
            records than the per-batch cap.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/ingest-body-too-large"
                title: "Payload Too Large"
                status: 413
                detail: "request body exceeds the observability ingest wire cap."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/audit"
                code: "ingest_body_too_large"
        "415":
          description: |
            The `Content-Encoding` header names an encoding other than
            `gzip` or `identity`. The Problem body's `code` field is
            `ingest_encoding_unsupported`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/ingest-encoding-unsupported"
                title: "Unsupported Media Type"
                status: 415
                detail: "Content-Encoding must be gzip or identity."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/audit"
                code: "ingest_encoding_unsupported"
        "429":
          description: |
            A quota bucket is exhausted. The Problem body's `code` field is
            `per_node_rate_limited` when the per-Node byte budget is
            exhausted or `capacity_exceeded` when the per-Domain byte
            budget is exhausted, and the `Retry-After` response header
            carries the number of seconds the caller should wait before
            retrying.
          headers:
            Retry-After:
              description: |
                Seconds the caller should wait before retrying, derived
                from the exhausted quota bucket's refill window.
              schema:
                type: integer
                minimum: 0
              required: true
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/capacity-exceeded"
                title: "Too Many Requests"
                status: 429
                detail: "per-Domain observability ingest budget exceeded; retry after the window refills."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/audit"
                code: "capacity_exceeded"
        "501":
          description: |
            The observability ingest surface is not yet provisioned in this
            build. The Problem body's `code` field is
            `observability_ingest_not_provisioned` so log scrapers can
            alert on the deferred-wiring state. Resolves once an
            observability ingest backend (`PLEXSPHERE_OBS_NATS_URL`) is
            configured and the ingest Service is wired into the v1 handler
            dependency cone.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/observability-ingest-not-provisioned"
                title: "Not Implemented"
                status: 501
                detail: "POST /v1/nodes/{id}/audit requires a configured observability ingest backend. The surface is not provisioned in this build."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/audit"
                code: "observability_ingest_not_provisioned"
        "503":
          description: |
            The ingest buffer could not accept the batch — the stream
            backend is unreachable or saturated. The Problem body's `code`
            field is `ingest_buffer_unavailable`, and the `Retry-After`
            response header carries the number of seconds the caller should
            wait before retrying.
          headers:
            Retry-After:
              description: |
                Seconds the caller should wait before retrying the batch.
              schema:
                type: integer
                minimum: 0
              required: true
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/ingest-buffer-unavailable"
                title: "Service Unavailable"
                status: 503
                detail: "the observability ingest buffer is unavailable; retry the batch shortly."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/audit"
                code: "ingest_buffer_unavailable"
  /v1/nodes/{id}/reachability:
    get:
      operationId: GetNodeReachability
      summary: Read the reachability projection for a Node.
      description: |
        Returns the latest `Reachability` projection for the addressed
        Node — the per-Node state-machine the heartbeat handler
        advances on every accepted heartbeat. The projection is the authoritative health view the
        operator UI and reconciliation surface consume; it transitions
        `healthy` → `stale` after 90s without a heartbeat and `stale`
        → `unreachable` after 300s, with `changed_at` tracking the
        most recent transition.

        The endpoint reuses the `node-agent` ReBAC relation already
        guarding `GET /v1/nodes/{id}/state` and
        `GET /v1/nodes/{id}/events`, so any caller authorised to issue
        a reconciliation pull is also authorised to read the
        reachability projection. Unauthenticated callers receive 401;
        authenticated callers without the relation receive 403; an
        unknown Node id surfaces as 404 only after the authorisation
        gate passes so the endpoint cannot be used as a Node-id oracle
        .

        DEFERRED-WIRING POSTURE: until the production
        composition root supplies the ReachabilityRepo, RelationChecker,
        and NodeRepo ports the handler depends on, every request to
        this endpoint returns 501 with `code:
        reachability_not_provisioned` so log scrapers can alert on the
        deferred-wiring state. See docs/architecture/mesh-event-bus-roadmap.md for the
        deferred work tracking.
      tags:
        - mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Node identifier (UUIDv7) — the reachability scope.
      responses:
        "200":
          description: |
            Latest `Reachability` projection for the addressed Node.
            `last_heartbeat_at` is `null` until the first heartbeat is
            accepted; `changed_at` is always present and tracks the
            most recent state transition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reachability"
              example:
                state: "healthy"
                last_heartbeat_at: "2026-04-27T10:15:30Z"
                changed_at: "2026-04-27T10:15:30Z"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller lacks the `node-agent` ReBAC relation on the
            addressed Node and may not read the reachability projection.
            The Problem body's `code` field is `insufficient_relation`
            .
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/insufficient-relation"
                title: "Forbidden"
                status: 403
                detail: "Caller lacks the node-agent relation on this Node."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/reachability"
                code: "insufficient_relation"
        "404":
          description: |
            Node id not found. Surfaced only after the authorisation
            gate has passed so the endpoint cannot be used as a
            Node-id oracle. The Problem body's `code` field is
            `node_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/node-not-found"
                title: "Not Found"
                status: 404
                detail: "Node id not found."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/reachability"
                code: "node_not_found"
        "501":
          description: |
            The reachability surface is not yet provisioned in this
            build. The Problem body's `code` field is
            `reachability_not_provisioned` so log scrapers can alert
            on the deferred-wiring state. Resolves once
            ReachabilityRepo, RelationChecker, and NodeRepo are wired
            into the v1 handler dependency cone (see docs/architecture/mesh-event-bus-roadmap.md).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/reachability-not-provisioned"
                title: "Not Implemented"
                status: 501
                detail: "GET /v1/nodes/{id}/reachability requires the production wiring of ReachabilityRepo, RelationChecker, and NodeRepo. One or more ports are not yet provisioned in this build (see docs/architecture/mesh-event-bus-roadmap.md)."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/reachability"
                code: "reachability_not_provisioned"
  /v1/nodes/{id}/keys/rotate:
    post:
      operationId: PostNodeKeysRotate
      summary: Trigger a mesh-key rotation for a Node.
      description: |
        Asks the control plane to dispatch a `rotate_keys` command to
        the addressed Node so it generates a fresh Curve25519 keypair
        without re-enrolling from scratch. An operator calls this when
        a Node's mesh key is aged or possibly compromised. The
        handler:

          1. Authenticates the caller and rejects requests without a
             resolved Principal with 401.
          2. Checks the operator-action ReBAC relation `node-operate`
             on `node:<id>` BEFORE any existence check, so an
             unauthorised caller cannot probe Node existence via the
             404/403 timing differential. A caller lacking the
             relation receives 403 `insufficient_relation` and an
             audit row with outcome `insufficient_relation`.
          3. Records a pending `peer_key_rotation` row and appends
             exactly one `rotate_keys` outbox event in a single
             transaction. A second trigger against a Node that already
             has a pending rotation returns the existing rotation
             handle and appends no second event — the operation is
             idempotent.

        The 200 response carries the rotation handle: the
        `peer_key_rotation` row id, the live Peer id, and
        `already_pending` (true when the response reflects a
        pre-existing in-flight rotation rather than a fresh request).

        DEFERRED-WIRING POSTURE: until the production composition root
        supplies the RotationRequester and the ReBAC RelationChecker
        the handler depends on, every request to this endpoint returns
        501 with `code: node_keys_rotate_not_provisioned` so log
        scrapers can alert on the deferred-wiring state.
      tags:
        - mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Node identifier (UUIDv7) — the rotation scope.
      responses:
        "200":
          description: |
            Rotation request recorded. A pending `peer_key_rotation`
            row exists and a `rotate_keys` command has been dispatched
            (or was already in flight — see `already_pending`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotationTriggerResponse"
              example:
                rotation_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a4"
                peer_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a5"
                already_pending: false
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller lacks the `node-operate` ReBAC relation on the
            addressed Node and may not trigger a key rotation. The
            PermissionDenied body's `reason` field is
            `insufficient_relation`. Surfaced before any existence
            check so the endpoint cannot be used as a Node-id oracle.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
              example:
                type: "https://plexsphere.dev/errors/insufficient-relation"
                title: "Forbidden"
                status: 403
                detail: "principal lacks the operator-action relation on the addressed Node."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/keys/rotate"
                reason: "insufficient_relation"
                correlation_id: "rebac-1719500000000000000"
        "404":
          description: |
            Node id does not match any Node in this Domain. Surfaced
            only after the authorisation gate has passed so the
            endpoint cannot be used as a Node-id oracle. The Problem
            body's `code` field is `node_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/node-not-found"
                title: "Not Found"
                status: 404
                detail: "node id does not match any Node in this Domain."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/keys/rotate"
                code: "node_not_found"
        "500":
          description: |
            Internal server error. An authorization-check fault or a
            rotation-request persistence failure surfaces here.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: |
            The key-rotation trigger surface is not yet provisioned in
            this build. The Problem body's `code` field is
            `node_keys_rotate_not_provisioned` so log scrapers can
            alert on the deferred-wiring state. Resolves once the
            RotationRequester and the ReBAC RelationChecker are wired
            into the v1 handler dependency cone.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/node-keys-rotate-not-provisioned"
                title: "Not Implemented"
                status: 501
                detail: "POST /v1/nodes/{id}/keys/rotate requires the production wiring of RotationRequester and RelationChecker. One or more ports are not yet provisioned in this build."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/keys/rotate"
                code: "node_keys_rotate_not_provisioned"
  /v1/nodes/{id}/keys/rotate/preview:
    get:
      operationId: GetNodeKeysRotatePreview
      summary: Preview the fleet impact of rotating a Node's mesh key.
      description: |
        Returns a non-mutating dry-run of the fleet impact a manual
        mesh-key rotation against the addressed Node would have. Backs
        the Phase-2 dashboard "manual key-rotation with impact preview"
        view and the `plexctl key rotate --preview` CLI. The handler:

          1. Authenticates the caller and rejects requests without a
             resolved Principal with 401.
          2. Checks the same operator-action ReBAC relation
             `node-operate` on `node:<id>` that the mutating
             `POST /v1/nodes/{id}/keys/rotate` checks, BEFORE any
             existence check, so an unauthorised caller cannot probe
             Node existence via the 404/403 timing differential. A
             caller lacking the relation receives 403
             `insufficient_relation` and an audit row with outcome
             `insufficient_relation`.
          3. Resolves the per-Node read-side projection — the live
             Peer the rotation would target, every peer edge whose
             PSK would be re-issued, and the in-flight rotation row
             (if any). NO `peer_key_rotation` row is created, NO
             `rotate_keys` outbox event is appended, and NO audit row
             beyond the read-side ReBAC decision is emitted.

        The 200 response payload mirrors the mutating endpoint's view
        of the world one-for-one — `peer_id` matches what the live
        `POST` would return, `already_pending` flips on a pre-existing
        in-flight rotation the same way — so a renderer that consumes
        both surfaces can drive the dashboard confirmation dialog from
        a single mapping.

        DEFERRED-WIRING POSTURE: until the production composition root
        supplies the read-side preview projection and the ReBAC
        RelationChecker the handler depends on, every request to this
        endpoint returns 501 with
        `code: node_keys_rotate_preview_not_provisioned` so log
        scrapers can alert on the deferred-wiring state.
      tags:
        - mesh
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Node identifier (UUIDv7) — the rotation scope.
      responses:
        "200":
          description: |
            Impact preview for the requested rotation. Carries the
            target Peer, the affected-edge listing, the
            `already_pending` flag, and an estimated wall-clock
            duration so the renderer can size its progress indicator.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotationImpactPreview"
              example:
                node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0"
                peer_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a5"
                affected_peer_count: 2
                affected_edges:
                  - peer_node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a6"
                    current_kid: "did:web:plexsphere.dev#psk-2026-04"
                    current_wrap_key_version: 7
                  - peer_node_id: "0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a7"
                    current_kid: "did:web:plexsphere.dev#psk-2026-04"
                    current_wrap_key_version: 7
                already_pending: false
                estimated_duration_seconds: 12
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller lacks the `node-operate` ReBAC relation on the
            addressed Node and may not preview a key rotation. The
            PermissionDenied body's `reason` field is
            `insufficient_relation`. Surfaced before any existence
            check so the endpoint cannot be used as a Node-id oracle.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
              example:
                type: "https://plexsphere.dev/errors/insufficient-relation"
                title: "Forbidden"
                status: 403
                detail: "principal lacks the operator-action relation on the addressed Node."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/keys/rotate/preview"
                reason: "insufficient_relation"
                correlation_id: "rebac-1719500000000000000"
        "404":
          description: |
            Node id does not match any Node in this Domain. Surfaced
            only after the authorisation gate has passed so the
            endpoint cannot be used as a Node-id oracle. The Problem
            body's `code` field is `node_not_found`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/node-not-found"
                title: "Not Found"
                status: 404
                detail: "node id does not match any Node in this Domain."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/keys/rotate/preview"
                code: "node_not_found"
        "500":
          description: |
            Internal server error. A projection-read failure or an
            authorization-check fault surfaces here.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "501":
          description: |
            The key-rotation impact-preview surface is not yet
            provisioned in this build. The Problem body's `code` field
            is `node_keys_rotate_preview_not_provisioned` so log
            scrapers can alert on the deferred-wiring state. Resolves
            once the preview projection and the ReBAC RelationChecker
            are wired into the v1 handler dependency cone.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "https://plexsphere.dev/errors/node-keys-rotate-preview-not-provisioned"
                title: "Not Implemented"
                status: 501
                detail: "GET /v1/nodes/{id}/keys/rotate/preview requires the production wiring of PreviewProjection and RelationChecker. One or more ports are not yet provisioned in this build."
                instance: "/v1/nodes/0190a8b8-a0c0-7a0a-8a0a-a0a0a0a0a0a0/keys/rotate/preview"
