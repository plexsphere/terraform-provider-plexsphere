              $ref: "#/components/schemas/LabelDefinitionUpdateRequest"
      responses:
        "200":
          description: Label Definition updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabelDefinition"
        "400":
          description: Invalid body.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          description: Caller is not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: |
            Caller is not authorized to manage the Definition's scope.
            Body is a `PermissionDenied` problem.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/PermissionDenied"
        "404":
          description: Label Definition not found.
          content:
            application/problem+json:
